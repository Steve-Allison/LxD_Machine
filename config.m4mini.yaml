paths:
  corpus_path: Knowledge_Base
  ontology_path: Yamls
  data_path: data

ollama:
  url: http://localhost:11434

models:
  embed: qwen3-embedding:4b
  embed_dims: 2048
  embed_backend: ollama
  llm: qwen3:30b-a3b
  rerank: dengcao/Qwen3-Reranker-4B:Q4_K_M
  llm_no_think: true

chunking:
  strategy: hierarchical_docling
  chunk_size: 256
  chunk_overlap: 50
  min_tokens: 20
  tokenizer_backend: tiktoken
  tokenizer_name: cl100k_base

embedding:
  timeout_secs: 180
  retry_attempts: 3
  retry_backoff:
    - 2
    - 4
    - 8
  query_instruction: "Instruct: Represent this sentence for retrieval.\nQuery: "

corpus:
  text_extensions:
    - ".md"
    - ".docling.json"
    - ".docling.md"
  asset_extensions:
    - ".png"
  ignore_names:
    - ".DS_Store"
  min_text_file_bytes: 1

assets:
  register_png: true
  infer_docling_parent: true

ontology:
  include_globs:
    - "**/*.yaml"
  ignore_names: []

retrieval:
  dense_top_k: 20
  rerank_top_k: 20
  lexical_fusion_weight: 2.0

reranker:
  enabled: true
  backend: llama_cpp
  url: http://127.0.0.1:8012
  endpoint: /v1/rerank
  timeout_secs: 30
  launch:
    auto_start: true
    executable: llama-server
    model_source: ollama_blob
    host: 127.0.0.1
    port: 8012
    startup_timeout_secs: 120
    extra_args: []

expansion:
  enabled: false
  hops: 1
  max_terms: 12

synthesis:
  max_chunks: 12
  timeout_secs: 90
  temperature: 0.1
  max_tokens: 2000

mcp:
  server_name: lxd-machine
  version: 0.1.0

logging:
  level: INFO
  format: json
