# Standard Data Requirements
textual:
  required:
    - "Full transcript or body text"
    - "Sentence/Paragraph segmentation"
  optional:
    - "Speaker notes"
    - "Speaker labels (diarization)"
  fallback:
    rule: "If speaker notes missing, analyze body text only."

structural:
  required:
    - "Sequence order (Slide # or Timecode)"
    - "Section headers (if available)"
  optional:
    - "Hierarchy levels (Title vs Body)"
  fallback:
    rule: "If structure missing, assume linear flow."

# SOAR-specific narrative analysis requirements
# Source: Research - Using SOAR Storytelling most effectively.md
soar_specific:
  description: "Input requirements specific to SOAR narrative arc analysis"
  required:
    - "Full slide text in sequence order (for arc classification)"
    - "Slide count and position metadata (to assess arc distribution across deck)"
  optional:
    - "Audience persona tag (for SOAR weight override lookup)"
    - "Sales stage tag (SS0-SS10) for stage-appropriate SOAR emphasis"
    - "Hierarchy level tag (L1-L4) for inheritance validation"
    - "Title or headline text separated from body text (for action_title scoring)"
  fallback:
    rule: "If hierarchy level absent, default to L2 weighting (balanced O/A/R). If persona absent, use default_by_tier CMO profile."
  soar_classification_minimum:
    description: "Minimum text required for reliable SOAR stage classification"
    min_words_per_slide: 15
    min_slides_for_arc_analysis: 3
    confidence_when_minimal: 0.5
    note: "Single-slide analysis possible for stage classification; arc analysis requires minimum 3 slides"
