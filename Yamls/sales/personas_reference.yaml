# ==============================================================================
# CHAMPION ARCHETYPE GUIDANCE
# Identifying and empowering internal champions per persona tier
# Source: Research - Using SOAR Storytelling most effectively.md
# ==============================================================================

champion_archetype_guidance:
  purpose: "Guidance on identifying and empowering internal customer champions to drive deals"
  source: "Research - Using SOAR Storytelling most effectively.md; Research - Comprehensive Audience Analysis.md"

  champion_profile:
    definition: "An internal advocate who believes in the solution and is willing to mobilize internal support"
    soar_role: "ACTION stage — the champion is the vehicle through which the solution story becomes real"
    identification_signals:
      - "Asks specific 'how would this work for us' questions (not just 'tell me more')"
      - "Volunteers to arrange additional stakeholder meetings"
      - "Uses Adobe terminology in their own communications"
      - "Shares internal challenges beyond what was asked"
    by_persona:
      cmo: "Champion when they own the business case and have CEO mandate for transformation"
      vp_marketing: "Most common champion tier — operational authority plus executive access"
      director_marketing_ops: "Technical champion — validates integration and workflow fit"
      marketing_manager: "End-user champion — validates day-to-day usability"

  champion_narrative_strategy:
    arming_the_champion:
      - "Provide a one-slide business case summary in their language (not Adobe language)"
      - "Supply peer proof from similar companies or roles they respect"
      - "Give them an objection-handling script for their specific economic buyer concerns"
      - "Align on the ask — what they need to say to their boss to get the next meeting"
    soar_message_for_champion:
      situation: "Confirm the champion version of the status quo is accurate"
      opportunity: "Help champion articulate the cost of inaction to their economic buyer"
      action: "Frame Adobe role as enabling the champion vision (champion as hero, Adobe as guide)"
      result: "Provide a proof point the champion can personally verify or identify with"

# ==============================================================================
# NARRATIVE DEPLOYMENT BY PERSONA TIER
# SOAR emphasis and opening hook strategy per persona tier
# Source: Research - Canonical Presentation Methodology Research.md
# ==============================================================================

narrative_deployment:
  purpose: "SOAR deployment strategy tuned per persona tier for narrative generation"
  source: "Research - Canonical Presentation Methodology Research.md; Crafting Powerful Opening Plays.md"

  by_tier:
    executive:
      soar_entry_point: "O stage — skip establishing Situation; assume awareness, lead with urgency"
      opening_hook: "Provocative statistic or peer benchmark (your competitors are already doing X)"
      time_to_value: "< 3 slides to first value claim"
      proof_preference: "CEO or board-level outcomes; peer comparison; named customer logos"
      narrative_length: "Short and sharp; no more than 10-12 slides for a standalone exec deck"
      banned_patterns:
        - "feature lists"
        - "technical architecture diagrams first"
        - "re-establishing known context"

    senior_leadership:
      soar_entry_point: "S to O transition — validate the current state briefly, escalate to opportunity"
      opening_hook: "Day-in-the-life problem scenario or cost-of-inaction framing"
      time_to_value: "< 5 slides to first value claim"
      proof_preference: "Functional metrics (CAC, pipeline velocity, content velocity); peer proof"
      narrative_length: "Medium; 15-20 slides is appropriate"
      banned_patterns:
        - "vision without specificity"
        - "generic industry stats not tied to their function"

    practitioner:
      soar_entry_point: "S stage — fully establish current pain; practitioners need to feel heard before they trust"
      opening_hook: "Specific, relatable workflow pain moment (Have you ever spent 3 hours looking for an approved asset?)"
      time_to_value: "Can tolerate longer setup; quality of A stage matters most"
      proof_preference: "Workflow demos; peer practitioner testimonials; time-saved metrics"
      narrative_length: "Can be longer with deep dives; 20-30 slides acceptable with interaction"
      banned_patterns:
        - "abstract strategy language"
        - "ROI claims without operational specifics"
