_meta:
  id: personas_reference
  title: Personas
  description: Buyer persona definitions across Executive, Senior Leadership, and
    Practitioner tiers with pain points, KPIs, preferred/banned terms, value messages,
    and stage-specific SOAR weight overrides (15-persona standard incl. CXO and CRO)
  domain: sales
  domain_type: cross_cutting
  purpose: reference
  version: "2.4.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Crafting Powerful Opening Plays.md"
    - "Corpus/Research/Research - Comprehensive Audience Analysis.md"
    - "Corpus/Research/SOAR - A Universal Storytelling Framework for Learning Professionals.md"
    - "Corpus/Research/Research - Using SOAR Storytelling most effectively.md"
    - "Corpus/Research/Research - Canonical Presentation Methodology Research.md"


  relationships:
    - target: entities/audience_entities.yaml
      type: depends_on
      description: "Buyer personas inform audience detection; sales personas draw on audience entity patterns"
personas:
- persona_id: cmo
  label: Chief Marketing Officer
  tier: executive
  role: CMO
  reports_to: CEO
  team_size: 50-500
  industry: General
  context: 'Responsible for overall marketing strategy, brand, and revenue attribution.

    Under pressure to prove marketing ROI and connect spend to pipeline.

    Balancing brand building with demand generation in tight budget environment.

    '
  pains:
  - Inability to prove marketing's revenue contribution
  - Fragmented customer data across channels
  - Content production bottlenecks slowing time-to-market
  - Inconsistent brand experience across touchpoints
  - Pressure to do more with flat or reduced budgets
  - Difficulty attributing pipeline to marketing activities
  - Keeping pace with AI disruption in marketing
  kpis:
  - Marketing-sourced pipeline
  - Marketing-influenced revenue
  - Customer acquisition cost (CAC)
  - Brand awareness and sentiment
  - Marketing ROI / ROMI
  - Customer lifetime value (CLTV)
  - Speed to market for campaigns
  goals:
  - Unified view of customer across all channels
  - Personalisation at scale without 1:1 manual effort
  - Prove marketing's contribution to revenue
  - Accelerate content velocity 10x
  - Reduce agency dependency
  objections:
  - We've invested heavily in our current stack
  - Integration with existing systems is always painful
  - My team doesn't have capacity for another platform migration
  - How is this different from what we already have?
  tone_hints:
  - strategic
  - outcome-focused
  - visionary but practical
  - ROI-conscious
  - customer-centric
  preferred_terms:
  - revenue impact
  - customer experience
  - personalisation at scale
  - unified customer view
  - time to value
  - marketing ROI
  - brand consistency
  banned_terms:
  - best-in-class
  - synergy
  - paradigm shift
  - revolutionary
  - silver bullet
  - seamless
  value_messages:
  - Connect every marketing dollar to revenue outcomes
  - Deliver personalised experiences across every touchpoint
  - Accelerate content production without adding headcount
  - Unify customer data for real-time activation
  stage_overrides:
    1:
      weights:
        S: 0.35
        O: 0.45
        A: 0.1
        R: 0.1
      focus: Industry trends and strategic vision
    3:
      weights:
        S: 0.15
        O: 0.35
        A: 0.3
        R: 0.2
      must_include_messages:
      - revenue impact
      - customer experience
    5:
      weights:
        S: 0.1
        O: 0.2
        A: 0.4
        R: 0.3
      focus: Concrete ROI and implementation timeline
- persona_id: cfo
  label: Chief Financial Officer
  tier: executive
  role: CFO
  reports_to: CEO
  team_size: 20-100
  industry: General
  context: 'Focused on financial performance, cost optimisation, and risk management.

    Evaluates technology investments through TCO, payback, and ROI lens.

    Increasingly involved in digital transformation business cases.

    '
  pains:
  - Unpredictable technology costs and scope creep
  - Difficulty quantifying ROI on marketing technology
  - Lack of visibility into spend efficiency
  - Vendor sprawl increasing complexity and cost
  - Compliance and audit burden
  - Multi-year commitments with uncertain value
  kpis:
  - Operating margin
  - Technology spend as % of revenue
  - Payback period on investments
  - Total cost of ownership (TCO)
  - Revenue per employee
  - Working capital efficiency
  goals:
  - Predictable, transparent pricing
  - Consolidated vendor relationships
  - Clear payback within 12-18 months
  - Reduced operational complexity
  - Risk mitigation and compliance
  objections:
  - The upfront investment is too high
  - We need to see hard ROI numbers, not projections
  - Why can't we build this ourselves for less?
  - What's the exit cost if this doesn't work?
  tone_hints:
  - data-driven
  - risk-aware
  - outcome-focused
  - pragmatic
  - efficiency-minded
  preferred_terms:
  - ROI
  - TCO
  - payback period
  - cost reduction
  - operational efficiency
  - risk mitigation
  - compliance
  - predictable costs
  banned_terms:
  - nice to have
  - strategic investment
  - priceless
  - unlimited potential
  - transformation
  value_messages:
  - Reduce marketing technology TCO by 30% through consolidation
  - 12-month payback through operational efficiency gains
  - Predictable subscription pricing with no hidden costs
  - Reduce compliance risk with built-in governance
  stage_overrides:
    3:
      weights:
        S: 0.1
        O: 0.25
        A: 0.35
        R: 0.3
      must_include_messages:
      - TCO
      - payback
      - ROI
    5:
      weights:
        S: 0.05
        O: 0.15
        A: 0.4
        R: 0.4
      focus: Business case with concrete numbers
- persona_id: cro
  label: Chief Revenue Officer
  tier: executive
  role: CRO
  reports_to: CEO
  team_size: 100-2000
  industry: General
  context: 'Owns revenue growth across the full customer lifecycle (new business, expansion, renewals) and alignment across Sales, Marketing, and Customer Success.

    Focused on pipeline health, conversion, forecast accuracy, and scaling repeatable selling motions.

    Accountable for seller productivity and driving consistent execution across regions and segments.'
  pains:
  - Inconsistent pipeline creation and progression across teams/regions
  - Low confidence in forecast due to poor data hygiene and stage discipline
  - Siloed marketing-to-sales handoffs reducing conversion
  - Long, unpredictable sales cycles and high no-decision rates
  - Difficulty scaling best practices and coaching across the org
  - Tool sprawl and process friction increasing non-selling time
  kpis:
  - Pipeline coverage and velocity
  - Stage conversion rates (SS2→SS3→SS5→Close)
  - Win rate / no-decision rate
  - Average sales cycle length
  - Forecast accuracy (CQ and CQ+1)
  - Net new ARR / bookings and expansion
  - Seller productivity (time in selling vs admin)
  goals:
  - Build predictable pipeline creation and progression engine
  - Improve forecast confidence through stage rigor and next-step discipline
  - Tighten marketing-sales alignment to increase conversion
  - Reduce sales cycle time while increasing deal size and win rates
  - Scale repeatable plays and coaching to lift the whole field
  objections:
  - This sounds like more process and admin burden for sellers
  - We already have tools—adoption is the problem
  - Change management will slow us down this quarter
  - Show me how this improves win rate and forecast accuracy quickly
  tone_hints:
  - metric-driven
  - operational
  - direct
  - accountable
  - field-oriented
  preferred_terms:
  - pipeline velocity
  - conversion
  - forecast accuracy
  - seller productivity
  - repeatable motions
  - time to value
  banned_terms:
  - eventually
  - maybe
  - nice to have
  - silver bullet
  - seamless
  value_messages:
  - Increase pipeline velocity and win rates with a repeatable, customer-value motion
  - Improve forecast confidence by aligning stages, exit criteria, and next steps
  - Reduce non-selling time through streamlined workflows and better tooling
  stage_overrides:
    1:
      weights:
        S: 0.3
        O: 0.4
        A: 0.15
        R: 0.15
      focus: Business priorities, growth opportunity, and why change now
    3:
      weights:
        S: 0.1
        O: 0.3
        A: 0.35
        R: 0.25
      must_include_messages:
      - pipeline velocity
      - conversion
      - forecast accuracy
    5:
      weights:
        S: 0.05
        O: 0.2
        A: 0.35
        R: 0.4
      focus: Execution plan, resources, and measurable impact on funnel metrics
- persona_id: cio
  label: Chief Information Officer
  tier: executive
  role: CIO
  reports_to: CEO
  team_size: 100-1000
  industry: General
  context: 'Responsible for enterprise technology strategy and IT operations.

    Balancing innovation demands with security, stability, and cost control.

    Under pressure to enable business agility while managing technical debt.

    '
  pains:
  - Shadow IT and ungoverned SaaS proliferation
  - Integration complexity across legacy and modern systems
  - Security and data governance concerns
  - Skill gaps in emerging technologies (AI, cloud)
  - Pressure to reduce costs while enabling innovation
  - Technical debt slowing down delivery
  - Vendor lock-in limiting flexibility
  kpis:
  - System uptime and reliability
  - Time to deploy new capabilities
  - IT spend as % of revenue
  - Security incident frequency
  - Application portfolio rationalisation
  - Cloud migration progress
  goals:
  - Unified, governed technology ecosystem
  - Reduce integration complexity
  - Enable business agility without sacrificing security
  - Consolidate vendors and reduce sprawl
  - Future-proof architecture
  objections:
  - How does this integrate with our existing systems?
  - What's the security and compliance posture?
  - We're already in the middle of a cloud migration
  - My team is stretched thin on implementation capacity
  - What happens to our existing investments?
  tone_hints:
  - technical but business-aware
  - risk-conscious
  - architecture-focused
  - pragmatic
  - security-minded
  preferred_terms:
  - integration
  - API-first
  - governance
  - security
  - scalability
  - time to value
  - composable architecture
  - extensibility
  banned_terms:
  - plug and play
  - no IT required
  - self-service
  - hacky
  - workaround
  value_messages:
  - Native integrations with your existing enterprise stack
  - Enterprise-grade security with SOC 2, ISO 27001 compliance
  - Composable architecture that grows with your needs
  - Reduce integration complexity by 60%
  stage_overrides:
    3:
      weights:
        S: 0.15
        O: 0.25
        A: 0.4
        R: 0.2
      must_include_messages:
      - integration
      - security
      - governance
    4:
      weights:
        S: 0.1
        O: 0.2
        A: 0.45
        R: 0.25
      focus: Technical architecture and integration details
- persona_id: cxo
  label: Chief Experience Officer
  tier: executive
  role: CXO
  reports_to: CEO
  team_size: 50-500
  industry: General
  context: 'Owns end-to-end customer experience strategy across channels and touchpoints.

    Accountable for improving customer satisfaction, loyalty, and lifetime value by aligning data, journeys, content, and operations.

    Balances experience consistency, privacy/trust, and speed-to-market while coordinating cross-functional teams.'
  pains:
  - Fragmented experiences across channels, brands, or regions
  - Siloed teams and systems preventing coordinated journeys
  - Inability to operationalize personalization with trust and governance
  - Difficulty measuring experience impact on revenue and retention
  - High effort to scale consistent experiences and content
  - Privacy, consent, and compliance constraints limiting activation
  kpis:
  - Customer satisfaction (CSAT) / NPS
  - Customer retention / churn
  - Customer lifetime value (CLTV)
  - Conversion and engagement across journeys
  - Time-to-market for experience changes
  - Experience consistency / compliance rate
  goals:
  - Deliver consistent, connected customer journeys across channels
  - Increase loyalty and lifetime value through relevant engagement
  - Scale personalization with governance and privacy controls
  - Reduce friction across acquisition-to-renewal experiences
  - Create measurable linkage between experience and growth outcomes
  objections:
  - We have too many competing CX priorities right now
  - Our data and teams are too fragmented to execute this
  - We need stronger proof that this improves retention and revenue
  - Governance and privacy requirements will slow implementation
  tone_hints:
  - customer-obsessed
  - outcome-focused
  - cross-functional
  - pragmatic
  - trust-and-governance minded
  preferred_terms:
  - customer journey
  - customer outcomes
  - experience orchestration
  - loyalty
  - trust and governance
  - time to value
  - connected experiences
  banned_terms:
  - seamless
  - silver bullet
  - one-size-fits-all
  - magic
  value_messages:
  - Connect data, content, and journeys to deliver coordinated experiences end-to-end
  - Scale personalization safely with enterprise governance and privacy controls
  - Improve retention and lifetime value by optimizing journeys with real-time insights
  stage_overrides:
    1:
      weights:
        S: 0.3
        O: 0.4
        A: 0.15
        R: 0.15
      focus: Customer themes and experience vision
    3:
      weights:
        S: 0.15
        O: 0.3
        A: 0.35
        R: 0.2
      must_include_messages:
      - customer outcomes
      - customer journey
    5:
      weights:
        S: 0.1
        O: 0.2
        A: 0.4
        R: 0.3
      focus: Operational plan, governance, and measurable impact
