_meta:
  id: sales_stages_reference
  title: Sales Stages
  description: Adobe sales methodology defining 10 stages from Prospect Outreach to
    Renewal & Expand, with SOAR emphasis weights, exit criteria, and stakeholder mapping
    per stage (SS0–SS10 aligned)
  domain: sales
  domain_type: cross_cutting
  purpose: reference
  version: "2.3.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Crafting Powerful Opening Plays.md"
    - "Corpus/Research/Learner Outcomes - Instructions v4.md"
    - "Corpus/Research/Research - Corporate Learning Assessment- Strategies, Modalities, and Best Practices.md"
    - "Corpus/Research/Research - Using SOAR Storytelling most effectively.md"
    - "Corpus/Research/The Universal Narrative Methodology: A Framework for Crafting and Improving Stories.md"


  relationships:
    - target: sales/soar_mapping_reference.yaml
      type: depends_on
      description: "Sales stages map to SOAR phases; stages reference used for SOAR stage classification"
method_id: AdobeSalesMethod
notes: 'Complete Adobe sales methodology covering pre-sales (stages 1-7) and post-sales (stages 8-10).

  SOAR emphasis weights shape narrative generation and scoring per stage.

  Customer journey phases: Discover → Explore → Buy → Implement → Adopt → Grow

  Aliases are intentionally curated to onboarding + main Corporate/ACE language only (no low-confidence shorthand).'
sales_stages:
- id: SS0
  legacy_ids:
  - '0'
  name: Account Planning
  customer_journey_phase: Discover
  hierarchy_level: L1
  objectives:
  - Prioritize accounts/territory using data and insights
  - Develop Account/Business Plan and Big Idea hypothesis
  - Identify target stakeholders and outreach plan
  - Align internal ecosystem on account strategy
  story_emphasis:
    S: 0.4
    O: 0.3
    A: 0.2
    R: 0.1
  tone: Strategic, insight-led
  exit_criteria_customer:
  - Target account(s) and initial stakeholders identified for outreach
  exit_criteria_internal:
  - Account/territory prioritized and documented
  - Account plan (Full or Lite) and Big Idea drafted
  - Outreach next steps logged in CRM
  key_stakeholders:
  - Account Team (AE/AD, Specialists)
  - BDR/SDR (where applicable)
  - Solution Consultant / DSG (as needed)
  example_messages:
  - Based on our research, we believe your team may be facing…
  - Here is our hypothesis on the biggest opportunity for you in the next 6–12 months…
  aliases_by_context:
    onboarding:
    - Account Planning/Outreach
    - Account Planning
    - Account / Business Planning/Outreach
    corporate:
    - Prospecting
  aliases:
  - Account / Business Planning/Outreach
  - Account Planning
  - Account Planning/Outreach
  - Prospecting
- id: SS1
  name: Prospect Outreach
  customer_journey_phase: Discover
  hierarchy_level: L1
  objectives:
  - Initial contact with potential stakeholders
  - Validate research on challenges, issues, and business objectives
  - Articulate Big Idea and seek alignment
  - Qualification of account against ICP
  story_emphasis:
    S: 0.4
    O: 0.4
    A: 0.1
    R: 0.1
  tone: Visionary, thought-provoking
  exit_criteria_customer:
  - Secure a meeting or conversation with customer or prospect
  exit_criteria_internal:
  - Internal agreement on account level strategies, challenges, and objectives
  - Validate Big Idea with existing partners
  - Next steps identified with ecosystem and updated in CRM
  key_stakeholders:
  - Marketing Leaders (CMO, VP of Marketing)
  - Creative Leaders (CCO, Creative Director)
  example_messages:
  - We're seeing X trend transforming the industry...
  - What if you could achieve Y transformation?
  - Industry leaders are facing this strategic challenge...
  legacy_ids:
  - '1'
  aliases_by_context:
    onboarding:
    - Prospect Outreach
    corporate:
    - Prospecting
  aliases:
  - Prospect Outreach
  - Prospecting
- id: SS2
  name: Opportunity Evaluation
  customer_journey_phase: Discover
  hierarchy_level: L1
  objectives:
  - Conduct structured initial discovery call
  - Understand business challenges and identify issues to solve
  - Determine interest in exploring Adobe solutions
  - Confirmation of next steps
  story_emphasis:
    S: 0.3
    O: 0.4
    A: 0.2
    R: 0.1
  tone: Consultative, empathetic
  exit_criteria_customer:
  - Confirmation of high-quality business issue and desire to engage
  - Confirmation of next steps and future meeting
  exit_criteria_internal:
  - Opportunity Driver determined
  - Business issue confirmed
  - Compelling event established (timing)
  - Use case defined and agreed to
  - BBAT information confirmed
  key_stakeholders:
  - Marketing Leaders
  - Creative Leaders
  - Marketing Operations
  example_messages:
  - Tell us about your current challenges with...
  - How does this impact your team's ability to...
  - What would success look like for you?
  legacy_ids:
  - '2'
  aliases_by_context:
    onboarding:
    - Opportunity Evaluation
    corporate:
    - Opportunity Evaluation
  aliases:
  - Opportunity Evaluation
- id: SS3
  name: Detailed Discovery and Vision
  customer_journey_phase: Explore
  hierarchy_level: L2
  objectives:
  - Gain deep understanding of business priorities and challenges
  - Confirm use cases accurately reflect customer needs
  - Develop tailored Adobe POV
  - Establish mutual plan with sequence of events
  story_emphasis:
    S: 0.2
    O: 0.4
    A: 0.3
    R: 0.1
  tone: Collaborative, insightful
  exit_criteria_customer:
  - Customer reviews POV and agrees to at least one use case to be resolved with Adobe
  - Customer and Adobe agree to next steps and initial Mutual Success Plan
  exit_criteria_internal:
  - Business Driver determined
  - Business issue confirmed with stakeholder
  - Compelling event established (timing)
  - Use case defined and validated internally
  key_stakeholders:
  - Marketing Operations
  - Creative Operations
  - IT Leaders
  example_messages:
  - Based on what we've learned, here's how we see the opportunity...
  - Our POV on addressing your use case...
  - Here's the mutual plan to move forward...
  legacy_ids:
  - '3'
  aliases_by_context:
    onboarding:
    - Detailed Discovery & Vision
    - Detailed Discovery and Vision
    corporate:
    - Qualification
  aliases:
  - Detailed Discovery & Vision
  - Detailed Discovery and Vision
  - Qualification
- id: SS4
  name: Circle of Influence & Qualification
  customer_journey_phase: Explore
  hierarchy_level: L2
  objectives:
  - Align with key decision makers
  - Review discovery findings and POV
