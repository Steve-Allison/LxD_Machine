# ==============================================================================
# NARRATIVE ARC GUIDANCE
# Stage-by-stage SOAR opening pattern recommendations
# Source: Research - Using SOAR Storytelling most effectively.md
# ==============================================================================

narrative_arc_guidance:
  purpose: "Recommended narrative opening patterns and SOAR beat emphasis per sales stage"
  source: "Research - Using SOAR Storytelling most effectively.md; Crafting Powerful Opening Plays.md"

  by_stage:
    SS0_account_planning:
      opening_pattern: "Hypothesis-led: Based on our research, we believe you are facing X — here is the hypothesis we want to validate"
      soar_beat: "S-dominant (80%)"
      hook_type: "Research-backed insight"
      narrative_goal: "Secure agreement on the problem before proposing any solution"

    SS1_prospect_outreach:
      opening_pattern: "Industry trend + provocative question: X trend is reshaping your industry — what is your strategy for Y?"
      soar_beat: "S to O transition"
      hook_type: "Provocative statistic or trend observation (Kairos)"
      narrative_goal: "Create curiosity and urgency; book the next conversation"

    SS2_opportunity_evaluation:
      opening_pattern: "Consultative discovery: Tell us about your current situation with X — what is working and what is not?"
      soar_beat: "S-focused, O emerging"
      hook_type: "Open question that surfaces pain"
      narrative_goal: "Confirm the business issue; establish Compelling Event"

    SS3_detailed_discovery_vision:
      opening_pattern: "Adobe POV: Based on what we have learned, here is how we see the opportunity to transform X"
      soar_beat: "O to A transition"
      hook_type: "Customer-specific insight framed as forward-looking opportunity"
      narrative_goal: "Align on use cases; get customer to co-author the solution narrative"

    SS4_circle_of_influence:
      opening_pattern: "Stakeholder-specific value frame: For your role, the key business case is X — here is how peers in your position have succeeded"
      soar_beat: "A-heavy, R emerging"
      hook_type: "Peer proof + role-specific value"
      narrative_goal: "Win C-suite commitment; validate business case ROI"

    SS5_solution_definition:
      opening_pattern: "Technical credibility: Here is the solution architecture and the verified outcomes it delivers"
      soar_beat: "A-dominant, R as proof"
      hook_type: "Architecture + validated case study"
      narrative_goal: "Remove technical objections; finalize proposal alignment"

    SS6_customer_commit:
      opening_pattern: "Results-first: Here is the immediate value you will realize in the first 90 days — and here is what we need to make it happen"
      soar_beat: "R-dominant (50%)"
      hook_type: "Quick-win timeline + risk mitigation"
      narrative_goal: "Secure verbal commitment; address pricing objections with value recapping"

    SS7_execute_to_close:
      opening_pattern: "Transition-focused: The journey begins with X — here is how your team will be supported every step"
      soar_beat: "A + R balanced"
      hook_type: "Onboarding roadmap + success metrics"
      narrative_goal: "Smooth handover; sustain buyer confidence through signature"

    SS8_SS10_post_sales:
      opening_pattern: "Value realization: Here is the progress against your goals — and the next opportunity to expand value"
      soar_beat: "R-dominant (50-60%)"
      hook_type: "KPI dashboard + expansion story"
      narrative_goal: "Reinforce ROI; surface expansion opportunity with peer proof"
