  exit_criteria_internal:
  - Key decision makers agreed to updated POV
  - Stakeholder requirements addressed
  - Confirmation of financial resources (budget) and buying timeline
  key_stakeholders:
  - C-Level Marketing (CMO)
  - C-Level Tech (CIO, CTO)
  - Senior Leaders of Marketing (VP, Director)
  example_messages:
  - Here's how our solution addresses your strategic priorities...
  - We've validated this approach with similar organizations...
  - The business case shows clear ROI in your timeline...
  legacy_ids:
