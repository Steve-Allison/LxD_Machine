# ==============================================================================
# SOAR NARRATIVE NOTES
# Narrative deployment guidance for the FY26 sales play hierarchy
# Source: Research - Using SOAR Storytelling most effectively.md
# ==============================================================================

soar_narrative_notes:
  purpose: "Guidance on applying SOAR narrative framework across the L1 to L4 play hierarchy"
  source: "Research - Using SOAR Storytelling most effectively.md; Research - Canonical Presentation Methodology Research.md"

  hierarchy_narrative_pattern:
    L1:
      soar_emphasis: "S + O dominant (40/40% weight)"
      narrative_role: "Establish the transformational vision and urgency for change"
      opening_strategy: "Lead with industry trend or provocative statistic (Situation), escalate to loss-aversion frame (Opportunity)"
      key_message: "The world has changed; here is why acting now matters"
    L2:
      soar_emphasis: "O + A + R (30/40/30% weight)"
      narrative_role: "Make the pain specific and the solution concrete"
      opening_strategy: "One-line bridge to L1 vision, then deep-dive into customer problem and use cases"
      key_message: "Here is the specific problem, our approach, and the proof it works"
    L3:
      soar_emphasis: "A + R dominant (50/30% weight)"
      narrative_role: "Demonstrate technical credibility and validated outcomes"
      opening_strategy: "Bridge to L2 value prop, then capabilities walkthrough with benchmarks"
      key_message: "Here is exactly how it works and how similar customers succeeded"
    L4:
      soar_emphasis: "A + R dominant, persona-WIIFM first"
      narrative_role: "Translate the play into the persona language and priorities"
      opening_strategy: "WIIFM statement, then approach steps in persona workflow terms, then role-relevant proof"
      key_message: "Here is what this means for you, your team, and your KPIs"

  play_count_narrative_implications:
    csc_plays: 6
    ucx_plays: 4
    b2b_plays: 5
    guidance: "Each L2 play must have a distinct Opportunity villain and Action hero to avoid narrative collision at L1 presentations"
