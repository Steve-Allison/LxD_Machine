# ==============================================================================
# NARRATIVE DEPLOYMENT FRAMEWORK
# SOAR arc shape and opening strategy per portfolio play (L1)
# Source: Research - Using SOAR Storytelling most effectively.md
# ==============================================================================

narrative_deployment_framework:
  purpose: "Canonical SOAR arc and opening hook strategy per portfolio play for narrative generation"
  source: "Research - Using SOAR Storytelling most effectively.md; Crafting Powerful Opening Plays.md"

  by_portfolio_play:
    FY26_L1_CSC:
      name: Content Supply Chain for the AI World
      arc_shape: man_in_hole
      opening_hook_type: provocative_statistic
      situation_frame: "Content demand is growing 3x while budgets remain flat; teams rely on disconnected tools creating bottlenecks"
      opportunity_villain: "Content fragmentation — disconnected planning, creation, activation, and measurement systems"
      opportunity_kairos: "Generative AI has eliminated the cost barrier to personalization at scale; competitors are moving now"
      action_hero: "Adobe GenStudio — the only integrated AI-powered content supply chain from planning to performance"
      result_proof_types:
        - content_velocity_metrics
        - agency_spend_reduction
        - brand_consistency_scores

    FY26_L1_UCX:
      name: Unified Customer Experience for the AI World
      arc_shape: man_in_hole
      opening_hook_type: customer_scenario
      situation_frame: "Customer expectations have outpaced marketing infrastructure; point solutions create data silos and inconsistent journeys"
      opportunity_villain: "Channel-first marketing vs customer-first reality; fragmented data prevents real-time personalization"
      opportunity_kairos: "AI agents can now act on unified data in real time; brands without unified CX lose to those who have it"
      action_hero: "Real-Time CDP + Journey Optimizer + AEM Sites — unified data, journeys, and content in one platform"
      result_proof_types:
        - conversion_rate_improvement
        - cac_reduction
        - customer_lifetime_value_increase

    FY26_L1_B2B:
      name: B2B GTM Orchestration
      arc_shape: man_in_hole
      opening_hook_type: provocative_question
      situation_frame: "B2B buying groups now average 6-10 stakeholders; manual orchestration across fragmented tools creates pipeline leakage"
      opportunity_villain: "Siloed marketing-sales-content tools that prevent buying group engagement at the right moment"
      opportunity_kairos: "AI-native competitors are orchestrating buying group journeys at scale; manual GTM is a strategic liability"
      action_hero: "Marketo Engage + Journey Optimizer B2B + Real-Time CDP B2B — unified GTM intelligence and orchestration"
      result_proof_types:
        - pipeline_velocity
        - win_rate
        - cac
        - sales_cycle_reduction

    FY26_L1_EUP:
      name: End-User Productivity
      arc_shape: rags_to_riches
      opening_hook_type: day_in_the_life
      situation_frame: "Knowledge workers spend 40%+ of time finding, reading and recreating information trapped in documents"
      opportunity_villain: "Static, siloed PDFs and tool sprawl that prevent fast decisions and high-quality stakeholder outputs"
      opportunity_kairos: "Trusted AI in documents has arrived; organizations that embed it now gain durable productivity advantage"
      action_hero: "Acrobat Studio — AI Assistant + PDF Spaces for trusted document intelligence and creation"
      result_proof_types:
        - time_to_decision_reduction
        - tool_consolidation_savings
        - stakeholder_output_quality
