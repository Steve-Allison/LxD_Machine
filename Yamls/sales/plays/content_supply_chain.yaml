_meta:
  id: content_supply_chain
  title: Content Supply Chain
  description: Content Supply Chain portfolio play (L1) with six strategic sales plays spanning Workflows & Planning, On-brand Creation, Supercharge Creative Teams, Scaled Asset Production, Asset Management, and Content Insights
  domain: sales
  domain_type: cross_cutting
  purpose: reference
  version: "2.4.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Crafting Powerful Opening Plays.md"
    - "Corpus/Research/Research - Comprehensive Audience Analysis.md"
    - "Corpus/Research/Research - Slide Deck Design Playbook Research.md"
    - "Corpus/Research/Research - Using SOAR Storytelling most effectively.md"
    - "Corpus/Research/The Universal Narrative Methodology: A Framework for Crafting and Improving Stories.md"


  relationships:
    - target: sales/play_catalog_reference.yaml
      type: depends_on
      description: "Play instance references the play catalog for classification context"
sales_play:
  tier: L1
  id: L1_CSC_AI_WORLD
  name: Content Supply Chain for the AI World
  description: Transform disconnected workflows, technologies, and teams so organizations can deliver and scale content at
    the speed, scale, and ROI required in an AI-first world.
  transformational_vision: Adobe GenStudio helps customers build an AI-powered content supply chain by integrating AI across
    content workflows—planning to production to activation to performance insights.
  target_customers:
    segment: Enterprise organizations with high content demand (cross-industry)
    account_characteristics:
    - Content demand outpaces capacity
    - Disconnected planning/production/activation workflows
    - Need brand integrity + compliance at scale
    - Limited visibility into content performance and reuse
  target_personas:
  - persona: Marketing Leaders
  - persona: Creative Leaders
  - persona: Ops Leaders (Marketing/Creative Ops)
  - persona: IT Leaders (CIO/CTO)
  cross_cloud_overlays:
    DMe:
      overlap_type: direct (Creation & Production) + indirect (enterprise narrative)
      customer_groups:
      - Creative Pros
      - Business Pros
      dme_motions_summary:
      - 'Creative Pros: drive value through Creative Cloud core offerings; Firefly adoption/credit consumption and workflow
        expansion.'
      - 'Business Pros: Acrobat + Express; Acrobat Studio positioned as hero in primary Corporate motion.'
      dme_apps_commonly_positioned_with_CSC:
      - Creative Cloud
      - Adobe Express
      - Frame.io
      - Firefly Services
      - Firefly Custom Models
      - Firefly Foundry
      - Acrobat Studio
  related_portfolio_plays:
  - id: L1_END_USER_PRODUCTIVITY
    name: End-User Productivity
    notes: Separate portfolio play in FY26 enterprise framework (DMe-led).
  - id: L1_KNOWLEDGE_BASED_PRODUCTIVITY
    name: Knowledge Based Productivity
    notes: Separate portfolio play in FY26 enterprise framework (DMe-led).
  strategic_sales_plays:
  - tier: L2
    id: L2_CSC_WORKFLOWS_PLANNING_METADATA
    name: Workflows, Planning & Metadata
    value_proposition: Boost end-to-end visibility, govern metadata/brand standards, and automate work across connected plans
      & AI-powered workflows to shorten creation-to-activation cycles.
    applications_included:
    - Workfront Planning
    - Workfront Workflow
    key_use_cases:
    - Campaign planning & in-flight visibility
    - Review/approval automation
    - Metadata governance and standards
  - tier: L2
    id: L2_CSC_ONBRAND_CREATION_FOR_MARKETERS
    name: 'C&P: On-brand Creation for Marketers and Beyond'
    value_proposition: Enable distributed teams to self-serve on-brand content variations with guardrails, reducing creative
      bottlenecks and agency reliance.
    applications_included:
    - GenStudio for Performance Marketing
    - Adobe Express
    - (optional) AEM Assets
    cross_cloud_overlays:
      DMe:
        overlap_type: direct (DX & DMe)
        dme_apps:
        - Adobe Express
        notes: Express is positioned as the on-brand self-serve creation surface (often alongside GenStudio).
    key_use_cases:
    - On-brand variant creation
    - Localization/resize/format variations
    - Template-driven content production
  - tier: L2
    id: L2_CSC_SUPERCHARGE_CREATIVE_TEAMS
    name: 'C&P: Supercharge Creative Teams'
    value_proposition: Accelerate creative productivity with AI-enhanced tools and integrated workflows so creative teams
      can meet rising content demands.
    applications_included:
    - Creative Cloud
    - Frame.io
    - Firefly Services
    - Firefly Custom Models
    - Firefly Foundry
    cross_cloud_overlays:
      DMe:
        overlap_type: direct (DX & DMe)
        notes: Explicitly delivered as a DX & DMe strategic play in Play & Product Activate materials.
    key_use_cases:
    - Creative collaboration and review
    - AI-assisted creation and iteration
    - High-value creative production workflows
  - tier: L2
    id: L2_CSC_SCALED_ASSET_PRODUCTION
    name: 'C&P: Scaled Asset Production'
    value_proposition: Automate production of versions/variants at scale (channel, region, persona) to meet personalization
      demands without sacrificing brand integrity.
    applications_included:
    - GenStudio for Performance Marketing
    - Firefly Services
    - Firefly Custom Models
    - (optional) Adobe Express
    cross_cloud_overlays:
      DMe:
        overlap_type: direct (DX & DMe)
        notes: Explicitly delivered as a DX & DMe strategic play in Play & Product Activate materials.
    key_use_cases:
    - Scaled variants and localization
    - Automated production workflows
    - Performance-informed creative iteration
  - tier: L2
    id: L2_CSC_ASSET_MANAGEMENT_REUSE
    name: Asset Management & Reuse
    value_proposition: Manage a governed library of assets, fragments, and templates to improve findability, reuse, rights/compliance,
      and activation speed.
    applications_included:
    - AEM Assets
    - Workfront Workflow
    key_use_cases:
    - DAM modernization and AI tagging
    - Rights/compliance governance
    - Reuse and distribution via portals/hubs
  - tier: L2
    id: L2_CSC_CONTENT_INSIGHTS
    name: Content Insights
    value_proposition: Identify which content attributes drive outcomes and continuously optimize content strategy using performance
      insights and measurement.
    applications_included:
    - Content Analytics
    - Customer Journey Analytics
    key_use_cases:
    - Content performance measurement
    - Attribution to business outcomes
    - Optimization recommendations
  canonical_aliases:
    portfolio_play:
    - Content Supply Chain
    - Content Supply Chain for the AI World
    - CSC

soar_narrative_blueprint:
  purpose: "Canonical SOAR arc and opening strategy for Content Supply Chain play"
  source: "Research - Using SOAR Storytelling most effectively.md"
  arc_shape: man_in_hole

  stages:
    situation:
      opening_frame: "Enterprise content demand has grown 3x in 5 years while production capacity and budgets remain flat"
      data_anchor: "IDC: companies producing 5x more content are growing revenue 2.9x faster — but 65% of content assets are never used"
      status_quo_pain: "Teams rely on 5-8 disconnected tools for planning, creation, approval, activation and measurement — creating bottlenecks, brand violations, and wasted spend"

    opportunity:
      villain_frame: "Content fragmentation — disconnected systems that prevent content from flowing efficiently from brief to brand-approved asset to activated and measured performance"
      pain_vocabulary:
        - content_bottleneck
        - brand_inconsistency
        - agency_over_reliance
        - content_sprawl
        - roi_blindness
        - approval_delays
      loss_aversion_frame: "Every day of content backlog is a missed campaign, a delayed launch, and a competitor gaining share with faster content cycles"
      kairos_trigger: "Generative AI has eliminated the cost barrier to creating personalized content at scale — organizations that do not build a CSC now will fall further behind"

    action:
      value_frame: "Adobe GenStudio provides an integrated AI-powered content supply chain — from unified planning and governance through AI-powered creation, brand-safe activation, and performance measurement"
      differentiation_language: "Only Adobe integrates the full content supply chain on a single platform: planning (Workfront), creation (Creative Cloud + Firefly), activation (AEM + GenStudio), insights (Content Analytics)"
      champion_story: "Creative Director or VP Marketing Ops as champion; they own the broken workflow and have the team trust to drive the fix"

    result:
      proof_pattern: "Before/after: [Customer] achieved 10x content velocity while reducing agency spend by 35% in 6 months after deploying GenStudio CSC"
      validated_outcome_types:
        - content_velocity_increase
        - agency_spend_reduction
        - brand_consistency_improvement
        - time_to_activation_reduction
        - content_roi_measurement_enabled

  audience_calibration:
    cmo: "Lead with marketing ROI and brand consistency at scale; O to R frame"
    cco_creative_director: "Lead with creative team empowerment and tool consolidation; S to A frame"
    marketing_ops: "Lead with workflow visibility and approval cycle reduction; S to O frame"
    cio: "Lead with governance, security, and integration architecture; A to R frame"
