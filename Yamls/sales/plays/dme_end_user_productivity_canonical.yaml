sales_play:
  tier: L1
  id: L1_END_USER_PRODUCTIVITY
  name: End-User Productivity
  aliases:
  - AI–Driven Secure Productivity
  - Secure Productivity
  - Digital Documents for Modern Workplace
  - Document Cloud for Enterprise (DCE)
  description: Drive secure, AI-powered productivity for business professionals and knowledge workers by modernizing document
    workflows, collaboration, and content output in one trusted platform.
  transformational_vision: Evolve document work from fragmented, manual PDF tasks into an outcome-based productivity and creation
    platform that accelerates decisions, improves collaboration, and reduces tool sprawl—built on Acrobat with enterprise
    security and trusted AI.
  target_customers:
    segment: Enterprise and Corporate accounts (DMe focus)
    account_characteristics:
    - High document volume / knowledge-worker heavy functions
    - Need secure collaboration, compliance and governance
    - Tool sprawl across PDF editing, collaboration, and lightweight content creation
  target_personas:
  - persona: IT & Innovation Leaders
    notes: CIO/CTO/VP IT / CSO; prioritize security, consolidation, ROI.
  - persona: Line-of-Business Leaders
    notes: Finance, Legal, HR, Sales, Procurement; own departmental outcomes and workflows.
  - persona: Business Professionals / Knowledge Workers
    notes: End users creating, reviewing, summarizing, and remixing documents.
  core_value_pillars:
  - Secure document productivity across desktop, web and mobile
  - AI-powered document insights grounded in customer documents
  - Collaboration and shared context for multi-document work
  - Create and remix polished, on-brand content from document insights
  solution_scope:
    primary_solution: Acrobat Studio
    solution_components:
    - Acrobat Pro
    - AI Assistant
    - PDF Spaces / Projects
    - Adobe Express Premium
    adjacent_components_optional:
    - Acrobat Sign
    - Acrobat Services / PDF Services
    - Document Cloud consulting / CSS
  strategic_sales_plays:
  - tier: L2
    id: L2_KNOWLEDGE_BASED_PRODUCTIVITY
    name: Knowledge Based Productivity
    value_proposition: Unlock insights trapped in documents and convert them into high-impact outputs—fast—using trusted AI
      in Acrobat Studio and built-in creation capabilities via Express across departments.
    applications_included:
    - Acrobat Studio
    - Adobe Express
    notes: Positioned as the strategic play driven by an executive CIO pitch for Business Pros; frequently referenced in Accelerate
      decks.
  cross_cloud_overlays:
    DX:
      related_portfolio_play: Content Supply Chain for the AI World
      overlap_type: indirect
      notes: Overlaps with CSC via on-brand creation capabilities (Express) and creation/production narratives; CSC remains
        DX-led at portfolio level.

soar_narrative_blueprint:
  purpose: "Canonical SOAR arc and opening strategy for End-User Productivity play"
  source: "Research - Using SOAR Storytelling most effectively.md"
  arc_shape: rags_to_riches

  stages:
    situation:
      opening_frame: "Knowledge workers spend 40%+ of their working day finding, reading, summarizing, and recreating information trapped across disconnected documents and tools"
      data_anchor: "McKinsey: knowledge workers spend 1.8 hours per day searching for information; enterprises with 1000+ employees have an average of 5.3 separate document tools in use"
      status_quo_pain: "Critical business knowledge is locked in static PDFs — inaccessible to AI, hard to search, and requiring manual effort to transform into decisions and stakeholder-ready outputs"

    opportunity:
      villain_frame: "Information fragmentation — the barrier between knowledge trapped in documents and the fast decisions and polished outputs that business teams need"
      pain_vocabulary:
        - information_overload
        - manual_synthesis
        - version_chaos
        - tool_sprawl
        - slow_decision_making
        - stakeholder_communication_bottleneck
      loss_aversion_frame: "Teams that do not embed trusted AI in document workflows will lose weeks per quarter to manual information work their competitors have already automated"
      kairos_trigger: "Trusted, grounded AI in documents has arrived — Acrobat AI Assistant cites sources and answers questions directly from your documents, eliminating hallucination risk"

    action:
      value_frame: "Acrobat Studio (AI Assistant + PDF Spaces + Adobe Express) transforms document knowledge into decisions and deliverables — securely, with citations, and with enterprise brand controls"
      differentiation_language: "Only Acrobat provides PDF-native trusted AI with grounded citations + integrated creation capabilities (Express) — reducing tool sprawl while accelerating knowledge worker output"
      champion_story: "CIO as executive champion (security + consolidation + ROI); Line-of-Business Leader as functional champion (faster decisions, better outputs)"

    result:
      proof_pattern: "Before/after: [Department] reduced research-to-brief time by 60% and consolidated 3 document tools into Acrobat Studio within 60 days"
      validated_outcome_types:
        - time_to_decision_reduction
        - document_tool_consolidation_savings
        - stakeholder_output_quality_improvement
        - collaboration_efficiency_increase

  audience_calibration:
    cio: "Lead with security, consolidation, and per-seat ROI; A to R frame (TCO focus)"
    lob_leader: "Lead with faster decisions and better stakeholder outputs; O to R frame"
    knowledge_worker: "Lead with relatable pain (manual research/synthesis) and demo-ready workflow; S to A frame"
