_meta:
  id: instructional_design_rubric
  title: "Instructional Design Rubric"
  description: "Scoring rubric for instructional design quality covering objective alignment, activity-objective mapping, assessment validity, scaffold progression, and learner engagement strategies"
  domain: pedagogical
  domain_type: workflow
  purpose: scoring
  version: "1.2.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Research - Comprehensive Learning Design Framework.md"
    - "Corpus/Research/Research - Merrills Instructional Design Theories Applied.md"
    - "Corpus/Research/Activities - Research + Instructions v4.md"
    - "Corpus/Research/Research - Writing Learning Objectives.md"
    - "Corpus/Research/Best Practices for Structuring Corporate Learning Content.md"
    - "Corpus/Research/Gold Standard Structure for Any Corporate-Learning Asset v3.md"
  academic_sources:
    - "Bloom et al. (1956) - Taxonomy of Educational Objectives (revised Anderson & Krathwohl 2001)"
    - "Merrill (2002) - First Principles of Instruction"
    - "Merrill (1983) - Component Display Theory"
    - "Gagne (1965) - Conditions of Learning / Nine Events of Instruction"
    - "Wiggins & McTighe (2005) - Understanding by Design (backward design)"
    - "Kirkpatrick (1959) - Four Levels of Evaluation"
    - "Biggs (1996) - Constructive Alignment"
    - "Mager (1962) - Preparing Instructional Objectives"
    - "Sweller (1988) - Cognitive Load Theory"
    - "Thompson (2002) - FPI corporate validation study (York University corpus)"
    - "Vygotsky (1978) - Mind in Society: Zone of Proximal Development"
    - "Mayer (2009) - Multimedia Learning: Personalisation Principle and Coherence Principle"
  relationships:
