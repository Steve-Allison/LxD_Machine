    verb_agency_ratio_min: 0.70
    passive_voice_max_pct: 5
    lsm_target: 0.85
    mtld_elite_ted_min: 70    # Measure of Textual Lexical Diversity — elite TED speaker range
    mtld_elite_ted_max: 80
    mtld_academic_threshold: 90  # >90 = academic register (too dense for engagement contexts)
    mtld_novice_threshold: 50    # <50 = limited vocabulary range; signals novice speaker profile
    # Source: Elite Speaker Linguistic Analysis Taxonomy — MTLD benchmarks for speaker tier classification

# =============================================================================
# PENALTIES
# Score deductions applied when specific delivery failures are detected.
# Applied to the dimension score before weighting.
# =============================================================================

penalties:
  - id: "PEN-01"
    label: "Filler Flooding"
    condition: "Filler frequency > 10 per minute"
    deduction: 0.15
    dimension: filler_management
    rationale: "Pervasive fillers divert audience attention from content and signal inadequate preparation"
  - id: "PEN-02"
    label: "Cognitive Overload Rate"
    condition: "Sustained speech rate > 190 WPM for > 60 seconds"
    deduction: 0.12
    dimension: pacing_timing
    rationale: "Rates above 190 WPM cause significant retention drops (17-25%) per UPF cognitive load research"
  - id: "PEN-03"
    label: "Monotone Delivery"
    condition: "F0 SD < 2.0 semitones throughout performance"
    deduction: 0.12
    dimension: vocal_quality
    rationale: "Empirically categorized as flat affect; auditory cortex habituates and disengages"
  - id: "PEN-04"
    label: "Vocal Instability"
    condition: "Jitter > 1.04% or Shimmer > 3.81% sustained"
    deduction: 0.10
    dimension: vocal_quality
    rationale: "Exceeds clinical concern threshold; perceived as nervousness, roughness, or instability"
  - id: "PEN-05"
    label: "Uptalk Pattern"
    condition: "Terminal F0 rise > 40% on > 20% of declarative sentences"
    deduction: 0.10
    dimension: executive_presence
    rationale: "Uptalk transforms declarations into questions, signaling subconscious request for validation"
  - id: "PEN-06"
    label: "Anxiety Leakage"
    condition: "Self-adaptor rate > 5.5 per minute (face, neck, object manipulation)"
    deduction: 0.10
    dimension: physical_delivery
    rationale: "Self-adaptors signal stress; disproportionate in anxious/deceptive states per UPF kinesics data"
  - id: "PEN-07"
    label: "Multimodal Incongruence"
    condition: "Body language consistently contradicts verbal content (head shaking on affirmation, shrug on declarative)"
    deduction: 0.10
    dimension: executive_presence
    rationale: "Audience believes body over words (Dual Coding mismatch); destroys Ethos and trust"
  - id: "PEN-08"
    label: "Excessive Postural Sway"
    condition: "Visible sway area estimated > 3.25 cm² or continuous weight-shifting throughout"
    deduction: 0.08
    dimension: physical_delivery
    rationale: "Sway signals loss of fine motor control under anxiety; highly distracting to audience"
  - id: "PEN-09"
    label: "Lawn Sprinkler Eye Contact"
    condition: "Eye contact < 50% or rapid darting without sustained individual connection"
    deduction: 0.08
    dimension: physical_delivery
    rationale: "Darting gaze communicates anxiety; fails to create the individual connection that drives trust"
  - id: "PEN-10"
    label: "Closed Posture"
    condition: "Elbow abduction < 10 degrees sustained; crossed arms or contracted torso"
    deduction: 0.07
    dimension: executive_presence
    rationale: "Contractive posture signals low confidence and low status; overrides positive vocal signals"
  - id: "PEN-11"
    label: "Vocal Fry Pattern"
    condition: "Habitual creaky phonation at sentence endings on > 30% of phrases"
    deduction: 0.07
    dimension: vocal_quality
    rationale: "Vocal fry perceived as low competence or submission in professional contexts"
  - id: "PEN-12"
    label: "Cluttering"
    condition: "Articulation rate > 5.3 syllables per second for extended passages"
    deduction: 0.06
    dimension: pacing_timing
    rationale: "Exceeds intelligibility threshold; articulators cannot maintain phoneme precision"
  - id: "PEN-13"
    label: "Monologue Mode"
    condition: "Zero engagement techniques used in any 10-minute segment"
    deduction: 0.05
    dimension: audience_engagement
    rationale: "Absence of engagement techniques converts audience from active participants to passive recipients"
  - id: "PEN-14"
    label: "High Propositional Density"
    condition: "PID > 0.55 sustained across presentation"
    deduction: 0.04
    dimension: audience_engagement
    rationale: "Academic density exceeds cognitive processing capacity; audience fatigue and disengagement"
  - id: "PEN-15"
    label: "Breathy Phonation"
    condition: "HNR < 15 dB sustained — excessive noise in vocal signal"
    deduction: 0.03
    dimension: vocal_quality
    rationale: "Breathiness is a submission/intimacy signal, not an authority signal; reduces projection and perceived competence"
  - id: "PEN-16"
    label: "Slide Dependency"
    condition: "Speaker turns to face slides on > 3 occasions OR reads directly from deck OR cannot respond to audience questions without referencing the slide"
    deduction: 0.07
    dimension: physical_delivery
    rationale: "Slide-crutch behavior signals under-rehearsal and breaks eye contact; audience competes for speaker's attention with the screen (Public_Speaking_research)"

