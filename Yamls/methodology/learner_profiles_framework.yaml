# ===========================================================================
# Pedagogical Strategies 2025-2026
# Evidence-based strategies aligned with current workforce and learning landscape
# ===========================================================================

pedagogical_strategies_2026:
  superagency_assessment_model:
    definition: "Structured self-assessment model helping learners identify where AI augments vs. replaces their expertise"
    source: "McKinsey Superagency Framework 2025; Research - The Architecture of the Modern Learner.md"
    target_personas: ["technical_specialist_skeptical_builder", "gen_z_digital_pragmatist"]
    application: "Learners map personal skill stack against AI capability boundaries; identify 'last mile' human-only competencies"
    delivery_format: "Reflective exercise + peer discussion; 15-20 minutes"

  third_space_soft_skills:
    definition: "Interpersonal and meta-cognitive skills that AI cannot automate — occupying the third space between technical and managerial competencies"
    examples: ["influencing without authority", "navigating ambiguity", "psychological safety creation", "cross-generational facilitation"]
    source: "WEF Future of Jobs Report 2025; Deloitte Human Capital Trends 2025; Research - The Architecture of the Modern Learner.md"
    target_personas: ["millennial_overwhelmed_architect", "technical_specialist_skeptical_builder"]
    delivery_format: "Case-based learning with role-play; scenario simulation"

  micro_credentials_signaling:
    definition: "Short, stackable credentials with visible market value — replacing traditional CPD points as motivation mechanism for transactional learners"
    rationale: "Learners earning 25% less than older cohorts prioritise credentials with clear salary uplift evidence"
    source: "Research - Learner Persona Research and Development.md"
    target_personas: ["gen_z_digital_pragmatist", "millennial_overwhelmed_architect"]
    design_requirement: "Each credential must display market salary correlation; integrate LinkedIn badge sharing where platform permits"

  just_in_time_performance_support:
    definition: "Point-of-need micro-resources embedded in workflow tools — replacing scheduled training for time-pressured personas"
    source: "Research - Comprehensive Learning Design Framework.md"
    target_personas: ["millennial_overwhelmed_architect", "sales_director_metric_warrior"]
    formats: ["2-minute explainer clips", "searchable decision trees", "AI-powered chatbot coaches", "one-page job aids"]
    design_rule: "Resource must be retrievable in under 30 seconds within the learner's existing digital environment"

# ===========================================================================
# Profile Inference Rules
# ===========================================================================

inference_rules:
  # Content signals that suggest target learner profile
  signals:
    novice_indicators:
      - "glossary terms used without definition"
      - "assumes no prior knowledge"
      - "step-by-step instructions"
      - "basic concepts explained"

    expert_indicators:
      - "dense technical terminology"
      - "assumes domain knowledge"
      - "focuses on edge cases"
      - "research citations"

    visual_learner_indicators:
      - "heavy use of diagrams"
      - "visual metaphors"
      - "infographic-style layouts"

    kinesthetic_indicators:
      - "hands-on exercises"
      - "practice labs"
      - "interactive elements"

# ===========================================================================
# Default Profile (when not specified)
# ===========================================================================

default_profile:
  expertise_level: intermediate
  learning_style: null  # Balanced approach
  cognitive_profile: null  # Balanced approach
  motivation: problem_solver

  rationale: |
    Default to intermediate expertise (most common corporate learner),
    balanced learning style approach (multiple modalities), and
    problem-solver motivation (practical application focus).
