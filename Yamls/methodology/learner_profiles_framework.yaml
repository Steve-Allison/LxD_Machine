# ==============================================================================
# Learner Profiles Configuration
# Comprehensive learner characteristics for pedagogical analysis
# ==============================================================================

_meta:
  id: learner_profiles_framework
  title: Learner Profiles
  description: Research-based learner profile definitions for instructional design
    evaluation
  domain: audience
  domain_type: cross_cutting
  purpose: methodology
  version: "4.2.0"
  last_updated: '2026-03-01'
  corpus_sources:
    - "Corpus/Research/Research - Learner Persona Research and Development.md"
    - "Corpus/Research/Research - Comprehensive Learning Design Framework.md"
    - "Corpus/Research/Research - The Architecture of the Modern Learner.md"

# ==============================================================================
# MACRO-ENVIRONMENTAL CONTEXT (2025-2026)
# Structural forces shaping every learner profile — critical for scoring context
# ==============================================================================

macro_environmental_context:
  skills_crisis:
    headline_stat: "39% of workers' core skills projected to be transformed or outdated by 2025-2030"
    source: "WEF Future of Jobs Report 2025"
    learner_impact: "Pervasive background anxiety; learners treat current skills as depreciating assets"
    execution_gap: "91% of L&D professionals agree continuous learning is critical; only 36% of orgs qualify as 'career development champions'"
    org_barrier_stat: "63% of transformation barriers are skills gaps in critical thinking and complex problem-solving"

  demographic_collision:
    five_generation_workforce: true
    primary_friction: "Exiting Baby Boomers, commanding Gen X/Millennials, entering Gen Z — simultaneously"
    pedagogical_implication: "Standardized training programs structurally fail multi-generational audiences; persona-aware design is mandatory"
    knowledge_transfer_risk: "Boomer retirement creating institutional knowledge loss in formats younger generations reject"

  trust_deficit:
    manager_trust_stat: "Trust in immediate managers has dropped to 29%"
    source: "DDI Global Leadership Forecast 2025"
    conscious_unbossing: "High-potential employees actively refusing management roles to avoid burnout"
    mentorship_chain_break: "Best performers refusing management breaks traditional mentorship and knowledge transfer chain"
    external_authority_shift: "Learners increasingly turn to LinkedIn influencers, Reddit peers, and industry communities over internal leadership"

  economics_of_learning:
    wage_gap: "Workers under 30 earn approximately 25% less than workers over 40"
    source: "Forbes UK Average Salary by Age 2026; ONS April 2025 data"
    learner_mindset: "Highly transactional; luxury of curiosity-based learning replaced by high-income skill focus"
    priority_certifications: ["Data Analytics", "Project Management", "Generative AI"]

  engagement_crisis:
    global_cost: "Employee disengagement costs global economy approximately $438 billion annually in lost productivity"
    source: "Gallup State of the Global Workplace Report"
    implication: "Disengagement is not uniform — varies by generational persona and must be addressed per profile, not with blanket interventions"

  structural_workforce_factors_2025_2026:
    four_day_work_week:
      adoption_stat: "Companies reporting 4-day week pilot: 92% retention improvement vs control groups"
      source: "4 Day Week Global Pilot Programme 2025"
      learning_implication: "Compressed schedule amplifies premium on time-efficient, high-density learning; eliminates tolerance for padding"
    hybrid_work:
      adoption_stat: "91% of UK knowledge workers in hybrid arrangements (2025)"
      source: "CIPD UK Working Lives Survey 2025"
      design_implication: "Learning delivery must be async-first with optional synchronous touchpoints; no assumption of shared physical space"
    mental_health_as_infrastructure:
      burnout_stat: "67% of UK knowledge workers report moderate to high burnout (2025)"
      source: "Deloitte Mental Health at Work 2025"
      l_and_d_implication: "Psychological safety and cognitive pace must be treated as design constraints; mandatory recovery windows between intensive modules"

expertise_levels:
  novice:
    label: "Novice Learner"
    description: "New to the domain with minimal prior knowledge"

    characteristics:
      prior_knowledge: "minimal"
      schema_development: "building foundational schemas"
      cognitive_load_tolerance: "low"
      abstraction_capacity: "concrete examples required"
      self_regulation: "needs external guidance"

    instructional_needs:
      - "Explicit scaffolding and step-by-step guidance"
      - "Concrete examples before abstract concepts"
      - "Frequent comprehension checks"
      - "High redundancy to reinforce key points"
      - "Clear definitions for domain terminology"
      - "Visual aids and worked examples"

    content_requirements:
      max_concepts_per_slide: 2
      jargon_tolerance: "low"
      requires_definitions: true
      example_to_concept_ratio: 3  # 3 examples per concept
      prerequisite_checks: true

    gagne_emphasis:
      gain_attention: 1.2
      inform_objectives: 1.3  # Critical: must know what they're learning
      stimulate_recall: 0.7  # Less prior knowledge to activate
      present_content: 1.0
      provide_guidance: 1.5  # Heavy scaffolding needed
      elicit_performance: 1.0
      provide_feedback: 1.3  # Frequent feedback essential
      assess_performance: 1.0
      enhance_retention: 1.0

    arcs_emphasis:
      attention: 1.0
      relevance: 1.3  # Must see "why this matters" clearly
      confidence: 1.4  # Build confidence with achievable steps
      satisfaction: 1.0

  intermediate:
    label: "Intermediate Learner"
    description: "Has foundational knowledge, building competence"

    characteristics:
      prior_knowledge: "foundational"
      schema_development: "integrating new with existing"
      cognitive_load_tolerance: "moderate"
      abstraction_capacity: "can handle some abstraction"
      self_regulation: "developing self-direction"

    instructional_needs:
      - "Connections to existing knowledge"
      - "Progressive complexity increase"
      - "Opportunities for application"
      - "Moderate scaffolding with gradual release"
      - "Comparative examples and contrasts"

    content_requirements:
      max_concepts_per_slide: 3
      jargon_tolerance: "moderate"
      requires_definitions: "for advanced terms only"
      example_to_concept_ratio: 2
      prerequisite_checks: false

    gagne_emphasis:
      gain_attention: 1.0
      inform_objectives: 1.0
      stimulate_recall: 1.3  # Activate existing knowledge
      present_content: 1.0
      provide_guidance: 1.0
      elicit_performance: 1.2  # More practice opportunities
      provide_feedback: 1.0
      assess_performance: 1.0
      enhance_retention: 1.1

    arcs_emphasis:
      attention: 1.0
      relevance: 1.0
      confidence: 1.0
      satisfaction: 1.1

  advanced:
    label: "Advanced Learner"
    description: "Strong domain knowledge, seeking mastery"

    characteristics:
      prior_knowledge: "substantial"
      schema_development: "refining and extending"
      cognitive_load_tolerance: "high"
      abstraction_capacity: "comfortable with abstraction"
      self_regulation: "self-directed"

    instructional_needs:
      - "Challenge existing mental models"
      - "Edge cases and exceptions"
      - "Integration across domains"
      - "Minimal scaffolding"
      - "Opportunities for analysis and evaluation"

    content_requirements:
      max_concepts_per_slide: 5
      jargon_tolerance: "high"
      requires_definitions: false
      example_to_concept_ratio: 1
      prerequisite_checks: false

    gagne_emphasis:
      gain_attention: 0.8
      inform_objectives: 0.8
      stimulate_recall: 1.0
      present_content: 1.0
      provide_guidance: 0.6  # Less hand-holding
      elicit_performance: 1.3  # Challenge them
      provide_feedback: 0.9
      assess_performance: 1.2
      enhance_retention: 1.2  # Focus on transfer

    arcs_emphasis:
      attention: 0.9
      relevance: 0.8  # Already motivated
      confidence: 0.8
      satisfaction: 1.2  # Mastery satisfaction

  expert:
    label: "Expert Learner"
    description: "Deep expertise, seeking cutting-edge insights"

    characteristics:
      prior_knowledge: "extensive"
      schema_development: "restructuring for new paradigms"
      cognitive_load_tolerance: "very high"
      abstraction_capacity: "prefers abstraction"
      self_regulation: "fully autonomous"

    instructional_needs:
      - "Novel perspectives and research"
      - "Debate and alternative viewpoints"
      - "Synthesis opportunities"
      - "Peer-level discourse"
      - "Minimal instruction, maximum insight"

    content_requirements:
      max_concepts_per_slide: 7
      jargon_tolerance: "native"
      requires_definitions: false
      example_to_concept_ratio: 0.5  # Fewer examples needed
      prerequisite_checks: false

    gagne_emphasis:
      gain_attention: 0.7
      inform_objectives: 0.6
      stimulate_recall: 0.8
      present_content: 1.0
      provide_guidance: 0.4
      elicit_performance: 1.0
      provide_feedback: 0.7
      assess_performance: 1.0
      enhance_retention: 1.4  # Transfer to novel contexts

    arcs_emphasis:
      attention: 0.8
      relevance: 0.7
      confidence: 0.6
      satisfaction: 1.3

# ===========================================================================
# LEARNING STYLE PREFERENCES - Modality Inclinations
# ===========================================================================

learning_styles:
  visual:
    label: "Visual Learner"
    description: "Prefers diagrams, charts, and spatial representations"

    content_preferences:
      - "Diagrams and flowcharts"
      - "Infographics and data visualizations"
      - "Colour-coded information"
      - "Mind maps and concept maps"
      - "Video demonstrations"

    instructional_adjustments:
      visual_to_text_ratio: 0.6  # 60% visual
      diagram_requirement: true
      animation_beneficial: true
      spatial_layout_important: true

    mayer_emphasis:
      multimedia_principle: 1.3
      spatial_contiguity: 1.4
      signalling: 1.2
      segmenting: 1.0

  verbal:
    label: "Verbal/Reading Learner"
    description: "Prefers text, written explanations, and reading"

    content_preferences:
      - "Detailed written explanations"
      - "Bullet points and lists"
      - "Textual definitions"
      - "Reading materials and references"
      - "Written summaries"

    instructional_adjustments:
      visual_to_text_ratio: 0.3  # 30% visual
      diagram_requirement: false
      bullet_points_preferred: true
      detailed_notes: true

    mayer_emphasis:
      multimedia_principle: 0.8
      coherence_principle: 1.3  # No extraneous visuals
      redundancy_principle: 1.2  # Text reinforcement OK

  auditory:
    label: "Auditory Learner"
    description: "Prefers spoken explanations and discussion"

    content_preferences:
      - "Narrated content"
      - "Discussion and Q&A"
      - "Verbal explanations"
      - "Podcasts and audio"
      - "Mnemonics and verbal cues"

    instructional_adjustments:
      narration_required: true
      discussion_opportunities: true
      verbal_summaries: true

    mayer_emphasis:
      modality_principle: 1.4  # Audio narration preferred
      voice_principle: 1.3
      personalization_principle: 1.2

  kinesthetic:
    label: "Kinesthetic Learner"
    description: "Prefers hands-on practice and active engagement"

    content_preferences:
      - "Interactive exercises"
      - "Simulations and labs"
      - "Practice problems"
      - "Case studies"
      - "Role-playing scenarios"

    instructional_adjustments:
      practice_frequency: "high"
      interactive_elements: true
      simulation_beneficial: true
      real_world_application: true

    gagne_emphasis:
      elicit_performance: 1.5
      provide_feedback: 1.3

# ===========================================================================
# COGNITIVE PROFILES - Processing Characteristics
# ===========================================================================

cognitive_profiles:
  analytical:
    label: "Analytical Thinker"
    description: "Systematic, logical, detail-oriented processing"

    characteristics:
      processing_style: "sequential"
      detail_orientation: "high"
      pattern_recognition: "through analysis"
      decision_making: "data-driven"

    content_preferences:
      - "Logical flow and structure"
      - "Data and evidence"
      - "Step-by-step breakdowns"
      - "Cause-effect relationships"
      - "Comparative analysis"

    instructional_adjustments:
      structure_requirement: "high"
      data_support: true
      logical_sequencing: true

  holistic:
    label: "Holistic Thinker"
    description: "Big-picture, intuitive, pattern-seeking processing"

    characteristics:
      processing_style: "parallel"
      detail_orientation: "low"
      pattern_recognition: "through intuition"
      decision_making: "context-driven"

    content_preferences:
      - "Overview before details"
      - "Conceptual frameworks"
      - "Analogies and metaphors"
      - "Visual summaries"
      - "Connections across topics"

    instructional_adjustments:
      overview_first: true
      conceptual_framework: true
      metaphors_beneficial: true

  reflective:
    label: "Reflective Processor"
    description: "Needs time to process, prefers individual work"

    characteristics:
      processing_speed: "deliberate"
      social_preference: "individual"
      depth_vs_breadth: "depth"

    content_preferences:
      - "Time for reflection"
      - "Self-paced learning"
      - "Written exercises"
      - "Deep-dive content"

    instructional_adjustments:
      pacing: "self-directed"
      reflection_prompts: true
      individual_exercises: true

  active:
    label: "Active Processor"
    description: "Learns by doing, prefers collaborative work"

    characteristics:
      processing_speed: "rapid"
      social_preference: "collaborative"
      depth_vs_breadth: "breadth"

    content_preferences:
      - "Immediate application"
      - "Group activities"
      - "Discussion-based learning"
      - "Trial and error"

    instructional_adjustments:
      pacing: "brisk"
      collaboration_opportunities: true
      immediate_practice: true

# ===========================================================================
# MOTIVATION PROFILES - Why They Learn
# ===========================================================================

motivation_profiles:
  achievement_oriented:
    label: "Achievement-Oriented"
    description: "Motivated by mastery, credentials, and recognition"

    drivers:
      - "Certification and credentials"
      - "Performance metrics"
      - "Competency demonstration"
      - "Career advancement"

    arcs_emphasis:
      attention: 1.0
      relevance: 1.2  # Career relevance
      confidence: 1.1
      satisfaction: 1.4  # Achievement recognition

    content_needs:
      - "Clear success criteria"
      - "Progress indicators"
      - "Assessment opportunities"
      - "Credential pathways"

  curiosity_driven:
    label: "Curiosity-Driven"
    description: "Motivated by intellectual interest and discovery"

    drivers:
      - "Novel information"
      - "Understanding 'why'"
      - "Exploration opportunities"
      - "Intellectual challenge"

    arcs_emphasis:
      attention: 1.4  # High curiosity hook
      relevance: 0.9
      confidence: 0.9
      satisfaction: 1.1

    content_needs:
      - "Intriguing questions"
      - "Deep explanations"
      - "Optional deep-dives"
      - "Thought-provoking challenges"

  problem_solver:
    label: "Problem-Solver"
    description: "Motivated by solving real problems"

    drivers:
      - "Immediate applicability"
      - "Real-world problems"
      - "Practical solutions"
      - "Efficiency gains"

    arcs_emphasis:
      attention: 1.0
      relevance: 1.5  # Must be immediately applicable
      confidence: 1.0
      satisfaction: 1.2

    content_needs:
      - "Problem-centred scenarios"
      - "Practical examples"
      - "Quick wins"
      - "Tool/technique focus"

  social_learner:
    label: "Social Learner"
    description: "Motivated by community and collaboration"

    drivers:
      - "Peer interaction"
      - "Shared learning"
      - "Discussion and debate"
      - "Community belonging"

    arcs_emphasis:
      attention: 1.1
      relevance: 1.0
      confidence: 1.2  # Confidence through peer validation
      satisfaction: 1.3

    content_needs:
      - "Discussion prompts"
      - "Collaborative exercises"
      - "Community references"
      - "Peer examples"

# ===========================================================================
# COMPOSITE PROFILES - Common Combinations
# ===========================================================================

composite_profiles:
  corporate_new_hire:
    description: "New employee onboarding - varied backgrounds"
    expertise_level: novice
    motivation: achievement_oriented
    typical_constraints:
      - "Limited time for training"
      - "Immediate job application needed"
      - "Varied technical backgrounds"

    recommended_approach:
      format: microlearning
      scaffolding: high
      practical_focus: true
      assessment: frequent_low_stakes

  technical_upskill:
    description: "Technical professional learning new technology"
    expertise_level: intermediate
    motivation: problem_solver
    typical_constraints:
      - "Already proficient in related areas"
      - "Needs to apply immediately"
      - "Low tolerance for basics"

    recommended_approach:
      format: self_paced_course
      scaffolding: moderate
      hands_on: critical
      skip_basics: true

  executive_briefing:
    description: "Senior leader needing strategic understanding"
    expertise_level: advanced
    motivation: achievement_oriented
    typical_constraints:
      - "Extremely limited time"
      - "Needs big picture, not details"
      - "Decision-making focus"

    recommended_approach:
      format: microlearning
      scaffolding: minimal
      strategic_focus: true
      data_driven: true

  certification_candidate:
    description: "Learner pursuing formal certification"
    expertise_level: intermediate
    motivation: achievement_oriented
    typical_constraints:
      - "Must cover all exam topics"
      - "Needs assessment practice"
      - "Accountability to credential"

    recommended_approach:
      format: instructor_led_workshop
      scaffolding: moderate
      assessment: frequent
      comprehensive: true

  # ===========================================================================
  # Role-Based Personas - Adobe-Specific Learner Profiles
  # ===========================================================================
  # Note: Adobe personas provide complete progression tracks for Solutions Consultants and Enterprise Sales

  # ===========================================================================
  # Generational Personas - Cross-Role Generational Archetypes
  # ===========================================================================
  # Based on WEF Future of Jobs 2025, Gallup State of Global Workplace, DDI Global Leadership Forecast

  gen_z_digital_pragmatist:
    description: "Generation Z (1997-2012): Digital-first learner seeking security and values alignment"
    persona_name: "Jordan Taylor"
    role_context: "Entry-level to 3 years experience, digital native navigating first corporate role"

    demographics:
      age_range: "24-29"
      birth_years: "1997-2012"
      education: "Bachelor's degree or equivalent"
      experience_years: "0-3"
      workforce_share: "~30% globally (rising rapidly)"

    expertise_level: novice
    learning_style: ["visual", "kinesthetic"]
    cognitive_profile: active
    motivation: achievement_oriented

    psychographic_profile:
      primary_drive: "Security, Autonomy, and Values Alignment"
      stress_level: "51% report high stress (highest among generations)"
      defining_characteristic: "Anxiety and ambition shaped by pandemic and economic turbilence; witnessing Millennial burnout, increasingly skeptical of management career paths"
      screen_time: "6+ hours daily on mobile devices"
      economic_context:
        salary_range_uk: "£23,000 - £32,000"
        economic_mindset: "Survival and Ascent — training viewed as the only ladder out of financial precarity. High churn risk if training does not yield concrete skill gains or salary increases."
        source: "ONS Employee Earnings UK 2025; Forbes UK Salary by Age 2026"

    goals_and_drivers:
      - "Build foundational professional skills to escape financial precarity"
      - "Find meaningful work aligned with personal values"
      - "Develop soft skills (resilience, conflict resolution, face-to-face communication)"
      - "Navigate unwritten rules of corporate culture and office politics"
      - "Achieve rapid upskilling to close 25% wage gap with workers over 40"

    learning_barriers:
      time_constraints:
        - "High anxiety and stress consuming cognitive bandwidth"
        - "Side hustles and gig work limiting dedicated learning time"

      cognitive_barriers:
        - "Soft skills paradox: 30% perception gap between self-assessment and employer assessment"
        - "Lack of 'muscle memory' for high-stakes face-to-face interactions"
        - "Struggle with synchronous, real-time communication after asynchronous upbringing"
        - "Context gap: can Google 'how' but lacks understanding of 'why it matters' in corporate hierarchy"

      social_barriers:
        - "Preference for asynchronous communication (Slack, text) over face-to-face"
        - "Fear of judgment in real-time interactions"
        - "Limited professional network and mentorship access"

      confidence_barriers:
        - "Imposter syndrome in corporate environments"
        - "56% report being left to learn complex tools like AI on their own"
        - "Distrust of highly produced 'corporate' training content as inauthentic"

      content_barriers:
        - "Rejects long-form content (30-page PDFs) in favor of 3-minute videos"
        - "Low tolerance for corporate polish; prefers user-generated content (UGC) style"

      technical_barriers: []  # Digital natives, no technical barriers

      language_considerations: []  # Varies by individual

    digital_learning_perception:
      attitude: "mobile_first_skeptic"
      views:
        - "Primary learning mode is visual, social search (YouTube, TikTok, Instagram Reels)"
        - "Expects mobile-optimized experiences; desktop-only LMS effectively invisible"
        - "Distrusts polished corporate videos; responds to authentic, informal tone"
        - "Values peer-generated content over institutional content"
        - "Craves mentorship despite digital independence (56% report need)"

      trust_factors:
        - "User-generated content and peer recommendations"
        - "Authentic, unpolished presentation style"
        - "Influencer endorsements on LinkedIn and professional communities"
        - "Clear career progression milestones and certifications"

    content_preferences:
      format:
        - "Bite-sized video content (3-5 minutes max)"
        - "TikTok-style visual learning with captions"
        - "Interactive mobile-first modules"
        - "Hidden curriculum training (unwritten rules, email etiquette, stakeholder management)"
        - "Peer cohort learning with social accountability"

      engagement_drivers:
        - "Values alignment and meaningful work connection"
        - "Clear 'why this matters' for career progression"
        - "Gamification with visible progress"
        - "Community and peer support"

      quality_requirements:
        - "Mobile-optimized (6+ hour daily mobile usage)"
        - "Authentic, informal tone (UGC aesthetic)"
        - "Visual-first with minimal text"
        - "High redundancy to reinforce key points"
        - "Explicit scaffolding for soft skills and corporate norms"

    technology_considerations:
      devices:
        - "Smartphone (primary device for 6+ hours daily)"
        - "Laptop (secondary for deep work)"

      tools_used:
        - "TikTok, YouTube, Instagram Reels for learning"
        - "Slack for asynchronous communication"
        - "Mobile-first productivity apps"

      requirements:
        - "Mobile-first mandatory (not mobile-friendly, but mobile-primary)"
        - "Offline capability for commute learning"
        - "Social sharing and peer collaboration features"
        - "Progress tracking with visible milestones"

    recommended_approach:
      format: mobile_first_microlearning
      module_length: "3-5 minutes"
      scaffolding: high
      authentic_tone: critical
      visual_primary: true
      social_learning: true
      hidden_curriculum: critical  # Teach unwritten rules
      mentorship: critical
      mobile_optimization: mandatory

    arcs_emphasis:
      attention: 1.2
      relevance: 1.4  # Must see career path clearly
      confidence: 1.5  # Critical for soft skills development
      satisfaction: 1.1

  millennial_overwhelmed_architect:
    description: "Millennials (1981-1996): Mid-career professionals balancing competing demands"
    persona_name: "Sarah Martinez"
    role_context: "Mid-to-senior manager with 8-15 years experience, squeezed between leadership and workforce demands"

    demographics:
      age_range: "30-45"
      birth_years: "1981-1996"
      education: "Bachelor's or Master's degree"
      experience_years: "8-15"
      workforce_share: "~40% globally (dominant cohort)"

    expertise_level: intermediate
    learning_style: ["auditory", "kinesthetic"]
    cognitive_profile: reflective
    motivation: problem_solver

    psychographic_profile:
      primary_drive: "Flexibility, Efficiency, and Meaning"
      stress_level: "The Burnout Generation"
      defining_characteristic: "Engine room of economy, absorbing friction between executives and Gen Z"
      sandwich_generation: "Caring for children and aging parents simultaneously"
      promotion_basis: "technical_competence_not_leadership_aptitude — promoted for domain expertise, not readiness to lead"
      conscious_unbossing:
        definition: "High-potential Millennials actively refusing leadership roles to avoid management stress and burnout"
        driver: "Seeing overworked, under-supported managers and deciding the career ladder is not worth the climb"
        l_and_d_implication: "Traditional 'high potential' development programs face resistance; leadership aspirations cannot be assumed; career design must be presented as choice, not obligation"
        trust_collapse_stat: "Trust in immediate managers: 29% (DDI Global Leadership Forecast 2025)"
      economic_context:
        salary_range_uk: "£45,000 - £65,000"
        economic_mindset: "The Squeezed Middle — time-poor, mortgage and childcare pressured. Will only invest time in learning if it guarantees efficiency gain or promotion. Highly transactional ROI calculation."
        source: "Forbes UK Average Salary by Age 2026; Research - Learner Persona Research and Development.md, Section 5.1"

    goals_and_drivers:
      - "Find efficiency tools to manage overwhelming workload"
      - "Develop leadership skills as 'Accidental Manager' promoted for technical competence"
      - "Maintain meaningful work amid exhaustion"
      - "Prepare for career advancement while avoiding burnout"
      - "Learn conflict resolution and strategy without formal management training"

    learning_barriers:
      time_constraints:
        - "Cognitive surplus near zero due to work and caregiving"
        - "Cannot dedicate weekends to learning"
        - "Must fit learning into flow of work"
        - "45% lack resources to develop teams effectively"

      cognitive_barriers:
        - "Accidental Manager crisis: promoted without leadership training"
        - "Difficulty balancing technical expertise with people management"
        - "Decision fatigue from constant context switching"

      social_barriers:
        - "Squeezed between executive demands and Gen Z expectations"
        - "Isolated in middle management with limited peer support"

      confidence_barriers:
        - "Unsupported in new management roles"
        - "Uncertainty about coaching and developing others"

      content_barriers:
        - "Long mandatory compliance modules viewed as disrespectful of time"
        - "Theoretical content without immediate application generates resentment"

      technical_barriers: []  # Bridge generation, comfortable with digital and analog

      language_considerations: []  # Varies by individual

    digital_learning_perception:
      attitude: "pragmatic_time_poor"
      views:
        - "Values learning that saves time or relieves burden"
        - "Appreciates efficiency of digital but values in-person connection"
        - "Needs learning to fit into existing workflow, not add to it"
        - "Podcast and audio learning for multitasking (commute, household chores)"

      trust_factors:
        - "Peer validation from others in similar roles"
