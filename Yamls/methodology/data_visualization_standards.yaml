_meta:
  id: data_visualization_standards
  title: "Data Visualization Rules"
  description: "Comprehensive data visualisation standards including chart selection framework, Tufte principles, Cleveland-McGill hierarchy, and cognitive load considerations."
  domain: visual
  domain_type: cross_cutting
  purpose: methodology
  version: "2.2.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Research - visualisation_techniques_corporate_learning.md"
    - "Corpus/Research/Research - Infographics.md"
  relationships:
    - target: methodology/visual_design_principles.yaml
      type: depends_on
