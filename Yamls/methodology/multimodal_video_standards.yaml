# ==============================================================================
# Multimodal Communication
# Dual Coding Theory and visual-verbal integration
# ==============================================================================

_meta:
  id: multimodal_video_standards
  title: Multimodal Video Standards
  description: Principles of multimodal communication including Dual Coding Theory,
    embodied cognition, and channel integration
  domain: visual
  domain_type: cross_cutting
  purpose: methodology
  version: "1.2.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Research - Best Practices for Writing Effective Corporate Learning Content.md"
    - "Corpus/Research/Theory_Mayers_Principles_of_Multimedia_Learning-_A_Comprehensive_Summary.md"

  relationships:
    - target: methodology/infographic_design_framework.yaml
      type: depends_on
      description: "Both visual media standards; video and infographic design share visual communication principles"
dual_coding_theory:
  description: "Allan Paivio's theory of separate visual and verbal processing systems"

  core_principles:
    separate_systems:
      verbal_system: "Processes language, text, speech"
      visual_system: "Processes images, spatial information"
      independence: "Can operate independently or together"

    additive_effect:
      principle: "Using both systems improves recall and understanding"
      evidence: "Items encoded in both systems remembered better"
      implication: "Combine visuals with verbal explanation"

    referential_connections:
      principle: "Systems can activate each other"
      example: "Seeing an image triggers related words and vice versa"
      design_use: "Use visuals that map to verbal concepts"

  cognitive_benefits:
    redundancy: "Multiple traces increase retrieval paths"
    elaboration: "Cross-referencing deepens processing"
    accessibility: "Either channel can trigger recall"

  application_guidelines:
    do:
      - "Pair explanations with relevant visuals"
      - "Use diagrams to illustrate verbal concepts"
      - "Create visual metaphors for abstract ideas"
      - "Show AND tell simultaneously"
    dont:
      - "Use decorative images without semantic link"
      - "Duplicate exact same info in both channels (redundancy)"
      - "Use visuals that conflict with verbal content"

# ==============================================================================
# EMBODIED COGNITION
# ==============================================================================

embodied_cognition:
  description: "Understanding through physical and sensory experience"

  principle: "Cognition is grounded in bodily experience and action"

  application_to_visuals:
    physical_metaphors:
      description: "Use concrete physical representations for abstract concepts"
      examples:
        weight: "Heavy = important, serious"
        direction: "Up = positive, down = negative"
        proximity: "Close = related, far = different"
        size: "Larger = more important"

    gestural_alignment:
      description: "Presenter gestures should reinforce visual content"
      principles:
        - "Point to visual elements when discussing them"
        - "Use hand movements that match diagram relationships"
        - "Gestures indicating size should match visual scale"
      anti_patterns:
        - "Looking away from visuals while describing them"
        - "Contradictory gestures (pointing elsewhere)"

    physical_demonstration:
      description: "Showing physical objects/actions enhances understanding"
      applications:
        - "Hold actual product while discussing"
        - "Demonstrate physical process before showing diagram"
        - "Use props to make abstract concepts tangible"

  video_production_implications:
    staging: "Plan space for physical demonstration"
    framing: "Frame shots to include relevant gestures and objects"
    timing: "Sync presenter movement with content reveal"

# ==============================================================================
# CHANNEL INTEGRATION STRATEGIES
# ==============================================================================

channel_integration:
  description: "Strategies for effective visual-verbal combination"

  complementary_presentation:
    description: "Each channel adds unique information"
    verbal_carries: "Explanation, nuance, sequence"
    visual_carries: "Structure, relationships, evidence"
    result: "Combined understanding greater than either alone"

  temporal_alignment:
    description: "Sync visual appearance with verbal reference"
    principle: "Show it as you say it, not before or after"
    techniques:
      progressive_reveal: "Build visuals in sync with narration"
      highlight_on_mention: "Emphasise element when verbally referenced"
      annotation_timing: "Labels appear as discussed"

  spatial_alignment:
    description: "Position related verbal content near visual referent"
    principle: "Reduce eye travel between related elements"
    techniques:
      integrated_labels: "Text on/beside visual elements"
      callout_positioning: "Callouts adjacent to referenced area"
      verbal_cue_direction: "'As you see on the right...'"

  semantic_alignment:
    description: "Visual meaning matches verbal meaning"
    principle: "Reinforce, don't contradict"
    checks:
      tone_match: "Visual emotion matches verbal tone"
      metaphor_match: "Visual metaphor aligns with verbal metaphor"
      emphasis_match: "Visual prominence reflects verbal importance"

# ==============================================================================
# COGNITIVE LOAD ACROSS CHANNELS
# ==============================================================================

channel_load_management:
  description: "Distributing cognitive load across processing channels"

  modality_principle:
    statement: "Graphics + Narration > Graphics + Text"
    rationale: "Text overloads visual channel; narration uses verbal channel"
    application: "Use spoken words with visuals, not written words"
    exception: "Self-paced learning, reference materials, hearing impairment"

  redundancy_principle:
    statement: "Don't duplicate information across channels"
    bad_practice: "Reading on-screen text word-for-word"
    good_practice: "Keywords on screen, elaboration spoken"
    rationale: "Redundancy wastes cognitive resources on comparison"

  split_attention_avoidance:
    statement: "Integrate information sources physically/temporally"
    visual_spatial: "Place related elements near each other"
    temporal: "Present related information simultaneously"
    rationale: "Mental integration of separated sources uses working memory"

  coherence_principle:
    statement: "Exclude extraneous material from both channels"
    visual: "Remove decorative non-informative elements"
    verbal: "Cut unnecessary words and tangents"
    rationale: "Extraneous material competes for limited attention"

# ==============================================================================
# SKETCHNOTING AS DUAL ENCODING
# ==============================================================================

sketchnoting_cognition:
  description: "Hand-drawn visual note-taking as dual-coding technique"

  cognitive_mechanisms:
    generative_effect:
      principle: "Creating representations strengthens encoding"
      application: "Drawing forces deeper processing than passive viewing"

    dual_encoding:
      principle: "Visual + verbal representation in same artifact"
      application: "Sketched icons paired with text notes"

    spatial_organisation:
      principle: "Physical layout encodes relationships"
      application: "Proximity, containment, connection show meaning"

  integration_with_digital:
    sketchnoting_as_prototype:
      purpose: "Rapid visual thinking before digital production"
      workflow: "Sketch ideas → Test understanding → Digitise refined version"
      benefit: "Low cost exploration, externalized cognition"

    collaborative_sensemaking:
      purpose: "Group visual thinking during discussions"
      application: "Whiteboard sketching during meetings"
      benefit: "Shared visual reference, aligned understanding"

# ==============================================================================
# VIDEO MULTIMODAL INTEGRATION
# ==============================================================================

video_multimodal:
  description: "Integrating multiple channels in video production"

  channel_orchestration:
    visual_channel:
      presenter: "Face, gestures, body language"
      graphics: "Slides, overlays, animations"
      b_roll: "Contextual footage, demonstrations"

    audio_channel:
      voice: "Narration, explanation"
      music: "Emotional tone (use sparingly)"
      effects: "Functional sounds (notifications, transitions)"

    text_channel:
      lower_thirds: "Speaker identification"
      captions: "Accessibility, reinforcement"
      callouts: "Key points, definitions"

  integration_principles:
    hierarchy: "One primary channel at any moment"
    support: "Secondary channels reinforce primary"
    alternation: "Shift primary channel to maintain engagement"

  common_mistakes:
    competing_channels:
      problem: "Text, narration, and visuals all demanding attention"
      solution: "Simplify; choose primary channel"
    misaligned_timing:
      problem: "Visual appears before/after verbal reference"
      solution: "Sync appearance with mention"
    redundant_channels:
      problem: "Same words spoken and displayed"
      solution: "Keywords only on screen; elaborate verbally"

# ==============================================================================
# ACCESSIBILITY ACROSS MODALITIES
# ==============================================================================

accessible_multimodal:
  description: "Ensuring multimodal content is accessible to all"

  alternative_channels:
    for_visual_impairment:
      audio_description: "Verbal description of visual elements"
      text_alternatives: "Alt text, long descriptions"
      data_tables: "Tabular alternative to charts"

    for_hearing_impairment:
      captions: "Synchronized text of audio"
      transcripts: "Full text version"
      visual_cues: "Replacing audio-only information"

  equivalent_experience_principle:
    goal: "Same information and engagement, different channel"
    not: "Reduced or inferior alternative"
    approach: "Design alternatives as first-class, not afterthought"

  progressive_enhancement:
    base: "Core message accessible without any enhancement"
    enhance: "Additional channels enrich but aren't required"
    test: "Does it work with only text? Only audio? Only visual?"
