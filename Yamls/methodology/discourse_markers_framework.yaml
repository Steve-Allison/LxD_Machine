# Temporal Discourse Markers
temporal_markers:
  sequence:
    - marker: "when"
      relation: "temporal"
      position: "subordinate_initial"
      nucleus_satellite: "satellite = temporal trigger, nucleus = event"
      pedagogical_note: "Simple and clear; use in procedures and step-by-step narratives to anchor timing"
      research_citation: "RST Discourse Treebank"
      example: "When we launched the product, demand surged"

    - marker: "after"
      relation: "temporal"
      position: "subordinate_initial"
      nucleus_satellite: "satellite = preceding event, nucleus = subsequent event"
      sequence: "posterior"  # Event B happens after Event A
      pedagogical_note: "Essential for procedure documentation and project timelines; establishes causality through sequence"
      research_citation: "RST Discourse Treebank"
      example: "After completing the pilot, we scaled deployment"

    - marker: "before"
      relation: "temporal"
      position: "subordinate_initial"
      nucleus_satellite: "satellite = future event/condition, nucleus = prior action"
      sequence: "anterior"  # Event B happens before Event A
      pedagogical_note: "Use for prerequisites and preparation steps in learning sequences"
      research_citation: "RST Discourse Treebank"
      example: "Before launching, we validated the market"

    - marker: "until"
      relation: "temporal"
      position: "subordinate_initial"
      nucleus_satellite: "satellite = endpoint/condition, nucleus = iterative action"
      pedagogical_note: "Use for iterative processes, loops, and convergence narratives (repeat until success)"
      research_citation: "DATS framework"
      example: "We tested until we achieved 99% reliability"

    - marker: "while"
      relation: "temporal"
      position: "subordinate_initial"
      nucleus_satellite: "satellite = simultaneous event, nucleus = main event"
      ambiguity: "contrast"  # Can mean during or contrastive
      pedagogical_note: "Ambiguous; context determines meaning (simultaneous vs contrastive). Clarify with explicit contrast markers if needed"
      research_citation: "RST Discourse Treebank"
      example: "While we developed Product A, we maintained Product B"

    - marker: "during"
      relation: "temporal"
      position: "phrase"
      nucleus_satellite: "satellite = time period (nominalised), nucleus = event"
      pedagogical_note: "Nominalised form; use in reports and formal documentation for temporal context"
      research_citation: "RST Discourse Treebank"
      example: "During Q3, we expanded operations"

  sequencing:
    - marker: "first"
      relation: "temporal"
      position: "main_initial"
      sequence: "initial"
      example: "First, we identified the problem"

    - marker: "then"
      relation: "temporal"
      position: "main_initial"
      sequence: "subsequent"
      example: "We analyzed the data, then we formulated a solution"

    - marker: "next"
      relation: "temporal"
      position: "main_initial"
      sequence: "subsequent"
      example: "Next, we validated assumptions with customers"

    - marker: "finally"
      relation: "temporal"
      position: "main_initial"
      sequence: "terminal"
      example: "Finally, we deployed the solution"

    - marker: "subsequently"
      relation: "temporal"
      position: "main_initial"
      formality: "formal"
      example: "We launched in the US. Subsequently, we expanded to Europe"

    - marker: "following"
      relation: "temporal"
      position: "phrase"
      example: "Following the acquisition, we integrated systems"

# Restatement Discourse Markers
restatement_markers:
  - marker: "in other words"
    relation: "elaboration"
    function: "paraphrase"
    example: "We need agility. In other words, we need to adapt quickly"

  - marker: "that is to say"
    relation: "elaboration"
    function: "clarification"
    formality: "formal"
    example: "We prioritize NPS, that is to say, Net Promoter Score"

  - marker: "to put it differently"
    relation: "elaboration"
    function: "alternative_formulation"
    example: "Revenue grew 20%. To put it differently, we added $2M in ARR"

  - marker: "in essence"
    relation: "elaboration"
    function: "summary"
    example: "We improved speed, reduced cost, and increased quality. In essence, we optimized operations"

# Attribution Discourse Markers
attribution_markers:
  reporting_verbs:
    - marker: "according to"
      relation: "attribution"
      formality: "formal"
      example: "According to Gartner, the market will grow 15%"

    - marker: "says"
      relation: "attribution"
      formality: "informal"
      example: "The CEO says revenue will double"

    - marker: "claims"
      relation: "attribution"
      epistemic_stance: "neutral_to_skeptical"
      example: "The vendor claims 99.9% uptime"

    - marker: "reports"
      relation: "attribution"
      formality: "formal"
      example: "IDC reports enterprise adoption is accelerating"

    - marker: "stated"
      relation: "attribution"
      formality: "formal"
      example: "The CFO stated that margins improved"

    - marker: "announced"
      relation: "attribution"
      formality: "formal"
      example: "Microsoft announced the acquisition"

    - marker: "believes"
      relation: "attribution"
      epistemic_stance: "opinion"
      example: "Analysts believe the trend will continue"

# Conditional Discourse Markers
conditional_markers:
  - marker: "if"
    relation: "condition"
    position: "subordinate_initial"
    example: "If we invest in AI, we will gain competitive advantage"

  - marker: "unless"
    relation: "condition"
    position: "subordinate_initial"
    polarity: "negative"
    example: "Unless we act, we will lose market share"

  - marker: "provided that"
    relation: "condition"
    position: "subordinate_initial"
    formality: "formal"
    example: "We will proceed, provided that funding is secured"

  - marker: "assuming"
    relation: "condition"
    position: "phrase"
    example: "Assuming demand holds, we will expand capacity"

  - marker: "in case"
    relation: "condition"
    position: "subordinate_initial"
    example: "In case demand surges, we have contingency plans"

# Discourse Marker Ambiguity Resolution
ambiguity_resolution:
  since:
    temporal_context: "Followed by time expression (year, date, duration)"
    causal_context: "Followed by proposition without time reference"
    example_temporal: "Since 1990, we have grown 10x"
    example_causal: "Since we have the resources, we should proceed"

  while:
    temporal_context: "Describes simultaneous events"
    contrastive_context: "Describes opposing situations"
    example_temporal: "While we developed Product A, we maintained Product B"
    example_contrastive: "While Product A succeeded, Product B failed"

  as:
    temporal_context: "Describes simultaneous events"
    causal_context: "Provides reason"
    manner_context: "Describes how something is done"
    example_temporal: "As we scaled, costs increased"
    example_causal: "As demand increased, we expanded"
    example_manner: "We executed as planned"

# Presentation-Specific Marker Usage
presentation_context:
  slide_transitions:
    sequential: ["first", "second", "then", "next", "finally"]
    contrastive: ["but", "however", "on the other hand"]
    additive: ["also", "additionally", "furthermore"]

  common_patterns:
    problem_solution: "We faced X (problem). Therefore, we implemented Y (solution)"
    benefit_enumeration: "First, benefit A. Second, benefit B. Finally, benefit C"
    before_after: "Before, situation X. After, situation Y. Therefore, improvement Z"

  pedagogical_guidance:
    explicit_markers: "Use explicit discourse markers to aid non-expert comprehension"
    consistency: "Use consistent markers within a slide deck (formal vs informal)"
    redundancy: "Combine linguistic markers with visual cues (arrows, icons) for clarity"
