_meta:
  id: character_archetypes_patterns
  title: "Character Archetypes"
  description: "Roles, archetypes, and narrative patterns for analyzing and crafting character dynamics in business narratives."
  domain: narrative
  domain_type: cross_cutting
  purpose: methodology
  version: "1.2.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Best Practices for Writing Effective Corporate Learning Content.md"
    - "Corpus/Research/Crafting Powerful Opening Plays.md"
    - "Corpus/Research/Research - Comprehensive Audience Analysis.md"


# ==============================================================================
# NARRATIVE PRINCIPLES & PSYCHOLOGICAL FOUNDATIONS
# ==============================================================================

narrative_principles:
  narrative_transportation:
    definition: "State of being fully absorbed in a story—mentally transported into the narrative world, losing track of immediate surroundings, experiencing story emotions as if inside the narrative."
    mechanism: "When transported, audiences identify strongly with characters; attitudes shift to align with narrative; persuasion and behavior change increase significantly."
    evidence: "Van Laer et al. (2014) meta-analysis; Green & Brock (2000)"
    diagnostic_question: "Does this narrative create full mental absorption, or is audience remaining detached/critical?"
    source: "Crafting Powerful Opening Plays.md"

  emotional_arousal_and_memory:
    definition: "Heightened emotional state (excitement, fear, awe, surprise) that intensely captures attention and tags information for priority memory storage."
    mechanism: "Emotionally arousing stories/scenarios are remembered far better than neutral ones. Character should face moment of emotional intensity (fear, surprise, hope) for memory consolidation."
    evidence: "Cahill et al. (1995); Goleman (1996)"
    anti_pattern: "Dry, emotion-free character descriptions fail to engage memory consolidation and persuade."
    example: "Friday, 11:55pm: Maria's heart sinks—payment system crashed during Black Friday sales. Emotional stakes make character relatable and memorable."
    source: "Crafting Powerful Opening Plays.md"

  primacy_effect:
    definition: "Initial information (especially character introduction) is retained far better than middle or end information."
    application: "First character introduced is disproportionately memorable. Lead with protagonist's most important trait or emotional moment, not generic background."
    anti_pattern: "Introducing character with generic background ('Engineer at fintech startup') wastes primacy effect."
    better_approach: "Front-load emotional moment + stakes ('Maria's heart sank as the pager went off at 11:55pm—payment system crashed mid-transaction')"
    evidence: "Glanzer & Cunitz (1966)"
    source: "Crafting Powerful Opening Plays.md"

  von_restorff_effect:
    definition: "Distinctive, unusual items pop out and are recalled more accurately. Isolated character trait becomes the memorable hook."
    application: "Character roles should have one isolating, distinctive trait or situation. Standard engineer solving a problem is forgettable. Engineer who almost quit industry, now solving the problem, is memorable."
    benefit: "Distinctive trait differentiates narrative from competitor narratives; increases recall."
    source: "Crafting Powerful Opening Plays.md"

  cognitive_load_in_character_description:
    definition: "Characters should be instantly graspable with simple language and concrete details to avoid overwhelming audience."
    target_reading_level: "Flesch-Kincaid Grade 8 or below for general corporate audiences"
    readability_score: "Flesch Reading Ease 60–70 (conversational, easy to read)"
    anti_pattern: "'A digitally-adept infrastructure specialist with 15 years of enterprise experience' (complex, abstract)"
    better_approach: "'Maria, a network engineer' (simple, concrete)"
    source: "Best Practices for Writing Effective Corporate Learning Content.md; Crafting Powerful Opening Plays.md"

# ==============================================================================
# THE PROTAGONIST (THE HERO)
# ==============================================================================

protagonist:
  role: "The central character undergoing transformation. In corporate learning, must embody challenges and situations the audience can relate to."
  business_mapping: "MUST be the Customer or Audience. Never the Brand."
  characterization_best_practice: "Use concrete, specific details and relatable challenges. Example: 'Carla, a team leader frustrated by constant scope creep' (specific name, role, realistic challenge) rather than generic 'a team leader' or 'an employee.'"
  scoring_anchors: !include ../shared/scoring_narrative.yaml

  attributes:
    the_lie:
      definition: "A misconception the hero has about themselves or the world."
      example: "'I can do this all by myself' or 'Cheaper is always better'."
      evidence_note: "In corporate learning, the Lie should reflect common misconceptions your target audience holds."
    the_want:
      definition: "The external goal the hero thinks will solve their problem."
      example: "High growth, cost savings, efficiency."
      audience_alignment: "The Want should reflect what audience publicly claims to value (stated goals, KPIs they announce)."
    the_need:
      definition: "The internal truth or shift required for actual success."
      example: "Collaboration, quality, strategic partnership."
      internal_dimension: "The Need represents what audience actually requires for success, often contradicting their Want. This tension creates narrative engagement."
    the_ghost:
      definition: "A past event that created the Lie. The trauma, failure, or precedent that locked hero into misconception."
      narrative_power: "When revealed, Ghost explains why hero believes Lie. Increases audience empathy and understanding."

  arc_types:
    positive_change:
      description: "Hero overcomes Lie, embraces Truth, wins."
      frequency: "Most common arc for corporate learning"
      emotional_arc: "Hero moves from misconception → crisis → realization → action → success"
    flat_arc:
      description: "Hero already knows Truth, changes the world/others (Leadership)."
      common_misdiagnosis: "Often mistaken for 'weak arc' - this is analytical error. Flat arc heroes are steady, wise, and transform their environment."
      analysis_focus: "Stop looking for change in hero; analyze hero's IMPACT on environment and other characters instead."
    negative_change:
      description: "Hero is challenged by Truth but rejects it, succumbs to Lie."
      outcome: "Ends story worse (corrupted, disillusioned, destroyed)"
      use_case: "Cautionary tales, demonstrations of what NOT to do"

  introduction_patterns:
    vivid_anecdote:
      format: "[Name/role] was [dramatic situation] when [something unexpected]."
      example: "Asha, a network engineer, was mid-way through a critical upgrade when the servers went dark."
      mechanism: "Use present tense for immediacy; humanize through empathy; show vulnerability when authentic."
      success_indicator: "A two-sentence story can create stronger emotional connection than abstract statements."
      source: "Crafting Powerful Opening Plays.md"
    controlled_vulnerability:
      format: "'I have a confession: [personal struggle/mistake]' OR 'I was wrong about [assumption]'"
      examples:
        - "I have a confession: I almost quit tech last year out of frustration."
        - "I was wrong about remote work. I thought productivity would tank – I couldn't have been more mistaken."
      mechanism: "People respond to authenticity; vulnerability signals confidence + self-awareness; paradoxically builds credibility."
      when_to_use: "Executive settings, audience skepticism, need to establish human connection before data/solution"
      source: "Crafting Powerful Opening Plays.md"
    high_stakes_question:
      format: "'What if [character in scenario]?' OR 'What would you do if [character's situation happened to you]?'"
      examples:
        - "What would you do if your AI could explain its decisions in plain English?"
        - "What would you do if a billion-dollar client's data vanished overnight?"
      mechanism: "Raises stakes personally; invites audience to identify with character; creates curiosity gap"
      effect: "Question form engages audience to mentally participate, increasing emotional investment"
      source: "Crafting Powerful Opening Plays.md"

# ==============================================================================
# THE MENTOR (THE GUIDE)
# ==============================================================================

mentor:
  role: "The wise figure who aids the hero. Demonstrates understanding, authority, and provides clear path forward."
  business_mapping: "The Brand, Product, Presenter, or Guide figure."
  scoring_anchors: !include ../shared/scoring_narrative.yaml

  key_characteristics:
    empathy:
      definition: "Demonstrating understanding of the hero's pain and internal struggle."
      indicators:
        - "'We understand how hard it is...', 'We've been there...'"
        - "Explicitly naming the hero's challenge with specificity and emotion"
      mechanism: "Empathy must feel *earned*, not performative. Mentor should acknowledge the real difficulty, frustration, or fear."
      evidence_source: "Research - Comprehensive Audience Analysis.md; Crafting Powerful Opening Plays.md"
    authority:
      definition: "Demonstrating competence, track record, and wisdom earned through experience."
      indicators:
        - "Case studies, awards, tenure"
        - "'We have helped 500+ companies...' with specific outcomes"
        - "Understatement works: 'We've found' rather than 'We're the only ones who'"
      anti_pattern: "Overpromising ('greatest solution ever') without proof; erodes credibility"
      better_approach: "Let outcomes and evidence do the bragging; understate, overdeliver"
      evidence_source: "Crafting Powerful Opening Plays.md"
    the_plan:
      definition: "Providing a clear, concrete path forward that hero can follow."
      indicators:
        - "Process steps, implementation roadmap"
        - "Specific sequence: Step 1 → Step 2 → Step 3"
        - "Visual diagram or progression showing path clarity"
      cognitive_principle: "Clear path reduces cognitive load; hero (audience) gains confidence through transparency"
      evidence_source: "Best Practices for Writing Effective Corporate Learning Content.md"

# ==============================================================================
# THE ANTAGONIST (THE VILLAIN)
# ==============================================================================

antagonist:
  role: "The force opposing the hero's success."
  business_mapping: "The Problem, Competition, Status Quo, or Market Forces."
  scoring_anchors: !include ../shared/scoring_narrative.yaml

  levels_of_conflict:
    external:
      definition: "The physical problem."
      example: "Declining revenue, broken software."
    internal:
      definition: "The emotion caused by the problem."
      example: "Fear of failure, frustration, imposter syndrome."
    philosophical:
      definition: "The 'wrongness' or injustice of the situation."
      example: "It shouldn't be this hard to do X."

# ==============================================================================
# OTHER ARCHETYPES
# ==============================================================================

influence_character:
  role: "A character who pushes the hero toward the Truth (or Lie)."
  business_mapping: "A peer, a competitor, a regulator."
  function: "To challenge the hero's worldview."

  flat_arc_importance:
    description: "In Flat Arc stories, the hero already knows Truth. The Influence Character is who undergoes the Change Arc."
    example: "Red in Shawshank Redemption - changed by flat-arc hero Andy"
    analysis_note: "When hero shows no change, analyze the hero's IMPACT on this character instead."

threshold_guardian:
  role: "An obstacle or gatekeeper testing the hero's commitment."
  business_mapping: "Procurement, Budget Committee, IT Security."
  function: "To ensure the hero is ready for the 'Special World'."

# ==============================================================================
# NARRATIVE PATTERNS FOR CORPORATE LEARNING & PERSUASION
# Specific structures using characters to drive engagement and behavior change
# ==============================================================================

narrative_patterns:

  pass_arc:
    name: "Problem-Agitate-Solution-Success (PASS) Narrative Arc"
    description: "Persona-focused narrative structure for engagement and persuasion. Moves audience through emotional journey: identify problem → feel urgency → discover solution → see proof of success."
    use_case: "Sales narratives, persona-driven pitches, customer-centric storytelling"
    structure:
      problem:
        definition: "State the persona's pain explicitly and quantitatively."
        example: "Fortune 500 companies lost $10B to spreadsheet errors"
        mechanism: "Big, scary number triggers emotional arousal; establishes persona relevance immediately"
        character_role: "Protagonist embodying the pain"
      agitate:
        definition: "Deepen emotional connection to problem through cascade of consequences."
        example: "Financial teams drowning in manual data checks – costing time, money, AND credibility"
        mechanism: "Vivid metaphor + multiple consequences; appeals to multiple concerns (efficiency, cost, reputation/career risk)"
        character_role: "Show protagonist struggling under accumulated weight of problem"
      solution:
        definition: "Introduce mentor/guide figure directly addressing pain."
        mechanism: "Contrast to problem; character/solution appears as relief and hope"
        character_role: "Mentor or mentor-aligned protagonist demonstrates new approach"
      success:
        definition: "Provide proof of solution's effectiveness with specific outcomes."
        example: "3 Fortune 100 firms cut processing time 80%, saved ~$5M each"
        mechanism: "Social proof + specific outcomes; similar personas reduce risk perception"
        character_role: "Show successful protagonists in similar contexts; testimonial-style success stories"
    source: "Crafting Powerful Opening Plays.md"

  discovery_inquiry_learning:
    name: "Discovery/Inquiry-Based Character Scenarios"
    description: "Narrative pattern where protagonist faces challenge; learner must think through solution first, then expert guidance reveals recommended approach. Creates 'aha' moments more impactful than direct instruction."
    learning_mechanism: "Contrast between learner's idea and expert guidance creates realization that validates good instincts and corrects misconceptions"
    structure:
      opening_scenario:
        definition: "Present character-driven challenge without immediate solution. Use vivid detail."
        example: "'How would you handle an employee who is talented but habitually late? Jot down a quick plan before reading on...'"
        character_role: "Protagonist in challenging situation"
      learner_pause_point:
        definition: "Ask what learner would do. Require thinking before revealing answer."
        mechanism: "Engages learner actively; creates personal investment in solution"
      expert_guidance_reveal:
        definition: "Provide recommended approach after learner's thinking."
        mechanism: "If learner's idea aligns with guidance, creates confidence. If different, creates learning moment."
        impact: "More impactful than simply reading guidance alone"
      incremental_decision_point_scenarios:
        definition: "Present character at multiple junctures; learner chooses approach, then explanation reveals trade-offs"
        example: "Protagonist receives unexpected feedback. Do you: (A) dismiss it, (B) take it personally, or (C) seek clarification?"
        mechanism: "Multiple scenarios build judgment and adaptability for complex situations"
    emotional_rhythm: "Learner should struggle just enough to stimulate curiosity and self-reflection, but not so much that they become lost or doubt the material"
    source: "Best Practices for Writing Effective Corporate Learning Content.md"

  problem_solution_narrative:
    name: "Problem-Solution Narrative Structure"
    description: "Three-part pattern using character to humanize problem, analyze root cause, and demonstrate solution. Distinct from archetypal roles; focuses on narrative *pattern* rather than character *role*."
    structure:
      problem_exposition:
        definition: "Introduce protagonist facing realistic challenge. Use specific detail, not generic description."
        example: "'Meet Carla, a team leader frustrated by constant scope creep that derails projects...'"
        mechanism: "Specific protagonist humanizes problem; audience connects emotionally before analysis begins"
      root_cause_analysis:
        definition: "Separate 'Why Problem Happens' section from 'Solution Approach' visually and structurally."
        guidance: "Use clear headings. List contributing factors analytically (separate from emotional story)."
        example: "Why Scope Creep Happens: (1) Unclear requirements upfront, (2) Stakeholder alignment gaps, (3) Change management processes not in place"
        character_role: "Protagonist's struggle illuminates root causes"
      solution_approach:
        definition: "Show protagonist applying solution steps. Learner then applies to own context."
        example: "Solution Approach: Carla implemented three changes... Learner reflection: 'Which of these could apply to my situation?'"
        mechanism: "Concrete example makes abstract solution tangible; reflection question links learner's context to character's journey"
    cognitive_principle: "Segmentation and visual organization (headings, structure) manage cognitive load while narrative engagement maintains attention"
    source: "Best Practices for Writing Effective Corporate Learning Content.md"

  extreme_analogy_for_vividness:
    name: "Extreme Analogy for Character Situation Vividness"
    description: "Cast character's situation in extreme comparison to create mental clarity and memorability."
    examples:
      - "'Upgrading this legacy system is like trying to swap a jet engine mid-flight'"
      - "'Managing 100 cloud accounts is like herding cats in a hurricane'"
      - "'Launching this product is like NASA trying to land a rover on Mars'"
    mechanism: "Analogy illuminates complexity; humorous or visually striking analogies stick in memory"
    application: "Use analogy to describe protagonist's challenge, making stakes and difficulty vivid"
    test: "Show analogy to someone unconnected – do they instantly grasp the point?"
    source: "Crafting Powerful Opening Plays.md"

# ==============================================================================
# CHARACTER ARC ANALYSIS MATRIX
# Diagnostic worksheet for deconstructing character transformations
# ==============================================================================

character_arc_analysis:
  description: "Framework for diagnosing whether plot points serve internal transformation."

  core_diagnostic_questions:
    for_protagonist:
      - "What is the Lie they believe?"
      - "What is the 'Ghost' that created this Lie?"
      - "What is their external Want?"
      - "What is their internal Need?"
      - "What is the Truth they must learn?"
      - "What is their final Arc Type (Positive/Negative/Flat)?"
    for_influence_character:
      - "What is the Lie they believe?"
      - "What is the 'Ghost' that created this Lie?"
      - "What is their external Want?"
      - "What is their internal Need?"
      - "What is the Truth they must learn?"
      - "What is their final Arc Type (Positive/Negative/Flat)?"

  plot_point_diagnostic:
    question: "Does this event only advance the character's Want (plot), or does it also challenge the Lie and force the hero to confront the Need?"
    rule: "A plot point that does not serve the internal arc is truly 'undeveloped'."

  arc_type_analysis:
    positive_change:
      description: "Hero confronts Lie, overcomes it, embraces Truth"
      outcome: "Ends story as better, more 'whole' person"
      frequency: "Most common arc"

    negative_change:
      description: "Hero is challenged by Truth but rejects it, succumbs to Lie"
      outcome: "Ends story worse (corrupted, disillusioned, destroyed)"
      use_case: "Cautionary tales, tragedies"

    flat_arc:
      description: "Hero ALREADY knows Truth at beginning"
      journey: "External struggle to use steadfast belief to change the WORLD and OTHER CHARACTERS"
      common_misdiagnosis: "Often mistaken for 'weak arc' - this is analytical error"
      analysis_method: "Stop looking for change in hero; analyze hero's IMPACT on environment and Influence Character"

  want_vs_need_connection:
    definition: "The conflict between Want and Need is the ENGINE connecting external plot to internal character arc."
    want:
      type: "External"
      created_by: "The Lie"
      function: "Drives external plot/Story Arc"
      example: "Money, power, revenge"
    need:
      type: "Internal"
      represents: "The Truth"
      function: "What character must discover for actual fulfillment"
      example: "Collaboration, vulnerability, acceptance"

# ==============================================================================
# STORY FOCUS DIAGNOSTIC
# Plot-Driven vs Character-Driven Analysis
# ==============================================================================

story_focus_diagnostic:
  description: "Determine if story is primarily plot-focused or character-focused."

  plot_driven:
    definition: "External events are paramount"
    emphasis: "What happens"
    examples: "Thrillers, action stories, mysteries"
    character_role: "Characters serve the plot"

  character_driven:
    definition: "Character's choices in response to events are paramount"
    emphasis: "Why it matters"
    examples: "Literary fiction, dramas, character studies"
    plot_role: "Plot serves character development"

  analysis_implication: "Analysis method shifts based on story type. Character-driven stories require deeper Want/Need analysis."

# ==============================================================================
# BUSINESS BUYING PERSONAS
# Tailoring narratives to different audience roles
# ==============================================================================

business_buying_personas:
  description: "Business storytelling must be tailored to audience persona. Each role has distinct interests, KPIs, and concerns."

  marketing_leaders:
    job_titles: ["CMO", "Chief Business Officer", "EVP/VP/Director of Marketing"]
    buying_role: "Approver / Champion"
    key_objectives:
      - "Increase ROI and marketing performance"
      - "Drive brand consistency across channels"
      - "Accelerate campaign time to market"
      - "Deliver data-driven, personalized experiences at scale"
      - "Grow brand equity and differentiation"
    pain_points:
      - "Lack of comprehensive visibility into costs and ROI"
      - "Outdated workflows and fragmented systems"
      - "Budget pressure to prove ROI"
    common_objections:
      - "Concern about technology overhaul leading to ballooning costs"
      - "Lack of awareness about integrated solutions"
      - "Unclear about AI capabilities and potential hurdles"
    narrative_approach:
      tone: "Visionary"
      lead_with: "Business outcomes (revenue growth, market share, brand equity)"
      emphasize: ["ROI and measurable results with concrete metrics", "Competitive advantage and market differentiation", "Risk mitigation for technology investments"]
      kpis_to_reference: ["Revenue growth", "Market share", "Brand equity", "Campaign ROI"]

  creative_leaders:
    job_titles: ["CCO", "Chief Design Officer", "EVP/VP/Director of Creative/Design/Content"]
    buying_role: "Champion / Influencer"
    key_objectives:
      - "Drive creative vision where marketing, creative, and technology intersect"
      - "Maintain high-quality brand and visual output"
      - "Reduce rework and last-minute changes"
      - "Improve time to market metrics"
    pain_points:
      - "Generating enough content to meet demand"
      - "Establishing and maintaining brand differentiation"
      - "Bottlenecks in review and approval processes"
      - "Functional silos and legacy systems"
      - "Outdated, manual workflows that slow down processes"
    common_objections:
      - "Shrinking or flat budgets"
      - "Potential change management hurdles and costs"
      - "Siloed business structure leading to implementation challenges"
    narrative_approach:
      tone: "Pragmatic"
      lead_with: "Creative empowerment and removing bottlenecks"
      emphasize: ["Quality at scale - maintaining brand integrity while increasing output", "Workflow efficiency and collaboration improvements", "Brand consistency and governance capabilities"]
      kpis_to_reference: ["Content velocity", "Time to market", "Brand consistency scores", "Rework rates"]

  operations_personas:
    job_titles: ["VP/Director of Marketing Operations", "VP/Director of Creative Operations"]
    buying_role: "Champion / Influencer / User"
    key_objectives:
      - "Reduce technology redundancies through consolidation"
      - "Optimize marketing campaign/content processes"
      - "Streamline end-to-end content lifecycle"
      - "Track KPIs and metrics effectively"
      - "Ensure campaign compliance and governance"
    pain_points:
      - "Disconnected tools and processes across organization"
      - "Legacy systems and manual processes leading to duplicated work"
      - "Difficulties tracking content usage and performance"
      - "Too many redundant technologies not being used effectively"
      - "Lack of system integration"
    common_objections:
      - "Too many disconnected processes requiring significant time/resource investment"
      - "Inability to achieve consensus across departments"
      - "Challenges with retiring legacy technology"
    narrative_approach:
      tone: "Detailed, Technical"
      lead_with: "Process optimization and efficiency gains"
      emphasize: ["Integration capabilities and consolidation benefits", "Visibility and metrics for tracking performance", "Governance and compliance features", "Change management with clear implementation paths"]
      kpis_to_reference: ["Process efficiency", "Tool consolidation", "Workflow automation", "Compliance rates"]

  it_technology_leaders:
    job_titles: ["CIO", "CTO", "Director/VP of MarTech", "Director/VP of IT"]
    buying_role: "Approver / Influencer / User"
    key_objectives:
      - "Ensure secure, scalable, and compliant infrastructure"
      - "Enable integration between systems"
      - "Support digital transformation strategy"
      - "Consolidate legacy content platforms"
      - "Minimize security risks"
    pain_points:
      - "Supporting fast-moving marketing and creative teams"
      - "Limited resources and budget"
      - "Managing fragmented tech stacks"
      - "Legacy systems and technical debt"
      - "Lack of engineering resources"
    common_objections:
      - "Flat or shrinking budgets do not allow for net new investments"
      - "Retiring legacy technology can prove costly and time-consuming"
    narrative_approach:
      tone: "Technical, Confident"
      lead_with: "Security, scalability, and compliance features"
      emphasize: ["Integration capabilities and API-first architecture", "Total cost of ownership (TCO) benefits", "Legacy system migration paths and coexistence", "Enterprise-grade support and SLAs"]
      kpis_to_reference: ["TCO", "Security compliance", "System uptime", "Integration count", "Technical debt reduction"]

# ==============================================================================
# ADOPTION LIFECYCLE PERSONAS
# Complementary segmentation: Where audiences sit on adoption curve
# ==============================================================================

adoption_lifecycle_personas:
  description: "Rogers' Diffusion of Innovations model. Different adoption lifecycle stages require fundamentally different character voices and narrative structures. Complements business_buying_personas with temporal/adoption-readiness dimension."

  innovators:
    segment_size: "2.5% of market"
    characteristics: "Visionary, risk-takers, seek cutting-edge solutions, first-mover advantage"
    motivation: "Be first, experiment, pioneering advantage"
    narrative_approach:
      tone: "Visionary, experimental, ambitious"
      lead_with: "Innovation and future potential"
      character_type: "Protagonist showing new possibility, willing to experiment"
      emphasize: ["Being first", "Cutting-edge approach", "Pioneering advantage"]
    common_objections: "Unproven risks"
    objection_handling: "Frame as 'calculated exploration' with safeguards"
    source: "Research - Comprehensive Audience Analysis.md"

  early_adopters:
    segment_size: "13.5% of market"
    characteristics: "Opinion leaders, pragmatic visionaries, see potential in innovation"
    motivation: "Industry leadership, early competitive advantage, influencing peers"
    narrative_approach:
      tone: "Confident, authoritative, forward-thinking"
      lead_with: "Early success in similar roles; efficiency gains"
      character_type: "Opinion-leader protagonist demonstrating advantage"
      emphasize: ["Industry leadership potential", "Competitive advantage", "Proven in select contexts"]
    common_objections: "Incomplete product, roadmap uncertainty"
    objection_handling: "Address with clear roadmap and dedicated support"
    source: "Research - Comprehensive Audience Analysis.md"

  early_majority:
    segment_size: "34% of market"
    characteristics: "Pragmatic, deliberate, want proven solutions, industry standards"
    motivation: "Peer validation, proven ROI, safety, industry standard adoption"
    narrative_approach:
      tone: "Pragmatic, reassuring, stable"
      lead_with: "Peer testimonials and case studies from similar orgs"
      character_type: "Relatable peer protagonist solving familiar problems with proven method"
      emphasize: ["Others like you have succeeded", "Industry standard compliance", "Tested and proven"]
      key_insight: "This segment seeks 'complete products fully tested, adhering to standards, used by others they know'"
    common_objections: "Unproven, implementation risk"
    objection_handling: "'Others in your situation have succeeded' with specific similar-company case studies"
    source: "Research - Comprehensive Audience Analysis.md"

  late_majority:
    segment_size: "34% of market"
    characteristics: "Risk-averse, need strong pressure to change, skeptical"
    motivation: "Cost savings, proven ROI, avoiding obsolescence, forced change"
    narrative_approach:
      tone: "Practical, urgent (but trustworthy), necessity-focused"
      lead_with: "Concrete problems solved, cost justification, ease of transition"
      character_type: "Pragmatic peer protagonist solving immediate concrete problem"
      emphasize: ["Cost savings with numbers", "Minimal workflow disruption", "Ease of adoption"]
    common_objections: "Disruption fears, change costs"
    objection_handling: "'Minimal workflow change—we're building on what works, not replacing it'"
    source: "Research - Comprehensive Audience Analysis.md"

  laggards:
    segment_size: "16% of market"
    characteristics: "Tradition-focused, change-resistant, only adopt when forced"
    motivation: "Avoiding being left behind entirely, continuity, minimal disruption"
    narrative_approach:
      tone: "Traditional, familiar, necessity-based"
      lead_with: "Evolution of proven approach, not disruption; continuity framing"
      character_type: "Trusted mentor figure representing stability while adapting"
      emphasize: ["What stays the same", "Proven foundation expanding", "Low risk of disruption"]
    common_objections: "'This breaks our way of working'"
    objection_handling: "'We're building on what works, not replacing it' with emphasis on continuity"
    source: "Research - Comprehensive Audience Analysis.md"

  adoption_tone_mismatches:
    anti_patterns:
      - "Using hype-y language (for Innovators) with Early Majority (who need reassurance)"
      - "Using overly cautious language with Innovators (who seek boldness)"
      - "Assuming one-size-fits-all character approach across adoption stages"
      - "Not matching character arc to audience adoption readiness (Laggard wants stability arc; Innovator wants possibility arc)"

# ==============================================================================
# NARRATIVE TONE TYPES
# Tone selection based on audience and context
# ==============================================================================

narrative_tones:
  description: "Different tones for different personas, emotional states, and adoption lifecycle stages. Conversational yet professional tone (using contractions, first/second person pronouns) creates rapport and lowers engagement barriers."
  foundational_principle: "Research on adult learning and web readability indicates that conversational tones lower barriers to engagement and increase receptivity. Professional tone maintains credibility; conversational delivery creates rapport."
  evidence_source: "Best Practices for Writing Effective Corporate Learning Content.md; Crafting Powerful Opening Plays.md"

  visionary:
    characteristics: "Strategic, big-picture, aspirational, outcome-focused"
    use_for: ["C-Suite executives", "Strategic decision makers", "Early sales stages", "Innovators on adoption curve"]
    language_markers: "Future state vision, market trends, competitive landscape, transformation, pioneering"

  pragmatic:
    characteristics: "Practical, concrete, process-focused, example-driven"
    use_for: ["Operations leaders", "Middle management", "Champions and influencers", "Early Majority on adoption curve"]
    language_markers: "Workflow examples, before/after scenarios, specific improvements, proven methods"

  technical:
    characteristics: "Detailed, architecture-focused, specification-driven, integration-aware"
    use_for: ["IT leaders", "Technical evaluators", "Implementation teams"]
    language_markers: "Architecture diagrams, APIs, security protocols, scalability metrics"

  urgent:
    characteristics: "Action-oriented, deadline-aware, risk-focused, decisive"
    use_for: ["Late-stage sales", "Competitive situations", "Cost of inaction scenarios"]
    language_markers: "Time-bound outcomes, competitive risk, market window, decisiveness"

  confident:
    characteristics: "Authoritative, proof-backed, assured, expert"
    use_for: ["Objection handling", "Competitive positioning", "ROI justification"]
    language_markers: "Evidence-based claims, case study references, guarantees, expert positioning"

  reassuring:
    characteristics: "Stable, proven, low-risk, confidence-building"
    use_for: ["Early Majority", "Risk-averse audiences", "After introducing change"]
    language_markers: "Proven track record, others have succeeded, industry standard, safeguards in place"

  traditional:
    characteristics: "Familiar, continuity-focused, evolution-based, trustworthy"
    use_for: ["Laggards", "Tradition-focused organizations", "Stability-seeking audiences"]
    language_markers: "Building on what works, proven foundation, minimal disruption, evolution not revolution"

  tone_by_audience_emotional_state:
    description: "Map audience's emotional state to narrative tone for maximum resonance"
    mappings:
      anxious:
        state: "About security, risk, disruption"
        tone: "Technical + Confident"
        character_role: "Expert/Guide protagonist"
        example_hook: "Statistics + case study proof from trusted sources"
      excited:
        state: "About innovation, possibility"
        tone: "Visionary"
        character_role: "Visionary/Pioneer protagonist"
        example_hook: "'What if X becomes possible?' with bold future vision"
      overwhelmed:
        state: "By complexity, options"
        tone: "Pragmatic"
        character_role: "Mentor/Guide"
        example_hook: "'Here's the simple path through the complexity...'"
      skeptical:
        state: "About claims, solutions"
        tone: "Urgent + Evidence-driven"
        character_role: "Vulnerable/Relatable protagonist"
        example_hook: "Personal confession + hard data proving claims"
      impatient:
        state: "Time-pressed, results-focused"
        tone: "Urgent"
        character_role: "Action-oriented protagonist"
        example_hook: "BLUF (Bottom Line Up Front) + quantified threat/opportunity"
    source: "Crafting Powerful Opening Plays.md; Research - Comprehensive Audience Analysis.md"

# ==============================================================================
# MULTI-STAKEHOLDER NARRATIVE MAPPING
# How hierarchy levels map to stakeholder types
# ==============================================================================

multi_stakeholder_mapping:
  description: "Enterprise B2B deals involve multiple personas. Each content level serves different stakeholders."

  l1_exec_summary:
    tailored_for: "Approvers (CMO, CIO)"
    focus: "Strategic, outcome-focused"
    typical_personas: ["Marketing Leaders", "IT Leaders (CIO/CTO)"]

  l2_solution_overview:
    tailored_for: "Champions and Influencers (VP-level)"
    focus: "Balanced strategic and tactical"
    typical_personas: ["Creative Leaders", "Senior Marketing Leaders"]

  l3_detailed_pitch:
    tailored_for: "Users and Influencers (Directors, Managers)"
    focus: "Tactical, detailed"
    typical_personas: ["Operations Personas", "Practitioners"]

  l4_technical_deep_dive:
    tailored_for: "Technical evaluators"
    focus: "Architecture, integration, implementation"
    typical_personas: ["IT Leaders (technical)", "Engineering stakeholders"]

# ==============================================================================
# PERSONA-DRIVEN STORYTELLING BEST PRACTICES
# ==============================================================================

persona_storytelling_best_practices:
  description: "Best practices for tailoring narratives to personas across different adoption lifecycle stages and emotional states."

  practices:
    know_your_audience:
      principle: "Always identify primary persona(s) before crafting narrative. Understand not just role but adoption readiness and emotional state."
      action: "Research role, KPIs, reporting structure, adoption stage (Innovator to Laggard), emotional state (anxious, excited, skeptical, etc.)"

    lead_with_their_pain:
      principle: "Start with specific challenges that persona faces daily. Pain points differ by adoption stage."
      action: "Open with empathetic acknowledgment of their struggle, scaled to adoption readiness (Innovators fear being left behind; Early Majority fear risk; Laggards fear forced disruption)"
      adoption_specificity:
        innovators: "Pain = missing opportunity, being left behind in innovation"
        early_majority: "Pain = risk, unproven solutions, implementation complexity"
        laggards: "Pain = forced change, perceived disruption, loss of familiar processes"

    speak_their_language:
      principle: "Use terminology and metrics relevant to their role AND adoption stage. Consider cultural communication style (high-context vs low-context)."
      examples:
        cmo: "ROI, brand equity, market share"
        cio: "TCO, security, scalability"
        operations: "Efficiency, integration, compliance"
      cultural_awareness: "High-context audiences prefer indirect approaches and implication; low-context audiences prefer direct, explicit statements"

    anticipate_objections:
      principle: "Address common objections proactively in narrative. Different personas have different objection types."
      action: "Embed counter-arguments within Approach and Results sections"

    provide_social_proof:
      principle: "Use case studies and examples from similar roles/industries. Match proof intensity to audience skepticism."
      action: "Match proof points to persona type, industry, and adoption stage. Early Majority needs proven success from similar companies; Laggards need evidence of stability and continuity"

    character_driven_anecdote_introduction:
      principle: "Use vivid, relatable character anecdotes to open narrative. Creates emotional engagement more powerfully than abstract statements."
      format: "[Name/role] was [dramatic situation] when [something unexpected]."
      example: "Asha, a network engineer, was mid-way through a critical upgrade when the servers went dark."
      mechanism: "Vivid, present-tense storytelling; humanizes challenge; signals authenticity"
      source: "Crafting Powerful Opening Plays.md"

    multi_threading:
      principle: "For enterprise deals, create coordinated narratives for all stakeholders. Each receives persona-appropriate messaging while all narratives support each other."
      action: "Ensure each stakeholder receives persona-appropriate messaging"
      acknowledgment: "Explicitly recognize different stakeholder viewpoints early. 'I know we have both Engineering and Sales here – different concerns, and we'll address both.'"

    maintain_coherence:
      principle: "Ensure narratives for different personas support each other and no contradictions exist between L1-L4 messaging."
      action: "Verify no contradictions between L1-L4 messaging. Unified goal emphasis at narrative close: 'This initiative serves all of us by [common benefit]'"

    vary_examples_across_staff_levels:
      principle: "Use examples and scenarios across different hierarchical levels to signal respect for all roles and avoid hierarchical assumptions."
      action: "Sometimes scenario is entry-level perspective, sometimes manager, sometimes neutral. Avoid language that implies only managers make decisions or only junior staff need training"
      anti_pattern: "Hierarchical language that excludes certain levels; signals disrespect for less senior roles"
      source: "Best Practices for Writing Effective Corporate Learning Content.md"

# ==============================================================================
# ANTI-PATTERNS IN NARRATIVE & CHARACTER DESIGN
# Common mistakes that reduce effectiveness
# ==============================================================================

anti_patterns:
  description: "Specific pitfalls that undermine character-driven narratives and audience engagement."

  generic_characters:
    definition: "Using vague roles instead of specific, relatable names and contexts."
    example_bad: "'An employee' or 'a manager' without specificity"
    example_good: "'Maria, a network engineer' or 'Carla, a team leader frustrated by constant scope creep'"
    impact: "Generic characters fail to activate primacy effect and emotional transportation"

  overly_formal_voice:
    definition: "Speaking *at* or *above* learners rather than creating dialogue. Failing to use contractions or second-person pronouns."
    example_bad: "'One must recognize the importance of collaboration paradigms...'"
    example_good: "'Here's what we've found: collaboration actually matters more than most people think.'"
    mechanism: "Formal voice creates distance; conversational voice creates connection"
    source: "Best Practices for Writing Effective Corporate Learning Content.md"

  one_dimensional_personas:
    definition: "Presenting single-level examples (only C-suite or only entry-level) in content targeting all staff levels."
    impact: "Excludes portions of audience; signals hierarchical bias"

  jargon_without_context:
    definition: "Using unexplained technical terms without analogy or plain-language definition, blocking comprehension of character's challenge."
    example_bad: "'The microservices architecture requires containerization governance...'"
    example_good: "'The system is made up of many small parts, like LEGO blocks, that need clear rules for how they fit together.'"

  disjointed_character_narrative:
    definition: "Good hook with awkward shift; audience confused about connection to main message."
    fix: "Connect character moment explicitly to main message. 'That story illustrates why we need X' – always bridge the gap"

  humor_that_fails:
    definition: "Off-color jokes, insider humor, or forced funny asides that erode authority"
    fix: "Light anecdote or witty observation; test on colleague first; ensure audience-appropriate"
    anti_pattern: "Self-deprecating humor that makes presenter seem untrustworthy; overly clever wordplay that requires explanation"
    source: "Crafting Powerful Opening Plays.md"

  overpromising_character:
    definition: "Claiming character as 'greatest leader ever' or 'most innovative thinker' without proof. Raises skepticism."
    fix: "Let outcomes and evidence do the bragging. Understate, overdeliver."
    evidence: "Cahill & McGaugh research on emotional memory; claims without proof trigger skeptical amygdala response"

  clichés_in_opening:
    definition: "'Webster's Dictionary defines a leader as…' or other tired opening tropes. Eyes roll; forgettable."
    fix: "Fresh, unique character angle drawn from real experience"

  burying_the_lead:
    definition: "Long character background before revealing why audience should care. Wastes primacy effect."
    fix: "Front-load character's core struggle or distinctive trait. BLUF (Bottom Line Up Front)"

  no_emotional_connection:
    definition: "Pure data/abstract; audience doesn't feel why character matters."
    fix: "Use story, relatable problem, tone; show character's hopes/fears"

  mismatch_tone_to_adoption_stage:
    definition: "Using hype-y language with Early Majority (who need reassurance) or overly cautious language with Innovators (who seek boldness)."
    fix: "Match tone to adoption stage: visionary for Innovators, pragmatic for Early Majority, traditional for Laggards"
    source: "Research - Comprehensive Audience Analysis.md"

  ignoring_cultural_communication_styles:
    definition: "High-context audiences find low-context directness rude/crude; low-context audiences find high-context indirectness confusing or evasive."
    fix: "Research audience cultural context. Adjust character dialogue and narrative style accordingly"
    source: "Research - Comprehensive Audience Analysis.md"

# ==============================================================================
# VALIDATION & RED/GREEN FLAGS CHECKLIST
# Real-time signals of narrative effectiveness
# ==============================================================================

validation_checklist:
  description: "Use during and after narrative delivery to assess persona alignment and character effectiveness."

  green_flags:
    - "Nodding, relevant questions from audience"
    - "Low drop-off or distraction (phones down, attention sustained)"
    - "Engagement signals: laughter at right moments, note-taking"
    - "Audience references character in follow-up discussion ('Like Maria in your example…')"
    - "Positive feedback: 'That story really resonated' or 'I saw myself in that situation'"
    - "Behavioral signals: commitment to action, willingness to try new approach"

  red_flags:
    - "Confusion on basic concepts (indicates you assumed knowledge they don't have)"
    - "Disengagement signals: side conversations, phone checking, staring"
    - "Negative feedback: 'This isn't relevant to our situation' or 'That would never work here'"
    - "Blank stares at character introduction (not connecting emotionally)"
    - "Losing deals with feedback 'They didn't understand our business'"
    - "Objections that contradict your narrative (persona mismatch)"

  iteration_guidance:
    action: "After each communication, assess green/red flags. Use feedback to iterate persona accuracy and character resonance."
    question: "Did the character create emotional transportation and identification? Did audience see themselves in the narrative?"
    source: "Research - Comprehensive Audience Analysis.md"
