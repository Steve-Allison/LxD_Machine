# ==============================================================================
# GAGNÉ'S NINE EVENTS OF INSTRUCTION
# Instructional sequence framework complementing the GGOO model
# ==============================================================================

gagnes_nine_events:
  description: >
    Robert Gagné's Nine Events of Instruction is a cognitive learning theory-based
    framework that structures lessons to maximise engagement, comprehension, and
    retention. Events align with how learners process and retain information and
    map directly onto modern e-learning, corporate training, and classroom instruction.
    Each event provides the instructional context in which learning objectives operate.
  source: "theory_gagne_s_nine_events_of_instruction.md"

  events:
    gain_attention:
      number: 1
      purpose: "Capture learners' interest to prepare them for learning"
      rationale: "Attention is a prerequisite for learning; without engagement, learners will not process new material"
      techniques:
        - "Start with a compelling question, surprising fact, or real-world scenario"
        - "Use storytelling or case studies to create an emotional connection"
        - "Integrate multimedia elements (videos, animations, interactive elements)"
      example: "A cybersecurity course starts with a live hacking demo to show the risks of weak passwords"

    inform_objectives:
      number: 2
      purpose: "Tell learners what they will learn and how it applies to them"
      rationale: "Clear objectives help focus attention and set learning goals — objectives written only for designers are a design failure"
      techniques:
        - "Present learning outcomes using 'By the end of this lesson, you will be able to...' formula"
        - "Explain how the material is relevant to their work or role"
      yaml_alignment: "ggoo_model.learning_objective, abcd_model"

    stimulate_recall:
      number: 3
      purpose: "Connect new information with what learners already know"
      rationale: "Learning is more effective when linked to existing knowledge schemas (Ausubel's Meaningful Learning Theory)"
      techniques:
        - "Use questions, discussions, or quick reviews of previous lessons"
        - "Ask learners to share experiences related to the topic"
        - "Use a concept map to visualize prior knowledge"
      example: "In a sales training, ask learners to recall the last time a customer objection stumped them before introducing new techniques"

    present_content:
      number: 4
      purpose: "Introduce new concepts in an engaging, structured way"
      rationale: "Content must be clear, concise, and multimodal to maximise understanding without overloading working memory"
      techniques:
        - "Use multimedia (videos, images, simulations) to enhance learning"
        - "Present small chunks of information to avoid cognitive overload (Mayer's Segmenting Principle)"
        - "Use real-world examples to reinforce understanding"
      yaml_alignment: "cognitive_load.working_memory_limits, mayer_principles.segmenting_principle"

    provide_guidance:
      number: 5
      purpose: "Offer strategies and scaffolding to help learners grasp complex concepts"
      rationale: "Guidance helps prevent misunderstandings and builds confidence before independent performance"
      techniques:
        - "Provide worked examples or step-by-step demonstrations"
        - "Use mnemonics, analogies, and storytelling to reinforce concepts"
        - "Allow guided practice before full independence"

    elicit_performance:
      number: 6
      purpose: "Encourage learners to apply what they have learned"
      rationale: "Hands-on practice reinforces learning and boosts retention — passive consumption is insufficient"
      techniques:
        - "Include quizzes, case studies, problem-solving tasks, or role-playing"
        - "Use interactive exercises instead of passive content consumption"
        - "Provide real-world scenarios for learners to apply skills"
      yaml_alignment: "assessment_mapping.formative_assessments"

    provide_feedback:
      number: 7
      purpose: "Ensure learners receive immediate, constructive feedback"
      rationale: "Feedback helps learners correct mistakes and improve — delayed feedback reduces effectiveness"
      techniques:
        - "Use real-time feedback in quizzes or simulations"
        - "Offer specific praise and corrective guidance (not just right/wrong)"
        - "Use peer feedback for collaborative learning contexts"

    assess_performance:
      number: 8
      purpose: "Measure whether learners have met the learning objectives"
      rationale: "Assessment ensures learners can apply knowledge independently, not just recognise it in controlled conditions"
      techniques:
        - "Use tests, projects, presentations, or case studies"
        - "Incorporate practical, performance-based assessments over purely written tests"
        - "Compare pre-training and post-training skills to measure growth against the Gap baseline"
      yaml_alignment: "assessment_mapping.summative_assessments, kirkpatrick_model.level_2_learning"

    enhance_retention:
      number: 9
      purpose: "Help learners retain and apply knowledge beyond the training event"
      rationale: "Learning must be transferable to real-world situations — training that doesn't transfer is waste"
      techniques:
        - "Provide job aids, summary sheets, and checklists for post-training reference"
        - "Encourage learners to teach others (peer teaching reinforces encoding)"
        - "Assign follow-up activities requiring application in real work contexts"
      yaml_alignment: "kirkpatrick_model.level_3_behavior.transfer_mechanisms, kirkpatrick_model.level_4_results"
