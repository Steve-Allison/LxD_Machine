adult_learning_principles:
  description: "Considerations for corporate/adult learners."

  principles:
    self_directed: "Adults prefer autonomy in learning"
    experiential: "Adults learn best from experience and practice"
    relevant: "Adults need to see immediate applicability"
    readiness: "Adults are ready to learn when they perceive a need"
    motivated: "Adults are internally motivated by growth and achievement"
    problem_centered: "Adults prefer problem-centered over content-centered learning"

  design_implications:
    - "Include real-world scenarios and problems"
    - "Provide choices and autonomy where possible"
    - "Connect learning to immediate job application"
    - "Leverage existing experience as foundation"
    - "Focus on practical skills over abstract knowledge"
    - "Activate prior knowledge before presenting new content (Gagné Event 3): use questions, brief reviews, shared experience prompts, or concept maps to prime cognitive schemas and make new information easier to encode and retain"

