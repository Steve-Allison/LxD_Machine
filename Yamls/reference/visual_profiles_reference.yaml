_meta:
  id: visual_profiles_reference
  title: "Contextual Analysis Profiles"
  description: "Presentation context profiles (keynote, training, executive) with analyzer threshold overrides for font size, density, and visual settings."
  domain: visual
  domain_type: cross_cutting
  purpose: reference
  version: "1.3.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Applying Mayer's Principles & Contemporary Theory - A Practical Checklist.md"
    - "Corpus/Research/Best Practices for Writing Effective Corporate Learning Content.md"
    - "Corpus/Research/Research - Comprehensive Learning Design Framework.md"
    - "Corpus/Research/Research - Canonical Presentation Methodology Research.md"
    - "Corpus/Research/Visual Narrative Flow Pass.md"


  relationships:
    - target: methodology/visual_design_principles.yaml
      type: depends_on
      description: "Visual design overlap: profiles specify how visual design principles are applied per content type"
profiles:
  keynote_speech:
    description: "Ballroom setting, emotional impact, minimal text, high visual engagement"
    thresholds:
      typography:
        min_font_size: 60
        max_words_per_slide: 10
      cognitive_load:
        max_elements: 3
        max_text_blocks: 2
      visual_hierarchy:
        weight: 2.0  # Critical importance

  executive_summary:
    description: "Boardroom setting, high density, decision-focused"
    thresholds:
      typography:
        min_font_size: 24
        max_words_per_slide: 50
      cognitive_load:
        max_elements: 12
      data_visualization:
        direct_labeling: "strict"

  technical_documentation:
    description: "Read-ahead or leave-behind, high detail, self-explanatory"
    thresholds:
      typography:
        min_font_size: 12
        max_words_per_slide: 150
      cognitive_load:
        max_elements: 20
      accessibility:
        alt_text_quality: "strict"  # Critical for documents

  webinar_virtual:
    description: "Screen sharing, medium density, hybrid engagement"
    thresholds:
      typography:
        min_font_size: 32
      cognitive_load:
        max_elements: 7
      motion:
        max_transition_duration: 0.5

  # ---------------------------------------------------------------------------
  # New profiles — Added v1.1.0
  # Sources: Research - Canonical Presentation Methodology Research.md;
  #          Visual Narrative Flow Pass.md
  # ---------------------------------------------------------------------------

  sales_presentation:
    description: "Customer-facing sales deck — boardroom or screen share, narrative-driven, action-title required, evidence-forward"
    note: "Distinct from executive_summary: sales decks must carry SOAR narrative arc and include hero positioning. Density closer to executive_summary but with higher narrative standards."
    thresholds:
      typography:
        min_font_size: 24
        max_words_per_slide: 60
        action_title: "required"  # Slide titles must be assertion-based, not topic labels
      cognitive_load:
        max_elements: 10
        max_text_blocks: 4
      data_visualization:
        direct_labeling: "strict"
        chart_annotation: "preferred"  # Callouts on key data points
      narrative:
        soar_arc: "required"
        hero_positioning: "required"  # Customer must be hero, vendor as guide
        loss_aversion_present: "preferred"
        validated_outcome: "preferred"
      accessibility:
        wcag_level: "AA"

  case_study_deck:
    description: "Customer proof story — evidence-first format with validated outcomes, before/after comparisons, and quantified ROI. Primary purpose: reduce buyer risk perception."
    note: "Highest evidence specificity standard of all profiles. Must pass evidence_specificity gate (≥65 points) to be considered publication-ready."
    thresholds:
      typography:
        min_font_size: 20
        max_words_per_slide: 80
        action_title: "required"
      cognitive_load:
        max_elements: 12
        max_text_blocks: 5
      evidence:
        evidence_specificity_gate: 65  # Must achieve ≥65 to pass quality gate
        validated_outcome_required: true  # VALIDATED_OUTCOME or BEFORE_AFTER_COMPARISON entity required
        data_statistic_required: true  # Must accompany validated outcome with quantified data
        before_after_comparison: "strongly_preferred"
        roi_enabler: true  # Before/after is ROI story foundation
      narrative:
        soar_arc: "required"
        customer_voice: "preferred"  # Direct quotes from customer stakeholders
        hero_positioning: "required"
      accessibility:
        wcag_level: "AA"
        alt_text_quality: "strict"  # Case studies often distributed as PDF
