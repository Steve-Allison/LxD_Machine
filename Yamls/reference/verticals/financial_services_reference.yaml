# ==============================================================================
# Industry Pain Points
# ==============================================================================

pain_points:
  strategic:
    - id: digital_transformation_lag
      description: "Legacy systems preventing digital innovation"
      severity: high
      affected_personas: [cio, cmo, cto]
      related_products: [AEM, AEP, RTCDP]

    - id: customer_experience_gap
      description: "Customer expectations outpacing service delivery"
      severity: high
      affected_personas: [cmo, vp_marketing]
      related_products: [AJO, RTCDP, Target]

    - id: trust_erosion
      description: "Rebuilding customer trust post-crisis"
      severity: medium
      affected_personas: [cmo, cco]
      related_products: [AEM, Analytics]

  operational:
    - id: compliance_burden
      description: "Regulatory compliance consuming resources"
      severity: critical
      affected_personas: [cco, cmo, it_director]
      related_products: [AEM, Workfront, GenStudio]

    - id: content_velocity
      description: "Slow content production for regulated communications"
      severity: high
      affected_personas: [director_content_strategy, cmo]
      related_products: [GenStudio, AEM Assets, Workfront]

    - id: channel_fragmentation
      description: "Inconsistent experience across channels"
      severity: high
      affected_personas: [vp_marketing, director_marketing_ops]
      related_products: [AJO, RTCDP, AEM]

  technical:
    - id: data_silos
      description: "Customer data trapped in legacy systems"
      severity: high
      affected_personas: [cio, director_marketing_ops, director_analytics]
      related_products: [RTCDP, AEP, CJA]

    - id: legacy_integration
      description: "Core banking system integration challenges"
      severity: high
      affected_personas: [cio, it_director]
      related_products: [AEP, RTCDP]

    - id: security_requirements
      description: "Stringent security requirements for cloud adoption"
      severity: critical
      affected_personas: [cio, ciso]
      related_products: [All - security positioning]

# ==============================================================================
# Compliance & Regulatory
# ==============================================================================

compliance:
  regulations:
    - id: sec_advertising
      name: "SEC Advertising Rules"
      description: "Investment adviser advertising regulations"
      applies_to: [wealth_management, capital_markets]
      content_impact:
        - Performance claims require disclosures
        - Testimonials have specific requirements
        - Social media content restrictions
      audit_requirements:
        - Pre-approval workflows
        - Archival for 5+ years
        - Audit trail

    - id: finra_guidelines
      name: "FINRA Communications Rules"
      description: "Broker-dealer communication requirements"
      applies_to: [retail_banking, wealth_management]
      content_impact:
        - Retail vs institutional distinctions
        - Suitability disclaimers
        - Supervision requirements

    - id: sox_compliance
      name: "Sarbanes-Oxley (SOX)"
      description: "Financial reporting and controls"
      applies_to: [all]
      content_impact:
        - Access controls
        - Change management
        - Audit logging

    - id: gdpr_ccpa
      name: "GDPR / CCPA"
      description: "Data privacy regulations"
      applies_to: [all]
      content_impact:
        - Consent management
        - Data subject rights
        - Cross-border data transfer

    - id: pci_dss
      name: "PCI-DSS"
      description: "Payment card data security"
      applies_to: [retail_banking, insurance]
      content_impact:
        - Cardholder data handling
        - Secure payment pages

  required_disclosures:
    - "Past performance is not indicative of future results"
    - "Investments are subject to risk, including the possible loss of principal"
    - "FDIC insured / Not FDIC insured (as applicable)"
    - "Securities offered through [registered entity]"
    - "Member SIPC"

  approval_workflows:
    typical_steps:
      - Legal review
      - Compliance review
      - Brand review
      - Final approval
    average_cycle_time: "5-15 business days"
    pain_point: "Slow time-to-market for campaigns"

# ==============================================================================
# Industry Terminology
# ==============================================================================

terminology:
  business_terms:
    AUM:
      full_name: "Assets Under Management"
      context: "Primary metric for wealth management"
    NIM:
      full_name: "Net Interest Margin"
      context: "Key profitability metric for banks"
    CLV:
      full_name: "Customer Lifetime Value"
      context: "Cross-sell and retention metric"
    NPS:
      full_name: "Net Promoter Score"
      context: "Customer satisfaction metric"
    KYC:
      full_name: "Know Your Customer"
      context: "Identity verification and onboarding"
    AML:
      full_name: "Anti-Money Laundering"
      context: "Compliance and fraud prevention"

  product_terms:
    core_banking_system:
      description: "Backend system managing accounts and transactions"
      examples: ["Temenos", "FIS", "Fiserv", "Jack Henry"]
    wealth_platform:
      description: "Integrated platform for advisors"
      examples: ["Envestnet", "Orion", "Black Diamond"]
    policy_admin_system:
      description: "Insurance policy management system"
      examples: ["Guidewire", "Duck Creek", "Majesco"]

  customer_journey_stages:
    - Awareness
    - Consideration
    - Application
    - Onboarding
    - Active Usage
    - Cross-sell / Upsell
    - Retention
    - Advocacy

