# ==============================================================================
# Competitive Landscape
# ==============================================================================

competitive_landscape:
  key_competitors:
    - name: Salesforce
      positioning: "CRM-centric with Marketing Cloud"
      strengths:
        - Strong CRM integration
        - Financial Services Cloud
        - Large ecosystem
      weaknesses:
        - Content creation gaps
        - Complex pricing
        - Integration overhead
      adobe_advantage: "Unified content and data platform vs point solutions"

    - name: Seismic
      positioning: "Sales enablement focus"
      strengths:
        - Strong advisor enablement
        - Content personalisation
        - Compliance workflows
      weaknesses:
        - Limited customer experience scope
        - Dependent on other stacks
      adobe_advantage: "End-to-end content supply chain"

    - name: Pega
      positioning: "Decisioning and process automation"
      strengths:
        - Strong decisioning engine
        - Process automation
        - FSI-specific solutions
      weaknesses:
        - Weak content management
        - Limited marketing capability
      adobe_advantage: "Superior content creation and journey orchestration"

  displacement_strategies:
    from_point_solutions:
      approach: "Consolidation value proposition"
      key_messages:
        - "Reduce vendor count and integration complexity"
        - "Unified data model across marketing and experience"
        - "Lower total cost of ownership"
    from_legacy_platforms:
      approach: "Modernisation value proposition"
      key_messages:
        - "Cloud-native, API-first architecture"
        - "Continuous innovation without disruption"
        - "Future-proof technology investment"

