# ==============================================================================
# Messaging Guidelines
# ==============================================================================

messaging:
  tone:
    - "Trust-focused"
    - "Security-conscious"
    - "Compliance-aware"
    - "Customer-centric"
    - "Innovation-balanced"

  preferred_terms:
    - "client (not customer for wealth)"
    - "member (for credit unions)"
    - "policyholder (for insurance)"
    - "advisor (not rep or agent for wealth)"
    - "compliant / governed"
    - "secure / enterprise-grade"

  avoid_terms:
    - "disrupt (too aggressive for regulated industry)"
    - 'revolutionary (prefer "evolutionary")'
    - 'cutting-edge (prefer "proven")'
    - "AI-generated (compliance concern)"
    - "automated decisions (regulatory sensitivity)"

  key_themes:
    - Trust and security
    - Regulatory compliance
    - Customer/client experience
    - Operational efficiency
    - Digital transformation (evolutionary, not revolutionary)

# ==============================================================================
# SOAR NARRATIVE GUIDANCE — FINANCIAL SERVICES
# Sources: Research - Canonical Presentation Methodology Research.md;
#          The Universal Narrative Methodology.md
# ==============================================================================

soar_narrative_guidance:
  description: "SOAR stage framing tailored to Financial Services audience expectations and regulatory context"

  situation:
    typical_opening_frames:
      - "The financial services industry is navigating simultaneous pressure from digital-native challengers, evolving customer expectations, and increasing regulatory complexity."
      - "Your customers expect Amazon-level personalisation from their bank — delivered with bank-level security and compliance."
      - "The shift from product-led to relationship-led banking is accelerating, but most institutions lack the data infrastructure to support it."
    data_anchors:
      - "74% of retail banking customers would switch to a provider offering better digital experiences (Accenture 2023)"
      - "Fintechs now hold 38% of personal lending market share in the US (McKinsey 2024)"

  opportunity:
    villain_frame: "The regulatory and technical complexity of legacy infrastructure — not a competitor product — is the primary villain in FSI narratives"
    pain_vocabulary:
      - "Siloed data across lines of business preventing 360-degree customer view"
      - "Manual compliance reporting consuming analyst bandwidth"
      - "Inability to personalise at scale due to fragmented MarTech stack"
      - "Customer attrition driven by poor digital onboarding experience"
    loss_aversion_frame: "Every quarter of delayed digital transformation is estimated at $X million in foregone wallet share to digital challengers"

  action:
    adobe_value_frame: "Adobe's Financial Services accelerator provides pre-built FINRA/SEC-compliant data schemas, consent management, and identity resolution designed for regulated industries"
    differentiation_language:
      - "Real-time customer profiles that unify data across branch, digital, call centre, and advisor touchpoints"
      - "Adobe's Journey Optimizer with consent-first design — built for GDPR, CCPA, and sector-specific data residency"
    champion_story: "The internal champion in FSI is typically the Chief Digital Officer or Head of Digital Experience — equip them with a compliance narrative, not just a capability narrative"

  result:
    proof_pattern: "Before: [Customer] was managing 14 data sources manually across 3 business units. After: Real-time unified profiles deployed in 4 months — campaign conversion improved 22%, compliance reporting time reduced 60%."
    validated_outcome_types:
      - "Customer retention improvement (measured in NPS or churn rate)"
      - "Digital onboarding completion rate improvement"
      - "Campaign personalisation lift (measured in conversion or revenue per customer)"
      - "Compliance cost reduction (FTE hours or audit cost)"

  audience_calibration:
    economic_buyer: "CFO / CEO — frame in terms of revenue impact and cost reduction; use BLUF; no feature names"
    technical_buyer: "CTO / Head of Architecture — frame in terms of data architecture, API-first, compliance certifications"
    champion: "CDO / VP Digital — frame in terms of velocity to value, internal credibility, and career impact"
