# ==============================================================================
# Messaging Guidelines
# ==============================================================================

messaging:
  tone:
    - "Patient/member-centric"
    - "Empathetic"
    - "Evidence-based"
    - "Compliant"
    - "Accessible"

  preferred_terms:
    - "patient / member (context-dependent)"
    - "care journey"
    - "health outcomes"
    - 'engagement (not "marketing" in clinical context)'
    - "compliant / governed"
    - "accessible"
    - "secure / HIPAA-ready"

  avoid_terms:
    - 'targeting patients (prefer "reaching" or "engaging")'
    - "AI diagnosis (regulatory sensitivity)"
    - "automated medical decisions"
    - "guaranteed results"
    - "cure (unless clinically validated)"
    - 'marketing to patients (prefer "patient engagement")'

  key_themes:
    - Improving health outcomes
    - Patient/member experience
    - Compliance and governance
    - Operational efficiency
    - Digital transformation (patient-centric)

# ==============================================================================
# SOAR NARRATIVE GUIDANCE — HEALTHCARE & LIFE SCIENCES
# Sources: Research - Canonical Presentation Methodology Research.md;
#          The Universal Narrative Methodology.md
# ==============================================================================

soar_narrative_guidance:
  description: "SOAR stage framing tailored to Healthcare & Life Sciences audience expectations and compliance context"

  situation:
    typical_opening_frames:
      - "Healthcare organisations are caught between the mandate to improve patient experience and the operational reality of fragmented systems, HIPAA complexity, and resource constraints."
      - "Patients are now consumers — they research providers online, compare ratings, and switch based on digital experience. Healthcare organisations that still operate as if patients have no choice are losing ground."
      - "The pharmaceutical industry is under pressure to deliver personalised, compliant HCP engagement at scale — with shrinking field force budgets and rising expectations from both physicians and patients."
    data_anchors:
      - "60% of patients research providers online before booking — but fewer than 30% of health systems have a unified digital presence (Accenture 2024)"
      - "HCP engagement personalisation is cited as the top-3 commercial priority for 78% of global pharma commercial leads"

  opportunity:
    villain_frame: "The operational and compliance complexity of legacy EHR-centric data architectures — and the resulting inability to orchestrate personalised, compliant patient or HCP journeys"
    pain_vocabulary:
      - "Disconnected patient portal, EHR, and marketing systems creating identity fragmentation"
      - "HIPAA-constrained marketing teams unable to leverage clinical data for personalisation"
      - "HCP outreach still largely non-personalised and channel-agnostic (email + rep calls)"
      - "Patient no-show rates elevated by generic, poorly timed appointment reminders"
    loss_aversion_frame: "Every 1% improvement in patient retention is worth approximately $X to a health system of your size. The cost of inaction is not neutral."

  action:
    adobe_value_frame: "Adobe's Healthcare Shield (HIPAA-eligible) provides BAA-backed data handling, de-identification pipelines, and PHI-safe personalisation — enabling compliant journey orchestration at scale"
    differentiation_language:
      - "Patient profile unification across EHR, portal, and marketing touchpoints — with HIPAA-compliant consent management built in"
      - "Adobe's Real-Time CDP Healthcare Shield: the only enterprise CDP with BAA coverage for ePHI"
    champion_story: "The champion in healthcare is typically the Chief Digital Health Officer or VP Patient Experience — equip with a compliance-first narrative; legal and compliance must be visibly addressed in every pitch"

  result:
    proof_pattern: "Before: [Health System] had 8 different patient communication systems. After: Unified journey platform reduced patient no-shows by 18% and improved portal adoption 34% in 6 months."
    validated_outcome_types:
      - "Patient no-show rate reduction"
      - "Portal self-service adoption improvement"
      - "HCP engagement conversion lift"
      - "Campaign regulatory compliance audit pass rate"

  audience_calibration:
    economic_buyer: "CFO / CEO — focus on operational cost reduction and revenue impact of retention; zero clinical terminology"
    technical_buyer: "CTO / CISO — focus on HIPAA/HITECH compliance certifications, BAA availability, PHI handling, SOC2 Type II"
    champion: "CDO / VP Patient Experience — focus on speed to deployment, vendor support model, internal executive alignment"
