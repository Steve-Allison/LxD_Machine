# ==============================================================================
# Industry Pain Points
# ==============================================================================

pain_points:
  strategic:
    - id: consumer_expectations
      description: "Patients expect retail-like experiences from healthcare"
      severity: high
      affected_personas: [cmo, vp_marketing]
      related_products: [RTCDP, AJO, AEM]

    - id: value_based_care
      description: "Shift from volume to value requiring new engagement models"
      severity: high
      affected_personas: [cmo, vp_marketing, director_analytics]
      related_products: [RTCDP, CJA, Analytics]

    - id: trust_and_transparency
      description: "Rebuilding patient/member trust post-pandemic"
      severity: medium
      affected_personas: [cmo, cco]
      related_products: [AEM, GenStudio]

  operational:
    - id: mlr_compliance
      description: "Medical Loss Ratio constraints limiting marketing spend"
      severity: high
      affected_personas: [cmo, cfo]
      related_products: [Workfront, Analytics]
      notes: "Payers must spend 80-85% of premiums on care"

    - id: content_review_cycles
      description: "Medical/legal/regulatory review bottlenecks"
      severity: critical
      affected_personas: [director_content_strategy, cmo]
      related_products: [Workfront, GenStudio, AEM Assets]

    - id: omnichannel_coordination
      description: "Fragmented patient/member touchpoints"
      severity: high
      affected_personas: [vp_marketing, director_marketing_ops]
      related_products: [AJO, RTCDP, AEM]

  technical:
    - id: hipaa_data_constraints
      description: "HIPAA limiting use of patient data for personalisation"
      severity: critical
      affected_personas: [cio, director_marketing_ops, director_analytics]
      related_products: [RTCDP, AEP]

    - id: ehr_integration
      description: "Electronic Health Record integration complexity"
      severity: high
      affected_personas: [cio, it_director]
      related_products: [AEP, RTCDP]
      common_systems: [Epic, Cerner, Meditech, Allscripts]

    - id: legacy_systems
      description: "Ageing technology infrastructure"
      severity: high
      affected_personas: [cio, it_director]
      related_products: [All - modernisation]

# ==============================================================================
# Compliance & Regulatory
# ==============================================================================

compliance:
  regulations:
    - id: hipaa
      name: "HIPAA"
      full_name: "Health Insurance Portability and Accountability Act"
      description: "Protected Health Information (PHI) requirements"
      applies_to: [all]
      content_impact:
        - PHI cannot be used for marketing without authorisation
        - De-identification requirements
        - Business Associate Agreements required
        - Breach notification requirements
      adobe_positioning:
        - "HIPAA-ready infrastructure"
        - "BAA available for AEP/RTCDP"
        - "De-identification capabilities"

    - id: fda_advertising
      name: "FDA Drug/Device Advertising"
      description: "Promotion of drugs and medical devices"
      applies_to: [pharmaceutical, medical_devices]
      content_impact:
        - Fair balance requirements
        - Risk/benefit disclosure
        - Indication-specific claims
        - Off-label promotion prohibited

    - id: cms_marketing
      name: "CMS Medicare Marketing Guidelines"
      description: "Medicare Advantage and Part D marketing rules"
      applies_to: [health_plans]
      content_impact:
        - Specific language requirements
        - Annual election period rules
        - Beneficiary communication rules
        - Material submission requirements

    - id: ada_accessibility
      name: "ADA / Section 508"
      description: "Digital accessibility requirements"
      applies_to: [all]
      content_impact:
        - WCAG 2.1 AA compliance
        - Alternative text for images
        - Screen reader compatibility
        - Colour contrast requirements

  review_process:
    typical_reviewers:
      - Medical/Scientific
      - Legal
      - Regulatory Affairs
      - Compliance
      - Brand
    average_cycle_time: "10-30 business days for new content"
    expedited_cycle_time: "3-5 days for updates"

# ==============================================================================
# Industry Terminology
# ==============================================================================

terminology:
  healthcare_acronyms:
    PHI:
      full_name: "Protected Health Information"
      context: "HIPAA-regulated patient data"
    EHR:
      full_name: "Electronic Health Record"
      context: "Patient medical record system"
    HCP:
      full_name: "Healthcare Professional"
      context: "Doctors, nurses, pharmacists"
    PCP:
      full_name: "Primary Care Physician"
      context: "Patient's main doctor"
    HMO:
      full_name: "Health Maintenance Organisation"
      context: "Type of health plan"
    PPO:
      full_name: "Preferred Provider Organisation"
      context: "Type of health plan"
    MLR:
      full_name: "Medical Loss Ratio"
      context: "% of premiums spent on care"
    HEDIS:
      full_name: "Healthcare Effectiveness Data and Information Set"
      context: "Quality measures for health plans"
    NPS:
      full_name: "Net Promoter Score"
      context: "Patient/member satisfaction metric"
    CAHPS:
      full_name: "Consumer Assessment of Healthcare Providers and Systems"
      context: "Patient experience survey"

  clinical_terms:
    indication:
      description: "Approved use of a drug/device"
    contraindication:
      description: "Condition where treatment should not be used"
    adverse_event:
      description: "Negative side effect"
    efficacy:
      description: "How well a treatment works"

  patient_journey_stages:
    - Awareness / Symptoms
    - Research / Information Seeking
    - Provider Selection
    - Appointment / Access
    - Diagnosis
    - Treatment Selection
    - Treatment / Care
    - Follow-up / Monitoring
    - Ongoing Wellness

