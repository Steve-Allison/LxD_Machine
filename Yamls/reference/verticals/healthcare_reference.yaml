# ==============================================================================
# Competitive Landscape
# ==============================================================================

competitive_landscape:
  key_competitors:
    - name: Veeva
      positioning: "Life sciences cloud leader"
      strengths:
        - Deep pharma expertise
        - CRM and content integration
        - Regulatory compliance
      weaknesses:
        - Limited to life sciences
        - Expensive
        - Less content creation capability
      adobe_advantage: "Broader platform with superior content creation"

    - name: Salesforce Health Cloud
      positioning: "CRM-centric healthcare solution"
      strengths:
        - Strong CRM capabilities
        - Care coordination features
        - AppExchange ecosystem
      weaknesses:
        - Weak content management
        - No native DAM
        - Complex implementation
      adobe_advantage: "Unified content and experience platform"

    - name: Epsilon (Publicis)
      positioning: "Healthcare marketing services"
      strengths:
        - Healthcare data expertise
        - Agency services
        - Campaign execution
      weaknesses:
        - Services dependency
        - Less technology depth
      adobe_advantage: "Enterprise platform vs agency services"

