_meta:
  id: media_entertainment_reference
  title: "Media & Entertainment Vertical"
  description: "Media & Entertainment industry configuration including sub-verticals (streaming, broadcasting, publishing, gaming, sports), terminology, value propositions, and competitive landscape."
  domain: sales
  domain_type: cross_cutting
  purpose: reference
  version: "1.3.0"
  last_updated: "2026-03-01"
