entity_types:
  competitor_mention:
    gliner_label: "COMPETITOR"
    gliner_description: "Competitor product company HubSpot Salesforce Google Analytics Sitecore Shopify Canva Figma alternative vendor"
    examples:
      - "HubSpot"
      - "Salesforce Marketing Cloud"
      - "Google Analytics"
      - "Sitecore"
      - "Canva"
    confidence_threshold: 0.8
    color: "#e74c3c"

  competitive_claim:
    gliner_label: "COMPETITIVE_CLAIM"
    gliner_description: "Competitor comparison differentiation advantage better than versus alternative claim positioning"
    examples:
      - "Unlike HubSpot, Adobe offers..."
      - "While competitors require multiple tools..."
      - "Adobe is the only platform that..."
    confidence_threshold: 0.7
    color: "#f39c12"

  objection:
    gliner_label: "OBJECTION"
    gliner_description: "Customer objection concern hesitation pushback too expensive too complex switch cost"
    examples:
      - "Adobe is too expensive"
      - "We can't afford"
      - "Too complex for our team"
      - "We're happy with our current solution"
    confidence_threshold: 0.65
    color: "#9b59b6"

# ==============================================================================
# SCORING & DETECTION
# ==============================================================================

scoring:
  description: "Rubric for evaluating competitive messaging quality"

  dimensions:
    positioning_clarity:
      weight: 0.30
      criteria:
        excellent: "Clear differentiation; specific value proposition; memorable framing"
        good: "Solid positioning; some differentiation; reasonable clarity"
        adequate: "Generic claims; limited differentiation"
        weak: "Unclear positioning; no differentiation"
        poor: "Confusing or contradictory positioning"

    objection_handling:
      weight: 0.25
      criteria:
        excellent: "Acknowledges concern; reframes effectively; provides evidence; advances conversation"
        good: "Handles objection; some reframe; moves forward"
        adequate: "Addresses objection superficially"
        weak: "Dismissive or defensive response"
        poor: "Ignores or fumbles objection"

    evidence_quality:
      weight: 0.25
      criteria:
        excellent: "Specific proof points; named customers; quantified results"
        good: "Some evidence; reasonably specific"
        adequate: "Generic claims; limited evidence"
        weak: "No supporting evidence"
        poor: "Misleading or fabricated claims"

    competitive_accuracy:
      weight: 0.20
      criteria:
        excellent: "Accurate competitor characterization; fair comparison"
        good: "Generally accurate; minor gaps"
        adequate: "Some inaccuracies; dated information"
        weak: "Significant inaccuracies; strawman arguments"
        poor: "Misleading or false competitor claims"

# ==============================================================================
# COMPETITIVE NARRATIVE FRAMEWORK
# Sources: Research - Canonical Presentation Methodology Research.md;
#          The Universal Narrative Methodology.md;
#          Crafting Powerful Opening Plays.md
# ==============================================================================

competitive_narrative_framework:
  description: "SOAR-stage mapping for competitive positioning — how to frame competitor context within the narrative arc"

  soar_competitive_mapping:
    situation:
      role: "Establish the shared competitive landscape without conceding ground"
      guidance: "Acknowledge the competitive environment as fact — do not ignore it or be defensive. Name the incumbent if known."
      example_framing: "'Most organisations in your space are running [Competitor X] or a mix of point solutions. You may be in that position now.'"
      anti_pattern: "Opening with 'we're better than X' — triggers defensiveness; Situation stage is not for differentiation claims"

    opportunity:
      role: "Reframe the competitive gap as the cost of not changing — not as 'switch to us'"
      guidance: "Define the opportunity in terms of the problem the incumbent doesn't solve, not in terms of your product features. Make the status quo the villain."
      example_framing: "'The real cost isn't the licence fee for [Competitor X] — it's the [lost revenue/manual effort/compliance risk] that their architecture can't address.'"
      villain_frame: "Competitor should be the OBSTACLE (external villain), not the VILLAIN per se — the villain is the business problem the competitor enables"

    action:
      role: "Present Adobe's solution as the mechanism that closes the gap — with differentiated proof"
      guidance: "Differentiation must be specific and verifiable. Avoid generic claims ('best in class', 'enterprise-grade'). Use named customer evidence and quantified outcomes."
      differentiation_standard:
        weak: "'Adobe has better analytics capabilities'"
        strong: "'Adobe Analytics processed 2.3 trillion data rows for [Customer] in 2024, versus [Competitor X]'s 500B row cap — enabling real-time personalisation at scale'"
      champion_role: "Equip the internal champion with one crisp competitive story for each stakeholder they must convince"

    result:
      role: "Close with proof that the switch/upgrade delivered measurable value — neutralising the migration objection"
      guidance: "VALIDATED_OUTCOME from a named similar-profile customer is the most powerful Result for competitive displacement"
      before_after_requirement: "Before/after comparisons should explicitly reference what the customer was running before — names the competitor, validates the switch"
      example: "'[Customer] migrated from [Competitor X] to Adobe in 8 months. ARR from digital grew 34% in the first year. Their previous tool couldn't attribute cross-channel — Adobe resolved that within 90 days.'"

  competitive_objection_narrative_patterns:
    description: "Narrative response patterns for common competitive objections — mapped to ethos/pathos/logos for rhetorical balance"

    price_objection:
      objection_type: "Adobe is too expensive"
      ethos_move: "Acknowledge that licence cost is a real consideration — validate the concern"
      pathos_move: "Reframe the pain: 'The question isn't what Adobe costs — it's what staying on [Competitor X] costs you every quarter in [missed attribution / manual workarounds / compliance risk]'"
      logos_move: "Present TCO comparison with quantified switching cost vs. ongoing opportunity cost"
      closing_question: "If we could show a clear path to 18-month payback on the investment, what would need to be true for you to move forward?"

    complexity_objection:
      objection_type: "Too complex / takes too long to implement"
      ethos_move: "Reference named customers of similar complexity who have gone live successfully"
      pathos_move: "Acknowledge implementation anxiety — 'Everyone who's gone through a platform change has felt this'"
      logos_move: "Provide specific timeline benchmarks: 'Median time to first value for your use case is 12 weeks. Here's the implementation playbook.'"

    incumbent_loyalty_objection:
      objection_type: "We're happy with [Competitor] / we have a long relationship with them"
      ethos_move: "Respect the relationship — 'That relationship clearly has value. We're not asking you to walk away from it today.'"
      pathos_move: "Explore the gap: 'What would change if you could do [specific capability X] that [Competitor] can't provide?'"
      logos_move: "Use a wedge strategy — identify a specific use case where Adobe is uniquely superior and propose a pilot"

  competitive_messaging_quality_indicators:
    description: "Additional scoring indicators for competitive content quality — supplements the scoring.dimensions section"

    narrative_specificity:
      weight: "Informational supplement to positioning_clarity"
      excellent: "Competitor named + specific weakness identified + Adobe alternative named + quantified customer proof"
      adequate: "Generic differentiation claims without competitor naming or specific evidence"
      weak: "Vague claims ('better than alternatives') with no supporting structure"

    soar_alignment:
      description: "Competitive content should appear primarily in Opportunity and Action stages of SOAR"
      misplaced_competitor_content:
        situation_competitor_mention: "Low risk — establishing context"
        result_competitor_mention: "High risk — Result stage should be about customer success, not competitor bashing"
      scoring_note: "Competitor mentions in Result stage without before/after context: -3 points narrative coherence"
