# ==============================================================================
# COMPETITIVE POSITIONING
# ==============================================================================

positioning:
  description: "Strategic positioning frameworks for competitive scenarios"

  # ---------------------------------------------------------------------------
  # POSITIONING BY SCENARIO
  # ---------------------------------------------------------------------------
  positioning_strategies:
    enterprise_scale:
      scenario: "Prospect needs enterprise-grade scale and reliability"
      key_messages:
        - "Adobe powers the world's largest brands - trusted by 80% of Fortune 100"
        - "Unified platform reduces integration complexity and total cost of ownership"
        - "Global 24/7 support with dedicated customer success"
      proof_points:
        - "Customer: [Major Brand] serves 50M+ customers on AEM"
        - "Uptime: 99.99% SLA for Enterprise customers"
        - "Scale: Process billions of events daily in Analytics"
      competitors_to_address:
        - "Point solution complexity (Contentful + Segment + multiple tools)"
        - "Google Analytics sampling at enterprise volume"
        - "Salesforce total cost of ownership"

    innovation_leader:
      scenario: "Prospect values cutting-edge technology and innovation"
      key_messages:
        - "First-party data foundation for a cookieless future"
        - "Native AI (Sensei) trained on marketing-specific data"
        - "Firefly generative AI with commercial safety built-in"
      proof_points:
        - "Adobe Sensei processes 100T+ transactions per year"
        - "Firefly trained on licensed Adobe Stock content"
        - "Real-Time CDP for millisecond personalization"
      competitors_to_address:
        - "Midjourney/Stability AI IP concerns"
        - "Google cookie deprecation impact"
        - "Point solution AI vs unified AI"

    time_to_value:
      scenario: "Prospect needs fast implementation and quick wins"
      key_messages:
        - "Edge Delivery Services for sub-second page loads in weeks"
        - "AJO quick-start templates for campaign launch in days"
        - "Express for democratized creation without design skills"
      proof_points:
        - "Customer: [Brand] launched in 6 weeks with EDS"
        - "100+ pre-built journey templates in AJO"
        - "Express: 30 minutes from idea to social asset"
      competitors_to_address:
        - "HubSpot simplicity claims"
        - "Canva speed claims"
        - "Contentful implementation speed"

    integration_ecosystem:
      scenario: "Prospect has complex technology stack"
      key_messages:
        - "250+ native integrations in Experience Cloud"
        - "API-first architecture for custom integration"
        - "Exchange marketplace for partner solutions"
      proof_points:
        - "Native Salesforce, Microsoft, SAP connectors"
        - "Experience Platform APIs for any data source"
        - "1000+ Exchange partners"
      competitors_to_address:
        - "Salesforce ecosystem lock-in"
        - "Point solution integration complexity"
        - "Custom development costs elsewhere"

  # ---------------------------------------------------------------------------
  # DIFFERENTIATION FRAMEWORK
  # ---------------------------------------------------------------------------
  differentiation:
    description: "Core differentiators for competitive positioning"

    platform_vs_point:
      differentiator: "Unified Platform vs Point Solution Sprawl"
      message: "Single view of customer across all channels; one data layer; unified AI"
      evidence:
        - "Real-Time CDP unifies all data sources"
        - "Sensei AI available across all products"
        - "One login, one governance model"
      counter:
        objection: "We prefer best-of-breed flexibility"
        response: "Adobe is composable - use what you need. But unified data and AI compound value. Integration tax of point solutions often exceeds platform cost."

    content_supply_chain:
      differentiator: "End-to-End Content Supply Chain"
      message: "From creative ideation through delivery and optimization - one flow"
      evidence:
        - "Creative Cloud to Experience Cloud workflow"
        - "Asset management in AEM Assets"
        - "Content velocity with GenStudio"
      counter:
        objection: "We use Figma/Canva for design"
        response: "Those tools fit early workflow. Adobe completes the chain - asset management, delivery, personalization, analytics. Handoff friction adds hidden cost."

    first_party_data:
      differentiator: "First-Party Data Foundation"
      message: "Built for a privacy-first, cookieless future from the ground up"
      evidence:
        - "Real-Time CDP is consent-aware by design"
        - "Adobe Analytics doesn't sample like GA4"
        - "Identity resolution without third-party cookies"
      counter:
        objection: "GA4 is free and sufficient"
        response: "Free at the cost of sampling, data ownership, and Google's priorities. First-party data ownership is strategic - Adobe ensures you control it."

    creative_to_commerce:
      differentiator: "Creative-to-Commerce Continuum"
      message: "Only Adobe connects creative, marketing, and commerce in one ecosystem"
      evidence:
        - "Firefly generates commerce-ready assets"
        - "AEM Assets serves Creative and Marketing"
        - "Adobe Commerce plugs into Experience Cloud"
      counter:
        objection: "We use Shopify/Salesforce Commerce"
        response: "Adobe Commerce offers B2B depth and Experience Cloud integration that Shopify can't match. For Salesforce shops, consider total ecosystem cost."

# ==============================================================================
# OBJECTION HANDLING
# ==============================================================================

objection_handling:
  description: "Common objections and response playbooks"

  # ---------------------------------------------------------------------------
  # COST/PRICING OBJECTIONS
  # ---------------------------------------------------------------------------
  cost:
    objection: "Adobe is too expensive"
    response_framework:
      acknowledge: "I understand - Adobe is an investment. Let's unpack what you're comparing."
      reframe: "When evaluating cost, consider total cost of ownership: point solution integration, multiple vendor management, data silos, and opportunity cost of slower time-to-value."
      evidence:
        - "Forrester TEI studies show 300%+ ROI for AEM, Analytics, and Target customers"
        - "Unified platform reduces IT integration burden by 30-40%"
        - "Faster time to market = faster revenue"
      question: "What is the cost of the problem you're trying to solve? How does that compare to the investment?"

    variations:
      cant_afford:
        objection: "We can't afford Adobe right now"
        response: "Let's scope to what matters most. Adobe has entry points at different investment levels. What's the most critical problem to solve first?"

      cheaper_alternative:
        objection: "HubSpot/GA4/Canva is much cheaper"
        response: "They are - for a subset of capability. What happens when you need to add personalization? Attribution? Enterprise scale? The upgrade path from point solutions often costs more than starting with Adobe."

      budget_freeze:
        objection: "We have a budget freeze"
        response: "Understood. Let's focus on building the business case for when budget opens. Often, Adobe pays for itself through efficiency gains - would a pilot help demonstrate value?"

  # ---------------------------------------------------------------------------
  # COMPLEXITY OBJECTIONS
  # ---------------------------------------------------------------------------
  complexity:
    objection: "Adobe is too complex for our team"
    response_framework:
      acknowledge: "Adobe has depth - that's part of the value. But I hear the concern about adoption."
      reframe: "Complexity depends on scope. You don't have to use everything. Adobe is modular - start simple, grow as you need."
      evidence:
        - "Edge Delivery Services: developers productive in days"
        - "Express: no design skills required"
        - "Adobe Learning: 1000+ free courses"
      question: "What would success look like for your team in the first 90 days? Let's design an adoption path for that."

    variations:
      learning_curve:
        objection: "The learning curve is too steep"
        response: "Adobe invests heavily in enablement - Adobe Learning, certification, customer success. We also have implementation partners who accelerate time to value."

      need_simpler:
        objection: "We need something simpler"
        response: "Simple is relative to capability. What feels simple today may constrain you tomorrow. Let's match tool complexity to your actual needs."

  # ---------------------------------------------------------------------------
  # COMPETITIVE OBJECTIONS
  # ---------------------------------------------------------------------------
  competitive:
    vs_google:
      objection: "We're happy with Google Analytics"
      response_framework:
        acknowledge: "GA4 is widely used and free at entry. I understand the appeal."
        reframe: "But consider: Do you own your data, or does Google? Are you hitting sampling limits? Can GA4 connect the full customer journey across touchpoints?"
        evidence:
          - "Adobe Analytics: No sampling at any volume"
          - "Full attribution modeling, not last-click default"
          - "Integrates natively with Adobe Target, AJO, CDP"
        question: "What questions can't you answer today with GA4? That's often where Adobe adds value."

    vs_salesforce:
      objection: "We're a Salesforce shop"
      response_framework:
        acknowledge: "Salesforce has a strong ecosystem. Adobe integrates well with Salesforce."
        reframe: "Many customers use both - CRM data in Salesforce, experience and creative in Adobe. They complement rather than compete."
        evidence:
          - "Native Salesforce connectors in Experience Platform"
          - "Bi-directional data sync"
          - "Adobe excels at experience, Salesforce at CRM"
        question: "Are you looking to consolidate, or optimize each platform for what it does best?"

    vs_hubspot:
      objection: "HubSpot does everything we need"
      response_framework:
        acknowledge: "HubSpot is great for getting started and inbound marketing."
        reframe: "As you scale, HubSpot's pricing increases and enterprise features become gaps. Many graduate to Adobe when they outgrow HubSpot's ceiling."
        evidence:
          - "Adobe Marketo: Built for enterprise B2B complexity"
          - "Advanced ABM, predictive scoring, attribution"
          - "Integrates with full Experience Cloud"
        question: "What marketing challenges are you facing that HubSpot can't solve? That's typically the trigger for Adobe."

  # ---------------------------------------------------------------------------
  # SWITCHING/MIGRATION OBJECTIONS
  # ---------------------------------------------------------------------------
  switching:
    objection: "Switching costs are too high"
    response_framework:
      acknowledge: "Migration is always a consideration. It's a valid concern."
      reframe: "But staying on the wrong platform has costs too - opportunity cost, technical debt, and eventually forced migration anyway."
      evidence:
        - "Adobe has migration tools and services"
        - "Phased implementation reduces risk"
        - "Customer success for smooth transition"
      question: "What's the cost of staying where you are for another 3 years? Often that exceeds migration investment."

    variations:
      locked_in:
        objection: "We're locked into our current vendor"
        response: "Most 'lock-in' is contractual, not technical. Let's explore your contract timeline and plan ahead."

      too_much_effort:
        objection: "Too much effort to migrate"
        response: "Adobe has migration playbooks and partners who've done this hundreds of times. Let's scope the actual effort together."

