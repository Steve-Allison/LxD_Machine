narrative:
  soar:
    what: "SOAR (Situation, Opportunity, Action, Result) is a strategic narrative framework designed for business communication. Unlike traditional problem-solution frameworks, it emphasizes the positive opportunity and measurable outcomes."
    why: "It structures complex information into a logical flow that decision-makers can easily follow, ensuring all critical elements of a business case are present."
    how: "Situation sets the context; Opportunity defines the value; Action explains the method; Result provides proof."

  hero_positioning:
    what: "Hero Positioning determines who the story is about. In the StoryBrand framework, the customer should be the Hero (the protagonist) and your brand should be the Guide."
    why: "Audiences care about their own success, not your brand's features. When you position the customer as the hero, they see themselves in the story."
    how: "Shift language from 'We provide...' (Brand-as-Hero) to 'You will achieve...' (Customer-as-Hero)."

  obstacle_depth:
    what: "Obstacle Depth measures the complexity of the problem. A strong narrative addresses three layers: External (physical/practical), Internal (emotional/feeling), and Philosophical (why it's wrong)."
    why: "If you only solve the external problem, you provide a commodity. If you solve the internal and philosophical problems, you create value and loyalty."
    how: "Identify not just what is broken (External), but how it makes them feel (Internal) and why it's unjust (Philosophical)."

  wiifm:
    what: "WIIFM stands for 'What's In It For Me?' It represents the customer-centric value proposition at every stage of the narrative."
    why: "Audiences constantly filter information through self-interest. If they don't see the personal benefit immediately, they disengage."
    how: "Translate every feature into a benefit, and every benefit into a specific outcome for the audience."

  loss_aversion:
    what: "Loss Aversion is a behavioral economics principle stating that the pain of losing is psychologically about twice as powerful as the pleasure of gaining."
    why: "Framing the cost of inaction (risk) before the benefit of action (reward) creates urgency and motivation to change."
    how: "State what they stand to lose if they do nothing before presenting what they will gain by acting."

  # ---------------------------------------------------------------------------
  # Structural Frameworks — Added v1.1.0
  # Sources: PDL Architecture; Research - Canonical Presentation Methodology
  # ---------------------------------------------------------------------------
  scqa:
    what: "SCQA (Situation, Complication, Question, Answer) is Barbara Minto's Pyramid Principle rhetorical sequence for executive communication. It opens with stable context (Situation), introduces the destabilising event (Complication), raises the logical question that creates (Question), and delivers the recommended response (Answer)."
    why: "Decision-makers process information deductively. SCQA matches this by presenting the answer at the top of the pyramid before supporting evidence — this is the Minto Principle."
    how: "Open with shared context → introduce the problem that breaks the status quo → let the problem generate the question the audience is now asking → answer that question immediately. The Answer becomes the BLUF."
    scoring_note: "SCQA presence in executive presentation earns +5 points. Absence earns -3 points."

  kairos:
    what: "Kairos (Greek: καιρός) is Aristotle's concept of the right or opportune moment. In persuasion, it refers to urgency framing — the argument that action must be taken NOW, not eventually."
    why: "Without urgency, decisions are deferred. Kairos creates the psychological pressure that converts understanding into commitment."
    how: "Use time-bound framing ('by Q3', 'before the next budget cycle'), consequence escalation ('every month of delay costs X'), and external trigger references ('the market is shifting now because...')."
    soar_stage: "Primarily deployed in SOAR Opportunity and Result stages."
    scoring_note: "KAIROS marker in close section: +3 points. Absent: missed urgency signal."

  monroe_sequence:
    what: "Monroe's Motivated Sequence is a five-stage persuasive structure developed by Alan Monroe (1935): Attention → Need → Satisfaction → Visualization → Action."
    why: "The sequence works because it mirrors the psychological journey from indifference to commitment. It is particularly effective for sales and change-management narratives."
    how: |
      1. Attention: Hook that disrupts the status quo
      2. Need: Establish the problem and its stakes
      3. Satisfaction: Present the solution
      4. Visualization: Show what success (or failure) looks like
      5. Action: Issue the specific call to action
    scoring_note: "Full Monroe sequence: +8 points. Partial (3-4 stages): +4 points."

  champion_archetype:
    what: "The Champion is the internal advocate within the buyer's organisation who drives the initiative, secures cross-functional buy-in, and pushes the project to completion. Distinguished from the Economic Buyer (budget authority) and Technical Buyer (evaluation authority)."
    why: "In complex multi-stakeholder B2B deals, identifying and equipping the Champion is often the decisive factor. The Champion does the selling internally when the vendor cannot be in the room."
    how: "Equip the Champion with: a clear narrative of the business impact, responses to likely objections, and an internal pitch deck. The SOAR ACTION stage should speak directly to the Champion's needs."
    soar_stage: "ACTION stage — the Champion is the agent of change."

# -----------------------------------------------------------------------------
# Rhetorical & Human Elements
# -----------------------------------------------------------------------------
critique:
  rhetorical_balance:
    what: "Rhetorical Balance is the distribution of Aristotle's three modes of persuasion: Ethos (Credibility), Pathos (Emotion), and Logos (Logic)."
    why: "A balanced argument appeals to the whole person. All-Logos is dry; All-Pathos is manipulative; All-Ethos is arrogant. The most persuasive arguments use all three."
    how: "Ensure you have data (Logos), trust signals (Ethos), and human stakes (Pathos)."

  human_element:
    what: "The Human Element refers to the relatability and authenticity of the presentation. It includes storytelling, conversational language, and emotional resonance."
    why: "People buy from people. A purely clinical or corporate presentation creates distance, while a human connection builds trust."
    how: "Use 'you/we' language, share relevant anecdotes, and acknowledge the human impact of business problems."

# -----------------------------------------------------------------------------
# Visual Design (CRAP, Tufte, etc.)
# -----------------------------------------------------------------------------
visual:
  crap:
    overall_what: "The CRAP framework (Contrast, Repetition, Alignment, Proximity) evaluates fundamental visual design principles that determine how effectively your slides communicate."
    overall_why: "Good design is not just aesthetic; it reduces cognitive load and guides the viewer's attention to what matters."
    contrast_what: "Contrast creates visual hierarchy by making important elements stand out through differences in size, color, weight, or spacing."
    repetition_what: "Repetition creates visual consistency through repeated use of colors, fonts, layouts, and design elements across slides."
    alignment_what: "Alignment creates visual order by ensuring elements line up along invisible grid lines or edges."
    proximity_what: "Proximity groups related information together and separates unrelated information through spacing."

  tufte:
    data_ink_what: "The Data-Ink Ratio measures what percentage of ink (or pixels) in your charts represents actual data versus decorative elements."
    chartjunk_what: "Chartjunk refers to decorative elements that don't convey information: unnecessary gridlines, 3D effects, shadows, gradients, or decorative borders."
    lie_factor_what: "The Lie Factor measures whether visual representations accurately reflect data proportions (e.g., does a bar 2x as tall represent 2x the value?)."

  # ---------------------------------------------------------------------------
  # Semiotic & Cognitive Visual Theory — Added v1.1.0
  # Sources: Structural Paradigms in NLP; PDL Architecture
  # ---------------------------------------------------------------------------
  semiotic_arrangement:
    what: "Semiotic Arrangement refers to the spatial grammar of visual communication, as theorised by Kress & van Leeuwen (1996) in 'Reading Images.' The two principal axes are: Given/New (left = established information; right = new or challenging information) and Ideal/Real (top = idealised or aspirational; bottom = practical or grounded)."
    why: "Audiences unconsciously decode spatial position as meaning. Placing a competitor logo in the 'Given' position and your logo in the 'New' position implies your solution is the natural evolution — without stating it."
    how: "Map slide layouts to the semiotic grid: headline in Ideal space, evidence and data in Real space. Use Given/New positioning for comparison slides."
    scoring_note: "Semiotic mismatch detected: -10 points."

  cognitive_debt:
    what: "Cognitive Debt is the accumulated extraneous cognitive load imposed on an audience by poor design choices. It is measured against Cognitive Load Theory (CLT) thresholds."
    why: "Every unit of cognitive capacity spent decoding layout, parsing dense text, or resolving split-attention is capacity NOT available for understanding the message."
    how: |
      CLT anti-patterns and their penalties:
      - Split-attention effect (spatially separated related information): -6 points
      - Redundancy effect (same information in text + audio simultaneously): -7 points
      - Wall of text (> 150 words per slide, non-document context): -8 points
      - Bullet overload (> 7 bullets without hierarchy): -5 points
    theory_source: "Sweller (1988), Chandler & Sweller (1991), Mayer (2009)"

  action_title:
    what: "An Action Title (also called an 'assertion headline') states the key insight or decision-enabling conclusion of a slide, rather than merely labelling the topic. Developed as a core principle of the McKinsey communication standard."
    why: "Topic titles ('Q3 Performance') require the audience to draw their own conclusion. Action titles ('Q3 Performance Exceeded Target by 18% — Driven by APAC Expansion') deliver the conclusion directly, enabling faster decision-making."
    how: |
      Scoring rubric:
      - Score 5: Result + Mechanism + Timeframe ('Customer NPS improved 22 points in 6 months following CX redesign')
      - Score 3: Assertion without mechanism ('Customer satisfaction improved')
      - Score 1: Topic label only ('Customer Satisfaction')

  cognitive_load:
    overall_what: "Cognitive Load Theory explains how working memory processes information. Your brain has limited capacity (about 7±2 items), and overloading it reduces comprehension."
    mayer_principles_what: "Mayer's 12 Multimedia Principles are research-based guidelines for designing effective multimedia learning materials."

  accessibility:
    score_what: "Accessibility measures compliance with WCAG 2.1 AA standards, ensuring content is usable by people with disabilities (screen readers, color blindness, etc.)."
    bluf_what: "BLUF (Bottom Line Up Front) places the key message or conclusion at the start of the content, aiding rapid comprehension and screen reader navigation."
