# Learning Design Orchestrator - Knowledge Corpus
# Version: 6.0
# Last Updated: 2026-02-12
#
# This YAML contains methodologies, theories, and templates for the
# GGOO (Gap → Goal → Objective → Outcome) learning design framework.
#
# Sections:
# 0. Shared Rules (formatting, grounding, output) + Backward Design Principle
# 1. Gap Analysis (HPT, Mager & Pipe, Action Mapping, Needs Assessment)
# 2. Learning Goals (SMART+, OKRs, ROI methodology)
# 3. Learning Objectives (ABCD, Bloom's Enhanced, Fink's, Adult Learning, Assessment, Cognitive Load, Terminal/Enabling, Measurability, Accessibility)
# 4. Learning Outcomes (Kirkpatrick-Phillips, Behavior Change, Transfer Frameworks)
# 5. Integration Validation (traceability, coherence)
#
# NEW IN v6.0:
# - Terminal vs. Enabling Objectives (hierarchical structure with parsing framework)
# - Needs Assessment (pragmatic, resource-constrained guidance with rapid assessment)
# - Enhanced Bloom's Taxonomy (remediation strategies + typical assessments for each level)
# - Measurability Indicators (practical improvement strategies for vague objectives)
# - Assessment Mapping (formative/summative/authentic with decision matrix)
# - Accessibility Considerations (CEFR B2, UDL, neurodiversity, inclusive language)
#
# RETAINED FROM v5.0:
# - Behavior change models (COM-B, Fogg) for outcome design
# - Learning transfer frameworks (Baldwin & Ford, 70:20:10)
# - OKR framework as alternative to SMART+ goals
# - Fink's Taxonomy for affective/metacognitive objectives
# - Adult learning principles (Knowles, Kolb) for objective design
# - Assessment design frameworks integrated with objectives
# - New World Kirkpatrick Model (2016 backward design approach)
# - Backward design principle showing GGOO alignment
# =============================================================================

# =============================================================================
# SECTION 0: SHARED RULES
# =============================================================================
shared_rules:
  formatting_rules: |
    FORMATTING RULES:
    - The full_report field should NOT include section headers like "## Section 1:" or "## Section 2:"
    - Start directly with content (e.g., "### Learning Gap Analysis" or "#### Course Title:")
    - The output template will add section numbering automatically
    - Use markdown formatting (headers, lists, tables) for readability
    - Keep paragraphs concise (2-4 sentences max)
    - Use bullet points for lists of 3+ items

  grounding_rules: |
    GROUNDING RULES - USE ONLY PROVIDED DATA:
    - Quote exact figures from input for all metrics
    - If a baseline is assumed (e.g., "0%"), state: "Baseline: X% (assumed - recommend pre-assessment to validate)"
    - If business impact is qualitative only, state that - NEVER invent financial figures
    - If cost_of_gap is not quantified, state: "Cost of Gap: Not quantified. Qualitative impact: [description]. Recommend stakeholder consultation for financial data."
    - For ROI calculations: If NO financial data in input, set roi_calculable: false and state: "ROI not calculable - no financial data provided"
    - Include measurement methodology for every metric (how will it be measured?)
    - Cite data sources for all figures

  output_json_rules: |
    JSON OUTPUT RULES:
    - All percentage fields must be integers (0-100), NOT decimals
    - All boolean fields must be true/false, NOT strings
    - All number fields must be numeric types, NOT strings
    - Enum fields must use EXACTLY the specified values (case-sensitive)
    - Use null for optional fields that are not applicable, NOT empty strings

# =============================================================================
# SECTION 0.1: BACKWARD DESIGN PRINCIPLE (GGOO META-FRAMEWORK)
# =============================================================================
backward_design_principle:
  name: "Wiggins & McTighe Backward Design"
  philosophy: "Start with the end in mind - design learning from outcomes backward to instruction"

  stages:
    stage_1:
      name: "Identify Desired Results"
      description: "What should learners ultimately be able to do?"
      ggoo_equivalent: "Learning Outcomes (Section 4)"
    stage_2:
      name: "Determine Acceptable Evidence"
      description: "How will we know they achieved the results?"
      ggoo_equivalent: "Learning Objectives + Assessment (Section 3)"
    stage_3:
      name: "Plan Learning Experiences"
      description: "What instruction will prepare learners?"
      ggoo_equivalent: "NOT in GGOO scope - this is post-GGOO implementation"

  ggoo_is_backward_design:
    explanation: |
      The GGOO framework IS backward design for learning analysis:

      1. GAP ANALYSIS (Section 1): Identifies the performance problem
      2. LEARNING GOAL (Section 2): Defines the business result we want (Stage 1 - Desired Results)
      3. LEARNING OUTCOMES (Section 4): Defines post-training behavior/results (Stage 1 - Observable Evidence)
      4. LEARNING OBJECTIVES (Section 3): Defines what learners demonstrate during training (Stage 2 - Assessment Evidence)
      5. [Implementation]: Content/activity design happens AFTER GGOO (Stage 3 - outside GGOO scope)

      GGOO stops at defining WHAT to achieve (analysis), not HOW to build it (implementation).

  design_sequence:
    traditional_forward: "Gap → Content → Objectives → Assessment (inefficient)"
    backward_ggoo: "Gap → Goal → Outcomes → Objectives → Assessment (efficient, aligned)"

# =============================================================================
# SECTION 1: GAP ANALYSIS
# =============================================================================
gap_analysis:
  expert_identity: |
    Performance Analysis Expert with 45+ years expertise using Human Performance
    Technology (HPT) methodology, Gilbert's BEM, Mager & Pipe decision trees,
    and Action Mapping. You achieve 94% accuracy in root cause identification
    and 89% business KPI connection rate.

  methodologies:
    gilberts_bem:
      name: "Gilbert's Behavior Engineering Model"
      purpose: "Systematic identification of performance barriers"
      categories:
        environmental:
          information: "Clear expectations, feedback, guidance"
          resources: "Tools, time, materials, processes"
          incentives: "Financial and non-financial motivation"
        individual:
          knowledge: "Understanding what to do and why"
          capacity: "Physical and mental ability"
          motives: "Internal drive and values"

    mager_pipe:
      name: "Mager & Pipe Performance Analysis Decision Tree"
      purpose: "Determine if training is the appropriate intervention"
      decision_tree:
        - question: "Can they do it if their life depended on it?"
          yes: "Not a skill/knowledge problem"
          no: "Continue analysis"
        - question: "Could they do it in the past?"
          yes: "Skill decay - practice needed"
          no: "Never learned - training appropriate"
        - question: "Are there obstacles preventing performance?"
          yes: "Environment problem - remove barriers"
          no: "Continue analysis"
        - question: "Are consequences aligned with desired performance?"
          yes: "Continue analysis"
          no: "Motivation problem - fix consequences"

    action_mapping:
      name: "Cathy Moore's Action Mapping"
      purpose: "Focus on observable business actions, not just knowledge"
      principle: "Design training around what people need to DO, not what they need to KNOW"
      verbs_to_use: ["decide", "respond", "prioritize", "solve", "negotiate", "adapt"]
      verbs_to_avoid: ["understand", "know", "learn", "be aware of", "appreciate"]

  root_cause_categories:
    knowledge:
      definition: "Lack of information, understanding, or awareness"
      training_appropriate: true
      indicators: ["Never been taught", "Lack of information", "Confusion about procedures"]

    skill:
      definition: "Inability to perform to required standard with knowledge"
      training_appropriate: true
      indicators: ["Can explain but can't do", "Inconsistent performance", "Requires excessive time"]

    motivation:
      definition: "Lack of will, incentive, or consequences"
      training_appropriate: false
      indicators: ["Can do but won't", "No reward for good performance", "Punishment for doing right thing"]

    environment:
      definition: "Systemic barriers, inadequate tools, or process issues"
      training_appropriate: false
      indicators: ["Obstacles prevent performance", "Inadequate resources", "Broken processes"]

  gap_quantification_template: |
    **Current Performance:** [metric with data source]
    **Target Performance:** [metric with benchmark]
    **Gap Size:** [quantified difference]
    **Measurement Method:** [how it will be measured]

  business_impact_template: |
    **Direct Costs:** [specific financial impact if quantified]
    **Indirect Costs:** [productivity, opportunity costs]
    **Risk Assessment:** [compliance, safety, reputation]
    **Strategic Impact:** [alignment with business goals]

  needs_assessment:
    name: "Pragmatic Needs Assessment for Resource-Constrained Environments"
    purpose: "Minimum viable inputs and rapid assessment approaches when time/budget is limited"

    must_have_inputs:
      measurable_business_goals:
        description: "Clear direction and success metrics"
        minimum: "2-3 key metrics agreed with stakeholders"
        example: "Reduce customer churn from 15% to 10%, increase NPS from 42 to 55"
      observable_behaviors:
        description: "Focus on what people need to DO (Action Mapping verbs)"
        minimum: "Critical tasks impacting business outcomes"
        example: "Respond to customer complaints within 4 hours, identify at-risk customers"
      performance_barriers:
        description: "Why people aren't currently performing (Gilbert's BEM)"
        minimum: "Quick root cause analysis (Knowledge/Skill vs. Environment vs. Motivation)"
        example: "Can't do (skill gap) vs. Could do but don't (environment/motivation gap)"
      success_metrics:
        description: "Clear indicators of training effectiveness"
        minimum: "Tied directly to business results (Kirkpatrick L3-L4)"
        example: "Manager observation of new behaviors at 60 days, KPI improvement at 90 days"

    rapid_assessment_approach:
      traditional_timeline: "2-4 weeks comprehensive needs analysis"
      pragmatic_timeline: "2-4 hours focused assessment"
      key_difference: "Focus on critical tasks that directly impact business outcomes, not exhaustive coverage"

      rapid_assessment_steps:
        step_1:
          action: "Identify 1-3 business KPIs at risk"
          time: "15 minutes"
          method: "Stakeholder interview or data review"
        step_2:
          action: "List 3-5 critical tasks that drive those KPIs"
          time: "30 minutes"
          method: "Action Mapping with SME"
        step_3:
          action: "Quick root cause analysis (Knowledge/Environment/Motivation)"
          time: "30 minutes"
          method: "Mager & Pipe decision tree with stakeholders"
        step_4:
          action: "Define success metrics (L3-L4 Kirkpatrick)"
          time: "30 minutes"
          method: "Agree on observable behaviors and KPI targets"
        step_5:
          action: "Document assumptions and flag gaps for later validation"
          time: "15 minutes"
          method: "Create GGOO draft with confidence scoring"

    threshold_decision_making:
      description: "When to proceed with training design vs. delay for more analysis"

      proceed_confident:
        threshold: "90%+ of critical inputs available"
        indicators:
          - "Business KPIs quantified with baseline and target"
          - "Critical tasks identified and validated by SME"
          - "Root cause confirms training is appropriate (knowledge/skill gap)"
          - "Success metrics agreed with stakeholders"
        action: "Proceed with full GGOO design"

      proceed_with_caution:
        threshold: "70-89% of critical inputs available"
        indicators:
          - "Some KPIs quantified, others qualitative"
          - "Critical tasks identified but not fully validated"
          - "Root cause analysis incomplete (some assumptions)"
          - "Success metrics drafted but not stakeholder-approved"
        action: "Proceed with GGOO design but flag assumptions explicitly; plan for validation during pilot"
        mitigation_strategies:
          - "Document all assumptions in gap analysis confidence notes"
          - "Schedule stakeholder validation before content development"
          - "Plan pilot with success criteria to validate assumptions"
          - "Budget for course corrections post-pilot"

      delay_or_simplify:
        threshold: "Below 70% of critical inputs available"
        indicators:
          - "Business KPIs unclear or not stakeholder-approved"
          - "Critical tasks unknown or speculative"
          - "Root cause analysis not performed"
          - "Success metrics undefined"
        action: "STOP design work; conduct proper needs assessment OR simplify scope to manageable scope"
        recommended_actions:
          - "Escalate to stakeholders for business goal clarification"
          - "Conduct rapid assessment (2-4 hours) to reach 70%+ threshold"
          - "Narrow scope to single high-confidence objective"
          - "Propose performance support or job aid instead of training"

    pragmatic_vs_ideal:
      ideal_comprehensive_analysis:
        inputs:
          - "Detailed job task analysis"
          - "Pre-training skill assessments"
          - "Comprehensive stakeholder interviews"
          - "Market/industry benchmarking"
          - "Cost-benefit analysis with ROI projection"
        timeline: "2-4 weeks"
        cost: "High (consultant time, stakeholder time, analysis tools)"

      pragmatic_minimum_viable:
        inputs:
          - "2-3 key business KPIs"
          - "3-5 critical tasks from Action Mapping"
          - "Root cause analysis (knowledge/skill vs. environment/motivation)"
          - "Success metrics (L3-L4 Kirkpatrick)"
        timeline: "2-4 hours"
        cost: "Low (single stakeholder meeting, SME collaboration)"

      when_to_use_pragmatic:
        - "Tight timeline (training needed in <8 weeks)"
        - "Limited budget (no funding for comprehensive analysis)"
        - "Well-understood domain (internal training, similar past projects)"
        - "Low-risk training (non-compliance, non-safety-critical)"
        - "Pilot planned (can validate assumptions during pilot)"

  confidence_scoring:
    high: "90-100% - Multiple data sources, validated by stakeholders"
    medium: "70-89% - Some data, reasonable assumptions documented"
    low: "50-69% - Limited data, significant assumptions required"

# =============================================================================
# SECTION 2: LEARNING GOALS
# =============================================================================
learning_goals:
  expert_identity: |
    Strategic Learning Designer and Chief Learning Officer with expertise in
    SMART+ goal framework, ROI methodology (Phillips), and business-learning
    alignment. You achieve 89% KPI connection rate and 4.2:1 average ROI.

  methodologies:
    smart_plus:
      name: "SMART+ Framework for Learning Goals"
      components:
        specific: "Clear, unambiguous connection between learning and business outcome"
        measurable: "Quantifiable improvement in specific KPI"
        achievable: "Realistic given constraints and resources"
        relevant: "Directly addresses identified performance gap"
        time_bound: "Clear timeline for impact measurement"
        plus_business_aligned: "Explicit link to strategic business objective"

    roi_methodology:
      name: "Phillips ROI Methodology"
      formula: "ROI = ((Benefits - Costs) / Costs) × 100"
      conservative_factor: "70% (account for attribution uncertainty)"
      components:
        benefits:
          - "Performance improvement value"
          - "Cost savings from gap closure"
          - "Revenue impact"
          - "Risk mitigation value"
        costs:
          - "Development costs (design, build)"
          - "Delivery costs (facilitation, technology)"
          - "Opportunity costs (learner time)"
          - "Maintenance and update costs"

  goal_template:
    structure: |
      "[Target learner role] will [achieve measurable performance improvement]
      resulting in [quantified business impact] within [timeframe]"
    example: |
      "Sales representatives will improve enterprise deal win rates from 45% to 65%
      resulting in £2.4M additional annual revenue within 12 months"

  roi_calculability_check:
    financial_data_required:
      - "Cost of gap (quantified)"
      - "Value of improvement (quantified)"
      - "OR revenue impact data"
      - "OR cost savings data"
    if_missing: "Set roi_calculable: false and state: 'ROI not calculable - financial data not provided in input'"

  okr_framework:
    name: "OKRs (Objectives and Key Results)"
    purpose: "Alternative goal framework for ambitious transformation and organizational alignment"

    when_to_use_vs_smart:
      use_okr:
        - "Ambitious transformation needed (e.g., culture change, strategic shift)"
        - "Quarterly agility required (fast-paced environment, need frequent recalibration)"
        - "Organizational alignment critical (cascading goals across teams/departments)"
        - "Stretch goals acceptable (70% achievement = success)"
      use_smart:
        - "Specific training project with defined scope"
        - "Clear baseline and target metrics available"
        - "Individual or team performance goals"
        - "100% achievement expected (not stretch goals)"

    structure:
      objective:
        definition: "Qualitative, aspirational, inspirational statement (WHAT we want to achieve)"
        characteristics: ["Ambitious", "Action-oriented", "Inspirational", "Time-bound"]
        count: "1-3 objectives per learning initiative"
      key_results:
        definition: "Quantitative, measurable outcomes that prove objective achievement (HOW we measure success)"
        characteristics: ["Specific metrics", "Measurable", "Time-bound", "Achievable but challenging"]
        count: "3-5 key results per objective"

    stretch_goal_principle: |
      OKRs are stretch goals: 70% achievement = success (vs. 100% for SMART goals)
      This encourages ambitious thinking while maintaining accountability.

    cascading_alignment:
      company_level: "Strategic transformation objectives"
      department_level: "Departmental objectives aligned to company OKRs"
      team_level: "Team objectives that contribute to department OKRs"
      individual_level: "Individual development objectives supporting team OKRs"

    quarterly_cycles:
      principle: "Set OKRs quarterly for agility, review weekly, reflect end of quarter"
      rhythm:
        week_1: "Set OKRs collaboratively with stakeholders"
        weeks_2_12: "Weekly check-ins, adjust tactics (not OKRs)"
        week_13: "Review results, reflect on learnings, set next quarter OKRs"

    okr_template:
      structure: |
        **Objective:** [Qualitative, aspirational statement]
        **Key Results:**
        1. [Quantified metric 1 with baseline → target]
        2. [Quantified metric 2 with baseline → target]
        3. [Quantified metric 3 with baseline → target]

    example_learning_okr:
      objective: "Transform our sales organization from transactional to consultative selling"
      key_results:
        kr1: "80% of sales reps demonstrate consultative discovery (SPIN questioning) in 3+ client calls per month (baseline: 15%)"
        kr2: "Enterprise deal cycle time reduces from 120 to 90 days (25% reduction)"
        kr3: "Customer satisfaction (CSAT) for sales interactions increases from 7.2 to 8.5 (baseline: Q1 2026 survey)"
      timeframe: "Q2 2026 (April-June)"

    comparison_to_smart:
      smart_example: "Sales representatives will improve enterprise deal win rates from 45% to 65% resulting in £2.4M additional annual revenue within 12 months"
      okr_equivalent: |
        Objective: Dominate enterprise sales in our market
        Key Results:
        1. Win rate increases from 45% to 60% (baseline: Q4 2025)
        2. Average deal size grows from £180K to £250K
        3. Sales cycle reduces from 120 to 90 days
      difference: "OKR is more ambitious (60% vs 65%), allows partial success (70% = good), focuses on multiple dimensions of success"

# =============================================================================
# SECTION 3: LEARNING OBJECTIVES
# =============================================================================
learning_objectives:
  expert_identity: |
    Senior Learning Objectives Designer with 15+ years achieving 96% SMART
    compliance using ABCD model, Bloom's Taxonomy, and Cognitive Load Theory.
    You design objectives that are measurable, authentic, and performance-focused.

  critical_distinction:
    objective: "What learners will demonstrate DURING training (in a controlled learning environment)"
    outcome: "What learners will do AFTER training (on the real job, in authentic context)"

  methodologies:
    abcd_model:
      name: "ABCD Model for Learning Objectives"
      components:
        audience: "Who is the learner? Include constraints (e.g., 'with no prior experience')"
        behaviour: "What observable action will they perform? (Use Bloom's verb)"
        condition: "Under what circumstances? (Context, tools, resources available)"
        degree: "How well must they perform? (Accuracy, speed, quality standard)"

    smart_scoring:
      name: "SMART Criteria Scoring System"
      minimum_acceptable: 90
      criteria:
        specific: "20 points - Clear, unambiguous, single action"
        measurable: "20 points - Observable, quantifiable criteria"
        achievable: "20 points - Realistic given audience and time"
        relevant: "20 points - Directly supports performance need"
        time_bound: "20 points - Clear completion timeframe"

    blooms_taxonomy:
      name: "Bloom's Taxonomy (Revised, 2001)"
      purpose: "Cognitive progression from basic recall through creative application"
      levels:
        remember:
          definition: "Retrieve relevant knowledge from memory"
          cognitive_processes: ["recognizing", "recalling"]
          verbs: ["define", "identify", "list", "name", "recall", "recognize", "select", "match", "label", "state"]
          typical_assessments:
            - "Multiple choice recognition questions"
            - "Fill-in-the-blank exercises"
            - "Matching exercises"
            - "True/false questions"
          remediation_strategies:
            - "Spaced repetition practice (review at increasing intervals)"
            - "Flashcards with active recall"
            - "Chunking information into 5-7 item groups (Miller's Law)"
            - "Mnemonic devices (acronyms, visualization, method of loci)"
          example_objective: "List the four stages of the SPIN selling framework (Situation, Problem, Implication, Need-payoff)"

        understand:
          definition: "Construct meaning from messages and demonstrate comprehension"
          cognitive_processes: ["interpreting", "exemplifying", "classifying", "summarizing", "inferring", "comparing", "explaining"]
          verbs: ["classify", "compare", "describe", "explain", "interpret", "summarize", "paraphrase", "contrast", "discuss", "illustrate"]
          typical_assessments:
            - "Short answer explanations"
            - "Concept mapping exercises"
            - "Summarization tasks"
            - "Paraphrasing activities"
          remediation_strategies:
            - "Worked examples with step-by-step explanations"
            - "Analogies connecting new concepts to prior knowledge"
            - "Visual representations (diagrams, flowcharts, mind maps)"
            - "Discussion activities with peer explanation"
          example_objective: "Explain why SPIN questioning is more effective than feature-benefit presentations in consultative selling"

        apply:
          definition: "Use procedures and knowledge in new situations"
          cognitive_processes: ["executing", "implementing"]
          verbs: ["apply", "demonstrate", "use", "solve", "implement", "execute", "perform", "operate", "calculate", "conduct"]
          typical_assessments:
            - "Problem-solving exercises"
            - "Simulations and role-plays"
            - "Hands-on practice tasks"
            - "Case study applications"
          remediation_strategies:
            - "Guided practice with immediate feedback"
            - "Scaffolded exercises (simple → complex)"
            - "Case study walkthroughs with expert modeling"
            - "Step-by-step demonstrations followed by practice"
          example_objective: "Demonstrate SPIN questioning in a 20-minute simulated discovery call achieving 80% on assessment rubric"

        analyze:
          definition: "Break material into components and understand relationships"
          cognitive_processes: ["differentiating", "organizing", "attributing"]
          verbs: ["analyze", "differentiate", "examine", "compare", "contrast", "investigate", "categorize", "distinguish", "deconstruct", "organize"]
          typical_assessments:
            - "Case study analysis with justification"
            - "Root cause analysis exercises"
            - "Comparative analysis tasks"
            - "Troubleshooting scenarios"
          remediation_strategies:
            - "Structured analysis frameworks (SWOT, fishbone diagrams)"
            - "Guided questioning to reveal relationships"
            - "Decomposition exercises (breaking wholes into parts)"
            - "Pattern recognition practice with feedback"
          example_objective: "Analyze discovery call transcripts to identify which SPIN question types were used effectively and which were missed"

        evaluate:
          definition: "Make judgments based on criteria and standards"
          cognitive_processes: ["checking", "critiquing"]
          verbs: ["evaluate", "assess", "judge", "critique", "justify", "defend", "prioritize", "recommend", "appraise", "validate"]
          typical_assessments:
            - "Peer review exercises with rubrics"
            - "Critique writing assignments"
            - "Decision-making scenarios with justification"
            - "Prioritization tasks"
          remediation_strategies:
            - "Rubric-based practice with exemplars"
            - "Criteria development exercises (define 'good' vs. 'poor')"
            - "Comparative evaluation tasks (A vs. B, which is better?)"
            - "Expert modeling of judgment with think-aloud protocol"
          example_objective: "Evaluate the effectiveness of peer discovery calls and recommend specific improvements using SPIN methodology criteria"

        create:
          definition: "Put elements together to form coherent, functional, original whole"
          cognitive_processes: ["generating", "planning", "producing"]
          verbs: ["create", "design", "develop", "construct", "produce", "formulate", "compose", "generate", "synthesize", "plan"]
          typical_assessments:
            - "Project development (end-to-end design)"
            - "Design challenges"
            - "Original content creation"
            - "Strategy formulation"
          remediation_strategies:
            - "Template-guided creation (provide structure, learner fills content)"
            - "Iterative design cycles with feedback at each stage"
            - "Collaborative creation (peer support reduces cognitive load)"
            - "Constraint-based challenges (creativity within boundaries)"
          example_objective: "Design a consultative sales approach customized for your industry, including SPIN questions tailored to your typical buyer personas"

  cognitive_load:
    max_objectives_per_segment: "7 plus or minus 2 (Miller's Law)"
    prerequisite_sequencing: "Foundation before advanced, simple before complex"
    scaffolding: "Novice: 1-level jumps; Experienced: 2-level jumps allowed"

  integration_principle:
    rule: "Course-level objective (C1) MUST assess the critical action AS A WHOLE, not broken into separate pieces"
    guidance: |
      The course objective should be an integrated performance that combines
      all the enabling skills/knowledge from module objectives. It should mirror
      the real-world integrated task learners need to perform.

  objective_structure:
    course_level:
      count: "1-3 course objectives"
      scope: "Integrated, complex performance"
      assessment: "Authentic, real-world scenario"
    module_level:
      count: "2-4 objectives per module"
      scope: "Enabling knowledge/skill building toward course objective"
      assessment: "Formative checks, practice exercises"

  objective_hierarchy:
    name: "Terminal vs. Enabling Objectives"
    purpose: "Hierarchical structure for managing complex learning goals"
    description: "Terminal objectives define destinations; enabling objectives build the path"

    terminal_objectives:
      definition: |
        Final behavioral outcomes learners achieve by completing an entire course
        or program. They describe integrated, complex performances that directly
        align with job requirements.
      characteristics:
        - "Broad in scope"
        - "Limited in number (typically 5-9 per course)"
        - "Focus on what learners can do independently after training"
        - "Use whole number references (1.0, 2.0)"
        - "Target higher-order thinking skills (Bloom's Apply, Analyze, Evaluate, Create)"
      linguistic_cues:
        scope_words: ["overall", "comprehensive", "complete"]
        integration_verbs: ["synthesize", "evaluate", "design"]
        end_state_language: ["by completion", "final performance"]
      example: "Managers will conduct effective performance reviews meeting company standards"

    enabling_objectives:
      definition: |
        Break down terminal objectives into manageable learning components—the
        building blocks required for mastery. Multiple enabling objectives (often 3-5)
        support each terminal objective.
      characteristics:
        - "Outline specific knowledge, skills, and behaviors"
        - "Learned sequentially to achieve terminal performance"
        - "Use decimal references (1.1, 1.2, 1.3)"
        - "Focus on discrete skills at lower cognitive levels (Bloom's Remember, Understand, Apply)"
      linguistic_cues:
        component_words: ["identify", "describe", "explain"]
        building_block_verbs: ["recognize", "recall", "apply"]
        sequential_language: ["first", "before", "prerequisite"]
      example_supporting_terminal_1_0:
        - "1.1: Identify performance criteria for roles"
        - "1.2: Structure feedback conversations using STAR model"
        - "1.3: Document review outcomes in HRIS system"

    parsing_framework:
      description: "Steps to parse complex learning goals into terminal and enabling objectives"
      when_to_use: "When learning goal contains multiple components or uses 'and' connector"
      steps:
        step_1: "Analyze the ultimate performance desired (what does success look like?)"
        step_2: "Break down complex goals into component skills through subordinate skills analysis"
        step_3: "Classify objectives as terminal (integrated performance) or enabling (component skills)"
        step_4: "Map dependencies to establish logical learning sequences"
      and_indicator: |
        When learning goals contain "and," this often signals multiple components
        requiring separate objectives. Each objective should target one particular
        aspect of performance with a single action verb.

    example_hierarchy:
      terminal_objective_1_0: "Conduct consultative enterprise sales calls achieving 80% on assessment rubric"
      enabling_objectives:
        objective_1_1: "Identify customer pain points using SPIN questioning framework (Bloom's Remember/Understand)"
        objective_1_2: "Demonstrate active listening techniques in discovery scenarios (Bloom's Apply)"
        objective_1_3: "Handle common objections using feel-felt-found method (Bloom's Apply)"
        objective_1_4: "Articulate value propositions aligned to customer needs (Bloom's Apply/Analyze)"
      rationale: "Terminal 1.0 integrates all enabling objectives (1.1-1.4) into complete performance"

  adult_learning_principles:
    name: "Adult Learning Principles for Objective Design"
    purpose: "Ensure objectives are written for adult learners, not children"

    knowles_andragogy:
      name: "Knowles' Principles of Andragogy (6 principles)"
      objective_design_implications:
        need_to_know:
          principle: "Adults need to know WHY before they learn HOW"
          application: "State relevance explicitly in objective framing"
          example_poor: "Identify the four stages of consultative selling"
          example_good: "Identify the four stages of consultative selling to diagnose where prospect conversations break down and improve deal progression"

        self_concept:
          principle: "Adults are self-directed and autonomous"
          application: "Frame objectives as self-directed achievement, not teacher-imposed tasks"
          example_poor: "Students will be taught to conduct discovery calls"
          example_good: "Sales representatives will conduct discovery calls using SPIN questioning"

        experience:
          principle: "Adults bring rich experience that should be leveraged"
          application: "Reference learner experience in objectives (e.g., 'Apply to your territory')"
          example_poor: "Demonstrate negotiation techniques"
          example_good: "Demonstrate negotiation techniques in scenarios based on your most challenging customer objections"

        readiness:
          principle: "Adults learn when they see immediate relevance to their role"
          application: "Link objectives to job tasks explicitly"
          example_poor: "Explain ROI calculation methodology"
          example_good: "Calculate ROI for proposed solutions to justify pricing in enterprise deals"

        orientation:
          principle: "Adults are problem-centered, not subject-centered"
          application: "Frame objectives around solving real problems, not learning topics"
          example_poor: "Understand the CRM system features"
          example_good: "Use CRM to track deal progression and identify at-risk opportunities requiring intervention"

        motivation:
          principle: "Adults are internally motivated (mastery, autonomy, purpose)"
          application: "Connect objectives to intrinsic motivators"
          example_poor: "Complete the sales methodology training"
          example_good: "Master consultative selling to increase win rates and earn top performer recognition"

    kolb_experiential_cycle:
      name: "Kolb's Experiential Learning Cycle"
      purpose: "Ensure objectives address all four learning stages"
      principle: "Adults learn by doing, reflecting, thinking, and applying"

      stages:
        concrete_experience:
          definition: "DO - hands-on activity, direct experience"
          objective_verb_examples: ["conduct", "perform", "execute", "demonstrate"]
        reflective_observation:
          definition: "REFLECT - analyze what happened, observe patterns"
          objective_verb_examples: ["analyze", "compare", "examine", "reflect on"]
        abstract_conceptualization:
          definition: "THINK - generalize principles, connect to theory"
          objective_verb_examples: ["explain", "synthesize", "formulate", "generalize"]
        active_experimentation:
          definition: "APPLY - test in new context, adapt approach"
          objective_verb_examples: ["adapt", "modify", "customize", "transfer"]

      integrated_objective_design:
        principle: "Course-level objectives should integrate all 4 stages"
        example: |
          "Conduct consultative discovery calls with enterprise prospects (EXPERIENCE),
          analyze call effectiveness using SPIN framework (REFLECT),
          identify principles that distinguish successful from unsuccessful calls (CONCEPTUALIZE),
          and adapt questioning approach for different buyer personas and industries (EXPERIMENT),
          achieving 80% adherence to methodology standards on role-play assessment."

  alternative_taxonomies:
    name: "Alternative Taxonomies to Bloom's"
    purpose: "Address affective and metacognitive domains that Bloom's cognitive taxonomy misses"

    finks_taxonomy:
      name: "Fink's Taxonomy of Significant Learning"
      when_to_use: "Leadership development, complex interpersonal skills, transformative learning, values-based training"
      philosophy: "Non-hierarchical, integrated, holistic approach (vs. Bloom's hierarchical cognitive focus)"

      six_domains:
        foundational_knowledge:
          definition: "Understanding and remembering facts, concepts, principles, theories"
          blooms_equivalent: "Remember + Understand levels"
          objective_example: "Explain the business impact of consultative vs. transactional selling approaches"

        application:
          definition: "Skills, critical thinking, creative thinking, managing projects"
          blooms_equivalent: "Apply + Create levels"
          objective_example: "Conduct a 45-minute discovery call using SPIN questioning methodology"

        integration:
          definition: "Connecting ideas, people, realms of life; seeing the big picture"
          blooms_equivalent: "No direct equivalent (gap in Bloom's)"
          objective_example: "Synthesize customer business challenges with product capabilities to create compelling value propositions"

        human_dimension:
          definition: "Learning about oneself and others; developing self-awareness and understanding of social dynamics"
          blooms_equivalent: "No equivalent (affective domain, missing in Bloom's)"
          objective_example: "Reflect on personal selling style strengths/weaknesses and adapt communication approach to match customer personality types"

        caring:
          definition: "Developing new values, feelings, interests; changing what one cares about"
          blooms_equivalent: "No equivalent (affective domain, missing in Bloom's)"
          objective_example: "Demonstrate commitment to customer success over short-term quota achievement in deal strategy decisions"

        learning_to_learn:
          definition: "Becoming a better learner; developing self-directed inquiry skills; metacognition"
          blooms_equivalent: "No equivalent (metacognitive domain, missing in Bloom's)"
          objective_example: "Design and execute a personal 90-day learning plan for continuous sales skill development using peer feedback and self-assessment"

      when_to_use_fink_vs_bloom:
        use_bloom:
          - "Cognitive skills (technical, procedural, analytical)"
          - "Clear right/wrong answers"
          - "Knowledge-based or skill-based training"
        use_fink:
          - "Leadership development"
          - "Interpersonal skills (coaching, influencing, collaborating)"
          - "Values-based or transformative learning"
          - "Self-awareness and emotional intelligence"
          - "Complex judgment in ambiguous situations"

      integrated_fink_objective:
        example: |
          "Senior sales representatives will analyze complex enterprise sales opportunities (APPLICATION),
          synthesize customer needs with organizational capabilities to design multi-year solutions (INTEGRATION),
          reflect on ethical implications of solution recommendations and prioritize long-term customer success (CARING + HUMAN DIMENSION),
          articulate the business case using ROI methodology (FOUNDATIONAL KNOWLEDGE),
          and develop a personal action plan for continuous consultative selling mastery (LEARNING TO LEARN),
          achieving 85% on holistic assessment rubric."

  assessment_design:
    name: "Assessment Design Frameworks"
    purpose: "Assessment is integral to objectives - objectives must specify HOW achievement will be measured"

    assessment_types:
      diagnostic:
        definition: "Pre-assessment to establish baseline"
        timing: "Before training begins"
        purpose: "Informs gap analysis, enables pre-to-post comparison, validates assumptions"
        example: "Pre-test on consultative selling knowledge (10 scenario-based questions)"

      formative:
        definition: "During-training assessment to check progress and guide instruction"
        timing: "Throughout training (after each module/section)"
        purpose: "Identifies struggling learners, allows course correction, builds confidence through practice"
        example: "Practice discovery call with feedback after Module 2"

      summative:
        definition: "End-of-training assessment to measure final achievement"
        timing: "End of training (before learners leave)"
        purpose: "Confirms objective mastery, gates certification/completion, predicts transfer"
        example: "Final role-play assessment with 5-criteria scoring rubric (summative proof of competence)"

    fidelity_levels:
      principle: "Match assessment fidelity to objective complexity and risk"

      low_fidelity:
        definition: "Paper-based, multiple choice, written scenarios, declarative knowledge"
        when_to_use: "Knowledge objectives (Bloom's Remember/Understand), low-risk skills, large-scale assessment"
        advantages: ["Scalable", "Objective scoring", "Quick feedback", "Low cost"]
        limitations: ["Doesn't prove skill application", "Prone to guessing", "Not authentic"]
        example: "25-question multiple-choice test on consultative selling principles"

      medium_fidelity:
        definition: "Simulations, role-plays, case studies, structured practice"
        when_to_use: "Application objectives (Bloom's Apply/Analyze), moderate-risk skills, interpersonal skills"
        advantages: ["Proves skill under controlled conditions", "Allows mistakes safely", "Provides practice"]
        limitations: ["Not fully authentic", "Requires trained assessors", "Time-intensive"]
        example: "30-minute role-play with trained actor playing difficult customer, scored on 5-criteria rubric"

      high_fidelity:
        definition: "On-job observation, real work samples, authentic client interactions, portfolio assessment"
        when_to_use: "Complex performance objectives (Bloom's Evaluate/Create), high-risk skills, post-training outcomes"
        advantages: ["Fully authentic", "Proves real-world competence", "High validity"]
        limitations: ["Expensive", "Hard to standardize", "Requires manager involvement", "Time-intensive"]
        example: "Manager observation of 3 live discovery calls over 30 days using standardized checklist"

    assessment_in_abcd_degree:
      principle: "Degree (D) component of ABCD must specify assessment method AND criteria"

      examples:
        poor_degree:
          text: "...with 80% accuracy"
          problem: "What does 80% mean? How is it measured? What criteria define accuracy?"

        good_degree:
          text: "...achieving 80% (16/20 points) on role-play scoring rubric with 5 criteria: questioning technique (4 pts), active listening (4 pts), objection handling (4 pts), solution articulation (4 pts), closing technique (4 pts)"
          why_good: "Specifies assessment method (role-play), scoring mechanism (rubric), criteria (5 elements), and passing standard (16/20 = 80%)"

    rubric_design:
      analytic_rubric:
        definition: "Criteria-based scoring with multiple dimensions"
        when_to_use: "Complex performances with multiple skill components"
        example: |
          Discovery Call Rubric (20 points total):
          - Questioning (SPIN): 0-5 points
          - Active Listening: 0-5 points
          - Objection Handling: 0-5 points
          - Solution Articulation: 0-5 points
        advantages: ["Detailed feedback", "Diagnostic", "Fair", "Transparent"]

      holistic_rubric:
        definition: "Overall impression scoring (e.g., 1-5 scale: Novice → Expert)"
        when_to_use: "Integrated performances where parts can't be separated, summative judgment"
        example: "Rate overall consultative selling competence: 1 (Novice) to 5 (Expert)"
        advantages: ["Fast", "Captures gestalt", "Good for summative judgment"]

      single_point_rubric:
        definition: "Describes 'meets standard' only, with space for feedback on what exceeded/didn't meet"
        when_to_use: "Formative assessment focused on growth, developmental feedback"
        advantages: ["Less time to create", "Focuses on feedback vs. scoring", "Growth-oriented"]

    assessment_mapping:
      name: "Mapping Objectives to Appropriate Assessment Types"
      purpose: "Connect objectives to assessment types and methods that validly measure achievement"

      formative_assessments:
        purpose: "Support learning during instruction; provide feedback to guide improvement"
        when_to_use: "Throughout training for each module or lesson objective"
        characteristics:
          - "Low stakes (no grade or completion requirement)"
          - "Frequent and timely feedback"
          - "Identifies struggling learners early"
          - "Allows course correction before summative"
        examples:
          - "Practice exercises with immediate feedback"
          - "Knowledge checks after each module"
          - "Peer discussions with instructor observation"
          - "Quizzes with explanations (not graded)"
          - "Self-assessments with model answers"
        mapping_to_objectives: "Use for module-level enabling objectives (1.1, 1.2, 1.3)"

      summative_assessments:
        purpose: "Validate final achievement; prove objective mastery at end of training"
        when_to_use: "End of training before learners leave (gates certification/completion)"
        characteristics:
          - "High stakes (determines pass/fail or completion)"
          - "Comprehensive (covers all course objectives)"
          - "Standardized (same assessment for all learners)"
          - "Predicts transfer to job"
        examples:
          - "Final examinations or comprehensive tests"
          - "Skills demonstrations or performance tasks"
          - "Project submissions or portfolios"
          - "Certification exams"
          - "Final role-play assessments with rubric"
        mapping_to_objectives: "Use for course-level terminal objectives (1.0, 2.0)"

      authentic_assessments:
        purpose: "Measure real-world application in actual job context (post-training outcomes)"
        when_to_use: "30-90 days post-training to measure transfer and impact"
        characteristics:
          - "Performed in actual work environment"
          - "Real consequences (not simulated)"
          - "Observable by managers or peers"
          - "Measures sustained application"
        examples:
          - "On-the-job observations by manager"
          - "Real work samples or artifacts"
          - "Dashboard metrics (sales, quality, productivity)"
          - "Manager or 360-degree feedback"
          - "Customer satisfaction scores"
        mapping_to_objectives: "Use for learning outcomes (Kirkpatrick L3-L4)"

      assessment_type_decision_matrix:
        when_assessing_knowledge:
          blooms_levels: ["Remember", "Understand"]
          formative: "Short quizzes, concept checks, retrieval practice"
          summative: "Comprehensive knowledge test (25+ items)"
          authentic: "Not applicable (knowledge alone doesn't predict job performance)"

        when_assessing_skills:
          blooms_levels: ["Apply"]
          formative: "Practice exercises with feedback, guided simulations"
          summative: "Skills demonstration, role-play with rubric, hands-on task"
          authentic: "Manager observation of on-job performance, work samples"

        when_assessing_analysis_evaluation:
          blooms_levels: ["Analyze", "Evaluate"]
          formative: "Case study discussions, peer critique practice"
          summative: "Case study analysis with justification, critique assignment"
          authentic: "Real decision-making on job, documented recommendations"

        when_assessing_creation:
          blooms_levels: ["Create"]
          formative: "Draft review with feedback, iterative design"
          summative: "Final project, original design, comprehensive plan"
          authentic: "Real work product used by organization"

      assessment_alignment_checklist:
        - "Does the assessment match the Bloom's level of the objective? (Don't test knowledge if objective is Apply)"
        - "Is the assessment fidelity appropriate? (Low for knowledge, medium for skills, high for outcomes)"
        - "Are formative assessments provided before summative? (Practice before high-stakes)"
        - "Is the summative assessment comprehensive? (Covers all course objectives)"
        - "Are authentic assessments planned post-training? (Measure transfer and outcomes)"

  cognitive_load_for_objectives:
    name: "Cognitive Load Theory for Objective Structuring"
    purpose: "Ensure objectives are cognitively manageable and properly sequenced"

    millers_law:
      principle: "Working memory holds 7 ± 2 chunks of information"
      application: "Limit to 5-9 objectives per module, ideally 5-7"
      warning: "10+ objectives = cognitive overload, learners can't track progress"

      example_poor:
        count: "12 objectives in 90-minute module"
        problem: "Learners can't hold all 12 in working memory, lose sight of big picture"

      example_good:
        count: "5 objectives in 90-minute module, each building toward integrated course objective"
        why_good: "Manageable, clear progression, aligns with working memory capacity"

    scaffolding_principle:
      definition: "Sequence objectives from simple → complex, foundation → advanced"

      novice_learners:
        blooms_progression: "1-level jumps only (Remember → Understand → Apply)"
        rationale: "Novices lack schemas, need gradual progression to build understanding"
        example: |
          Module 1: Define consultative selling (Remember)
          Module 2: Explain when to use consultative vs. transactional approach (Understand)
          Module 3: Demonstrate consultative discovery call (Apply)

      experienced_learners:
        blooms_progression: "2-level jumps allowed (Remember → Apply, or Understand → Evaluate)"
        rationale: "Experts have schemas, can skip intermediate steps"
        example: |
          Module 1: Explain consultative selling framework (Understand)
          Module 2: Evaluate effectiveness of discovery calls and recommend improvements (Evaluate)

    prerequisite_sequencing:
      principle: "Foundation before advanced, simple before complex, parts before whole"

      example_poor:
        sequence:
          - "Module 1: Conduct full consultative sales call (Apply - complex)"
          - "Module 2: List SPIN question types (Remember - foundational)"
        problem: "Can't do Module 1 without Module 2 knowledge"

      example_good:
        sequence:
          - "Module 1: List SPIN question types and explain purpose of each (Remember + Understand)"
          - "Module 2: Demonstrate SPIN questioning in discovery scenarios (Apply)"
          - "Module 3: Conduct full consultative sales call integrating SPIN, objection handling, and closing (Apply - integrated)"
        why_good: "Builds from foundation (SPIN knowledge) → practice (SPIN application) → integration (full call)"

    chunking_strategy:
      principle: "Break complex objectives into manageable sub-objectives (enabling objectives)"

      example_complex_objective:
        text: "Conduct a consultative enterprise sales call from opening to close"
        cognitive_load: "Too complex as single objective - 8+ sub-skills"

      chunked_approach:
        course_objective: "Conduct consultative enterprise sales call achieving 80% on rubric"
        module_objectives:
          module_1: "Craft effective opening and build rapport (sub-skill 1)"
          module_2: "Execute SPIN questioning for discovery (sub-skill 2)"
          module_3: "Handle objections using feel-felt-found method (sub-skill 3)"
          module_4: "Articulate value proposition aligned to customer needs (sub-skill 4)"
          module_5: "Close with clear next steps and commitment (sub-skill 5)"
          final: "Integrate all sub-skills in full role-play (integration)"

  measurability_indicators:
    name: "Measurability Indicators and Improvement Strategies"
    purpose: "Practical guidance for transforming vague objectives into measurable, observable statements"

    strong_measurability_indicators:
      - "Specific percentage or number (e.g., '80%', '3 out of 4')"
      - "Time-bound criterion (e.g., 'within 5 minutes', 'by end of module')"
      - "Observable action verb from Bloom's Taxonomy (not 'understand', 'know')"
      - "Clear success/failure boundary (e.g., 'no critical errors', 'achieving 85%+')"
      - "Authentic assessment method specified (e.g., 'on role-play assessment', 'in manager observation')"

    weak_measurability_indicators:
      warning_signs:
        - "Vague verbs like 'understand,' 'know,' 'appreciate,' 'be aware of'"
        - "No quantifiable standard (e.g., 'effectively' without definition)"
        - "Vague modifiers like 'appropriately,' 'correctly' without criteria"
        - "Missing conditions or context (no 'C' in ABCD)"
        - "Missing degree or standard (no 'D' in ABCD)"

    improvement_strategies:
      strategy_1_vague_to_specific:
        problem: "Objective uses vague verb or lacks quantifiable standard"
        before_example: "Learners understand escalation"
        after_example: "By end of Module 1, learners identify escalation criteria correctly in 85% of practice scenarios"
        improvements_made:
          - "Changed 'understand' to 'identify' (observable verb)"
          - "Added timing ('by end of Module 1')"
          - "Added quantifiable standard ('85% of practice scenarios')"
          - "Added context ('in practice scenarios')"

      strategy_2_adding_conditions:
        problem: "Objective missing conditions (how/when/where performance occurs)"
        before_example: "Demonstrate troubleshooting skills"
        after_example: "Given realistic customer scenarios and access to knowledge base, demonstrate troubleshooting skills"
        improvements_made:
          - "Added conditions: 'given realistic customer scenarios'"
          - "Specified available resources: 'access to knowledge base'"
          - "Context now clear: this is simulated practice, not live customer calls"

      strategy_3_adding_degree:
        problem: "Objective missing performance standard (how well)"
        before_example: "Calculate ROI accurately"
        after_example: "Calculate ROI with no more than 2% variance from actual figures, completing calculations in under 10 minutes"
        improvements_made:
          - "Added accuracy standard: '2% variance'"
          - "Added speed standard: 'under 10 minutes'"
          - "Success criteria now testable and unambiguous"

      strategy_4_decomposing_compound_objectives:
        problem: "Objective contains 'and' or multiple unrelated skills"
        before_example: "Understand the CRM system and demonstrate effective customer communication"
        after_example_1: "Navigate CRM to locate customer records achieving 90% accuracy on system quiz"
        after_example_2: "Demonstrate active listening in customer conversations using STAR feedback model (3+ examples per call)"
        improvements_made:
          - "Split compound objective into two separate objectives"
          - "Each objective now has single, clear action"
          - "Assessment method clear for each"

      strategy_5_making_implicit_explicit:
        problem: "Objective assumes shared understanding of quality"
        before_example: "Write professional emails"
        after_example: "Write professional customer emails meeting company standards: clear subject line, greeting, purpose statement, action request, professional closing, <3 grammar/spelling errors"
        improvements_made:
          - "Defined 'professional' with explicit criteria"
          - "Enumerated components of quality email"
          - "Added quantifiable error tolerance"

    measurability_checklist:
      question_1: "Can you observe the behavior? (If the verb is 'know' or 'understand,' the answer is NO)"
      question_2: "Is there a clear success/failure boundary? (Can you say definitively if learner achieved it?)"
      question_3: "Is the standard quantified? (Percentage, number, time limit, error tolerance?)"
      question_4: "Are conditions specified? (Tools, resources, context?)"
      question_5: "Could two assessors independently score the performance and agree? (Interrater reliability)"

    common_fixes_quick_reference:
      vague_verb: "Replace with observable Bloom's verb (analyze, demonstrate, calculate)"
      missing_standard: "Add quantifiable criteria (80%, 3 out of 4, within 5 minutes)"
      missing_context: "Add conditions (given X, using Y, in Z situation)"
      no_assessment_method: "Specify how measured (on quiz, in role-play, via manager observation)"
      compound_objective: "Split into separate objectives, one per skill"

  accessibility_considerations:
    name: "Accessibility and Inclusive Design for Learning Objectives"
    purpose: "Ensure objectives and assessments are accessible to diverse learner populations"

    language_requirements:
      readability_standard: "CEFR B2 (upper intermediate) or lower for objective statements"
      cefr_b2_characteristics:
        - "Clear, concrete language"
        - "Active voice preferred"
        - "Sentences under 20 words"
        - "Technical jargon defined or avoided"
        - "Common vocabulary (avoid obscure words)"
      tools: "Use Hemingway Editor, Readable.com, or CEFR checkers to validate readability"

    linguistic_diversity:
      statistic: "33% of US workforce doesn't speak English as first language"
      implications_for_objectives:
        - "Use simple, direct language in objective statements"
        - "Avoid idioms, colloquialisms, cultural references"
        - "Define technical terms explicitly"
        - "Provide examples to illustrate abstract concepts"
        - "Consider translation needs for global audiences"

    universal_design_for_learning:
      principle_1_multiple_representations:
        description: "Provide multiple ways to perceive and comprehend information"
        objective_design_implication: "When objectives require information processing, allow for multiple formats (text, audio, visual)"
        example: "Instead of: 'Read the case study and analyze...' → 'Review the case study (text or video format) and analyze...'"

      principle_2_multiple_action_expression:
        description: "Provide multiple ways for learners to demonstrate knowledge"
        objective_design_implication: "When feasible, allow choice in how learners demonstrate competency"
        example: "Instead of: 'Write a report analyzing...' → 'Demonstrate analysis through written report, verbal presentation, or annotated diagram'"

      principle_3_multiple_engagement:
        description: "Provide multiple ways to motivate and engage learners"
        objective_design_implication: "Connect objectives to varied learner motivations (mastery, autonomy, purpose)"
        example: "Frame objectives with both intrinsic and extrinsic motivators: 'Master X to improve Y performance (mastery) and earn recognition (extrinsic)'"

    neurodiversity_considerations:
      adhd_learners:
        challenge: "Working memory limitations, sustained attention challenges"
        objective_design_accommodation:
          - "Limit to 5-7 objectives per module (Miller's Law)"
          - "Break complex objectives into smaller enabling objectives"
          - "Provide external memory aids (job aids, checklists) for procedures"
      dyslexia_learners:
        challenge: "Reading speed and accuracy, phonological processing"
        objective_design_accommodation:
          - "Use dyslexia-friendly fonts (OpenDyslexic, Comic Sans) in materials"
          - "Provide audio versions of written objectives"
          - "Allow extended time on text-heavy assessments"
      autism_spectrum_learners:
        challenge: "Ambiguity, implicit expectations, social communication"
        objective_design_accommodation:
          - "Be explicit and literal in objective statements (avoid figurative language)"
          - "Clearly state all expectations (no implied requirements)"
          - "Provide structured examples of what 'good' looks like"

    cultural_considerations:
      global_audiences:
        - "Avoid culture-specific examples (US holidays, sports references)"
        - "Use international standards (ISO dates, metric measurements when possible)"
        - "Consider time zones when stating 'complete by end of day'"
        - "Be aware of cultural norms around assessment (some cultures view peer feedback as disrespectful)"

    technology_accessibility:
      screen_reader_compatibility:
        - "Use semantic HTML for objective lists (ordered/unordered lists, headings)"
        - "Provide alt text for images in assessment materials"
        - "Ensure rubrics are table-formatted with proper headers"
      keyboard_navigation:
        - "All assessment interactions must be keyboard-accessible (no mouse-only)"
      captioning_and_transcripts:
        - "Video-based assessments must have captions/transcripts"

    assessment_accessibility:
      accommodations_to_consider:
        extended_time:
          who: "Learners with processing speed challenges (dyslexia, ADHD, ESL)"
          guideline: "Typically 1.5x or 2x standard time"
        alternative_formats:
          who: "Visual impairments, print disabilities"
          guideline: "Provide audio, large print, or screen-reader-compatible versions"
        reduced_distraction_environment:
          who: "ADHD, anxiety disorders"
          guideline: "Private testing space, noise-canceling headphones, breaks allowed"
        assistive_technology:
          who: "Various disabilities"
          guideline: "Allow text-to-speech, speech-to-text, screen readers, magnification"

    inclusive_language:
      avoid:
        - "Gendered language (use 'they/them' or 'the learner')"
        - "Ableist language ('stand-up meeting' → 'team sync'; 'blind spot' → 'gap')"
        - "Age assumptions ('digital native' → 'learners familiar with technology')"
      use:
        - "Person-first language ('learner with dyslexia' not 'dyslexic learner')"
        - "Neutral, inclusive terms ('team member' not 'guys'; 'participants' not 'students')"

    accessibility_checklist:
      - "Are objective statements written at CEFR B2 readability or lower?"
      - "Is technical jargon defined or avoided?"
      - "Are multiple means of representation, action, and engagement provided?"
      - "Are assessment accommodations planned (extended time, alternative formats)?"
      - "Is all content compatible with assistive technology (screen readers, captions)?"
      - "Does inclusive language avoid gender, ableist, and age assumptions?"

# =============================================================================
# SECTION 4: LEARNING OUTCOMES
# =============================================================================
learning_outcomes:
  expert_identity: |
    Chief Learning Officer and ROI Measurement Expert implementing Kirkpatrick-
    Phillips evaluation methodology. You design outcome metrics with 92%
    business alignment and real-world validation.

  critical_distinction:
    objective: "What learners demonstrate DURING training (controlled environment, immediate)"
    outcome: "What learners do AFTER training (real job, 30-90 days post-training)"

  methodologies:
    kirkpatrick_phillips:
      name: "Kirkpatrick-Phillips 5-Level Evaluation Model"
      levels:
        level_1:
          name: "Reaction"
          focus: "Participant satisfaction and engagement"
          timing: "End of training"
          typical_metric: "NPS score >40, satisfaction rating >4.0/5.0"
        level_2:
          name: "Learning"
          focus: "Knowledge/skill acquisition"
          timing: "During and end of training"
          typical_metric: "Assessment score >85%, pre-to-post gain >20%"
        level_3:
          name: "Behavior"
          focus: "On-the-job application"
          timing: "30-90 days post-training"
          typical_metric: ">80% applying learned skills, manager observation"
        level_4:
          name: "Results"
          focus: "Business KPI impact"
          timing: "90-180 days"
          typical_metric: "Targeted KPI improvement achieved"
        level_5:
          name: "ROI"
          focus: "Financial return"
          timing: "6-12 months"
          typical_metric: "ROI ratio >3:1, positive payback period"
      ggoo_focus: "Focus on Levels 3-4 (Behavior and Results) for outcome design"

  outcome_structure:
    template: |
      "[Target learner] will [observable on-the-job behavior]
      measured by [specific metric/data source]
      achieving [quantified target]
      within [timeframe] post-training"

  metric_selection:
    guidelines:
      - "Use existing business metrics where possible (KPIs already tracked)"
      - "Ensure metric is observable and attributable to training"
      - "Include baseline and target for comparison"
      - "Specify data source (who collects, how often)"

  measurement_plan:
    checkpoints:
      day_30: "Initial application check - Are learners using new skills?"
      day_60: "Consistency check - Is application becoming habit?"
      day_90: "Impact check - Are business metrics improving?"

  behavior_change_models:
    name: "Behavior Change Models for Outcome Design"
    purpose: "Outcomes ARE behavior change - use explicit models to define what change looks like and how to measure it"

    com_b_model:
      name: "COM-B Behavior Change Model"
      source: "Michie, van Stralen, & West (2011) - Evidence-based behavior change framework"
      formula: "Behavior = Capability × Opportunity × Motivation"

      components:
        capability:
          definition: "Physical + Psychological ability to perform behavior"
          physical: "Physical skill, strength, stamina (e.g., can physically conduct a 60-min discovery call)"
          psychological: "Knowledge, cognitive skills, behavioral skills (e.g., knows SPIN framework, can ask probing questions)"

        opportunity:
          definition: "Physical + Social environment that enables/hinders behavior"
          physical: "Time, resources, location (e.g., has time for discovery calls, has CRM access)"
          social: "Social norms, cues, support (e.g., manager expects consultative approach, peers model it)"

        motivation:
          definition: "Reflective + Automatic drivers of behavior"
          reflective: "Conscious intentions, goals, beliefs (e.g., believes consultative selling is effective)"
          automatic: "Habits, emotional responses, impulses (e.g., defaults to consultative approach without thinking)"

      outcome_design_application:
        principle: "Diagnose which COM-B component(s) are weak, then design outcomes to measure that component"

        if_capability_gap:
          diagnosis: "Learners CAN'T do the behavior (knowledge/skill deficit)"
          outcome_focus: "Measure skill application on the job"
          example: "85% of sales reps demonstrate SPIN questioning in discovery calls (3+ calls per month observed by manager)"

        if_opportunity_gap:
          diagnosis: "Learners can do it but ENVIRONMENT doesn't support it"
          outcome_focus: "Measure environmental support changes (NOT just learner behavior)"
          example: |
            - Managers conduct monthly consultative selling coaching sessions (physical opportunity)
            - 80% of sales team reports peer support for consultative approach in team survey (social opportunity)

        if_motivation_gap:
          diagnosis: "Learners can do it, environment supports it, but they WON'T do it (incentive problem)"
          outcome_focus: "Measure motivational factors, incentive alignment (training alone won't fix this)"
          example: |
            - Sales compensation plan rewards quality of discovery (not just volume) - check plan changes
            - Managers recognize consultative selling in team meetings - measure recognition frequency

      com_b_outcome_checklist:
        question_1: "Do learners have CAPABILITY (knowledge + skill)? If not, training can help. Measure skill application."
        question_2: "Does OPPORTUNITY exist (time + resources + social support)? If not, training alone won't work. Measure environmental changes."
        question_3: "Is MOTIVATION sufficient (beliefs + habits + incentives)? If not, training may not stick. Measure motivational factors."

    fogg_behavior_model:
      name: "Fogg Behavior Model (B=MAP)"
      source: "BJ Fogg, Stanford Persuasive Technology Lab"
      formula: "Behavior = Motivation × Ability × Prompt"
      principle: "For behavior to occur, motivation, ability, and prompt must converge at the same moment"

      components:
        motivation:
          definition: "Why should they do it? What's the driver?"
          factors: ["Pleasure/Pain", "Hope/Fear", "Social Acceptance/Rejection"]
          outcome_measurement: "Measure desire to apply learning (surveys, interviews, self-report)"

        ability:
          definition: "How easy is it to do? Can they do it with current resources?"
          factors: ["Time", "Money", "Physical effort", "Brain cycles (cognitive load)", "Social deviance", "Non-routine"]
          outcome_measurement: "Measure ease of application (remove barriers, simplify process)"

        prompt:
          definition: "Is there a trigger at the right moment to spark the behavior?"
          types: ["Spark (high ability, low motivation)", "Facilitator (high motivation, low ability)", "Signal (high motivation, high ability)"]
          outcome_measurement: "Measure presence of prompts/triggers in work environment"

      outcome_design_application:
        principle: "Measure all three factors (M × A × P), not just knowledge/skill"

        example_poor:
          outcome: "85% of sales reps know SPIN questioning framework (post-test score)"
          problem: "Only measures knowledge (part of Ability), ignores Motivation and Prompt"

        example_good:
          outcome: |
            **Motivation:** 80% of sales reps report believing consultative selling is more effective than transactional (30-day survey)
            **Ability:** 85% of sales reps demonstrate SPIN questioning in role-play assessment (end of training)
            **Prompt:** Managers provide call prep prompt ("Use SPIN today") before 80% of discovery calls (manager report, 60-day follow-up)
          why_good: "Measures all three components needed for behavior change"

      fogg_outcome_checklist:
        - "Is MOTIVATION measured? (Do they want to do it?)"
        - "Is ABILITY measured? (Can they do it easily?)"
        - "Is PROMPT measured? (Is there a trigger at the right moment?)"
        - "Are we measuring behavior at the moment M×A×P converge?"

  transfer_frameworks:
    name: "Learning Transfer Frameworks"
    purpose: "Transfer IS the outcome - use explicit frameworks to design and measure transfer"

    baldwin_ford_model:
      name: "Baldwin & Ford Transfer of Training Model"
      source: "Baldwin & Ford (1988) - Seminal model in transfer research"
      principle: "Transfer depends on trainee characteristics, training design, AND work environment"

      three_factor_categories:
        training_inputs:
          trainee_characteristics:
            - "Ability (cognitive ability, self-efficacy)"
            - "Personality (conscientiousness, openness)"
            - "Motivation (pre-training motivation to learn and transfer)"
          training_design:
            - "Learning principles (identical elements, stimulus variability, general principles)"
            - "Sequencing (part-to-whole, progressive complexity)"
            - "Content relevance (job-relevant scenarios)"
          work_environment:
            - "Manager support (encouragement, feedback, coaching)"
            - "Peer support (social norms, modeling)"
            - "Opportunity to use (time, resources, encouragement to practice)"

        training_outputs:
          learning: "Knowledge and skill acquisition during training"
          retention: "Maintenance of knowledge/skill over time"

        conditions_of_transfer:
          generalization: "Applying learned skills to job context (different from training context)"
          maintenance: "Continuing to use skills over time (not reverting to old behavior)"

      outcome_design_application:
        principle: "Outcomes must measure BOTH generalization AND maintenance, not just immediate application"

        generalization_outcomes:
          definition: "Do learners apply skills in VARIED job contexts (not just scenarios they practiced)?"
          example: |
            - Sales reps use SPIN questioning with NEW customer types not covered in training (measure: call observation)
            - Sales reps adapt questioning for different industries/verticals (measure: diversity of application)

        maintenance_outcomes:
          definition: "Do learners SUSTAIN skill use over 90+ days (not just honeymoon period)?"
          example: |
            - 80% of sales reps still using consultative approach at 90 days (baseline: 30-day check)
            - No regression to transactional selling after initial enthusiasm fades (measure: longitudinal call observation)

        work_environment_outcomes:
          definition: "Is the work environment supporting transfer?"
          example: |
            - Manager support: 75% of managers conduct monthly coaching on consultative selling (manager survey)
            - Peer support: 70% of sales team reports peers model consultative approach (peer survey)
            - Opportunity: Sales reps allocated 60% of time to discovery vs. closing (time tracking)

      baldwin_ford_outcome_checklist:
        - "Are we measuring GENERALIZATION (application in varied contexts)?"
        - "Are we measuring MAINTENANCE (sustained use over 90+ days)?"
        - "Are we measuring WORK ENVIRONMENT support (manager, peers, opportunity)?"
        - "Are we measuring trainee characteristics that predict transfer (motivation, self-efficacy)?"

    seventy_twenty_ten_model:
      name: "70:20:10 Model for Learning Transfer"
      source: "Center for Creative Leadership research on executive development"
      principle: "Learning comes from multiple sources, not just formal training"

      breakdown:
        experiential_70:
          definition: "70% of learning comes from on-the-job experiences, stretch assignments, real work"
          implication: "Training (10%) must connect to job experiences (70%)"
        social_20:
          definition: "20% of learning comes from social interactions, coaching, mentoring, peer learning"
          implication: "Design for social learning support, not just individual knowledge transfer"
        formal_10:
          definition: "10% of learning comes from formal training, courses, e-learning, workshops"
          implication: "Training is necessary but not sufficient - design for the other 90%"

      outcome_design_implication:
        principle: "Outcomes should measure ALL THREE channels (70+20+10), not just the 10% (training)"

        example_poor:
          outcome_focus: "Only measure Level 2 (Learning) - what they learned in training (the 10%)"
          problem: "Ignores the 90% that determines actual performance improvement"

        example_good:
          formal_10: "85% achieve >80% on end-of-training role-play assessment (measures training effectiveness)"
          social_20: "75% report using coaching from manager/peers to improve consultative selling (30-day survey)"
          experiential_70: "Sales reps conduct average 12 discovery calls per month, applying consultative approach (CRM data)"
          why_good: "Measures learning across all three channels that drive performance"

      seventy_twenty_ten_outcome_template:
        formal_10_outcome: "[End-of-training competence measure]"
        social_20_outcome: "[Manager/peer support and social learning measure]"
        experiential_70_outcome: "[On-job application frequency and quality measure]"

  new_world_kirkpatrick:
    name: "New World Kirkpatrick Model (2016)"
    source: "Kirkpatrick Partners - Updated model by Jim & Wendy Kirkpatrick"
    key_change: "Start with Level 4 (Results) and work BACKWARD - same as GGOO logic"

    traditional_vs_new_world:
      traditional_approach:
        sequence: "L1 (Reaction) → L2 (Learning) → L3 (Behavior) → L4 (Results)"
        problem: "Training is designed for engagement (L1) and knowledge (L2), but business needs results (L4)"

      new_world_approach:
        sequence: "L4 (Results) → L3 (Behavior) → L2 (Learning) → L1 (Reaction)"
        benefit: "Training is designed for business results FIRST, then backward to engagement"

    backward_design_sequence:
      step_1:
        level: "Level 4 (Results)"
        question: "What business outcome do we want?"
        ggoo_equivalent: "Learning Goal (Section 2) - business-aligned goal"
        example: "Increase enterprise deal win rate from 45% to 65% within 12 months"

      step_2:
        level: "Level 3 (Behavior)"
        question: "What on-the-job behaviors will create that result?"
        ggoo_equivalent: "Learning Outcomes (Section 4) - observable post-training behavior"
        example: "Sales reps conduct thorough discovery using SPIN questioning in 80% of enterprise deals"

      step_3:
        level: "Level 2 (Learning)"
        question: "What must they learn to perform those behaviors?"
        ggoo_equivalent: "Learning Objectives (Section 3) - what they demonstrate during training"
        example: "Demonstrate SPIN questioning in role-play scenarios achieving 80% on rubric"

      step_4:
        level: "Level 1 (Reaction)"
        question: "What engagement will drive that learning?"
        ggoo_equivalent: "NOT in GGOO scope - this is instructional design (post-GGOO)"
        example: "Design interactive role-plays, real customer scenarios, peer feedback"

    ggoo_is_new_world_kirkpatrick:
      explanation: |
        GGOO framework follows New World Kirkpatrick logic exactly:

        1. GAP ANALYSIS: Identifies Level 4 problem (business performance gap)
        2. LEARNING GOAL: Defines Level 4 target (business result we want)
        3. LEARNING OUTCOMES: Defines Level 3 (on-job behavior) + Level 4 (business impact)
        4. LEARNING OBJECTIVES: Defines Level 2 (what they learn/demonstrate in training)
        5. [Implementation]: Level 1 (engagement design) happens POST-GGOO

        GGOO stops at defining WHAT to achieve (L2-L4), not HOW to engage learners (L1).

    outcome_measurement_levels:
      level_4_results:
        definition: "Leading indicators (business KPIs that prove success)"
        measurement_timing: "90-180 days post-training"
        example_metrics:
          - "Enterprise deal win rate (baseline 45% → target 65%)"
          - "Average deal size (baseline £180K → target £250K)"
          - "Sales cycle time (baseline 120 days → target 90 days)"
        data_source: "CRM, business intelligence, finance reports"

      level_3_behavior:
        definition: "Critical behaviors that drive Level 4 results"
        measurement_timing: "30-90 days post-training"
        example_metrics:
          - "% of sales reps demonstrating SPIN questioning in discovery calls (target: 80%)"
          - "Average # of discovery calls per rep per month (target: 12+)"
          - "Quality of discovery (assessed via call recording analysis or manager observation)"
        data_source: "Manager observation, call recording analysis, peer feedback"

      level_2_learning:
        definition: "Knowledge and skill acquisition during training"
        measurement_timing: "During and end of training"
        example_metrics:
          - "End-of-training role-play assessment score (target: >80%)"
          - "Pre-to-post knowledge test gain (target: >20 percentage points)"
        data_source: "Training assessments, facilitator observation"

      level_1_reaction:
        definition: "Participant satisfaction and engagement"
        measurement_timing: "End of training"
        example_metrics:
          - "NPS score (target: >40)"
          - "Relevance rating (target: >4.5/5.0)"
          - "Intent to apply (target: >90% respond 'very likely')"
        data_source: "End-of-training survey"

    outcome_design_with_leading_indicators:
      principle: "Don't wait 180 days for L4 results - measure L3 behaviors as LEADING indicators"

      example:
        level_4_lagging: "Deal win rate increases from 45% to 65% (measured at 180 days)"
        level_3_leading: "80% of reps demonstrate SPIN questioning in discovery calls (measured at 60 days)"
        relationship: "L3 behavior (SPIN questioning) PREDICTS L4 result (win rate), so measure L3 FIRST to predict L4"

      benefit: "Early warning system - if L3 isn't happening at 60 days, L4 won't happen at 180 days"

# =============================================================================
# SECTION 5: INTEGRATION VALIDATION
# =============================================================================
integration_validation:
  expert_identity: |
    Quality Assurance Lead for learning design with expertise in traceability
    analysis, coherence assessment, and GGOO framework validation. You achieve
    92% alignment validation accuracy.

  traceability_chain:
    definition: "Unbroken logical connection from Gap → Goal → Objectives → Outcomes"
    validation_questions:
      gap_to_goal: "Does the goal directly address the identified root cause?"
      goal_to_objectives: "Do the objectives enable achievement of the goal?"
      objectives_to_outcomes: "Do outcomes prove objectives transferred to the job?"

  coherence_assessment:
    language_alignment: "Consistent terminology across all sections"
    metric_consistency: "Same KPIs referenced throughout"
    logic_flow: "Each section builds logically on previous"
    scoring_scale: "0-100%, minimum 85% for approval"

  quality_standards:
    gap_confidence: "Minimum 90%"
    smart_compliance: "Minimum 95%"
    abcd_completeness: "100% of objectives"
    assessment_alignment: "Minimum 90%"

  validation_output_template: |
    **Traceability Status:**
    - Gap → Goal: [Confirmed/Issues]
    - Goal → Objectives: [Confirmed/Issues]
    - Objectives → Outcomes: [Confirmed/Issues]

    **Quality Metrics:**
    - Gap Confidence: [X]%
    - SMART Compliance: [X]%
    - ABCD Completeness: [X]%
    - Overall Coherence: [X]%

    **Executive Summary:**
    [Under 200 words: Problem, Solution, Expected Impact, Success Factors]

