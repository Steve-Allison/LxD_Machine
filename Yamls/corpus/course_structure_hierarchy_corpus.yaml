      - pr_011

  - id: bp_040
    entry_type: best_practice
    title: "Modality-Specific Timing Adjustments"
    description: >
      Adjust timing by delivery modality: ILT = baseline attention and activity
      frequency, +75% peer learning opportunity; VILT = −25% attention span,
      +40% activity frequency; eLearning = 5–7 min max segment, 1 interaction
      per 3 min; Microlearning = 3–7 min total with built-in check per unit.
    sources:
      - "content_map_corpus.yaml §3"
    tags:
      - timing
      - structuring
    added: "2026-03-09"
    evidence: "VILT reduces effective attention by 25% compared to ILT; eLearning requires higher interaction density."
    context: "Apply timing adjustments based on the course's delivery modality when calculating strip and session durations."
    confidence: strong

  - id: bp_041
    entry_type: best_practice
    title: "Timing Estimation Heuristics"
    description: >
      Use these heuristics for duration estimation: video narration = 150–180
      wpm (reduce for complex content); on-screen reading = 200–250 wpm;
      interactive exercise = 1.5–3× duration of the content it practises;
      assessment question = 1–2 min per question depending on complexity.
    sources:
      - "content_map_corpus.yaml §3"
      - "Content_Outline_Generator.md"
    tags:
      - timing
    added: "2026-03-09"
    evidence: "Word-per-minute research provides reliable estimation for audio and visual content pacing."
    context: "Apply when calculating card and strip durations during the structuring phase."
    confidence: moderate
    related_principles:
      - pr_002

  # --- Assessment ---

  - id: bp_042
    entry_type: best_practice
    title: "Assessment Types by Hierarchy Level"
    description: >
      Map assessment to each hierarchy level: Course = summative (final module,
      competency validation); Module = formative (end of module, gap identification);
      Topic = knowledge check (quick understanding validation); Strip = Independent
      Test card (single-objective mastery); Card = embedded interaction (engagement
      and immediate feedback).
    sources:
      - "content_map_corpus.yaml §6"
      - "assessment_taxonomy.yaml"
    tags:
      - assessment
      - hierarchy
    added: "2026-03-09"
    evidence: "Multi-level assessment ensures learning is validated at appropriate granularity throughout the hierarchy."
    context: "Plan assessment at every level during the structuring phase, not as an afterthought."
    confidence: strong
    related_principles:
      - pr_020
      - pr_021

  - id: bp_043
    entry_type: best_practice
    title: "Kirkpatrick Evaluation Integration"
    description: >
      Plan evaluation across 4 levels: L1 Reaction (satisfaction surveys, during
      and immediately after); L2 Learning (assessment scores, pre/post comparison,
      end of course); L3 Behaviour (manager observation, self-report, 30–90 days
      post); L4 Results (KPI changes, ROI, 90+ days post). Course-level assessment
      targets L2; post-course follow-up targets L3–L4.
    sources:
      - "Kirkpatrick, D. (2016)"
      - "learning_design_corpus.yaml"
    tags:
      - assessment
    added: "2026-03-09"
    evidence: "The New World Kirkpatrick Model (2016) provides a backward-design approach starting from desired results."
    context: "Plan L1–L2 during course structuring; plan L3–L4 as post-course evaluation strategy."
    confidence: strong
    related_principles:
      - pr_024

  - id: bp_044
    entry_type: best_practice
    title: "Formative Assessment Frequency"
    description: >
      Formative assessment must appear at least every 20–30 minutes of instruction
      to maintain engagement and identify misunderstandings early. Frequency
      increases for eLearning (every 3 minutes) and VILT (+40% above ILT baseline).
    sources:
      - "content_map_corpus.yaml §6"
    tags:
      - assessment
      - timing
    added: "2026-03-09"
    evidence: "Regular formative assessment catches misunderstandings before they compound into larger comprehension failures."
    context: "Apply when planning assessment placement within module timelines."
    confidence: strong
    related_principles:
      - pr_020

  # --- Scaffolding ---

  - id: bp_045
    entry_type: best_practice
    title: "Phase-Based Scaffolding Gradient"
    description: >
      Map scaffolding to 5-phase position, not fixed module numbers: Foundation
      = HIGH scaffolding (detailed step-by-step, directive guidance, 20–30%
      learner independence); Development = MEDIUM (key prompts, coaching, 40–60%);
      Integration = LOW (minimal cues, facilitative, 60–80%); Consolidation =
      MINIMAL (self-generated, advisory, 80–100%); Assessment = NONE (fully
      independent, evaluative, 100%).
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - scaffolding
      - 5-phase-cycle
    added: "2026-03-09"
    evidence: "Phase-based scaffolding works for courses of any size — a 4-module course and a 20-module course follow the same gradient."
    context: "Apply when setting scaffolding levels for strips across the course. Determine phase position first, then set scaffolding."
    confidence: strong
    related_principles:
      - pr_018

  - id: bp_046
    entry_type: best_practice
    title: "Signal-Fade Schedule"
    description: >
      Visual and audio learning cues progressively fade across the 5-phase cycle:
      Foundation & early Development = highlighted terms, annotated diagrams,
      step-by-step walkthroughs, explicit signposting; Late Development &
      Integration = reduced annotations, partial worked examples, strategic hints;
      Consolidation & Assessment = clean presentation, independent application,
      minimal cues.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - scaffolding
      - structuring
    added: "2026-03-09"
    evidence: "Signal fading promotes learner independence and prevents scaffold dependency."
    context: "Apply to card-level design notes to ensure cue density decreases appropriately across the course."
    confidence: moderate
    related_principles:
      - pr_018

  # --- Quality Validation ---

  - id: bp_047
    entry_type: best_practice
    title: "4-Step Architecture Validation Checklist"
    description: >
      Validate course structure in 4 steps: (1) Architecture Completeness —
      all 5 phases present, time allocations within range, each module has one
      goal, mandatory phases exist; (2) Objective Alignment — SMART objectives,
      ladder-up from module→topic→strip→card, Bloom's progression, GGOO
      traceability; (3) Activity/Assessment Coverage — every objective has an
      activity, assessment at every level, cognitive alignment matrix followed;
      (4) Assembly — content map complete, prerequisites mapped, timing adds up,
      no orphan or duplicate content, scaffolding gradient progressive.
    sources:
      - "content_map_corpus.yaml §9"
      - "Course_Gold_Structure_Module.md"
    tags:
      - quality-validation
      - structuring
    added: "2026-03-09"
    evidence: "Systematic validation prevents structural defects that are costly to fix after production begins."
    context: "Run this checklist after completing the full course structure before handing off to production."
    confidence: strong
    related_principles:
      - pr_016

  - id: bp_048
    entry_type: best_practice
    title: "Strip-Level Validation Checklist"
    description: >
      Validate each strip: exactly ONE learning objective; 2–6 cards appropriate
      to pattern; all card types justified by the strip pattern; scaffolding
      level appropriate for course position; duration within 5–20 min; atomic
      concepts limited to 3–7 per strip.
    sources:
