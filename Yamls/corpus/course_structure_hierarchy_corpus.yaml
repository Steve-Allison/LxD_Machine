  - id: bp_035
    entry_type: best_practice
    title: "Guided Practice Card Design"
    description: >
      The Guided Practice card provides supported application with scaffolding
      in 2–5 min. Techniques: step-by-step exercise, coached scenario,
      fill-in-blank, partial worked example. Maps to Gagné Event 6. Provides
      immediate feedback and error correction while learner independence
      is still developing.
