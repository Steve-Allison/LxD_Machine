  # --- Topic Level ---

  - id: bp_024
    entry_type: best_practice
    title: "Topic Boundary Definition"
    description: >
      Define topic boundaries using 5 criteria: (1) Addresses one conceptual
      cluster from Phase 2; (2) Contains 1–3 subtopics or goes directly to
      strips; (3) Lasts 10–40 minutes; (4) Has a clear learning objective
      traceable to the module's goal; (5) Has identifiable prerequisite
      dependencies on earlier topics.
    sources:
      - "content_map_corpus.yaml §1, §2"
      - "Content_Mining_Module.md"
    tags:
      - structuring
      - topic
    added: "2026-03-09"
    evidence: "Well-defined topic boundaries prevent content bleed between adjacent topics and support modular design."
    context: "Apply when converting Phase 2 concept clusters into formal hierarchy Level 3 topics."
    confidence: strong
    related_principles:
      - pr_001

  - id: bp_025
    entry_type: best_practice
    title: "Topic Sequencing Within a Module — 5 Priority Criteria"
    description: >
      Sequence topics within a module using these criteria in priority order:
      (1) Prerequisite dependencies — dependent topics come after;
      (2) Complexity progression — simple before complex;
      (3) Bloom's level progression — lower levels before higher;
      (4) Narrative coherence — topics tell a logical story;
      (5) Engagement pacing — alternate heavy conceptual content with
      lighter application/practice.
    sources:
      - "content_map_corpus.yaml §1, §2"
      - "Content_Mining_Module.md"
    tags:
      - structuring
      - topic
      - sequencing
    added: "2026-03-09"
    evidence: "Multi-criteria sequencing produces more learnable topic orders than single-criterion approaches."
    context: "Apply when arranging topics within each module. Criterion 1 (prerequisites) always takes priority."
    confidence: strong
    related_principles:
      - pr_009
      - pr_010

  # --- Subtopic Level ---

  - id: bp_026
    entry_type: best_practice
    title: "Subtopic Usage Decision"
    description: >
      Use subtopics when: a topic contains 3+ distinct but related sub-concepts;
      the topic would exceed 20 minutes without subdivision; different sub-concepts
      need different instructional approaches. Do NOT use subtopics when: the
      topic focuses on a single concept; subdivision would create fragments too
      small to stand alone; the topic flows as a single narrative.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - subtopic
    added: "2026-03-09"
    evidence: "Subtopics add structural clarity for complex topics but unnecessary subdivision fragments the learning experience."
    context: "Apply as a decision gate before creating Level 4 entries. Default is no subtopics; add only when criteria are met."
    confidence: strong

  # --- Strip Level ---

  - id: bp_027
    entry_type: best_practice
    title: "Intelligent Strip Planning Matrix"
    description: >
      Select strip pattern using 4 scoring dimensions (1–3 each): Content
      Complexity, Criticality, Prior Knowledge, Application Frequency. Sum
      score determines pattern: 4–6 = Micro-Strip (2–3 cards, 5–8 min);
      7–9 = Standard Strip (3–4 cards, 10–15 min); 10–12 = Full Strip
      (5–6 cards, 15–20 min).
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - strip
    added: "2026-03-09"
    evidence: "The planning matrix ensures strip investment matches the instructional need, preventing over- or under-design."
    context: "Apply for every strip decision. Score all 4 dimensions before selecting the pattern."
    confidence: strong
    related_principles:
      - pr_004

  - id: bp_028
    entry_type: best_practice
    title: "Micro-Strip Pattern (2–3 Cards, 5–8 Minutes)"
    description: >
      Best for simple updates, single concepts, experienced audiences (score 4–6).
      Three options: (A) Hook/Teach → Practice/Test → Reflect;
      (B) Teach → Test → Transfer; (C) Hook/Pre-train → Teach/Practice →
      Test/Reflect. Uses card merging to compress the 6-card model.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - strip
      - card
    added: "2026-03-09"
    evidence: "Micro-strips efficiently deliver low-complexity content without unnecessary instructional overhead."
    context: "Use when the Strip Planning Matrix scores 4–6."
    confidence: strong
    related_principles:
      - pr_004

  - id: bp_029
    entry_type: best_practice
    title: "Standard Strip Pattern (3–4 Cards, 10–15 Minutes)"
    description: >
      Best for core skills, mixed audiences, moderate complexity (score 7–9).
      Three options: (A) Hook → Teach/Practice → Test → Reflect;
      (B) Pre-train → Teach → Practice/Test → Transfer;
      (C) Hook/Pre-train → Teach → Practice → Test/Reflect.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
