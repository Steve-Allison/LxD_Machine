    context: "Run for every strip after structuring is complete."
    confidence: strong

  - id: bp_049
    entry_type: best_practice
    title: "Cross-Strip Coherence Validation"
    description: >
      Validate coherence across strips: consistent terminology across all strips;
      progressive skill building from strip to strip; no unintended redundancy
      (unless deliberate spaced repetition); narrative thread connects related
      strips within a topic.
    sources:
