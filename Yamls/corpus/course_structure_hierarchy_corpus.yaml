  # --- Timing & Pacing ---

  - id: bp_039
    entry_type: best_practice
    title: "Session Timing Rules"
    description: >
      Observe cognitive-science timing limits: max session before break = 45–60
      min; synchronous interaction frequency = every 15–20 min; eLearning
      interaction = every 3 min; video attention refresh = every 20–30 sec;
      max continuous lecture = 15–20 min before activity.
    sources:
      - "content_map_corpus.yaml §3"
      - "Content_Outline_Generator.md"
    tags:
      - timing
      - cognitive-load
    added: "2026-03-09"
