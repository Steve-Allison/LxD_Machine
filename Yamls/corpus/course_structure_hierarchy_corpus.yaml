      - strip
      - card
    added: "2026-03-09"
    evidence: "Standard strips balance instructional completeness with time efficiency for the majority of learning objectives."
    context: "Use when the Strip Planning Matrix scores 7–9. This is the most common pattern."
    confidence: strong
    related_principles:
      - pr_004

  - id: bp_030
    entry_type: best_practice
    title: "Full Strip Pattern (5–6 Cards, 15–20 Minutes)"
    description: >
      Best for complex skills, novice audiences, critical capabilities (score
      10–12). Uses all 6 card types when complexity and criticality justify the
      full investment: Hook → Pre-Training → Teach → Guided Practice →
      Independent Test → Reflect & Transfer.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - strip
      - card
    added: "2026-03-09"
    evidence: "Full strips provide maximum instructional support for high-stakes, high-complexity learning objectives."
    context: "Use when the Strip Planning Matrix scores 10–12. Reserve for genuinely critical content."
    confidence: strong
    related_principles:
      - pr_004
      - pr_005

  - id: bp_031
    entry_type: best_practice
    title: "Smart Card Merging Guidelines"
    description: >
      Merge cards to compress strips: Hook + Pre-Training (when ≤3 new terms
      and hook naturally introduces concepts); Teach + Guided Practice (when
      demonstration includes try-it moments); Guided Practice + Independent
      Test (progressive challenge with fading hints); Test + Reflect (when
      reflection is brief and for building-block skills). Never merge when:
      skills are mission-critical, compliance requires documented assessment,
      cognitive load limits (7±2) would be exceeded, or quality would suffer.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - card
      - strip
    added: "2026-03-09"
    evidence: "Smart merging reduces strip duration by 20–40% without compromising learning when applied appropriately."
    context: "Apply when designing Micro-Strip or Standard Strip patterns to compress the canonical 6-card sequence."
    confidence: strong

  # --- Card Level ---

  - id: bp_032
    entry_type: best_practice
    title: "Hook Card Design"
    description: >
      The Hook card captures attention and establishes relevance in 30 sec–1 min.
      Techniques: compelling story, surprising statistic, provocative question,
      real-world scenario. Maps to Gagné Events 1–2. Must answer the learner's
      implicit question 'Why should I care about this?'
    sources:
