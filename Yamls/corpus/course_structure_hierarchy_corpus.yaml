  - id: bp_037
    entry_type: best_practice
    title: "Reflect & Transfer Card Design"
    description: >
      The Reflect & Transfer card consolidates learning and plans real-world
      application in 1–3 min. Techniques: action planning, commitment setting,
      next steps, journal prompt, self-assessment. Maps to Gagné Event 9.
      Addresses Merrill's Integration principle — the ONLY FPI principle
      generating long-term ROI; skipping it causes 40–60% knowledge decay.
