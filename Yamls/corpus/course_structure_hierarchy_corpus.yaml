  - id: bp_036
    entry_type: best_practice
    title: "Independent Test Card Design"
    description: >
      The Independent Test card requires unassisted performance in 2–5 min.
      Techniques: quiz, scenario challenge, problem-solving without hints.
      Maps to Gagné Events 7–8. Provides verification that learning has
      occurred and feeds into the cognitive alignment matrix (assessment
      format matches Bloom's level).
