      - pr_019

  - id: bp_034
    entry_type: best_practice
    title: "Teach Card Design"
    description: >
      The Teach card delivers core instructional content in 3–8 min. Techniques:
      demonstration, worked example, explanation, dual-coded delivery (words +
      pictures). Maps to Gagné Events 4–5. Apply Mayer's Multimedia, Signalling,
      Coherence, and Modality principles. Limit to 7±2 chunks per segment.
