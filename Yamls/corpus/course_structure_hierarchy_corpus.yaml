      - "Gagné, R. (1985)"
    tags:
      - card
      - gagne
    added: "2026-03-09"
    evidence: "Attention capture within the first 30 seconds determines learner engagement for the remainder of the strip."
    context: "Include in every strip pattern. May be merged with Pre-Training in Micro-Strips."
    confidence: strong
    related_principles:
      - pr_005
      - pr_014

  - id: bp_033
    entry_type: best_practice
    title: "Pre-Training Card Design"
    description: >
      The Pre-Training card introduces essential vocabulary and mental models
      in 1–3 min. Content: glossary of key terms, concept map overview,
      framework introduction, prerequisite review. Maps to Gagné Event 3.
      Implements Mayer's Pre-training Principle — introduce concepts before
      the main lesson to reduce intrinsic load during teaching.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "Mayer, R. (2009)"
    tags:
      - card
      - mayer-principles
    added: "2026-03-09"
    evidence: "Mayer's Pre-training Principle reduces intrinsic cognitive load by preparing learners before complex instruction."
    context: "Include in Standard and Full strips. May be merged with Hook in Micro-Strips when vocabulary is minimal."
    confidence: strong
    related_principles:
