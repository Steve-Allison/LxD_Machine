    title: "Module Internal Flow"
    description: >
      Structure each module's internal flow as: Opening (5–10% of module time)
      — context setting, objective clarity, hook; Development (70–80%) —
      core content and practice through topics/strips/cards; Consolidation
      (10–15%) — summary, validation, transition to next module.
    sources:
