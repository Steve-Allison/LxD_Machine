    added: "2026-03-09"
    evidence: "Dot-notation enables precise reference to any element in the hierarchy and supports traceability audits."
    context: "Assign IDs during the structuring phase. Choose 3-part or 4-part based on whether subtopics are used."
    confidence: strong

