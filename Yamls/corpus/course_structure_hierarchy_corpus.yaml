# ═══════════════════════════════════════════════════════════════
# WORKFLOW — Pipeline execution sequence for LLM agents
# Process these phases IN ORDER. Within each phase, apply the
# listed entries in the given sequence. Check anti-patterns at
# the end of each phase before proceeding.
# ═══════════════════════════════════════════════════════════════

workflow:

  - phase: 1_extraction
    name: "Content Extraction"
    description: >
      Mine raw source materials to identify all topics, concepts, evidence,
      examples, and threshold concepts. Work through the 5-stage extraction
      pipeline (bp_004). Apply nuclearity analysis (bp_054) for long/complex
      sources. Output: a comprehensive concept inventory with source mapping.
    governing_principles:
      - pr_006   # Semantic Over Surface
      - pr_007   # Threshold Concept Priority
      - pr_022   # Multi-Stage Extraction
      - pr_023   # Source Attribution and Traceability
      - pr_026   # Nuclearity — Core vs Supporting Content
    sequence:
      - bp_003   # 8-Criterion Source Quality Assessment (rank sources first)
      - bp_004   # 5-Stage Extraction Pipeline (execute the pipeline)
      - bp_001   # Semantic Content Analysis Using Kintsch Methodology
      - bp_002   # 9 Content Types for Extraction Categorisation
      - bp_005   # Presentation Deck Extraction (if applicable)
      - bp_006   # Video and Transcript Extraction (if applicable)
      - bp_007   # Document and PDF Extraction (if applicable)
      - bp_008   # Job Aids and eLearning Extraction (if applicable)
      - bp_054   # Nuclearity-Based Content Prioritisation
      - bp_010   # Threshold Concept Identification and Prioritisation
      - bp_009   # Source Mapping for Traceability
    check_against:
      - ap_001   # Format-Driven Mining
      - ap_002   # Source Bias
      - ap_003   # Threshold Concept Neglect
      - ap_004   # Shallow Extraction
    output_artefact: >
      Concept inventory: a structured list of all extracted concepts, each
      categorised by content type (bp_002), tagged as nucleus/satellite,
      scored for quality, with source mapping (bp_009) and threshold concept
      flags (bp_010).

  - phase: 2_organisation
    name: "Content Organisation"
    description: >
      Cluster extracted concepts into logical groups, map prerequisite
      dependencies, sequence by complexity, deduplicate, and identify gaps.
      Output: organised concept clusters ready for hierarchical structuring.
    governing_principles:
      - pr_008   # MECE Principle
      - pr_009   # Prerequisite Mapping
      - pr_010   # Complexity Progression
      - pr_011   # Cognitive Load Theory
    sequence:
      - bp_011   # Semantic Clustering Process
      - bp_014   # Deduplication and Conflict Resolution
      - bp_012   # Prerequisite Dependency Mapping
      - bp_016   # Bottleneck Concept Identification
      - bp_013   # Bloom's-Aligned Complexity Sequencing
      - bp_015   # 6-Type Gap Identification
    check_against:
      - ap_005   # Source-Driven Grouping
      - ap_006   # Topic Sprawl
      - ap_007   # Missing Prerequisites
      - ap_008   # MECE Violation
    output_artefact: >
      Organised concept map: MECE clusters with descriptive labels,
      prerequisite dependency graph, Bloom's-aligned sequence, bottleneck
      flags, and gap analysis report.

  - phase: 3_structuring
    name: "Hierarchical Structuring"
    description: >
      Arrange organised concepts into the 6-level hierarchy: Course → Module →
      Topic → Subtopic → Strip → Card. Apply the 5-phase learning cycle,
      select strip patterns, design cards, plan assessment and scaffolding.
      Validate the complete structure before handoff to production.
    governing_principles:
      - pr_001   # 6-Level Structural Hierarchy
      - pr_002   # Duration Philosophy
      - pr_003   # One Module, One Goal
      - pr_004   # One Strip, One Objective
      - pr_005   # 6-Card Canonical Model
      - pr_012   # 5-Phase Learning Cycle
      - pr_013   # Bloom's Revised Taxonomy
      - pr_014   # Gagné's Nine Events
      - pr_015   # Merrill's First Principles
      - pr_016   # GGOO Alignment Traceability
      - pr_017   # Adult Learning Principles
      - pr_018   # Progressive Scaffolding Gradient
      - pr_019   # Mayer's 15 Multimedia Principles
      - pr_020   # Assessment Integration at Every Level
      - pr_021   # Cognitive Alignment Matrix
      - pr_024   # Kirkpatrick 4-Level Evaluation
      - pr_025   # Topic Disambiguation
    sub_steps:

      - step: "3a_course_level"
        name: "Course Architecture"
        sequence:
          - bp_017   # 5-Phase Course Architecture
          - bp_018   # Module Count by Learning Goals
          - bp_019   # Module Archetype Selection
          - bp_020   # Module 1 Structure
          - bp_021   # Final Module — Summative Assessment
          - bp_055   # Planning-Before-Realization Architecture

      - step: "3b_module_level"
        name: "Module Design"
        sequence:
          - bp_022   # 7-Column Content Map Format
          - bp_023   # Module Internal Flow
          - bp_053   # ABCD Formula for Learning Objectives

      - step: "3c_topic_level"
        name: "Topic Design"
        sequence:
          - bp_024   # Topic Boundary Definition
          - bp_025   # Topic Sequencing — 5 Priority Criteria
          - bp_026   # Subtopic Usage Decision

      - step: "3d_strip_level"
        name: "Strip Design"
        sequence:
          - bp_027   # Intelligent Strip Planning Matrix
          - bp_028   # Micro-Strip Pattern
          - bp_029   # Standard Strip Pattern
          - bp_030   # Full Strip Pattern
          - bp_031   # Smart Card Merging Guidelines

      - step: "3e_card_level"
        name: "Card Design"
        sequence:
          - bp_032   # Hook Card
          - bp_033   # Pre-Training Card
          - bp_034   # Teach Card
          - bp_035   # Guided Practice Card
          - bp_036   # Independent Test Card
          - bp_037   # Reflect & Transfer Card
          - bp_038   # Card Specification Template

      - step: "3f_cross_cutting"
        name: "Cross-Cutting Concerns"
        sequence:
          - bp_039   # Session Timing Rules
          - bp_040   # Modality-Specific Timing Adjustments
          - bp_041   # Timing Estimation Heuristics
          - bp_042   # Assessment Types by Hierarchy Level
          - bp_043   # Kirkpatrick Evaluation Integration
          - bp_044   # Formative Assessment Frequency
          - bp_045   # Phase-Based Scaffolding Gradient
          - bp_046   # Signal-Fade Schedule
          - bp_056   # Spaced Repetition and Retrieval Practice
          - bp_050   # Dot-Notation ID System
          - bp_051   # Asset Tagging for Reuse
          - bp_052   # Reusable Component Design

      - step: "3g_validation"
        name: "Structure Validation"
        sequence:
          - bp_047   # 4-Step Architecture Validation Checklist
          - bp_048   # Strip-Level Validation Checklist
          - bp_049   # Cross-Strip Coherence Validation
        check_against:
          - ap_009   # Flat Structure
          - ap_010   # Phase Imbalance
          - ap_011   # Objective Inflation
          - ap_012   # Assessment Afterthought
          - ap_013   # Cognitive Load Cliff
          - ap_014   # Integration Neglect
          - ap_015   # One-Size-Fits-All Strips

# ═══════════════════════════════════════════════════════════════
# VALIDATION RUBRIC — Score a completed course structure
# Use after Phase 3 validation to produce a quality score.
# Each criterion scores 0–3: 0=absent, 1=partial, 2=adequate, 3=exemplary
# Maximum score: 42 (14 criteria × 3). Pass threshold: 28 (67%).
# ═══════════════════════════════════════════════════════════════

validation_rubric:
  pass_threshold: 28
  max_score: 42
  criteria:
    - id: vr_01
      name: "5-Phase Completeness"
      description: "All 5 learning cycle phases present with time allocations within prescribed ranges"
      references: [pr_012, bp_017]

    - id: vr_02
      name: "Hierarchy Integrity"
      description: "Full 6-level hierarchy used; every module contains topics, every topic contains strips, every strip contains cards"
      references: [pr_001, ap_009]

    - id: vr_03
      name: "One-Goal-One-Module"
      description: "Each module addresses exactly one significant learning goal; no multi-goal or empty modules"
      references: [pr_003, bp_018]

    - id: vr_04
      name: "One-Objective-One-Strip"
      description: "Each strip targets exactly one measurable ABCD objective; no multi-objective strips"
      references: [pr_004, ap_011, bp_053]

    - id: vr_05
      name: "Bloom's Progression"
      description: "Cognitive levels progress from lower to higher within modules and across the course"
      references: [pr_010, pr_013, bp_013, ap_013]

    - id: vr_06
      name: "Prerequisite Sequencing"
      description: "All prerequisite dependencies satisfied; no concept appears before its prerequisites"
      references: [pr_009, bp_012, ap_007]

    - id: vr_07
      name: "Strip Pattern Justification"
      description: "Strip patterns (Micro/Standard/Full) justified by the Intelligent Strip Planning Matrix scores"
      references: [bp_027, bp_028, bp_029, bp_030, ap_015]

    - id: vr_08
      name: "Assessment Coverage"
      description: "Assessment present at every hierarchy level; formative every 20–30 min; cognitive alignment matrix followed"
      references: [pr_020, pr_021, bp_042, bp_044, ap_012]

    - id: vr_09
      name: "Scaffolding Gradient"
      description: "Scaffolding decreases progressively across the 5-phase cycle; signal-fade schedule applied"
      references: [pr_018, bp_045, bp_046]

    - id: vr_10
      name: "Timing Compliance"
      description: "Topic durations 10–40 min, strip durations 5–20 min, card durations 30s–4 min; session breaks planned"
      references: [pr_002, bp_039, bp_041]

    - id: vr_11
      name: "GGOO Traceability"
      description: "Every level traces to GGOO: Gap → Goal → Objective → Outcome; no content without business justification"
      references: [pr_016, bp_047, bp_053]

    - id: vr_12
      name: "Integration Presence"
      description: "Reflect & Transfer card present in every strip (or merged in Micro-Strips); no integration neglect"
      references: [pr_015, bp_037, ap_014]

    - id: vr_13
      name: "MECE Compliance"
      description: "No content overlap between modules/topics; no orphan content; all extracted concepts placed"
      references: [pr_008, bp_011, ap_008]

    - id: vr_14
      name: "Spaced Retrieval Planning"
      description: "Retrieval touchpoints planned at expanding intervals; cross-module integration strips reference prior concepts"
      references: [bp_056, bp_049]

entries:

  # ═══════════════════════════════════════════════════════════════
  # PRINCIPLES (pr_001 – pr_026)
  # Foundational rules underpinning the methodology
  # ═══════════════════════════════════════════════════════════════

  - id: pr_001
    entry_type: principle
    title: "6-Level Structural Hierarchy"
    description: >
      Every course is organised into exactly 6 levels: Course → Module → Topic →
      Subtopic (optional) → Strip → Card. Each level has a defined role, containment
      rules, and — for instructional units — cognitive-science-based duration guidance.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "content_architecture_taxonomy.yaml"
    tags:
      - hierarchy
      - structuring
    added: "2026-03-09"
    underpins:
      - bp_017
      - bp_024
      - bp_027

  - id: pr_002
    entry_type: principle
    title: "Duration Philosophy — Containers vs Instructional Units"
    description: >
      Duration constraints apply ONLY to instructional units (Topic: 10–40 min,
      Strip: 5–20 min, Card: 30 sec–4 min) where cognitive science provides
      meaningful guidance. Course, Module, and Subtopic are containers whose
      duration is the sum of their children. A course can be anything from
      30 minutes to hundreds of hours.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "Corpus/Research/course_structure_hierarchy_corpus_research.md §2.1"
    tags:
      - hierarchy
      - timing
    added: "2026-03-09"
    underpins:
      - bp_039
      - bp_041

  - id: pr_003
    entry_type: principle
    title: "One Module, One Goal"
    description: >
      Each module addresses exactly one significant learning goal. If a module
      tries to address more than one goal, split it. If a module feels too thin,
      merge it with a related module. The number of modules is driven by the
      content's distinct learning goals, not by arbitrary count targets.
    sources:
      - "content_map_corpus.yaml §1"
      - "Course_Gold_Structure_Module.md"
    tags:
      - module
      - structuring
    added: "2026-03-09"
    underpins:
      - bp_018
      - bp_019

  - id: pr_004
    entry_type: principle
    title: "One Strip, One Objective"
    description: >
      A Strip is the fundamental instructional building block. Each strip
      targets exactly one measurable learning objective, is completable in
      5–20 minutes, and follows a clear pedagogical sequence. Assigning
      multiple objectives to a single strip violates this principle.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - strip
      - structuring
    added: "2026-03-09"
    underpins:
      - bp_027
      - bp_028
      - bp_029
      - bp_030

  - id: pr_005
    entry_type: principle
    title: "6-Card Canonical Model"
    description: >
      The canonical strip contains 6 card types: Hook, Pre-Training, Teach,
      Guided Practice, Independent Test, Reflect & Transfer. The 6-card model
      (from Essentials Playbook) supersedes the earlier 5-card model (from
      content_map_corpus.yaml) because Merrill's FPI research shows Integration
      (addressed by Reflect & Transfer) is the ONLY principle generating
      long-term ROI; omitting it causes 40–60% knowledge decay.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "merrill_framework.yaml"
      - "content_map_corpus.yaml §2 (earlier 5-card version)"
    tags:
      - card
      - strip
      - merrill
    added: "2026-03-09"
    underpins:
      - bp_032
      - bp_033
      - bp_034
      - bp_035
      - bp_036
      - bp_037

  - id: pr_006
    entry_type: principle
    title: "Semantic Over Surface"
    description: >
      Meaningful structure emerges from content relationships, not surface
      formatting. Analyse content for underlying meaning and pedagogical value
      rather than relying on headings, bullet points, or visual layout.
      A presentation deck's real content is often in the speaker notes and
      narrative, not in the bullet points on screen.
    sources:
      - "Content_Mining_Module.md"
      - "Kintsch, W. (1998) — Semantic Content Analysis"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    underpins:
      - bp_001
      - bp_005

  - id: pr_007
    entry_type: principle
    title: "Threshold Concept Priority"
    description: >
      Threshold concepts (Meyer & Land, 2003) — transformative, irreversible,
      integrative, troublesome, bounded ideas — require 3× more extraction
      attention than routine content because they are the linchpins of genuine
      understanding. Cognitive load optimisation increases retention by 40–60%.
    sources:
      - "Content_Detail_Mining_Module.md"
      - "Meyer, J. & Land, R. (2003)"
    tags:
      - extraction
      - threshold-concept
    added: "2026-03-09"
    underpins:
      - bp_010
      - bp_003

  - id: pr_008
    entry_type: principle
    title: "MECE Principle for Content Organisation"
    description: >
      All content clusters must be Mutually Exclusive (no concept appears in
      two clusters) and Collectively Exhaustive (every extracted concept belongs
      to a cluster). This principle from information architecture ensures
      logical, non-overlapping structure with no orphan content.
    sources:
      - "Content_Outline_Generator.md"
      - "Rosenfeld & Morville — Information Architecture"
    tags:
      - organisation
      - clustering
    added: "2026-03-09"
    underpins:
      - bp_011

  - id: pr_009
    entry_type: principle
    title: "Prerequisite Mapping Prevents Comprehension Failure"
    description: >
      Prerequisite mapping prevents 70% of learning comprehension issues.
      Content must be sequenced so that foundational knowledge appears before
      concepts that depend on it. Four dependency types exist: hard prerequisite,
      soft prerequisite, co-requisite, and no dependency.
    sources:
      - "Content_Mining_Module.md"
      - "content_map_corpus.yaml §1"
    tags:
      - prerequisite
      - sequencing
      - organisation
    added: "2026-03-09"
    underpins:
      - bp_012

  - id: pr_010
    entry_type: principle
    title: "Complexity Progression — Simple to Complex"
    description: >
      Cognitive Load Theory (Sweller, 1988) requires sequencing content from
      simple to complex. Within a Module, progress from lower to higher Bloom's
      levels. Within a Course, early Modules address Remember/Understand, middle
      Modules address Apply/Analyse, and late Modules address Evaluate/Create.
      Never introduce a higher-order task before its foundational knowledge.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "Sweller, J. (1988)"
    tags:
      - sequencing
      - cognitive-load
      - bloom
    added: "2026-03-09"
    underpins:
      - bp_013
      - bp_025

  - id: pr_011
    entry_type: principle
    title: "Cognitive Load Theory — Three Load Types"
    description: >
      Total cognitive load = intrinsic (material complexity) + extraneous
      (poor design) + germane (productive schema-building). The goal at every
      hierarchy level is to minimise extraneous load, manage intrinsic load
      through segmentation and scaffolding, and maximise germane load through
      practice, examples, and self-explanation.
    sources:
      - "Sweller, J. (1988)"
      - "content_map_corpus.yaml §3"
    tags:
      - cognitive-load
    added: "2026-03-09"
    underpins:
      - bp_039
      - bp_027

  - id: pr_012
    entry_type: principle
    title: "5-Phase Learning Cycle"
    description: >
      Every course follows a 5-phase cycle: Foundation (10–15%), Development
      (30–40%), Integration (25–30%), Consolidation (10–15%), Assessment
      (10–15%). This is the CoE's own framework, synthesised from Kolb's
      Experiential Learning (1984), Dick & Carey's ISD (2015), and Merrill's
      FPI (2002). It should NOT be confused with Kolb's 4-stage model directly.
      Foundation and Assessment phases are MANDATORY in every course.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - 5-phase-cycle
    added: "2026-03-09"
    underpins:
      - bp_017
      - bp_045

  - id: pr_013
    entry_type: principle
    title: "Bloom's Revised Taxonomy"
    description: >
      Six cognitive levels form the basis for objective writing, activity
      selection, and assessment alignment across the hierarchy: Remember →
      Understand → Apply → Analyse → Evaluate → Create. Each level has
      specific action verbs, activity types, and assessment formats.
    sources:
      - "Bloom, B. et al. (1956)"
      - "learning_objectives_framework.yaml"
    tags:
      - bloom
      - assessment
    added: "2026-03-09"
    underpins:
      - bp_019
      - bp_025
      - bp_042

  - id: pr_014
    entry_type: principle
    title: "Gagné's Nine Events of Instruction"
    description: >
      Nine instructional events map directly to the Strip/Card structure:
      (1) Gain attention → Hook; (2) Inform of objective → Hook/Pre-Training;
      (3) Stimulate recall → Pre-Training; (4) Present stimulus → Teach;
      (5) Provide guidance → Teach/Guided Practice; (6) Elicit performance →
      Guided Practice; (7) Provide feedback → Guided Practice/Independent Test;
      (8) Assess performance → Independent Test; (9) Enhance retention →
      Reflect & Transfer.
    sources:
      - "Gagné, R. (1985)"
      - "pedagogical_frameworks.yaml"
    tags:
      - gagne
      - strip
      - card
    added: "2026-03-09"
    underpins:
      - bp_032
      - bp_033
      - bp_034
      - bp_035
      - bp_036
      - bp_037

  - id: pr_015
    entry_type: principle
    title: "Merrill's First Principles of Instruction"
    description: >
      Five principles orbit an authentic problem: (1) Problem-Centred,
      (2) Activation, (3) Demonstration, (4) Application, (5) Integration.
      Integration is the ONLY principle generating long-term ROI and is
      almost universally skipped, causing 40–60% knowledge decay.
    sources:
      - "Merrill, M.D. (2002)"
      - "merrill_framework.yaml"
    tags:
      - merrill
    added: "2026-03-09"
    underpins:
      - bp_037

  - id: pr_016
    entry_type: principle
    title: "GGOO Alignment Traceability"
    description: >
      Every level of the hierarchy traces back to GGOO: Gap (performance
      problem) → Goal (business outcome, SMART+) → Objective (learner
      behaviour during course, ABCD formula) → Outcome (on-job behaviour
      change, Kirkpatrick L3–L4). This ensures no content exists without
      a clear business justification.
    sources:
      - "learning_design_corpus.yaml"
      - "learning_objectives_framework.yaml"
    tags:
      - ggoo
      - structuring
    added: "2026-03-09"
    underpins:
      - bp_047

  - id: pr_017
    entry_type: principle
    title: "Adult Learning Principles"
    description: >
      Knowles' (1984) andragogy principles apply throughout the hierarchy:
      self-direction (agency over pace/path), experience (connect to prior
      knowledge), relevance (immediate job connection for every content piece),
      problem-centred (realistic workplace challenges, not abstract theory),
      and motivation (learners must understand personal benefit — WIIFM).
    sources:
      - "Knowles, M. (1984)"
      - "content_map_corpus.yaml §8"
    tags:
      - adult-learning
    added: "2026-03-09"

  - id: pr_018
    entry_type: principle
    title: "Progressive Scaffolding Gradient"
    description: >
      Scaffolding decreases as learners progress through the 5-phase cycle,
      mapped to phases not fixed module numbers. Foundation = HIGH scaffolding
      (20–30% independence); Development = MEDIUM (40–60%); Integration = LOW
      (60–80%); Consolidation = MINIMAL (80–100%); Assessment = NONE (100%
      independence). Visual/audio cues fade on the same gradient.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - scaffolding
      - 5-phase-cycle
    added: "2026-03-09"
    underpins:
      - bp_045
      - bp_046

  - id: pr_019
    entry_type: principle
    title: "Mayer's 15 Multimedia Learning Principles"
    description: >
      Apply to all card-level content design. Organised in three groups:
      Reducing extraneous processing (Coherence, Signalling, Redundancy,
      Spatial Contiguity, Temporal Contiguity); Managing essential processing
      (Segmenting, Pre-training, Modality); Fostering generative processing
      (Multimedia, Personalisation, Voice, Image, Embodiment, Immersion,
      Generative Activity). The full 15-principle set from the CoE corpus.
    sources:
      - "Mayer, R. (2009)"
      - "mayer_principles.yaml"
    tags:
      - mayer-principles
      - card
    added: "2026-03-09"
    underpins:
      - bp_034
      - bp_038

  - id: pr_020
    entry_type: principle
    title: "Assessment Integration at Every Hierarchy Level"
    description: >
      Assessment is not an afterthought bolted on at the end. Each hierarchy
      level has its own assessment type: Course = summative (final module);
      Module = formative (end of module); Topic = knowledge check; Strip =
      Independent Test card; Card = embedded interaction. Formative assessment
      must appear at least every 20–30 minutes.
    sources:
      - "content_map_corpus.yaml §6"
      - "assessment_taxonomy.yaml"
    tags:
      - assessment
      - hierarchy
    added: "2026-03-09"
    underpins:
      - bp_042
      - bp_044

  - id: pr_021
    entry_type: principle
    title: "Cognitive Alignment Matrix"
    description: >
      Assessment format must match the Bloom's level being assessed:
      Remember/Understand → multiple choice, matching, fill-in-blank;
      Apply/Analyse → short answer, scenario response, case analysis;
      Evaluate/Create → performance task, portfolio, project. Misalignment
      produces invalid assessments.
    sources:
      - "content_map_corpus.yaml §6"
      - "learning_objectives_framework.yaml"
    tags:
      - assessment
      - bloom
    added: "2026-03-09"
    underpins:
      - bp_042

  - id: pr_022
    entry_type: principle
    title: "Multi-Stage Extraction Prevents Cognitive Overwhelm"
    description: >
      Content extraction must be staged (surface scan → concept extraction →
      relationship mapping → depth extraction → gap analysis) to prevent
      cognitive overwhelm. Sweller's CLT shows that staged processing produces
      higher quality output than attempting comprehensive extraction in one pass.
    sources:
      - "Content_Mining_Module.md"
      - "Content_Detail_Mining_Module.md"
      - "Sweller, J. (1988)"
    tags:
      - extraction
      - cognitive-load
    added: "2026-03-09"
    underpins:
      - bp_004

  - id: pr_023
    entry_type: principle
    title: "Source Attribution and Traceability"
    description: >
      Every piece of extracted content must trace back to its origin source
      document, page, and section. This enables verification, evidence-based
      design decisions, and allows subject matter experts to validate accuracy.
      No content should exist in the hierarchy without provenance.
    sources:
      - "Content_Outline_Generator.md"
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - quality-validation
    added: "2026-03-09"
    underpins:
      - bp_009

  - id: pr_024
    entry_type: principle
    title: "Kirkpatrick 4-Level Evaluation"
    description: >
      Evaluation spans four levels: L1 Reaction (satisfaction, during/after);
      L2 Learning (knowledge acquisition, end of course); L3 Behaviour (on-job
      application, 30–90 days post); L4 Results (business impact, 90+ days).
      Course-level assessment targets L2; post-course follow-up targets L3–L4.
    sources:
      - "Kirkpatrick, D. (2016)"
      - "learning_design_corpus.yaml"
    tags:
      - assessment
    added: "2026-03-09"
    underpins:
      - bp_043

  - id: pr_025
    entry_type: principle
    title: "Topic Disambiguation — Hierarchy Level vs Content Map Column"
    description: >
      The word 'topic' has two senses: (1) Topic as hierarchy Level 3 — a
      formally defined container with an ID, learning objective, and boundary;
      (2) 'Key Topics' as a content map column — informal labels describing
      what a module covers. During Phase 3, informal key topics are formalised
      into structural Topics with IDs and strip breakdowns.
    sources:
      - "Corpus/Research/course_structure_hierarchy_corpus_research.md §2.4"
    tags:
      - hierarchy
      - topic
      - naming-convention
    added: "2026-03-09"

  - id: pr_026
    entry_type: principle
    title: "Nuclearity — Core vs Supporting Content"
    description: >
      Rhetorical Structure Theory's nucleus/satellite distinction provides a
      principled framework for content prioritisation during extraction. A
      nucleus is the text span central to the author's communicative intent
      and capable of standing alone; a satellite is ancillary, supporting, or
      contextualising information. When mining source documents, identifying
      nuclei isolates the core instructional content while satellites provide
      examples, background, and elaboration. In multinuclear relations (lists,
      contrasts), multiple spans carry equal semantic weight. Crucially, only
      8.5–22% of these relationships are signalled by explicit markers
      ('because', 'however') — the majority must be inferred from semantic,
      syntactic, morphological, and graphical cues.
    sources:
      - "corpus/descriptive_RST_corpus.yaml — pr_002, pr_004"
      - "Advanced Computational Discourse Analysis: Operationalizing RST with LLMs"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    underpins:
      - bp_054
    notes: >
      Cross-domain application of RST nuclearity to pedagogical content mining.
      The nucleus/satellite distinction maps to the difference between core
      concepts (bp_002 type 1) and supporting material (types 3, 6, 7).

  # ═══════════════════════════════════════════════════════════════
  # BEST PRACTICES — PHASE 1: EXTRACTION (bp_001 – bp_010)
  # ═══════════════════════════════════════════════════════════════

  - id: bp_001
    entry_type: best_practice
    title: "Semantic Content Analysis Using Kintsch Methodology"
    description: >
      Apply Kintsch's (1998) semantic analysis: identify propositions (atomic
      meaning units), map semantic relationships (supports, contradicts,
      elaborates, exemplifies, prerequisites), assess semantic richness (concept
      density), and score each source on a multi-criterion framework.
    sources:
      - "Content_Mining_Module.md"
      - "Kintsch, W. (1998)"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    evidence: "Content_Mining_Module.md reports 94% accuracy in structure identification using this methodology."
    context: "Use whenever mining unstructured educational materials to identify core concepts and relationships."
    confidence: strong
    related_principles:
      - pr_006

  - id: bp_002
    entry_type: best_practice
    title: "9 Content Types for Extraction Categorisation"
    description: >
      Categorise all extracted content into 9 types: (1) Core Concepts,
      (2) Detailed Explanations, (3) Examples and Cases, (4) Threshold
      Concepts, (5) Procedures and Processes, (6) Evidence and Data,
      (7) Visual/Media References, (8) Assessment Material,
      (9) Misconceptions and Anti-Patterns.
    sources:
      - "Content_Detail_Mining_Module.md"
      - "content_map_corpus.yaml §0"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    evidence: "Content_Detail_Mining_Module.md achieves 92% extraction quality using this categorisation framework."
    context: "Apply during Stage 2 (concept extraction) of the multi-stage pipeline to ensure comprehensive coverage."
    confidence: strong
    related_principles:
      - pr_006
      - pr_007

  - id: bp_003
    entry_type: best_practice
    title: "8-Criterion Source Quality Assessment"
    description: >
      Rank every source document before extraction on 8 weighted criteria:
      Semantic Richness (15%), Threshold Concept Coverage (20%), Pedagogical
      Effectiveness (15%), Cognitive Load Appropriateness (15%), Structural
      Clarity (10%), Currency and Accuracy (10%), Evidence Quality (10%),
      Practical Applicability (5%). Score 0.0–1.0 per criterion. Sources >0.8
      = top-tier; 0.6–0.8 = secondary; <0.6 = remediation needed.
    sources:
      - "Content_Detail_Mining_Module.md"
    tags:
      - extraction
      - source-quality
    added: "2026-03-09"
    evidence: "Source ranking improves extraction efficiency and ensures high-quality materials are prioritised."
    context: "Apply before any extraction begins. Threshold Concept Coverage has the highest weight (20%) because transformative concepts drive the greatest learning impact."
    confidence: strong
    related_principles:
      - pr_007

  - id: bp_004
    entry_type: best_practice
    title: "5-Stage Extraction Pipeline"
    description: >
      Extract in 5 progressive stages: (1) Surface Scan — identify structure,
      headings, key terms, coverage breadth; (2) Concept Extraction — extract
      discrete concepts with initial categorisation; (3) Relationship Mapping —
      map dependencies, supports, relations, contradictions between concepts;
      (4) Depth Extraction — detailed treatment of high-priority and threshold
      concepts; (5) Gap Analysis — identify missing content, unexplained
      prerequisites, absent assessment material.
    sources:
      - "Content_Mining_Module.md"
      - "Content_Detail_Mining_Module.md"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    evidence: "Staged processing prevents cognitive overwhelm (Sweller, 1988) and achieves 92–94% extraction quality."
    context: "Use for any multi-document extraction task. Single-document tasks may compress stages 1–2."
    confidence: strong
    related_principles:
      - pr_022

  - id: bp_005
    entry_type: best_practice
    title: "Presentation Deck Extraction"
    description: >
      When mining presentation decks: use slide titles as topic indicators;
      extract speaker notes as the primary explanatory content; analyse visual
      layouts for concept relationships; look beyond bullet points to the
      narrative connecting slides. The real content is often in the speaker
      notes and delivery context, not on the slides themselves.
    sources:
      - "Content_Mining_Module.md"
      - "Content_Outline_Generator.md"
    tags:
      - extraction
      - asset-type
    added: "2026-03-09"
    evidence: "Content_Mining_Module.md identifies that surface formatting misleads; meaning lives in relationships."
    context: "Apply specifically to PowerPoint, Keynote, or Google Slides source materials."
    confidence: strong
    related_principles:
      - pr_006

  - id: bp_006
    entry_type: best_practice
    title: "Video and Transcript Extraction"
    description: >
      When mining video content: extract transcripts for conceptual content;
      identify visual segments for demonstrations; use timestamps to mark topic
      boundaries. For transcripts: extract key statements and claims; mine Q&A
      segments for common questions; use narrative flow as sequencing clues.
      Filter repetition, tangents, and informal language.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - asset-type
    added: "2026-03-09"
    evidence: "Video's linear format obscures hierarchy; transcript mining reveals topic boundaries not visible in playback."
    context: "Apply to video recordings, webinar captures, podcast episodes, and any spoken-word source materials."
    confidence: moderate

  - id: bp_007
    entry_type: best_practice
    title: "Document and PDF Extraction"
    description: >
      When mining documents/PDFs: use headings as hierarchy indicators;
      extract paragraphs as explanatory content; mine figures and tables as
      evidence. Distinguish core content from supplementary material. Documents
      may be overly detailed — focus on concepts, not verbatim reproduction.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - asset-type
    added: "2026-03-09"
    evidence: "Document extraction requires distinguishing core concepts from supplementary detail to prevent information overload."
    context: "Apply to Word documents, PDFs, technical manuals, policy documents, and research papers."
    confidence: strong

  - id: bp_008
    entry_type: best_practice
    title: "Job Aids and eLearning Extraction"
    description: >
      Job aids and infographics contain compressed, high-value content
      (procedures, quick references, summary frameworks) but assume prior
      knowledge and lack explanatory depth. SCORM/eLearning packages contain
      learning objectives, assessment questions, and interaction sequences but
      may require manual review due to locked formats.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - asset-type
    added: "2026-03-09"
    evidence: "Compressed formats are high-value for procedures but need supplementary sources for explanation."
    context: "Use job aids as secondary sources for gap-filling, not as primary extraction targets."
    confidence: moderate

  - id: bp_009
    entry_type: best_practice
    title: "Source Mapping for Traceability"
    description: >
      Map every extracted point back to its source location using a source map
      table: Topic | Source Document | Location (page/section/timestamp) |
      Confidence (High/Medium/Low). This enables verification by SMEs, supports
      evidence-based design decisions, and prevents ungrounded claims.
    sources:
      - "Content_Outline_Generator.md"
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - quality-validation
    added: "2026-03-09"
    evidence: "Source mapping prevents 'invented content' and enables SME validation of all extracted material."
    context: "Create the source map during extraction and maintain it through organisation and structuring phases."
    confidence: strong
    related_principles:
      - pr_023

  - id: bp_010
    entry_type: best_practice
    title: "Threshold Concept Identification and Prioritisation"
    description: >
      Identify threshold concepts using Meyer & Land's 5 criteria: transformative
      (changes how the learner sees the domain), irreversible (once understood,
      cannot be unlearned), integrative (connects previously unrelated ideas),
      troublesome (often counter-intuitive), bounded (marks disciplinary borders).
      Allocate 3× extraction attention to threshold concepts compared to routine
      content. Flag for enhanced scaffolding during structuring.
    sources:
      - "Content_Detail_Mining_Module.md"
      - "Meyer, J. & Land, R. (2003)"
    tags:
      - extraction
      - threshold-concept
    added: "2026-03-09"
    evidence: "Threshold concept identification accuracy target: 94% (Content_Detail_Mining_Module.md); these concepts cause the most learner difficulty and greatest transformation."
    context: "Apply during Stage 2–3 of the extraction pipeline. Threshold concepts should be prominently tagged and tracked through all subsequent phases."
    confidence: strong
    related_principles:
      - pr_007

  # ═══════════════════════════════════════════════════════════════
  # BEST PRACTICES — PHASE 2: ORGANISATION (bp_011 – bp_016)
  # ═══════════════════════════════════════════════════════════════

  - id: bp_011
    entry_type: best_practice
    title: "Semantic Clustering Process"
    description: >
      Cluster extracted concepts using 5 steps: (1) Identify natural groupings
      by shared parent idea, problem, or skill area; (2) Apply MECE — no
      concept in two clusters, every concept in one; (3) Name each cluster with
      a descriptive label signalling pedagogical purpose; (4) Identify orphan
      concepts — may indicate gaps, bridges, or irrelevant content;
      (5) Merge clusters with <2 concepts; split clusters with >7 concepts.
    sources:
      - "Content_Mining_Module.md"
      - "Content_Outline_Generator.md"
      - "Rosenfeld & Morville — Information Architecture"
    tags:
      - organisation
      - clustering
    added: "2026-03-09"
    evidence: "Information architecture research shows semantic clustering produces more learnable structures than source-based grouping."
    context: "Apply after extraction is complete. Cluster by conceptual similarity, NOT by source document origin."
    confidence: strong
    related_principles:
      - pr_008

  - id: bp_012
    entry_type: best_practice
    title: "Prerequisite Dependency Mapping"
    description: >
      Map dependencies using 5 steps: (1) For each concept, ask 'What must a
      learner already understand to grasp this?'; (2) Trace chains to identify
      foundational concepts (no prerequisites themselves); (3) Identify
      bottleneck concepts (required by many downstream concepts — need extra
      instructional attention); (4) Detect circular dependencies (indicate
      threshold concepts needing special scaffolding); (5) Map parallel tracks
      (concepts learnable in any order relative to each other).
    sources:
      - "Content_Mining_Module.md"
      - "Course_Gold_Structure_Module.md"
    tags:
      - organisation
      - prerequisite
      - sequencing
    added: "2026-03-09"
    evidence: "Prerequisite mapping prevents 70% of learning comprehension issues (Content_Mining_Module.md)."
    context: "Apply after semantic clustering. Dependency maps directly inform topic and module sequencing in Phase 3."
    confidence: strong
    related_principles:
      - pr_009

  - id: bp_013
    entry_type: best_practice
    title: "Bloom's-Aligned Complexity Sequencing"
    description: >
      Sequence content following Bloom's levels: within a Module, progress from
      lower to higher cognitive levels; within a Course, early Modules target
      Remember/Understand, middle Modules target Apply/Analyse, late Modules
      target Evaluate/Create. Cognitive load should increase gradually with no
      sudden jumps in complexity.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "learning_objectives_framework.yaml"
    tags:
      - organisation
      - sequencing
      - bloom
    added: "2026-03-09"
    evidence: "Bloom's taxonomy provides an empirically validated progression; Sweller's CLT shows gradual increase prevents overload."
    context: "Apply when ordering topics within modules and when ordering modules within a course."
    confidence: strong
    related_principles:
      - pr_010
      - pr_013

  - id: bp_014
    entry_type: best_practice
    title: "Deduplication and Conflict Resolution"
    description: >
      Apply 4 rules: (1) Same concept in multiple sources → merge richest
      explanations and examples into a single canonical entry; (2) Sources
      contradict → flag conflict, include both perspectives with authority note;
      (3) Concept covered at different depths → keep deepest treatment,
      reference lighter versions as supplementary; (4) Preserve source
      attribution throughout — every content piece traces to its origin.
    sources:
      - "Content_Outline_Generator.md"
      - "Content_Mining_Module.md"
    tags:
      - organisation
      - content-mining
    added: "2026-03-09"
    evidence: "Deduplication prevents redundant content that wastes learning time; conflict resolution ensures accuracy."
    context: "Apply after clustering, before sequencing. Use the source map (bp_009) to trace and resolve conflicts."
    confidence: strong

  - id: bp_015
    entry_type: best_practice
    title: "6-Type Gap Identification"
    description: >
      After clustering and sequencing, check for 6 gap types: (1) Prerequisite
      gaps — required knowledge not covered; (2) Bloom's level gaps — jumps
      without adequate intermediate content; (3) Assessment gaps — topics
      without corresponding assessment material; (4) Example gaps — abstract
      concepts without concrete illustrations; (5) Transfer gaps — skills
      without workplace application guidance; (6) Audience gaps — content
      assuming knowledge the target audience may lack.
    sources:
      - "Content_Detail_Mining_Module.md"
      - "content_map_corpus.yaml §9"
    tags:
      - organisation
      - gap-analysis
    added: "2026-03-09"
    evidence: "Systematic gap identification before structuring prevents costly rework and incomplete learning pathways."
    context: "Apply as the final step of Phase 2, before beginning Phase 3 structuring."
    confidence: strong

  - id: bp_016
    entry_type: best_practice
    title: "Bottleneck Concept Identification"
    description: >
      During prerequisite mapping, identify bottleneck concepts — those required
      by many downstream concepts. These need extra instructional attention
      because failure to learn a bottleneck concept cascades into failure across
      all dependent concepts. Flag bottlenecks for enhanced scaffolding, multiple
      examples, and formative assessment checkpoints.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - organisation
      - prerequisite
      - threshold-concept
    added: "2026-03-09"
    evidence: "Bottleneck concepts create single points of failure in the learning path; addressing them proactively prevents cascading comprehension issues."
    context: "Apply during prerequisite dependency mapping (bp_012). Bottlenecks may or may not be threshold concepts — both need attention but for different reasons."
    confidence: moderate

  # ═══════════════════════════════════════════════════════════════
  # BEST PRACTICES — PHASE 3: STRUCTURING (bp_017 – bp_053)
  # ═══════════════════════════════════════════════════════════════

  # --- Course Level ---

  - id: bp_017
    entry_type: best_practice
    title: "5-Phase Course Architecture"
    description: >
      Structure every course using the 5-phase learning cycle: Foundation
      (10–15%), Development (30–40%), Integration (25–30%), Consolidation
      (10–15%), Assessment (10–15%). Foundation (introductory module) and
      Assessment (summative module) are MANDATORY. Percentages are guidelines —
      short courses may compress, large programmes may expand.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - 5-phase-cycle
    added: "2026-03-09"
    evidence: "The 5-phase cycle synthesises Kolb, Dick & Carey, and Merrill into a proven course architecture achieving 96% structure quality."
    context: "Apply at the highest level when arranging modules into a course. Map each module to one of the 5 phases."
    confidence: strong
    related_principles:
      - pr_012

  - id: bp_018
    entry_type: best_practice
    title: "Module Count by Learning Goals"
    description: >
      Determine module count by counting distinct learning goals, not by
      applying arbitrary targets. Each module addresses one significant goal.
      A module must be substantial enough to contain at least one Topic with
      at least one Strip, but not so large that it spans multiple unrelated
      goals. There is no upper or lower limit beyond this heuristic.
    sources:
      - "content_map_corpus.yaml §1"
      - "Course_Gold_Structure_Module.md"
    tags:
      - structuring
      - module
    added: "2026-03-09"
    evidence: "Goal-driven module count produces better-scoped modules than duration-based count targets."
    context: "Apply after concept clusters from Phase 2 have been mapped to learning goals."
    confidence: strong
    related_principles:
      - pr_003

  - id: bp_019
    entry_type: best_practice
    title: "Module Archetype Selection via Bloom's Alignment"
    description: >
      Select module archetype by Bloom's level of its objectives:
      Remember/Understand → Core Concept module (foundational understanding);
      Apply/Analyse → Application Practice module (theory-to-practice bridge);
      Evaluate/Create → Integration Challenge module (multi-concept competency).
      Plus two mandatory archetypes: Introduction (always Module 1) and
      Summative Assessment (always final module).
    sources:
      - "Course_Gold_Structure_Module.md"
      - "content_map_corpus.yaml §1"
    tags:
      - structuring
      - module
      - bloom
    added: "2026-03-09"
    evidence: "Archetype selection aligned to Bloom's ensures appropriate cognitive demand at each course stage."
    context: "Apply when assigning module roles during 5-phase architecture design."
    confidence: strong
    related_principles:
      - pr_003
      - pr_013

  - id: bp_020
    entry_type: best_practice
    title: "Module 1 Structure — Always Introductory"
    description: >
      Module 1 must always cover: (1) What the course is about (scope and
      objectives); (2) Why it matters (learner relevance, WIIFM);
      (3) Scope boundaries (what is and isn't covered); (4) Prerequisites
      (what learners need before starting); (5) Links to related courses;
      (6) Optional diagnostic assessment to gauge starting knowledge.
    sources:
      - "Content Map - Instructions v3.md"
      - "content_map_corpus.yaml"
    tags:
      - structuring
      - module
    added: "2026-03-09"
    evidence: "Content Map Instructions v3 mandates this structure for all courses; it sets context and motivation."
    context: "Apply to every course regardless of size. Even a 30-minute micro-course needs a brief introduction."
    confidence: strong
    related_principles:
      - pr_012

  - id: bp_021
    entry_type: best_practice
    title: "Final Module — Always Summative Assessment"
    description: >
      The final module must always include summative assessment to validate
      overall competency and provide certification or next-step guidance.
      This module corresponds to the Assessment phase (10–15%) of the
      5-phase learning cycle and is mandatory regardless of course size.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - module
      - assessment
    added: "2026-03-09"
    evidence: "Omitting summative assessment removes the validation mechanism that confirms learning has occurred."
    context: "Apply to every course. The assessment may be a short quiz for micro-courses or a multi-part project for extensive programmes."
    confidence: strong
    related_principles:
      - pr_012
      - pr_020

  # --- Module Level ---

  - id: bp_022
    entry_type: best_practice
    title: "7-Column Content Map Format"
    description: >
      Document each module using 7 columns: Module (number and title),
      Duration (estimated time), Key Topics (subjects covered), Learning
      Objectives (SMART, Bloom's-aligned), Activities/Assessments (learning
      activities and formative assessment), Learning Outcomes (observable
      post-learning behaviours), Instructional Alignment (pedagogical
      framework justification).
    sources:
      - "Content Map - Instructions v3.md"
      - "content_map_corpus.yaml §7"
    tags:
      - structuring
      - module
    added: "2026-03-09"
