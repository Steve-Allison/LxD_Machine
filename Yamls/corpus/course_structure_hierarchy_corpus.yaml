    confidence: moderate

  # --- Naming Convention ---

  - id: bp_050
    entry_type: best_practice
    title: "Dot-Notation ID System"
    description: >
      Use flexible dot-notation for traceability. Without subtopics (3-part):
      Module.Topic.Strip (e.g. 3.1.1); cards numbered 3.1.1-C1 through -C6.
      With subtopics (4-part): Module.Topic.Subtopic.Strip (e.g. 3.1.2.1);
      cards 3.1.2.1-C1 through -C6. Disambiguation: 3-part always means
      M.T.S; 4-part always means M.T.ST.S.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "Corpus/Research/course_structure_hierarchy_corpus_research.md §2.3"
