  # --- GGOO Objective Formula ---

  - id: bp_053
    entry_type: best_practice
    title: "ABCD Formula for Learning Objectives"
    description: >
      Write objectives using the ABCD formula: Audience (who is the learner),
      Behaviour (observable measurable verb from Bloom's), Condition (under
      what circumstances), Degree (to what standard). Every strip, topic, and
      module must have objectives written to this formula with Bloom's-aligned
      verbs. Module objectives ladder up to course objectives.
    sources:
      - "learning_design_corpus.yaml"
      - "learning_objectives_framework.yaml"
    tags:
      - ggoo
      - structuring
    added: "2026-03-09"
    evidence: "ABCD formula ensures objectives are measurable, assessable, and aligned to business outcomes."
    context: "Write objectives for every module, topic, and strip during the structuring phase."
    confidence: strong
    related_principles:
      - pr_016

  # --- RST-Informed Practices ---

  - id: bp_054
    entry_type: best_practice
    title: "Nuclearity-Based Content Prioritisation During Extraction"
    description: >
      When mining source documents, apply RST nuclearity analysis to distinguish
      core instructional content (nuclei) from supporting material (satellites).
      Nuclear content — the spans that carry the author's primary communicative
      intent and can stand alone — maps to Core Concepts and Threshold Concepts
      in extraction. Satellite content — background, elaboration, examples,
      attribution — maps to supporting types (Detailed Explanations, Examples,
      Evidence). Use this distinction to: (1) prioritise nuclear content for
      deeper extraction; (2) identify which satellite material enriches
      understanding vs which is dispensable; (3) detect implicit relationships
      by looking beyond explicit markers (only 8.5–22% of discourse relations
      are signalled explicitly) to semantic, syntactic, and structural cues.
    sources:
      - "corpus/descriptive_RST_corpus.yaml — pr_002, pr_004, bp_006"
      - "Advanced Computational Discourse Analysis: Operationalizing RST with LLMs"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    evidence: "RST nuclearity-based extractive summarisation preserves core communicative intent; RST-LoRA surpasses prior state-of-the-art for structural summarisation (descriptive_RST_corpus bp_006)."
    context: "Apply during Stage 2–3 of the extraction pipeline when deciding what to extract deeply vs lightly. Particularly valuable for long, complex source documents where not everything can receive equal attention."
    confidence: moderate
    related_principles:
      - pr_026
      - pr_006

  - id: bp_055
    entry_type: best_practice
    title: "Planning-Before-Realization Architecture"
    description: >
      The full pipeline (Extract → Organise → Structure) embodies the
      Constructive RST principle that structural planning must strictly precede
      content realization. Just as Constructive RST separates blueprint
      generation from surface text production — because auto-regressive models
      suffer logical drift without a global planner — course design separates
      structural architecture (the hierarchy, the 5-phase cycle, the strip
      patterns) from content production (writing the actual cards and assets).
      The course structure IS the rhetorical blueprint; content production is
      the realization phase. Collapsing planning and realization into a single
      step produces incoherent courses just as it produces incoherent text.
    sources:
      - "corpus/constructive_RST_corpus.yaml — pr_001, pr_002, pr_003"
      - "Advanced Computational Discourse Analysis: Operationalizing RST with LLMs"
    tags:
      - structuring
      - quality-validation
    added: "2026-03-09"
    evidence: "Constructive RST research shows that without explicit structural planning, generative output degrades proportionally with length (constructive_RST_corpus pr_003). The same principle applies to course design — larger courses without upfront structural architecture become incoherent."
    context: "Apply as an architectural principle governing the entire pipeline. Never begin content production (card writing, asset creation) until the full hierarchical structure has been validated."
    confidence: strong
    related_principles:
      - pr_012
      - pr_001

  # --- Spaced Repetition & Retrieval Practice ---

  - id: bp_056
    entry_type: best_practice
    title: "Spaced Repetition and Retrieval Practice Sequencing"
    description: >
      Deliberately revisit previously learned concepts at expanding intervals
      across the course structure. Ebbinghaus's forgetting curve shows that
      without retrieval practice, learners forget 60–70% of new information
      within 48 hours. Counter this by: (1) embedding retrieval cues in later
      strips that reference earlier concepts (e.g. a Pre-Training card that
      asks 'recall what you learned about X in Module 2'); (2) designing
      Independent Test cards that require integration of current AND prior
      knowledge; (3) using the Integration phase (25–30%) explicitly for
      cross-module retrieval and synthesis; (4) planning deliberate redundancy
      in cross-strip coherence — not accidental repetition, but intentional
      spacing. Optimal spacing follows an expanding schedule: first retrieval
      within 24 hours, then 3 days, then 7 days, then 21 days. Map these
      intervals to strip/topic/module positions rather than calendar time,
      since learners progress at different rates.
    sources:
      - "Ebbinghaus, H. (1885) — Forgetting Curve"
      - "Cepeda, N.J. et al. (2006) — Distributed Practice in Verbal Recall Tasks"
      - "Roediger, H.L. & Butler, A.C. (2011) — The Critical Role of Retrieval Practice"
      - "content_map_corpus.yaml §3, §6"
    tags:
      - sequencing
      - assessment
      - cognitive-load
      - scaffolding
    added: "2026-03-09"
    evidence: "Spaced retrieval practice produces 150–200% better long-term retention than massed practice (Cepeda et al., 2006). Testing effect research shows retrieval practice is more effective than re-studying (Roediger & Karpicke, 2006)."
    context: "Apply during Phase 3 structuring when sequencing strips and topics. Plan retrieval touchpoints at the topic, module, and course level. Particularly important for threshold concepts and bottleneck concepts identified during extraction."
    confidence: strong
    related_principles:
      - pr_009
      - pr_010
      - pr_020

  # ═══════════════════════════════════════════════════════════════
  # ANTI-PATTERNS (ap_001 – ap_015)
  # Common mistakes to avoid
  # ═══════════════════════════════════════════════════════════════

  # --- Extraction Anti-Patterns ---

  - id: ap_001
    entry_type: anti_pattern
    title: "Format-Driven Mining"
    description: >
      Relying on headings, bullet points, and visual layout instead of semantic
      analysis to determine content structure. Surface formatting often misleads;
      meaning lives in conceptual relationships, not document layout.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - extraction
    added: "2026-03-09"
    consequences: "Produces structures that mirror document formatting rather than learning logic, resulting in incoherent course flow."
    instead: "Apply semantic analysis (bp_001) to identify relationships and meaning. Use Kintsch methodology to mine propositions and semantic connections."
    violates:
      - pr_006
    severity: critical

  - id: ap_002
    entry_type: anti_pattern
    title: "Source Bias"
    description: >
      Favouring one source document because it is well-structured while missing
      important content from less polished sources. Quality of formatting does
      not equal quality of content.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - extraction
      - source-quality
    added: "2026-03-09"
    consequences: "Incomplete content extraction; high-value material in poorly formatted sources is lost."
    instead: "Apply the 8-criterion source quality assessment (bp_003) to rank sources objectively. Extract from all sources scoring >0.6."
    severity: moderate

  - id: ap_003
    entry_type: anti_pattern
    title: "Threshold Concept Neglect"
    description: >
      Treating transformative threshold concepts the same as routine content
      during extraction. Threshold concepts are the linchpins of genuine
      understanding and require 3× more extraction attention.
    sources:
      - "Content_Detail_Mining_Module.md"
      - "Meyer, J. & Land, R. (2003)"
    tags:
      - extraction
      - threshold-concept
    added: "2026-03-09"
    consequences: "Threshold concepts are under-documented, leading to inadequate scaffolding and learner struggles with transformative ideas."
    instead: "Identify threshold concepts using Meyer & Land's 5 criteria (bp_010) and allocate 3× extraction attention."
    violates:
      - pr_007
    severity: critical

  - id: ap_004
    entry_type: anti_pattern
    title: "Shallow Extraction"
    description: >
      Pulling definitions without examples, evidence, context, or misconceptions.
      Definitions alone do not provide enough material for effective instruction.
    sources:
      - "Content_Detail_Mining_Module.md"
    tags:
      - extraction
      - content-mining
    added: "2026-03-09"
    consequences: "Insufficient material for card design; teach cards lack examples, practice cards lack scenarios, and assessment lacks context."
    instead: "Use the 9 content types (bp_002) to ensure each concept has definitions, explanations, examples, evidence, and misconceptions extracted."
    severity: moderate

  # --- Organisation Anti-Patterns ---

  - id: ap_005
    entry_type: anti_pattern
    title: "Source-Driven Grouping"
    description: >
      Organising content by which document it came from rather than by conceptual
      relationships. This produces a structure that mirrors the source library,
      not the learning logic.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - organisation
      - clustering
    added: "2026-03-09"
    consequences: "Course structure mirrors document organisation rather than learning progression; related concepts are separated across modules."
    instead: "Cluster by semantic similarity (bp_011). Group concepts by shared ideas, problems, and skill areas regardless of source."
    violates:
      - pr_008
    severity: critical

  - id: ap_006
    entry_type: anti_pattern
    title: "Topic Sprawl"
    description: >
      Creating too many fine-grained clusters that fragment the learning
      experience. Over-subdivision produces topics too small to support a
      meaningful strip.
    sources:
      - "Content_Mining_Module.md"
    tags:
      - organisation
      - clustering
    added: "2026-03-09"
    consequences: "Fragmented learning experience; learners cannot build coherent mental models from tiny disconnected pieces."
    instead: "Merge clusters with <2 concepts; ensure each cluster is substantial enough for at least one strip (bp_011)."
    severity: moderate

  - id: ap_007
    entry_type: anti_pattern
    title: "Missing Prerequisites"
    description: >
      Sequencing advanced concepts before their foundational knowledge is covered.
      Learners encounter content they cannot understand because prerequisites
      were not mapped or were ignored.
    sources:
      - "Content_Mining_Module.md"
      - "Course_Gold_Structure_Module.md"
    tags:
      - organisation
      - prerequisite
    added: "2026-03-09"
    consequences: "Learner confusion; prerequisite gaps cause 70% of comprehension failures."
    instead: "Map all prerequisite dependencies (bp_012) before sequencing. Always place foundational concepts before dependent ones."
    violates:
      - pr_009
    severity: critical

  - id: ap_008
    entry_type: anti_pattern
    title: "MECE Violation"
    description: >
      Allowing concepts to appear in multiple clusters (overlapping) or leaving
      concepts unassigned to any cluster (gaps). Both violations produce
      ambiguous, incomplete structures.
    sources:
      - "Content_Outline_Generator.md"
    tags:
      - organisation
      - clustering
    added: "2026-03-09"
    consequences: "Overlap = redundant content across modules; gaps = orphan content that learners never encounter."
    instead: "Enforce MECE (bp_011): every concept in exactly one cluster, every concept in some cluster."
    violates:
      - pr_008
    severity: moderate

  # --- Structuring Anti-Patterns ---

  - id: ap_009
    entry_type: anti_pattern
    title: "Flat Structure"
    description: >
      Dumping all content into modules without topic, strip, and card
      subdivision. Produces large, undifferentiated content blocks with no
      pedagogical sequencing at the instructional level.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - hierarchy
    added: "2026-03-09"
    consequences: "Content lacks pedagogical structure; no clear learning objectives per unit; cognitive load is unmanaged."
    instead: "Apply the full 6-level hierarchy (pr_001): subdivide into topics, strips, and cards with clear objectives at each level."
    violates:
      - pr_001
    severity: critical

  - id: ap_010
    entry_type: anti_pattern
    title: "Phase Imbalance"
    description: >
      Overweighting the Development phase (all teaching, no practice) or skipping
      Consolidation entirely. Both distort the 5-phase learning cycle and
      compromise learning effectiveness.
    sources:
      - "Course_Gold_Structure_Module.md"
    tags:
      - structuring
      - 5-phase-cycle
    added: "2026-03-09"
    consequences: "Learners receive information without practice (Development-heavy) or without consolidation, reducing retention and transfer."
    instead: "Follow the 5-phase percentages (bp_017): Foundation 10–15%, Development 30–40%, Integration 25–30%, Consolidation 10–15%, Assessment 10–15%."
    violates:
      - pr_012
    severity: critical

  - id: ap_011
    entry_type: anti_pattern
    title: "Objective Inflation"
    description: >
      Assigning multiple learning objectives to a single strip. Each strip
      must target exactly ONE measurable objective. Multi-objective strips
      are unfocused and impossible to assess cleanly.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - structuring
      - strip
    added: "2026-03-09"
    consequences: "Strips become unfocused; assessment cannot cleanly validate a single skill; learners are confused about what they should learn."
    instead: "Enforce one-strip-one-objective (pr_004). If a strip needs multiple objectives, split it into multiple strips."
    violates:
      - pr_004
    severity: critical

  - id: ap_012
    entry_type: anti_pattern
    title: "Assessment Afterthought"
    description: >
      Adding assessment only at the end of the course rather than integrating
      it throughout the hierarchy at every level. Delays detection of
      misunderstandings until it is too late to correct them.
    sources:
      - "content_map_corpus.yaml §6"
    tags:
      - assessment
      - structuring
    added: "2026-03-09"
    consequences: "Learner misunderstandings compound over time; gaps are only discovered at the final assessment when remediation is costly."
    instead: "Integrate assessment at every hierarchy level (bp_042): embedded in cards, test in strips, knowledge checks in topics, formative in modules, summative in course."
    violates:
      - pr_020
    severity: critical

  - id: ap_013
    entry_type: anti_pattern
    title: "Cognitive Load Cliff"
    description: >
      Jumping from simple to very complex content without gradual progression.
      Sudden spikes in cognitive demand overwhelm learners and cause disengagement.
    sources:
      - "Course_Gold_Structure_Module.md"
      - "Sweller, J. (1988)"
    tags:
      - structuring
      - cognitive-load
      - sequencing
    added: "2026-03-09"
    consequences: "Learner overwhelm, disengagement, and dropout; schema construction fails when load exceeds capacity."
    instead: "Follow complexity progression (pr_010): sequence from simple to complex with gradual Bloom's level increases."
    violates:
      - pr_010
      - pr_011
    severity: critical

  - id: ap_014
    entry_type: anti_pattern
    title: "Integration Neglect"
    description: >
      Skipping the Reflect & Transfer card in strip design. This omits
      Merrill's Integration principle — the ONLY FPI principle generating
      long-term ROI — and causes 40–60% knowledge decay.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
      - "merrill_framework.yaml"
    tags:
      - card
      - merrill
      - strip
    added: "2026-03-09"
    consequences: "40–60% knowledge decay; learners cannot transfer skills to the workplace; long-term ROI is destroyed."
    instead: "Always include the Reflect & Transfer card (bp_037), even in Micro-Strips where it can be merged with Test."
    violates:
      - pr_005
      - pr_015
    severity: critical

  - id: ap_015
    entry_type: anti_pattern
    title: "One-Size-Fits-All Strips"
    description: >
      Using the Full Strip pattern (5–6 cards, 15–20 min) for every strip
      regardless of complexity and criticality. Over-investing in simple content
      wastes time; under-investing in complex content shortchanges learning.
    sources:
      - "Essentials_Course_Gold_Structure_AI_Course_Playbook.md"
    tags:
      - strip
      - structuring
    added: "2026-03-09"
    consequences: "Inefficient use of learning time; simple content is over-taught while complex content may still be under-served."
    instead: "Use the Intelligent Strip Planning Matrix (bp_027) to select Micro, Standard, or Full pattern based on scored complexity and criticality."
    severity: moderate

