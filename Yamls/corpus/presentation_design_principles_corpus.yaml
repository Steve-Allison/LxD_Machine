- id: bp_035
  entry_type: best_practice
  title: Slides Are Frames, Not Posters
  description: 'Treat slides as **frames in a film**, not self-contained posters. A concept may need 3–5 frames to unpack
    (context → data → insight → implication). Two modes: **Explanation mode** (body): one cognitive step per frame, use as
    many slides as the concept needs — progressive builds, reveals, and transitions are the primary storytelling mechanism.
    **Overview mode** (BLUF, summary, dashboard, closing): aggregate multiple concepts for orientation/recall. In both modes:
    **one focal point per visible unit.** Slide count is not a quality metric — narrative flow is. Platform scoping: fixed-frame
    (PPT/Keynote) = per slide; card-based (Gamma) = per card.'
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
