entries:
- id: pr_001
  entry_type: principle
  title: Cognitive Load Model
  description: 'Total cognitive load = intrinsic (material complexity) + extraneous (poor design) + germane (productive thinking).
    Goal: minimise extraneous, manage intrinsic, maximise germane.'
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Learning_Framework/01_Core_Theory/Visual_Design_for_Learning.md
  tags:
  - cognitive-load
  added: '2026-03-09'
  underpins:
  - bp_036
  - bp_037
  - bp_038
  - bp_138
- id: pr_002
  entry_type: principle
  title: Working Memory Limit (Cowan/Miller)
  description: 'Working memory holds 3–5 chunks (Cowan, 2001). Operational thresholds: **≤5 ideal** (Cowan''s limit — safest),
    **6–7 acceptable** (Miller''s range — experienced audiences), **8–9 warning** (overload risk — simplify or chunk), **10+
    error** (guaranteed overload — split slide).'
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Guides/02-slide-design/slide-design-best-practices.md
  tags:
  - cognitive-load
  added: '2026-03-09'
  underpins:
  - bp_036
  - bp_098
  - bp_171
- id: pr_003
  entry_type: principle
  title: Dual Coding Theory
  description: Combining text + visuals creates two retrieval pathways → 65% better recall (Mayer & Anderson, 1991), effect
    size 0.89.
  sources:
  - Learning_Framework/01_Core_Theory/Visual_Design_for_Learning.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_078
- id: pr_004
  entry_type: principle
  title: Picture Superiority Effect
  description: Pictures remembered 6× better than words alone (Standing, 1973), but ONLY when meaningful and relevant — never
    decorative.
  sources:
  - Learning_Framework/01_Core_Theory/Visual_Design_for_Learning.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_078
  - bp_168
- id: pr_005
  entry_type: principle
  title: Split-Attention Effect
  description: Separating related information (e.g. chart on one slide, legend on another) forces mental integration and wastes
    cognitive resources.
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_092
  - bp_093
  - bp_136
- id: pr_006
  entry_type: principle
  title: Redundancy Effect
  description: Presenting identical information in multiple modalities simultaneously (reading text aloud while it's on screen)
    increases extraneous load.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_135
- id: pr_007
  entry_type: principle
  title: Coherence Principle
  description: Remove non-essential words, pictures, and sounds. Removing extraneous visuals improves learning by 73% (Harp
    & Mayer, 1998).
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Learning_Framework/01_Core_Theory/Visual_Design_for_Learning.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_038
  - bp_134
- id: pr_008
  entry_type: principle
  title: Signalling Principle
  description: Add cues (arrows, highlights, colour, size) that direct attention to what matters most. One clear focal point
    per slide.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_040
  - bp_072
  - bp_137
- id: pr_009
  entry_type: principle
  title: Redundancy Principle
  description: Don't duplicate narration with on-screen text. Slides carry visual anchors; spoken word carries detail.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
- id: pr_010
  entry_type: principle
  title: Spatial Contiguity Principle
  description: Place related text NEAR the related visual — 68% better transfer (Mayer, 1989). Labels go ON the diagram, not
    in separate legends.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  - Learning_Framework/01_Core_Theory/Visual_Design_for_Learning.md
  tags:
  - gestalt
  added: '2026-03-09'
  underpins:
  - bp_092
  - bp_093
  - bp_115
- id: pr_011
  entry_type: principle
  title: Temporal Contiguity Principle
  description: Present corresponding words and pictures simultaneously, not successively. Sync animation timing with narration.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - gestalt
  added: '2026-03-09'
- id: pr_012
  entry_type: principle
  title: Segmenting Principle
  description: Present complex information in small, learner-paced steps rather than all-at-once. Progressive disclosure in
    decks.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
  underpins:
  - bp_039
  - bp_035
- id: pr_013
  entry_type: principle
  title: Pre-Training Principle
  description: Define key terms, parts, and concepts before presenting complex explanations. Front-load vocabulary.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
- id: pr_014
  entry_type: principle
  title: Modality Principle
  description: Graphics + narration often beats graphics + on-screen text (when spoken delivery exists).
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
- id: pr_015
  entry_type: principle
  title: Personalisation Principle
  description: Conversational tone increases engagement and learning. Use "you" language where appropriate.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
- id: pr_016
  entry_type: principle
  title: Voice Principle
  description: Human voice preferred. Visuals should clarify, not decorate.
  sources:
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - mayer-principles
  added: '2026-03-09'
- id: pr_017
  entry_type: principle
  title: Law of Proximity
  description: Elements close together are perceived as related. Group related content; increase space between unrelated sections.
  sources:
  - Guides/03-visual-design/infographic-design-methodology.md
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - gestalt
  added: '2026-03-09'
  underpins:
  - bp_070
  - bp_115
- id: pr_018
  entry_type: principle
  title: Law of Similarity
  description: Consistent icons, colours, and shapes signal related function. Inconsistency implies difference.
  sources:
  - Guides/03-visual-design/infographic-design-methodology.md
  tags:
  - gestalt
  added: '2026-03-09'
- id: pr_019
  entry_type: principle
  title: Law of Continuity
  description: The eye follows lines, arrows, and sequential positioning. Use to guide reading path through slides.
  sources:
  - Guides/03-visual-design/infographic-design-methodology.md
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - gestalt
  added: '2026-03-09'
- id: pr_020
  entry_type: principle
  title: Law of Closure
  description: Partial shapes suggest completeness — the brain fills gaps. Can use for implied grouping.
  sources:
  - Guides/03-visual-design/infographic-design-methodology.md
  tags:
  - layout
  - visual-hierarchy
  added: '2026-03-09'
- id: pr_021
  entry_type: principle
  title: Law of Figure-Ground
  description: Clear distinction between content (figure) and background (ground) is essential.
  sources:
  - Guides/03-visual-design/infographic-design-methodology.md
  tags:
  - layout
  - visual-hierarchy
  added: '2026-03-09'
- id: pr_022
  entry_type: principle
  title: Law of Common Region
  description: Elements within a shared closed boundary are perceived as a group. Overrides weaker Law of Proximity. Parent
    items become containers, children become content within.
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - layout
  - visual-hierarchy
  added: '2026-03-09'
- id: pr_023
  entry_type: principle
  title: Law of Prägnanz (Simplicity)
  description: The human eye interprets complex images in the simplest form possible. Reduce visual complexity to canonical
    form.
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - layout
  - visual-hierarchy
  added: '2026-03-09'
- id: pr_024
  entry_type: principle
  title: Law of Isomorphic Correspondence
  description: Visual relationships are interpreted as analogous to conceptual relationships. Same-size objects = equal importance;
    higher position = superior/prior. Visual hierarchy MUST match semantic hierarchy.
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - layout
  - visual-hierarchy
  added: '2026-03-09'
- id: pr_025
  entry_type: principle
  title: CRAP Framework
  description: 'All visual design evaluated against four principles: Contrast (attention), Repetition (consistency), Alignment
    (structure), Proximity (grouping).'
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - layout
  - consistency
  added: '2026-03-09'
  underpins:
  - bp_112
  - bp_113
  - bp_114
  - bp_115
- id: pr_026
  entry_type: principle
  title: Data-Ink Ratio (Tufte)
  description: Maximise the proportion of ink devoted to actual data vs. decoration. Data-Ink Ratio = Data-Ink / Total Ink;
    goal approaches 1.0.
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - data-visualisation
  added: '2026-03-09'
  underpins:
  - bp_086
  - bp_087
  - bp_088
  - bp_089
  - bp_090
  - bp_091
- id: pr_027
  entry_type: principle
  title: Graphical Excellence (Tufte)
  description: Gives the viewer the greatest number of ideas in the shortest time with the least ink in the smallest space.
    Clarity is the goal, not simplicity.
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - narrative-structure
  added: '2026-03-09'
- id: pr_028
  entry_type: principle
  title: MECE Principle
  description: All content must be Mutually Exclusive and Collectively Exhaustive — no overlaps, no gaps. Applies to arguments,
    sections, and categories.
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  - Guides/03-visual-design/cognitive-load-principles.md
  tags:
  - cognitive-load
  added: '2026-03-09'
  underpins:
  - bp_005
  - bp_145
  - bp_160
- id: pr_029
  entry_type: principle
  title: Memory & Attention Principle
  description: People remember beginnings, endings, and groups of three. Opening and closing slides receive disproportionate
    attention and retention.
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - cognitive-load
  added: '2026-03-09'
  underpins:
  - bp_016
  - bp_017
- id: pr_030
  entry_type: principle
  title: Transformation Principle
  description: 'Every deck must answer: "Transform [audience] from [current belief/behaviour] to [desired belief/behaviour]
    so that [business outcome]."'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  added: '2026-03-09'
  underpins:
  - bp_003
- id: bp_001
  entry_type: best_practice
  title: Four-Question Diagnostic
  description: 'Before any design: (1) Who is the audience? (2) What is the objective/CTA? (3) What is the context (live/leave-behind/both)?
    (4) What is the "one thing" to remember?'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_002
  entry_type: best_practice
  title: Deck Type Decision First
  description: Determine PRIMARY delivery mode BEFORE designing. "Presentation" (minimal text, spoken narrative) vs. "Deck-ument"
    (self-contained, action titles). Never mix.
  sources:
  - Guides/02-slide-design/presentation-vs-deck-ument-decision-guide.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_003
  entry_type: best_practice
  title: Transformation Statement
  description: 'Every deck MUST have: "Transform [audience] from [current state] to [desired state] so that [outcome]." Must
    be specific, measurable, audience-centred, action-oriented.'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
  related_principles:
  - pr_030
- id: bp_004
  entry_type: best_practice
  title: WIIFM Hook
  description: 'Answer the audience''s immediate question: "Why should I care?" within the opening.'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_005
  entry_type: best_practice
  title: Vertical Flow Test
  description: Reading slide titles alone must tell a coherent story with beginning, middle, end. All titles must be action
    statements. No gaps or redundancies (MECE logic).
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
  related_principles:
  - pr_028
- id: bp_006
  entry_type: best_practice
  title: Dot-Dash Storyline
  description: Action titles (dots) + supporting evidence (dashes). Titles tell the story when read sequentially; body content
    proves each title.
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_007
  entry_type: best_practice
  title: Framework Completeness
  description: The selected narrative framework (SCQA/SOAR/Gagné/Sparkline) must be complete — all required elements present.
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_008
  entry_type: best_practice
  title: Pyramid Principle
  description: Start with the key insight/recommendation. Parent-child hierarchy maps to visual containers. Conclusion first,
    supporting arguments after.
  sources:
  - Guides/03-visual-design/accessible-data-narrative-design.md
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_009
  entry_type: best_practice
  title: Rule of Three
  description: Apply groupings of three to narrative elements. Three key points, three supporting arguments, three proof points.
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_010
  entry_type: best_practice
  title: BLUF (Bottom Line Up Front)
  description: State conclusion/recommendation first, then provide supporting detail. Essential for executive and time-constrained
    audiences.
  sources:
  - Guides/03-visual-design/accessible-data-narrative-design.md
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_011
  entry_type: best_practice
  title: SOAR-to-Layout Mapping
  description: 'Each SOAR phase maps to a specific visual archetype: Situation → Grid/Dashboard; Obstacle → Split Screen/Metaphor;
    Approach → Timeline/Process Flow; Results → Hero Card/Big Number.'
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_012
  entry_type: best_practice
  title: Situation Phase Design
  description: 'Visual archetype: Bento Grid / Dashboard. Use Law of Common Region to group disparate data. Audience scans
    state of play as single gestalt.'
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_013
  entry_type: best_practice
  title: Obstacle Phase Design
  description: 'Visual archetype: Metaphor / Split Screen. Use dramatic contrast, bold typography. Highlight gap between "what
    is" and "what could be."'
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_014
  entry_type: best_practice
  title: Approach Phase Design
  description: 'Visual archetype: Timeline / Process Flow / Funnel. Use Law of Continuity — elements linked by lines, arrows,
    left-to-right sequential positioning.'
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_015
  entry_type: best_practice
  title: Results Phase Design
  description: 'Visual archetype: Hero Card / Big Number / Before-After. Single massive statistic. Clean, spacious, aspirational.'
  sources:
  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_016
  entry_type: best_practice
  title: Opening Structure
  description: 'Must include: (1) Hook (statistical shock, financial impact, relevance cue), (2) Transformation promise, (3)
    Roadmap (optional but recommended).'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
  related_principles:
  - pr_029
- id: bp_017
  entry_type: best_practice
  title: Closing Structure
  description: 'Must include: (1) Summary of key transformation, (2) Clear Call-to-Action (specific ask, owner, deadline),
    (3) Contact info / next steps.'
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
  related_principles:
  - pr_029
- id: bp_018
  entry_type: best_practice
  title: Executive Hook Types
  description: Statistical shock (surprising statistic), financial impact (ROI-focused), relevance cue (why now), evidence
    of problem (proof that pain exists).
  sources:
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_019
  entry_type: best_practice
  title: Executive SCQA Structure
  description: Situation (context established) → Complication (problem quantified with $, %, time) → Question (decision framed)
    → Answer (recommendation in first 5 slides — BLUF).
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_020
  entry_type: best_practice
  title: Executive Slide Distribution
  description: 'Title: 1 slide; Situation: 1–2; Complication: 2–3; Answer/Exec Summary: 1; Data slides: 3–5 (40–50% of deck);
    Process: 1–2; CTA: 1. Key ratios: data 40–50%, text 30–40%, visual 10–20%.'
  sources:
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_021
  entry_type: best_practice
  title: Executive Slide Minimisation
  description: 'Minimise or eliminate: section dividers, agenda slides, "About Us" slides, "Thank You" slides. **Zero agenda
    slides for <10 slide decks. Max 1 agenda slide for 10–20. Section dividers only for >20 slides.** Every slide must earn
    its place.'
  sources:
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - narrative-structure
  - slide-structure
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: All deck types
  confidence: strong
- id: bp_022
  entry_type: best_practice
  title: Training Gagné Structure
  description: '9 events mapped to slides: (1) Gain attention (hook in first 3 slides), (2) Inform objectives (ABCD format),
    (3) Stimulate recall, (4) Present content, (5) Provide guidance, (6) Elicit practice, (7) Provide feedback, (8) Assess
    performance, (9) Enhance retention/transfer.'
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - narrative-structure
