  - Guides/00-presentation-methodology/cognitive-visual-bridge.md
  tags:
  - deck-type
  - sales-deck
  added: '2026-03-09'
  evidence: Industry best practice and expert consensus
  context: Sales presentations and pitch decks
  confidence: strong
- id: ap_001
  entry_type: anti_pattern
  title: Teleprompter
  description: Paragraphs of text on screen; presenter reads verbatim
  consequences: Audience reads ahead, stops listening; redundancy principle violated
  instead: Move text to speaker notes; replace with visual anchor + keyword
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  - narrative-structure
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_006
  - pr_009
- id: ap_002
  entry_type: anti_pattern
  title: Hybrid Trap
  description: Dense "leave-behind" slides used in live presentation
  consequences: 'Fails at both: too dense to present, too sparse to stand alone'
  instead: Split into two versions OR redesign for primary delivery mode
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  - Guides/02-slide-design/presentation-vs-deck-ument-decision-guide.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_002
- id: ap_003
  entry_type: anti_pattern
  title: Data Dump
  description: Tables/charts with no "so what"
  consequences: Audience doesn't know what to conclude; wasted cognitive resources
  instead: Add action title + highlight one insight; move detail to appendix
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  - data-visualisation
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_008
- id: ap_004
  entry_type: anti_pattern
  title: Legend Addiction
  description: Separate legends requiring eye-scanning between legend and data
  consequences: Split-attention effect; increases extraneous cognitive load
  instead: Direct-label data series; delete legend
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  - data-visualisation
  added: '2026-03-09'
  severity: moderate
  violates:
  - pr_005
  - pr_010
- id: ap_005
  entry_type: anti_pattern
  title: Chartjunk
  description: 3D effects, heavy gridlines, gradients, shadows, unnecessary icons
  consequences: Reduces data-ink ratio; distracts from actual data; 40% less accurate
  instead: Strip to essentials; maximise data-ink ratio; use 2D flat colours
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  - data-visualisation
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_026
- id: ap_006
  entry_type: anti_pattern
  title: Pretty-but-Useless
  description: Decorative visuals with no informational purpose
  consequences: Extraneous cognitive load; violates coherence principle
  instead: Remove or replace with functional diagram/metaphor
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
  violates:
  - pr_007
- id: ap_007
  entry_type: anti_pattern
  title: Frankendeck
  description: Fonts, colours, and layouts change from slide to slide
  consequences: Audience perceives chaos; undermines professional credibility
  instead: Standardise 1–2 fonts, consistent colour palette, single layout system
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - anti-pattern
  - layout
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_025
- id: ap_008
  entry_type: anti_pattern
  title: Topic-Label Titles
  description: Vague headlines like "Market Analysis" or "Background"
  consequences: Audience can't skim deck; vertical flow test fails; no insight communicated
  instead: 'Use action titles: full-sentence assertions stating the insight'
  sources:
  - Guides/02-slide-design/presentation-vs-deck-ument-decision-guide.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_025
- id: ap_009
  entry_type: anti_pattern
  title: Death by PowerPoint
  description: Reading dense text-heavy slides verbatim to audience
  consequences: Redundancy principle violated; audience disengages entirely
  instead: Redesign as visual presentation or create proper deck-ument
  sources:
  - Guides/02-slide-design/presentation-vs-deck-ument-decision-guide.md
  tags:
  - anti-pattern
  - narrative-structure
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_006
  - pr_009
- id: ap_010
  entry_type: anti_pattern
  title: Information Overload
  description: Wall of text, >10 data points, cluttered layout on single slide
  consequences: Exceeds working memory; audience retains nothing
  instead: Chunk into 3–5 groups; progressive disclosure; split slides
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
  violates:
  - pr_001
  - pr_002
- id: ap_011
  entry_type: anti_pattern
  title: Missing Hierarchy
  description: All text same size; no focal point; flat visual weight
  consequences: Eye doesn't know where to start; audience scans randomly
  instead: 'Establish 3-tier hierarchy: title → section → detail'
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
  violates:
  - pr_008
- id: ap_012
  entry_type: anti_pattern
  title: Colour Overload
  description: 10+ colours, rainbow palette, no semantic meaning
  consequences: Cognitive overload; no visual priority system
  instead: Limit to 5 colours max; one accent for key data
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  tags:
  - anti-pattern
  - colour
  added: '2026-03-09'
  severity: moderate
  violates:
  - pr_001
- id: ap_013
  entry_type: anti_pattern
  title: Mismatched Complexity
  description: Expert-level complexity presented to novice audience (or vice versa)
  consequences: Audience either confused or bored; transformation fails
  instead: Match visual and content complexity to specific audience persona
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_014
  entry_type: anti_pattern
  title: Presentation Emailed
  description: Minimal-text presentation slides sent via email without context
  consequences: Slides are incomprehensible without spoken narration
  instead: Create deck-ument version for distribution OR add comprehensive notes
  sources:
  - Guides/02-slide-design/presentation-vs-deck-ument-decision-guide.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_015
  entry_type: anti_pattern
  title: Truncated Bar Axis
  description: Bar chart Y-axis doesn't start at zero
  consequences: Exaggerates differences; creates visual lie for magnitude comparison
  instead: Always start bars at zero; if variance, use line chart instead
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_094
- id: ap_016
  entry_type: anti_pattern
  title: 3D Charts
  description: Any chart rendered with 3D perspective effects
  consequences: Perspective distortion; occlusion; 40% less accurate; zero information added
  instead: 'Convert to 2D: 3D pie→horizontal bar; 3D column→2D bar; 3D area→line'
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  - data-visualisation
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_086
- id: ap_017
  entry_type: anti_pattern
  title: Dual Y-Axes
  description: Two Y-axes on same chart
  consequences: Confusion/manipulation risk; viewer can't compare scales
  instead: Use separate charts or index metrics to common baseline
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  - data-visualisation
  added: '2026-03-09'
  severity: moderate
  violates:
  - bp_107
- id: ap_018
  entry_type: anti_pattern
  title: Default Excel Charts
  description: Unmodified Excel/PowerPoint default output (grey background, heavy gridlines, 3D)
  consequences: Low data-ink ratio; unprofessional appearance; chartjunk
  instead: 'Strip defaults: white background, no gridlines, 2D, direct labels'
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_019
  entry_type: anti_pattern
  title: Skipping Logic Phase
  description: Building visuals before structuring narrative/logic architecture
  consequences: Incoherent deck; "slideument" with no through-line
  instead: Always complete Phase 1–2 (audience + logic) before Phase 3 (visual)
  sources:
  - Guides/00-presentation-methodology/presentation-design-workflow.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
- id: ap_020
  entry_type: anti_pattern
  title: Design-in-Vacuum
  description: Creating infographics/slides without user testing
  consequences: Assumes comprehension that may not exist; misses accessibility issues
  instead: Conduct 5-second test, squint test, and accessibility audit
  sources:
  - Guides/03-visual-design/infographic-design-workflow.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_021
  entry_type: anti_pattern
  title: Moiré Patterns
  description: Tight crosshatch/dot patterns in chart fills
  consequences: Creates optical illusions and visual vibration; physically uncomfortable
  instead: Use solid fills; no textures
  sources:
  - Guides/03-visual-design/data-visualization-excellence.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_022
  entry_type: anti_pattern
  title: Colour-Only Encoding
  description: Using colour as sole differentiator without labels/patterns
  consequences: 4%+ population cannot distinguish; accessibility violation
  instead: Always pair colour with labels, icons, shapes, or positional encoding
  sources:
  - Guides/03-visual-design/accessibility-standards.md
  tags:
  - anti-pattern
  - colour
  added: '2026-03-09'
  severity: moderate
  violates:
  - bp_056
- id: ap_023
  entry_type: anti_pattern
  title: Broken Hierarchy
  description: Skipped heading levels (H1 → H3, missing H2)
  consequences: Screen readers confused; document structure broken; violates semantic hierarchy
  instead: Strict H1 → H2 → H3 progression, no skips
  sources:
  - Guides/02-slide-design/opml-to-slides-conversion.md
  tags:
  - anti-pattern
  - layout
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_026
- id: ap_024
  entry_type: anti_pattern
  title: Buried Recommendation
  description: Key recommendation appears on slide 15+ instead of early in deck
  consequences: Executive disengages; decision deferred; meeting unproductive
  instead: 'BLUF: state recommendation in first 5 slides'
  sources:
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: critical
  violates:
  - bp_010
- id: ap_025
  entry_type: anti_pattern
  title: Agenda/About Padding
  description: Excessive agenda slides, "About Us" sections, section dividers consuming deck real estate
  consequences: Delays value delivery; wastes scarce executive attention
  instead: Minimise or eliminate; every slide must earn its place
  sources:
  - Guides/02-slide-design/executive-presentation-sop.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_026
  entry_type: anti_pattern
  title: Transition Overload
  description: Fly-in, bounce, spin, zoom animations on every slide
  consequences: Distracts from content; adds extraneous cognitive load; looks dated
  instead: Zero transitions default; fade only if used, <0.5s duration
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
  violates:
  - pr_007
- id: ap_027
  entry_type: anti_pattern
  title: Missing Speaker Notes
  description: Presentation slides with no speaker notes sent to stand-in presenter
  consequences: Stand-in has no context; delivery quality drops catastrophically
  instead: '50–150 words per slide: key message + detail + transition cue'
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_028
  entry_type: anti_pattern
  title: No Appendix
  description: Detail-heavy data moved to "the report" that doesn't exist
  consequences: Audience has no way to verify claims or explore detail
  instead: Create appendix slides (A1, A2…) with full data and methodology
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
- id: ap_029
  entry_type: anti_pattern
  title: Decorative Animations
  description: Builds that add no cognitive step; animations used for visual flair not storytelling
  consequences: Audience distracted; builds become noise; screenshot/PDF meaningless
  instead: Each build must advance understanding. For complex sequences, split across slides (film frames). Final state standalone
  sources:
  - Guides/00-presentation-methodology/quality-checklist-framework.md
  tags:
  - anti-pattern
  added: '2026-03-09'
  severity: moderate
  violates:
  - bp_039
