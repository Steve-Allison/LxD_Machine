    canonical_id: enablement_format
    entity_kind: content_format
    family: communication
    gliner_label: ENABLEMENT_FORMAT
    gliner_description: Enablement format battle card sales deck pitch deck briefing document enablement kit playbook internal
      comms
    examples:
    - competitive battle card
    - sales enablement deck
    - pitch deck
    - internal briefing document
    - enablement kit
    - sales playbook
    - campaign brief
    anti_examples:
    - enable the feature
    - battle plan
    confidence_threshold: 0.75
    aliases:
    - sales collateral
    - enablement material
    - go-to-market asset
    indicators:
    - battle card
    - sales deck
    - pitch deck
    - briefing
    - enablement kit
    - playbook
    - campaign brief
    - internal comms
    - launch kit
    patterns:
    - (competitive|objection|win-loss) (battle card|card)
    - (sales|enablement|pitch|launch) (deck|kit|playbook)
    - (internal|executive|campaign) (briefing|brief|comms)
    color: '#f39c12'
    relates_to:
    - target: course_format
      relation: supported_by
      weight: optional
      description: Training courses generate foundational knowledge that enablement materials like playbooks
        and battle cards operationalise for sales teams
    - target: job_aid_format
      relation: bridges
      weight: expected
      description: Job aid design principles of brevity, scannability, and point-of-need access apply directly
        to battle cards and sales playbooks
    - target: visual_content_format
      relation: contains
      weight: expected
      description: Enablement decks and battle cards rely on visual content formats including slide decks, data
        visualisations, and infographics
    - target: delivery_modality
      relation: supported_by
      weight: optional
      description: Enablement assets must work across multiple distribution channels including intranet portals,
        mobile devices, and print formats
      target_file: delivery_entities
    - target: learning_objective
      relation: supported_by
      weight: optional
      description: Enablement content benefits from Bloom's taxonomy-based objective decomposition for targeted
        skill transfer in sales contexts
      target_file: pedagogical_frameworks_entities
    - target: course_format
