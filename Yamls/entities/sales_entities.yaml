    - making me nervous
    - relieved
    patterns:
    - (I'm|we're) (worried|anxious|nervous|scared) (about|that)
    - (I'm|we're) (excited|hopeful|optimistic) (about|that)
    - not (convinced|sure|ready) (yet|about)
    - before (I|we) (commit|decide|sign)
    buyer_state_by_stage_group:
