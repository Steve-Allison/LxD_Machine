gliner_config:
  model: gliner-large-v2
  batch_size: 32
  default_confidence_threshold: 0.7
  context_window: 512
  entity_groups:
    soar_elements:
    - SITUATION_MARKER
    - OPPORTUNITY_MARKER
    - ACTION_MARKER
    - RESULT_MARKER
    buying_signals:
    - POSITIVE_BUYING_SIGNAL
    - URGENCY_SIGNAL
    objections:
    - BUDGET_OBJECTION
    - TIMING_OBJECTION
    - COMPETITOR_OBJECTION
    qualification_markers:
    - CHAMPION_MARKER
    - DECISION_MAKER_MARKER
    play_triggers:
    - EXPANSION_TRIGGER
    - DISPLACEMENT_TRIGGER
    narrative_quality:
    - STAGE_TRANSITION_SIGNAL
    - BUYER_PSYCHOLOGY_SIGNAL
    - SOAR_NARRATIVE_QUALITY
domain_keywords:
  primary:
  - SOAR
  - situation
  - opportunity
  - action
  - result
  - objection
  - buying signal
  - champion
  - decision maker
  - MEDDPICC
  - qualification
  - pipeline
  - deal
  - account
  - stage
  - narrative arc
  secondary:
  - budget
  - timing
  - competitor
  - expansion
  - displacement
  - urgency
  - revenue
  - ROI
  - proof of value
  - business case
  - contract
  - renewal
  - buyer psychology
  - tension
  - case for change
quality_indicators:
  soar_balance:
    incomplete: < 3 of 4 SOAR elements detected
    complete: All 4 SOAR elements represented
    strong: All 4 SOAR elements with evidence markers present
  soar_narrative_arc:
    weak: Situation only — no opportunity tension; no result
    adequate: S + R present; O or A weak
    strong: All 4 elements with tension vocabulary in O; specific metrics in R
  deal_health:
    at_risk: Objection markers > buying signal markers
    neutral: Even balance of signals and objections
    progressing: Buying signals > objection markers
  qualification_coverage:
    weak: No champion or decision maker markers
    partial: Champion OR decision maker identified
    strong: Both champion AND decision maker identified
  result_specificity:
    weak: Vague result — 'improved', 'better', 'faster'
    adequate: Directional metric — 'reduced costs significantly'
    strong: Specific validated metric — 'confirmed 35% efficiency gain within 6 months'
