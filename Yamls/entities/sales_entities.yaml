      storytelling
    entity_kind: quality_signal
    family: soar
    examples:
    - The situation was compelling and specific.
    - What's at stake is clear.
    - The case for change is evident.
    - No clear outcome was stated.
    - Generic result — no specifics.
    - Opportunity element is missing.
