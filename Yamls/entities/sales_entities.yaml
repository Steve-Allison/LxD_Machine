  stage_transition_signal:
    label: STAGE_TRANSITION_SIGNAL
    field_description: Stage transition buyer behavioral signal ready to advance commitment request how do we proceed moving
      forward
    description: Buyer behavioral signal indicating readiness to progress to the next sales stage — NOT calendar-based
    entity_kind: transition_signal
    family: deal_dynamics
    examples:
    - How do we proceed from here?
    - We'd like to move forward.
    - We're ready to see a proof of concept.
    - Can we get the team aligned on this?
    - We need a formal proposal.
