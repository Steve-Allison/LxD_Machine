quality_indicators:
  element_diversity:
    single_type: Only one visual element category detected — limited visual vocabulary
    mixed: Multiple visual element categories detected — balanced visual communication
    rich: Data visualisation + structural + typographic elements all present — full visual grammar applied
  accessibility_coverage:
    absent: No accessibility-related visual entity detected — WCAG compliance unverified
    partial: Some accessible design entities present but coverage incomplete
    compliant: Alt text, contrast, and colour encoding entities all represented — accessible design
  semiotic_intentionality:
    decorative: Only decorative elements detected — visual rhetoric absent; images add no meaning
    functional: Functional elements present (chart, diagram) but no semiotic arrangement applied
    rhetorical: SEMIOTIC_ARRANGEMENT entity detected — intentional visual grammar applied to reinforce message
