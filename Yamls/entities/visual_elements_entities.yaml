  semiotic_arrangement:
    description: Spatial arrangement signal reflecting Kress & van Leeuwen's visual grammar — Given/New (left/right axis)
      and Ideal/Real (top/bottom axis) positioning as meaning-making structures
    canonical_id: semiotic_arrangement
    entity_kind: design_concept
    family: visual_grammar
    gliner_label: SEMIOTIC_ARRANGEMENT
    gliner_description: Semiotic arrangement given new ideal real left right top bottom spatial positioning visual grammar
      compositional meaning
    examples:
    - The 'before' state on the left, the 'after' state on the right.
    - Aspirational vision at the top, operational detail below.
    - Given information in the left panel; new information on the right.
    - Ideal outcome framed in the upper section.
    - Current state left, future state right.
    - Headline promise at top; evidence below the fold.
    - Problem in the upper-left; solution in the lower-right.
