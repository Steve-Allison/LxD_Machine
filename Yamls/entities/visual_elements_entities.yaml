    - (upper|top|lower|bottom) (section|half|panel)
    - before.+left.+after.+right
    - current state.+left.+future.+right
    color: '#2c3e50'
    theory_source: 'Kress & van Leeuwen (1996) Reading Images: The Grammar of Visual Design'
    metafunctions:
      compositional: Given/New (left/right) and Ideal/Real (top/bottom) positioning as semantic organisation
      interactional: Gaze, angle, and distance encode power relationship between image and viewer
      representational: Narrative vs conceptual processes — action vs classification structures
    scoring_note: 'SEMIOTIC_ARRANGEMENT mismatch (e.g., solution in Given/left position, problem in New/right) detected by
      scoring engine as compositional conflict: penalty -10 points'
    relates_to:
    - target: visual_narrative_element
      relation: supports
      weight: required
      description: Semiotic arrangement (the position and relationship of visual elements) creates narrative meaning. Vectors,
        placement, and spatial relationships between elements tell visual stories and establish cause-effect relationships.
    - target: visual_narrative_element
      relation: enables
      weight: required
      description: Semiotics is the explicit bridge connecting visual communication to visual storytelling through sign encoding
        and decoding per Visual Communication and Storytelling
