        processing per Visual Communication and Storytelling
      target_file: cognitive_load_entities
    - target: color_reference
      relation: contains
      weight: expected
      description: Design principles like contrast and hierarchy are implemented through color manipulation as a primary visual
        tool per Visual Communication and Storytelling
    - target: typography_element
      relation: contains
      weight: expected
      description: Design principles like hierarchy and emphasis are implemented through typography variations in size weight
        and color per Visual Communication and Storytelling
    - target: extraneous_load_marker
      relation: resolves
      weight: expected
      description: "Gestalt design principles resolve extraneous load by allowing brain to parse structure without conscious effort"
      target_file: cognitive_load_entities
    - target: semiotic_arrangement
      relation: enables
      weight: expected
      description: Design principles provide the compositional grammar through which semiotic signs construct meaning per Visual
        Communication and Storytelling
    - target: nonverbal_cue
      relation: enables
      weight: optional
      description: "Design principles enable nonverbal communication; in virtual contexts, background composition, lighting design, and camera angle function as environmental design elements that carry credibility signals per Anatomy of Presence research"
      target_file: performance_entities
    - target: novice_learner
      relation: supports
      weight: optional
      description: "Design principles (progressive disclosure, signaling, spatial contiguity) support novice learners by reducing extraneous cognitive load and scaffolding visual comprehension per slide design research monograph part 3"
      target_file: audience_entities
    - target: storyboard_element
      relation: supports
      weight: expected
      description: "Design principles of clarity, simplicity, and consistency govern storyboard frame composition — minimal shading, clean outlines, and spatial hierarchy ensure frames communicate layout and action without unnecessary detail per Sketch Style for Wireframes and Storyboards"
      target_file: media_entities
    - target: brand_element
      relation: enables
      weight: expected
      description: "CRAP Repetition principle establishes brand identity by repeating consistent fonts, colours, and styles throughout designs, building visual cohesion and recognition per theory_crap_design_principles"
    - target: accessibility_feature
      relation: supports
      weight: expected
      description: "CRAP principles collectively improve readability and usability — Contrast ensures legibility, Proximity groups related content for scannability, Alignment creates clean reading paths per theory_crap_design_principles"
    - target: cognitive_debt_marker
      relation: limits
      weight: optional
      description: "Design principles like progressive disclosure and annotative scaffolding limit cognitive debt by preventing information overload when users encounter unfamiliar visualization grammars per Narrative Visualization research"
    - target: accessibility_feature
      relation: enables
      weight: expected
      description: "The Squint Test and 3-Second Rule ensure the focal point is cognitively accessible; design principles of contrast and hierarchy enable accessibility of key information (Canonical Presentation Methodology)"
    - target: progressive_disclosure_marker
      relation: bridges
      weight: expected
      description: "Design principles of progressive disclosure in visualization (ego-centric graph expansion, scrollytelling chunking) directly instantiate the progressive disclosure cognitive load pattern per Narrative Visualization research"
      target_file: cognitive_load_entities
    - target: mayer_extraneous_principle
      relation: supported_by
      weight: required
      description: "Design principles are governed by Mayer's extraneous principles — Signalling uses bold text, arrows, highlighting to direct attention; Spatial Contiguity places labels near relevant visual parts per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: microlearning_format
      relation: supports
      weight: expected
      description: "Minimalist approach with coherence, signalling, and spatial contiguity reduces cognitive load while maintaining engagement through clean, mobile-optimised layouts per AI Microlearning Guide"
      target_file: content_format_entities
    - target: VISUAL_QUALITY_DIMENSION
      relation: supports
      weight: expected
      description: "CRAP audit evaluates contrast, repetition, alignment, proximity determining visual quality scores"
      target_file: scoring_entities
    - target: layout_pattern
      relation: contains
      weight: expected
      description: "Mayer's spatial contiguity requires layout patterns with labels adjacent to diagram elements per Applying Mayer's Principles Practical Checklist"
