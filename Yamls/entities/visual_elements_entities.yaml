  - target: ai_config/analyzer_catalog.yaml
    type: depends_on
    description: Slide analysis patterns and indicators
entity_types:
  chart_type:
    description: Data visualization chart types and graph formats
    canonical_id: chart_type
    entity_kind: visual_component
    family: data_visualization
    gliner_label: CHART_TYPE
    gliner_description: Data visualization bar line pie scatter chart graph plot diagram treemap heatmap
    examples:
    - bar chart
    - line graph
    - pie chart
    - scatter plot
    - treemap
    - waterfall chart
    - funnel chart
    - Gantt chart
    - heatmap
    - bubble chart
    - area chart
    - donut chart
    - radar chart
    - Sankey diagram
    confidence_threshold: 0.8
    match_policy_ref: defaults
    aliases:
    - graph
    - visualization
    - data_viz
    - diagram
    indicators:
    - chart
    - graph
    - plot
    - diagram
    - visualization
    - visual
    - map
    patterns:
    - \w+ chart
    - \w+ graph
    - \w+ plot
    - \w+ diagram
    color: '#3498db'
    relates_to:
    - target: data_proof_slide
      relation: supports
      weight: required
      description: Chart types are the primary visual carrier for data proof slides. The choice of chart (bar, line, scatter,
        pie) determines how effectively quantitative evidence is communicated. Chart type selection directly impacts the effectiveness
        of proof-based narrative.
      target_file: slide_types_entities
    - target: claim
      relation: supports
      weight: required
      description: "Charts serve as the Dashes (supporting evidence) that prove the Dot (Action Title claim) — the relationship is hierarchical and the chart data must explicitly prove the claim per Canonical Presentation Methodology"
      target_file: narrative_entities
    - target: cognitive_debt_marker
      relation: triggers
      weight: expected
      description: "Charts with chartjunk (3D effects, backgrounds, legends) create cognitive debt by forcing viewers to process non-data ink per Slide Deck Design Playbook"
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Chart design must follow Tufte's data-ink ratio principle and CRAP framework for visual clarity per Slide Deck Design Playbook"
    - target: layout_pattern
      relation: supported_by
      weight: expected
      description: "Chart types depend on layout patterns for proper spatial positioning and sizing within slide compositions per Visualisation Techniques research"
    - target: color_reference
      relation: supported_by
      weight: expected
      description: "Charts rely on color encoding to distinguish data series, categories, and values; color choice directly affects chart readability per Visualisation Techniques research"
    - target: accessibility_feature
      relation: supported_by
      weight: expected
      description: "Charts require accessibility features (alt text descriptions, colour-blind safe palettes, pattern fills) to be perceivable by all audiences per Visualisation Techniques research"
    - target: extraneous_load_marker
      relation: triggers
      weight: expected
      description: "Complex chart types with decorative elements (3D effects, gradient fills, unnecessary gridlines) trigger extraneous cognitive load per Visualisation Techniques research"
      target_file: cognitive_load_entities
    - target: clarity_dimension
      relation: enables
      weight: expected
      description: "Well-designed data visualisations with clear labels, appropriate chart type selection, and data-ink optimisation enable clarity scoring per Visualisation Techniques research"
      target_file: scoring_entities
    - target: working_memory_marker
      relation: limits
      weight: expected
      description: "Complex or poorly chosen chart types with excessive data series overwhelm working memory capacity by demanding simultaneous comparison of too many visual elements per slide design research monograph part 4"
      target_file: cognitive_load_entities
    - target: quality_indicator
      relation: supported_by
      weight: expected
      description: "Chart selection quality is governed by Cognitive Fit Theory — tables for symbolic/lookup tasks, line charts for trends, bar charts for comparison; misfit degrades comprehension (Cognitive Interface, §4.2)"
    - target: intrinsic_load_marker
      relation: supports
      weight: expected
      description: "Cognitive Fit Theory dictates chart selection: tables for lookup, line charts for trends, reducing intrinsic load"
      target_file: cognitive_load_entities
  layout_pattern:
    description: Slide and page layout structures
    canonical_id: layout_pattern
    entity_kind: visual_component
    family: design_structure
    gliner_label: LAYOUT_PATTERN
    gliner_description: Layout composition grid column split screen arrangement structure slide page template
    examples:
    - title slide
    - two-column layout
    - full-bleed image
    - split screen
    - grid layout
    - asymmetrical layout
    - Z-pattern
    - F-pattern
    - golden ratio
    - rule of thirds
    anti_examples:
    - behavior pattern
    - design pattern (software)
    confidence_threshold: 0.7
    match_policy_ref: defaults
    aliases:
    - layout
    - composition
    - structure
    - arrangement
    indicators:
    - layout
    - column
    - grid
    - pattern
    - composition
    - structure
    - arrangement
    - slide
    patterns:
    - \w+-column layout
    - \w+ slide
    - \w+ layout
    - \w+ pattern
    color: '#9b59b6'
    relates_to:
    - target: visual_quality_dimension
      relation: supports
      weight: required
      description: Layout patterns directly impact visual quality assessment. Proper grid systems, alignment consistency,
        and spatial organization are measurable components of visual quality scoring.
      target_file: scoring_entities
    - target: design_principle
      relation: supported_by
      weight: required
      description: "Layout patterns are governed by the five design principles (Contrast, Repetition, Alignment, Proximity, Balance) applied via the mandatory 12-column grid system per Canonical Presentation Methodology"
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Grid-based layouts with whitespace, alignment, and clear section boundaries directly limit extraneous cognitive load by creating visual order and preventing clutter per Infographics research"
      target_file: cognitive_load_entities
    - target: content_structure_marker
      relation: enables
      weight: expected
      description: "Layout patterns establish the visual structure that content architecture markers detect per slide design research monograph"
      target_file: content_architecture_entities
    - target: storyboard_element
      relation: supports
      weight: expected
      description: "Layout patterns using foreground/midground/background spatial language structure the composition of storyboard frames for visual clarity per Sketch Style for Wireframes and Storyboards"
      target_file: media_entities
    - target: planning_artefact_marker
      relation: supported_by
      weight: optional
      description: "Layout patterns are supported by planning artefacts — LXD recommends sketching sample screen layouts or UI wireframes during the planning phase to confirm the learning experience will be intuitive, especially for digital courses per High-Level Planning Tools research"
      target_file: content_architecture_entities
    - target: slide_type
      relation: supports
      weight: required
      description: "Layout patterns (1-column, 2-column, 3-pillar, hero+detail) directly determine which slide types can be effectively rendered per Slide Deck Design Playbook"
      target_file: slide_types_entities
    - target: chart_type
      relation: supports
      weight: expected
      description: "Layout patterns (force-directed, clustering, ego-centric expansion) organize chart elements spatially to enable narrative reading of network and multi-dimensional data per Narrative Visualization research"
    - target: microlearning_format
      relation: supports
      weight: expected
      description: "High-definition graphics optimised for mobile viewing, consistent visual hierarchy, and spatial contiguity are specified layout requirements for microlearning per AI Microlearning Guide"
      target_file: content_format_entities
    - target: extraneous_load_marker
      relation: resolves
      weight: expected
      description: "Layout patterns (line length 50-75 CPL, proximity spacing, left alignment) resolve extraneous cognitive load"
      target_file: cognitive_load_entities
    - target: SOAR_NARRATIVE_QUALITY
      relation: supported_by
      weight: expected
      description: "Layout selection determined by SOAR phase: Situation=Grid, Obstacle=Metaphor, Approach=Flow, Results=Big Statistic"
      target_file: sales_entities
    - target: content_structure_marker
      relation: supported_by
      weight: expected
      description: "OPML hierarchy maps deterministically to visual layouts: L1=headers, L2=cards, L3=atoms, L4=reveals"
      target_file: content_architecture_entities
  visual_element:
    description: Individual design elements and components
    canonical_id: visual_element
    entity_kind: visual_component
    family: design_elements
    gliner_label: VISUAL_ELEMENT
    gliner_description: Icon logo photograph illustration infographic screenshot diagram flowchart timeline callout
    examples:
    - icon
    - logo
    - photograph
    - illustration
    - infographic
    - screenshot
    - diagram
    - flowchart
    - timeline
    - callout box
    - pull quote
    - data table
    confidence_threshold: 0.75
    match_policy_ref: defaults
    aliases:
    - element
    - component
    - graphic
    - asset
    indicators:
    - icon
    - logo
    - image
    - photo
    - graphic
    - illustration
    - diagram
    - screenshot
    - table
    patterns:
    - \w+ icon
    - \w+ graphic
    - \w+ illustration
    color: '#2ecc71'
    relates_to:
    - target: extraneous_load_marker
      relation: triggers
      weight: expected
      description: Excessive visual elements (chartjunk, decorative graphics) increase extraneous cognitive load per Tufte
        principles
      target_file: cognitive_load_entities
    - target: cognitive_load_dimension
      relation: triggers
      weight: required
      description: Visual elements directly trigger cognitive load responses. High visual density creates extraneous load;
        well-organized visual hierarchies reduce intrinsic load. The choice of visual_elements (color, typography, layout)
        determines whether viewers experience germane (productive) or extraneous (wasteful) cognitive processing.
      target_file: scoring_entities
    - target: visual_narrative_element
      relation: supports
      weight: required
      description: Visual elements (composition, framing, symbolism) are the tools used to express narrative story elements
        visually per Visual Communication and Storytelling
    - target: narrative_hook
      relation: supports
      weight: expected
      description: Visual hierarchy directs the viewer's eye first to the hook then context then call to action in static
        media per Visual Communication and Storytelling
      target_file: narrative_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Visual elements are governed by Gestalt principles (proximity, similarity, closure, figure-ground) and dual coding theory for effective multimodal communication per Visualisation Techniques research"
    - target: germane_load_marker
      relation: enables
      weight: expected
      description: "Well-designed visual elements enable germane cognitive processing by activating dual coding (verbal + visual channels) which doubles encoding pathways per Visualisation Techniques research"
      target_file: cognitive_load_entities
    - target: clarity_dimension
      relation: supports
      weight: expected
      description: "Visual elements directly contribute to the clarity scoring dimension when properly designed per slide design research monograph"
      target_file: scoring_entities
    - target: storyboard_element
      relation: bridges
      weight: optional
      description: "Visual elements used in sketchnoting (connectors, containers, icons, shadow/color) serve as rapid prototyping components that bridge to formal storyboard elements for high-fidelity visualization per Narrative Visualization research"
      target_file: media_entities
    - target: working_memory_marker
      relation: limits
      weight: expected
      description: "Excessive visual elements limit working memory capacity — only graphics that directly support the learning objective should be included per the coherence principle per Visual Best Practices for Corporate Learning Videos"
      target_file: cognitive_load_entities
  color_reference:
    description: Color names, values, and palette references
    canonical_id: color_reference
    entity_kind: visual_component
    family: color_theory
    gliner_label: COLOR_REFERENCE
    gliner_description: Color palette gradient hue tone shade tint contrast monochromatic complementary scheme
    examples:
    - brand blue
    - primary color
    - accent color
    - gradient
    - monochromatic
    - complementary colors
    - warm palette
    - cool palette
    - high contrast
    - muted tones
    confidence_threshold: 0.7
    validators:
    - type: regex
      ref: hex_color
    match_policy_ref: defaults
    aliases:
    - color
    - colour
    - palette
    - scheme
    indicators:
    - color
    - colour
    - palette
    - gradient
    - hue
    - tone
    - shade
    - tint
    - contrast
    patterns:
    - \w+ color
    - \w+ palette
    - \w+ gradient
    - '#[0-9A-Fa-f]{6}'
    - rgb\(\d+
    color: '#e74c3c'
    relates_to:
    - target: accessibility_feature
      relation: supports
      weight: expected
      description: Color choices must support accessibility through adequate contrast and consideration of color vision deficiency
    - target: accessibility_feature
      relation: bridges
      weight: required
      description: Color choices must work with accessibility features. High contrast color combinations support accessibility;
        color-only information becomes inaccessible. Color decisions bridge visual design intent with inclusive design requirements.
    - target: brand_element
      relation: supports
      weight: required
      description: Color choices reinforce brand elements. Consistent color palettes across presentations strengthen brand
        recognition and coherence. Brand colors become visual anchors that aid audience memory and emotional association.
    - target: accessibility_feature
      relation: supported_by
      weight: required
      description: Color usage must meet WCAG contrast ratios of 4.5:1 for normal text based on relative luminance not hue
        per Visual Communication and Storytelling
    - target: low_contrast_text
      relation: triggers
      weight: expected
      description: Color choices that fail WCAG luminance contrast requirements trigger low contrast text accessibility violations
        per Visual Communication and Storytelling
      target_file: accessibility_entities
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: Color is a potent driver of emotion and behavior with cultural and contextual associations evoking specific
        feelings per Visual Communication and Storytelling
      target_file: rhetorical_devices_entities
    - target: ethos_appeal
      relation: supports
      weight: optional
      description: "Color references support ethos appeal; navy signals trust/calm, black signals authority/sophistication, grey signals neutrality, and red signals power — serving credibility establishment through enclothed cognition per Anatomy of Presence research"
      target_file: rhetorical_devices_entities
    - target: nonverbal_cue
      relation: specialises
      weight: optional
      description: "Color functions as a specialised nonverbal cue; attire colour choices signal specific psychological associations (navy=trust, black=authority, red=power) that perceivers process through thin-slicing per Anatomy of Presence research"
      target_file: performance_entities
    - target: color_only_indicator
      relation: limits
      weight: expected
      description: "Color must never be the only means of conveying information; must be paired with labels, icons, or patterns per Slide Deck Design Playbook"
      target_file: accessibility_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Color choices are governed by design principles (contrast for readability, repetition for consistency, proximity for grouping) per Visualisation Techniques research"
    - target: low_contrast_ratio
      relation: triggers
      weight: required
      description: "Color references with insufficient contrast ratios directly trigger low contrast accessibility violations per slide design research monograph"
      target_file: accessibility_entities
    - target: narrative_tension
      relation: supports
      weight: expected
      description: "Color progression (warm-to-cool, dark-to-bright) directly supports narrative tension by creating visual emotional pacing across the slide sequence per visual_narrative_flow_pass"
      target_file: narrative_entities
  typography_element:
    description: Font and text styling references
    canonical_id: typography_element
    entity_kind: visual_component
    family: typography
    gliner_label: TYPOGRAPHY_ELEMENT
    gliner_description: Font text headline title subtitle body caption label typeface typography styling
    examples:
    - headline
    - body text
    - caption
    - pull quote
    - callout
    - label
    - title
    - subtitle
    - bullet point
    - numbered list
    confidence_threshold: 0.75
    match_policy_ref: defaults
    aliases:
    - text
    - font
    - type
    - copy
    indicators:
    - headline
    - title
    - subtitle
    - body
    - caption
    - label
    - text
    - font
    - type
    patterns:
    - \w+ text
    - \w+ font
    - \w+ headline
    color: '#f39c12'
    relates_to:
    - target: accessibility_feature
      relation: supports
      weight: required
      description: Typography choices (font size, weight, contrast) are critical accessibility features. Sans-serif fonts,
        adequate contrast, and minimum 18pt sizes support visual accessibility for diverse audiences including those with
        low vision.
    - target: brand_element
      relation: supports
      weight: expected
      description: Typefaces possess distinct personalities and communicate brand voice beyond the words they spell per Visual
        Communication and Storytelling
    - target: low_contrast_text
      relation: triggers
      weight: expected
      description: Typography choices in size weight and contrast with background directly affect legibility and can trigger
        contrast violations per Visual Communication and Storytelling
      target_file: accessibility_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Typography elements depend on design principles (hierarchy, contrast, repetition) to establish clear reading order and visual emphasis per Visualisation Techniques research"
    - target: readability_flag
      relation: triggers
      weight: expected
      description: "Typography choices directly trigger readability flags when font size, weight or spacing violate legibility thresholds per slide design research monograph"
      target_file: writing_entities
    - target: small_font_size
      relation: triggers
      weight: required
      description: "Typography elements below minimum size thresholds directly trigger small font size accessibility violations per slide design research monograph"
      target_file: accessibility_entities
    - target: extraneous_load_marker
      relation: resolves
      weight: expected
      description: "Typographic hierarchy (H1 24-30pt, H2 18-20pt, H3 14-16pt, Body 10-12pt) reduces extraneous load by signaling importance levels and enabling scanning without reading all content (Cognitive Interface, §2.2.1)"
      target_file: cognitive_load_entities
    - target: clarity_dimension
      relation: supports
      weight: expected
      description: "Typographic hierarchy supports clarity by enabling scanning behavior and signaling information importance"
      target_file: scoring_entities
