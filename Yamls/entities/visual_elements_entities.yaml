  cognitive_debt_marker:
    description: Visual anti-patterns that increase cognitive load — detectable signals of split-attention, redundancy effect,
      wall-of-text, and bullet overload violations of Cognitive Load Theory
    canonical_id: cognitive_debt_marker
    entity_kind: quality_assessment
    family: cognitive_load
    gliner_label: COGNITIVE_DEBT
    gliner_description: Cognitive debt marker wall of text bullet overload text heavy slide dense content split attention
      redundancy text duplicates visual
    examples:
    - Wall of text — no visual relief.
    - 12 bullets on one slide.
    - Speaker notes duplicating slide text verbatim.
    - Chart without label, label without chart (split-attention).
    - Dense paragraph content without visual hierarchy.
    - Every point in paragraph form instead of structured format.
    - Text box repeating the chart title word for word.
    - Slide with 8 data points and no clear hierarchy.
    confidence_threshold: 0.68
    match_policy_ref: defaults
    aliases:
    - cognitive overload
    - CLT violation
    - split-attention
    - redundancy effect
    indicators:
    - wall of text
    - too many bullets
    - dense content
    - text heavy
    - split attention
    - redundancy
    - text-heavy slide
    - no visual break
    patterns:
    - wall of text
    - too many (bullets|points)
    - text[- ]heavy \w+
    - dense (content|slide|paragraph)
    - split[- ]attention
    - duplicat(es|ing) \w+
    color: '#e74c3c'
    clt_taxonomy:
      split_attention:
        description: Audience must mentally integrate two separated information sources (e.g., chart + distant legend)
        penalty: -6
      redundancy_effect:
        description: Information presented in both text and visual simultaneously — doubles processing demand without adding
          meaning
        penalty: -7
      wall_of_text:
        description: Dense paragraph or bullet-heavy slide requiring reading mode, not visual processing mode
        penalty: -8
      bullet_overload:
        description: More than 5 bullets per slide — forces serial reading instead of holistic comprehension
        penalty: -5
    scoring_note: 'COGNITIVE_DEBT marker detected: penalty applied per clt_taxonomy sub-type; multiple violations compound
      (-2 extra per additional violation after the first)'
    relates_to:
    - target: clt_compliance_dimension
      relation: limits
      weight: required
      description: Cognitive debt markers (poorly explained concepts, missing context, excessive jargon) accumulate during
        presentations and reduce clt_compliance scores. Audiences with high cognitive debt cannot process subsequent complex
        information.
      target_file: scoring_entities
    - target: extraneous_load_marker
      relation: triggers
      weight: required
      description: "Cognitive debt markers (wall of text, bullet overload, split-attention) directly trigger extraneous load — design must reduce cognitive load not decorate per Canonical Presentation Methodology"
      target_file: cognitive_load_entities
    - target: clarity_dimension
      relation: limits
      weight: required
      description: "Cognitive debt markers (wall of text, split attention, bullet overload) directly limit clarity dimension scores by obscuring the presenter's core message under visual noise per slide design research monograph part 4"
      target_file: scoring_entities
    - target: progressive_disclosure_marker
      relation: resolves
      weight: expected
      description: "Progressive disclosure techniques (layered builds, staged reveals) resolve accumulated cognitive debt by breaking dense content into sequenced digestible units per slide design research monograph part 4"
      target_file: cognitive_load_entities
    - target: design_principle
      relation: resolves
      weight: expected
      description: "CRAP design principles (Contrast, Alignment, Proximity) resolve cognitive debt — Proximity prevents scattered layouts, Alignment eliminates unstructured placement, Contrast prevents difficult-to-read content per theory_crap_design_principles"
    - target: extraneous_load_marker
      relation: specialises
      weight: expected
      description: "Visual cognitive debt specialises extraneous load — rapid-fire edits, busy backgrounds, and redundant on-screen text create visual cognitive debt that compounds over time per Visual Best Practices for Corporate Learning Videos"
      target_file: cognitive_load_entities
    - target: quality_indicator
