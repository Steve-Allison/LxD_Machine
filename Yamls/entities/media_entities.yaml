      weight: expected
      description: "Each storyboard scene must include MMS step identification; Monroe's Motivated Sequence structures the persuasive arc across panels"
      target_file: rhetorical_devices_entities
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Mayer's coherence principle applied to storyboard design requires removing irrelevant detail from frames to reduce extraneous load"
      target_file: cognitive_load_entities
    - target: visual_narrative_element
      relation: supports
      weight: expected
      description: "Storyboard elements support visual narrative by pre-planning the visual storytelling arc including action titles, annotations, and dot-dash logic per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: visual_element
      relation: supported_by
      weight: optional
      description: "Storyboard elements for high-fidelity digital narratives are supported by low-fidelity sketchnote visual elements (CLDs, icons, connectors) that serve as rapid prototyping precursors per Narrative Visualization research"
      target_file: visual_elements_entities
    - target: chart_type
