_meta:
  id: media_entities
  purpose: entity
  version: 1.14.0
  last_updated: '2026-03-09'
  description: GLiNER entity definitions for multimedia asset analysis including video production elements, audio design markers,
    animation types, storyboard components, and image generation terminology.
  domain: visual
  domain_type: cross_cutting
  corpus_sources:
  - Corpus/Research/Creating Learning Videos - Process v2.md
  - Corpus/Research/Research - Storyboard Best Practices.md
  - Corpus/Research/Research - Sketch Style for Wireframes and Storyboards.md
  - Corpus/Research/Research - Best Video Script Prompts.md
  - Corpus/Research/Visual Best Practices for Corporate Learning Videos.md
  - Corpus/Research/Research - Advanced Image Prompting for Technical Content.md
  - Corpus/Research/Research - Image Prompt Writing Effectiveness.md
  - Corpus/Research/Learning Experience Design - Donald Clark - Combined.md
  - Corpus/Research/Research - Visual Communication and Storytelling.md
  - Corpus/Research/Research - visualisation_techniques_corporate_learning.md
  - Corpus/Research/Applying Mayer's Principles & Contemporary Theory - A Practical Checklist.md
  - Corpus/Research/visual_narrative_flow_pass.md
  - Corpus/Research/Research - Narrative Visualization, Sketchnoting, Accessibility.md
  relationships:
  - target: methodology/multimodal_video_standards.yaml
    type: depends_on
    description: Video production standards and quality thresholds
  - target: methodology/infographic_design_framework.yaml
    type: depends_on
    description: Infographic and data visualisation standards
gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - video
    - audio
    - animation
    - storyboard
    - image
    - multimedia
    - production
    - footage
    secondary:
    - B-roll
    - voiceover
    - motion graphics
    - render
    - keyframe
    - aspect ratio
    - resolution
entity_types:
  video_shot_type:
    description: Camera shot types and framing conventions used in video production
    canonical_id: video_shot_type
    entity_kind: production_element
    family: video
    gliner_label: VIDEO_SHOT_TYPE
    gliner_description: Video shot type close-up wide shot medium shot over-the-shoulder establishing shot B-roll cutaway
    examples:
    - close-up of the speaker
    - wide establishing shot
    - medium shot
    - over-the-shoulder angle
    - B-roll footage
    - cutaway to product
    - screen capture
    - talking head
    anti_examples:
    - shot of espresso
    - take a shot
    confidence_threshold: 0.75
    aliases:
    - camera shot
    - framing type
    - shot composition
    indicators:
    - close-up
    - wide shot
    - medium shot
    - over-the-shoulder
    - establishing shot
    - B-roll
    - cutaway
    - screen capture
    - talking head
    - two-shot
    - aerial shot
    - pan
    - zoom
    patterns:
    - (close-up|wide|medium|establishing|aerial) shot
    - over-the-shoulder
    - (B-roll|cutaway|screen capture|talking head)
    - (pan|zoom|tilt|dolly|tracking) (shot|in|out)
    color: '#3498db'
    relates_to:
    - target: storyboard_element
      relation: supported_by
      weight: required
      description: "Storyboard frames specify camera direction and shot type as required annotations per the storyboard template structure"
    - target: video_edit_transition
      relation: enables
      weight: expected
      description: "Shot variety across wide, medium, and close-up enables meaningful edit transitions at natural breakpoints every 8-15 seconds"
    - target: audio_element
      relation: bridges
      weight: expected
      description: "Temporal contiguity principle requires aligning visual shot framing with narration pacing and audio cues for coherent delivery"
    - target: image_prompt_element
      relation: enables
      weight: expected
      description: "AI storyboard prompts require explicit camera details including shot type and angle to generate accurate concept frames"
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Varied shot framing prevents visual monotony that increases extraneous processing and reduces cognitive load on learners"
      target_file: cognitive_load_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Rule-of-thirds composition, three-point lighting, and headroom framing are design principles governing shot type selection"
      target_file: visual_elements_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "Cycling between wide, medium, and close-up frames breaks visual monotony and maintains viewer engagement and interest"
      target_file: delivery_entities
    - target: visual_narrative_element
      relation: supports
      weight: expected
      description: Shot types control point of view and psychological distance between viewer and story calibrating empathy
        per Visual Communication and Storytelling
      target_file: visual_elements_entities
    - target: engagement_dimension
      relation: enables
      weight: expected
      description: "Varied shot types (close-up for emotional connection, wide for context, medium for dialogue) directly enable engagement scoring by maintaining visual interest and audience attention per Visualisation Techniques research"
      target_file: scoring_entities
    - target: layout_pattern
      relation: enables
      weight: expected
      description: "Video shot type selection enables layout patterns — wider shots leave space for graphic overlays while close-ups focus attention on speaker expressions per Visual Best Practices for Corporate Learning Videos"
      target_file: visual_elements_entities
    parent_entity: null
  video_edit_transition:
    description: Post-production transition and editing techniques between video segments
    canonical_id: video_edit_transition
    entity_kind: production_element
    family: video
    gliner_label: VIDEO_TRANSITION
    gliner_description: Video edit transition cut dissolve fade wipe jump cut cross-fade montage split screen
    examples:
    - hard cut
    - dissolve transition
    - fade to black
    - cross-fade
    - jump cut
    - montage sequence
    - split screen
    - wipe transition
    anti_examples:
    - cut the cord
    - fade away
    confidence_threshold: 0.75
    aliases:
    - edit type
    - transition effect
    indicators:
    - hard cut
    - dissolve
    - fade to black
    - fade in
    - cross-fade
    - jump cut
    - montage
    - split screen
    - wipe
    - L-cut
    - J-cut
    - match cut
    patterns:
    - (hard|jump|match|L|J)[- ]cut
    - fade (to black|in|out)
    - (cross[- ]fade|dissolve|wipe|montage)
    - split screen
    color: '#e74c3c'
    relates_to:
    - target: storyboard_element
      relation: supported_by
      weight: expected
      description: "Storyboard shot plans specify cut frequency and transition styles; timing annotations document editing decisions in pre-production"
    - target: video_shot_type
      relation: bridges
      weight: expected
      description: "Transitions connect sequential shot types in storyboard sequences, linking consecutive visual panels in frame-by-frame flow"
    - target: audio_element
      relation: bridges
      weight: expected
      description: "J-cuts and L-cuts bridge audio across visual cuts; musical stings accompany chapter transition wipes or fades"
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Consistent transition style makes chapter breaks predictable and reduces extraneous processing; coherence principle prohibits elaborate transitions"
      target_file: cognitive_load_entities
    - target: content_structure_marker
      relation: supports
      weight: expected
      description: "Title cards and slide transitions signal structural shifts between segments; transition style reinforces content chunking into logical chapters"
      target_file: content_architecture_entities
    - target: visual_narrative_element
      relation: supports
      weight: expected
      description: Edit transitions control pacing and rhythm of narrative flow compressing time via montage sequences per
        Visual Communication and Storytelling
      target_file: visual_elements_entities
    - target: progressive_disclosure_marker
      relation: supports
      weight: expected
      description: "Video edit transitions support progressive disclosure by segmenting content into logical chapters with title cards and consistent transition styles between sections per Visual Best Practices for Corporate Learning Videos"
      target_file: cognitive_load_entities
    parent_entity: null
  audio_element:
    description: Audio production elements including voiceover, music, and sound design
    canonical_id: audio_element
    entity_kind: production_element
    family: audio
    gliner_label: AUDIO_ELEMENT
    gliner_description: Audio element voiceover narration background music sound effect SFX ambient audio bed underscore
    examples:
    - voiceover narration
    - background music bed
    - sound effect (SFX)
    - ambient audio
    - underscore music
    - audio sting
    - transition sound
    - podcast narration
    anti_examples:
    - audio settings
    - sound system
    confidence_threshold: 0.75
    aliases:
    - sound element
    - audio component
    indicators:
    - voiceover
    - narration
    - background music
    - music bed
    - sound effect
    - SFX
    - ambient
    - underscore
    - audio sting
    - jingle
    - foley
    - audio bed
    patterns:
    - (voiceover|voice-over|VO) narration
    - (background|underscore|ambient) (music|audio)
    - sound effect|SFX
    - audio (sting|bed|cue)
    color: '#9b59b6'
    relates_to:
    - target: storyboard_element
      relation: supported_by
      weight: required
      description: "Storyboard templates require concise narration and audio script as a mandatory component per the production planning process"
    - target: video_shot_type
      relation: bridges
      weight: expected
      description: "Temporal contiguity principle mandates synchronising audio narration with on-screen visuals across shot type changes"
    - target: video_edit_transition
      relation: enables
      weight: expected
      description: "J-cuts and L-cuts use audio flow to enable seamless visual transitions between scenes and camera angles"
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Modality and redundancy principles require audio to complement rather than duplicate on-screen text, reducing extraneous cognitive load"
      target_file: cognitive_load_entities
    - target: missing_alt_indicator
      relation: triggers
      weight: expected
      description: "Absent audio descriptions and missing captions or transcripts trigger accessibility violations per mandatory accessibility requirements"
      target_file: accessibility_entities
    - target: engagement_cue
      relation: supports
      weight: expected
      description: "Enthusiastic speaker delivery with expressive tone holds attention better than flat monotone, directly driving learner engagement"
      target_file: delivery_entities
    - target: narrative_hook
      relation: enables
      weight: optional
      description: "Monroe's Motivated Sequence attention step and engaging narrative hooks are delivered through narration audio in the opening"
      target_file: narrative_entities
    - target: delivery_rate_issue
      relation: triggers
      weight: optional
      description: "Narration speed deviating from recommended 120-150 words per minute triggers pacing and delivery rate problems"
      target_file: performance_entities
    - target: mayer_extraneous_principle
      relation: supported_by
      weight: expected
      description: "Audio elements are governed by Mayer's redundancy and modality principles — narration should complement rather than duplicate on-screen text, and background music must not compete with instructional audio per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    - target: accessibility_feature
      relation: supports
      weight: expected
      description: "Audio elements — specifically data sonification mapping y-axis values to musical pitch — support accessibility by providing non-visual perception of data shape and trends per Narrative Visualization research"
      target_file: visual_elements_entities
    - target: quality_indicator
      relation: supports
      weight: expected
      description: "Crisp audio is cited as essential for professional production quality in learning videos — audio quality directly supports overall quality indicators per Visual Best Practices for Corporate Learning Videos"
      target_file: visual_elements_entities
    - target: mayer_essential_principle
      relation: supported_by
      weight: expected
      description: "Modality principle recommends audio narration to explain visuals offloading visual channel per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    - target: extraneous_load_marker
      relation: triggers
      weight: optional
      description: "Background music or irrelevant sound effects increase extraneous load per coherence principle per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    parent_entity: null
  animation_type:
