  - audio
  - animation
  - storyboard
  - image
  - multimedia
  - production
  - footage
  - frame
  - scene
  - shot
  - narration
  secondary:
  - voiceover
  - b-roll
  - screencast
  - motion graphics
  - podcast
  - soundtrack
  - caption
  - subtitle
  - aspect ratio
  - resolution
  - colour grading
  - lower third
