    - target: audio_element
      relation: contains
      weight: required
      description: "Storyboard templates require concise narration and audio script alongside visual panels for temporal contiguity compliance"
    - target: video_edit_transition
      relation: contains
      weight: expected
      description: "Storyboard frame components include technical specifications with transitions; AI prompt templates include dedicated transition fields"
    - target: animation_type
      relation: contains
      weight: expected
      description: "Action and animation cues are a required storyboard template field specifying motion graphics and animated sequences per scene"
    - target: image_asset_type
      relation: contains
      weight: expected
      description: "Visual panels contain illustrations, sketches, or AI-generated frames; storyboard frames serve as containers for image asset specifications"
    - target: image_prompt_element
      relation: enables
      weight: expected
      description: "Storyboard annotations feed directly into AI image generation prompts via the structured prompt template for concept frames"
    - target: planning_artefact_marker
      relation: specialises
