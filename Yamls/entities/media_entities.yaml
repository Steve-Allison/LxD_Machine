quality_indicators:
  positive:
  - consistent visual style
  - professional audio quality
  - accessible captions and alt text
  - appropriate pacing
  - clear storyboard annotations
  - brand-aligned assets
  negative:
  - inconsistent visual treatment
  - poor audio levels
  - missing accessibility features
  - jarring transitions
  - low resolution assets
  - unlicensed stock imagery
