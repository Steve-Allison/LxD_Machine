    - animated (infographic|explainer|diagram)
    - (keyframe|parallax|ease[- ](in|out))
    color: '#f39c12'
    relates_to:
    - target: storyboard_element
      relation: supported_by
      weight: required
      description: "Storyboard templates require action and animation cues as a mandatory field specifying animation intent for each scene"
    - target: video_shot_type
      relation: bridges
      weight: expected
      description: "Green-screen compositing layers animated charts beside the presenter during specific shot framings, integrating animation with composition"
    - target: image_asset_type
      relation: supports
      weight: expected
      description: "Animated infographics and motion graphics enhance static image assets into dynamic learning visuals per multimedia principle"
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: "Coherence principle requires animations to directly serve learning objectives; gratuitous animation adds extraneous cognitive load"
      target_file: cognitive_load_entities
    - target: animation_type
      relation: bridges
      weight: expected
      description: "Media production animation_type and visual_elements animation_type represent the same concept in different analytical frames"
      target_file: visual_elements_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Consistent clean on-brand graphic style with legible fonts and high-contrast colours are design principles governing animation quality"
      target_file: visual_elements_entities
    - target: progressive_disclosure_marker
      relation: enables
      weight: optional
      description: "Segmenting principle uses animation to enable progressive reveal of complex content through bite-sized sequential segments"
      target_file: cognitive_load_entities
    - target: progressive_disclosure_marker
      relation: supported_by
      weight: expected
      description: "Segmenting requires animations be divided into user-paced segments not continuous streams per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
