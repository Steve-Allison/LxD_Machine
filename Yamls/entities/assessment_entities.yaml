    - descriptor
    - anchor
    - exemplar
    - rubric
    - weight
    - dimension
    - scoring guide
    - marking scheme
    patterns:
    - '(criterion|criteria|dimension):'
    - (performance|proficiency|mastery) level
    - (scoring|rubric) (descriptor|anchor|guide|weight)
    color: '#f39c12'
    relates_to:
    - target: proficiency_level
      relation: contains
      weight: required
      description: Rubric components contain proficiency level descriptors
    - target: demonstration_activity
      relation: enables
      weight: required
      description: Rubrics provide criteria matrices essential for consistently evaluating performance demonstrations like role-plays and simulations
      target_file: activity_types_entities
    - target: roleplay_activity
      relation: enables
      weight: expected
      description: Rubrics enable structured roleplay evaluation with criteria for opening, needs analysis, presenting solutions, and objection handling
      target_file: activity_types_entities
    - target: feedback_modality
      relation: triggers
      weight: expected
      description: Rubrics trigger structured feedback by providing criteria-level observations, making feedback targeted to agreed standards
    - target: clarity_dimension
      relation: supports
      weight: expected
      description: Rubrics must use observable clear language for each level descriptor to promote fairness, consistency, and scoring transparency
      target_file: scoring_entities
    - target: scenario_activity
      relation: supports
      weight: required
      description: "Analytic, single-point, and holistic rubrics assess participant performance during scenarios, reducing subjectivity and providing consistent feedback per SBT guide"
      target_file: activity_types_entities
    - target: vocal_quality_issue
      relation: contains
      weight: expected
      description: "Assessment rubrics contain vocal quality metrics (Jitter, Shimmer, HNR, CPPS) as objective measurement components for evaluating speaker performance per Voice Coaching and Clinical Analysis"
      target_file: performance_entities
    - target: kirkpatrick_level
      relation: supported_by
      weight: expected
      description: "Evaluation constructs (Learning, Relevance, Characteristics of Training, Intent to Use, Barriers) function as rubric components structuring Kirkpatrick-level postcourse evaluation per recommended-training-effectiveness-questions"
    - target: summative_assessment
      relation: supports
      weight: expected
      description: "Rubric components support summative assessments by providing structured criteria, performance levels, and scoring anchors for consistent end-of-course evaluation (Gold Standard Structure)"
    - target: learning_objective
      relation: supports
      weight: required
      description: "Rubric components directly support learning objectives by defining criteria and proficiency levels that operationalise the target behaviour and degree of mastery per innovative learning experiments"
      target_file: learning_objectives_entities
  proficiency_level:
    description: Named competency or proficiency tiers used in learner assessment
    canonical_id: proficiency_level
    entity_kind: assessment_label
    family: rubric
    gliner_label: PROFICIENCY_LEVEL
    gliner_description: Proficiency level novice beginner intermediate advanced expert mastery developing proficient exemplary
    examples:
    - Novice
    - Developing
    - Proficient
    - Advanced
    - Expert
    - Exemplary
    - Mastery
    - Needs Improvement
    anti_examples:
    - advanced settings
    - expert mode
    confidence_threshold: 0.8
    aliases:
    - competency tier
    - mastery level
    - skill level
    indicators:
    - novice
    - beginner
    - developing
    - intermediate
    - proficient
    - advanced
    - expert
    - exemplary
    - mastery
    - needs improvement
    - not yet competent
    patterns:
    - (Novice|Beginner|Developing|Intermediate|Proficient|Advanced|Expert|Exemplary)
    - (Needs Improvement|Not Yet Competent|Mastery)
    color: '#27ae60'
    relates_to:
    - target: rubric_component
      relation: specialises
      weight: required
      description: Proficiency levels are defined within rubric components
    - target: novice_learner
      relation: supports
      weight: expected
      description: Ipsative proficiency tracking shows novice learners their personal improvement, motivating engagement before external benchmarks
      target_file: audience_entities
    - target: expert_learner
      relation: supports
      weight: optional
      description: Proficiency tracking challenges high performers to beat personal bests, preventing complacency at advanced skill levels
      target_file: audience_entities
    - target: cognitive_level
      relation: supported_by
      weight: expected
      description: Proficiency levels align with Bloom's Taxonomy — lower levels map to remember/understand, higher to apply/analyze/evaluate/create
      target_file: pedagogical_frameworks_entities
    - target: learner_characteristic
      relation: supported_by
      weight: expected
      description: "Proficiency levels must account for learner characteristics that vary by generation: Gen Z has high digital but low soft-skill proficiency; Boomers have inverse pattern per Learner Persona Research"
      target_file: pedagogical_frameworks_entities
    - target: assessment_item_type
      relation: supported_by
      weight: required
      description: "Clark defines four proficiency levels (Familiar, Recognised, Recalled, Automatic) mapping directly to assessment item types — MCQ tests recognition, open-response tests recall, timed open-response tests automaticity per Clark 100 Tips"
    - target: learning_objective
      relation: supports
      weight: required
      description: "Retrospective pre/post proficiency ratings directly measure achievement of learning objectives via 5-point scale from Not at all knowledgeable to Extremely knowledgeable per recommended-training-effectiveness-questions"
      target_file: pedagogical_frameworks_entities
    - target: pedagogical_sequence_marker
      relation: supported_by
      weight: expected
      description: "Proficiency level progression depends on pedagogical sequencing — scaffolded sequences define the path from novice to expert proficiency tiers per course structure hierarchy research"
      target_file: content_architecture_entities
    - target: progressive_disclosure_marker
      relation: enables
      weight: expected
      description: "Proficiency levels enable progressive disclosure — the adaptive engine routes learners along different difficulty paths based on assessed proficiency per module-integration-strategy"
      target_file: cognitive_load_entities
    parent_entity: rubric_component
