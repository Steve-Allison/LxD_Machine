gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - cognitive load
    - working memory
    - Mayer
    - split attention
    - redundancy
    - segmenting
    - modality
    secondary:
    - extraneous load
    - intrinsic load
    - germane load
    - dual coding
    - contiguity
    - coherence
    - pre-training
entity_types:
  extraneous_load_marker:
    description: References to extraneous cognitive load — unnecessary processing caused by poor design
    canonical_id: extraneous_load_marker
    entity_kind: cognitive_load_type
    family: clt_load_types
    gliner_label: EXTRANEOUS_LOAD
    gliner_description: Extraneous cognitive load unnecessary processing poor design distraction cluttered split attention
      redundancy chartjunk decoration
    examples:
    - the slide is cluttered with unnecessary detail
    - split attention between the legend and the chart
    - redundant text duplicates the narration
    - decorative images distract from the content
    - chartjunk obscures the data
    - extraneous information overloads the learner
    anti_examples:
    - the content is inherently complex
    - the topic is difficult
    confidence_threshold: 0.7
    aliases:
    - unnecessary load
    - design-imposed load
    - distracting elements
    indicators:
    - extraneous load
    - extraneous processing
    - split attention
    - split-attention
    - redundant
    - redundancy
    - cluttered
    - chartjunk
    - decorative
    - distracting
    - unnecessary detail
    - competing signals
    patterns:
    - (extraneous|unnecessary) (load|processing|information|detail)
    - split[- ]attention (between|effect|layout)
    - (redundant|duplicate) (text|information|content)
    - (cluttered|busy|noisy|overloaded) (slide|screen|layout|design)
    - (decorative|seductive) (image|detail|element|graphic)
    color: '#e74c3c'
    relates_to:
    - target: intrinsic_load_marker
      relation: contrasts_with
      weight: required
      description: Extraneous (unnecessary) vs intrinsic (inherent) cognitive load — different CLT dimensions
    - target: germane_load_marker
      relation: contrasts_with
      weight: required
      description: Extraneous (wasteful) vs germane (productive) cognitive load
    - target: readability_flag
      relation: triggers
      weight: expected
      description: "Poor presentation generating extraneous load triggers readability flags — verbose text, inconsistent fonts, and split-attention designs degrade readability scores (Cognitive Interface, §1.1.2, §4.1)"
      target_file: writing_entities
    - target: mayer_extraneous_principle
      relation: triggers
      weight: expected
      description: Detected extraneous load triggers application of Mayer's extraneous reduction principles
    - target: structural_slide
      relation: supports
      weight: required
      description: Slide design is unified by Cognitive Load Theory principles which guide all structural decisions
      target_file: slide_types_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: Coherence and signaling design principles guide reduction of extraneous load through visual clarity and information hierarchy
      target_file: visual_elements_entities
    - target: cognitive_debt_marker
      relation: supports
      weight: expected
      description: Extraneous load markers are indicators of cognitive debt accumulation in slide design requiring remediation
      target_file: visual_elements_entities
    - target: jargon_marker
      relation: supported_by
      weight: required
      description: Extraneous load is increased by jargon usage causing cognitive overload from constant jargon novel syntax and erratic jumps per Elite Speaker Linguistic Analysis
      target_file: writing_entities
    - target: instructional_strategy
      relation: limits
      weight: expected
      description: "CDT's prescriptive matrix reduces extraneous load by ensuring only relevant presentation forms are used for each content-performance cell per Merrill"
      target_file: pedagogical_frameworks_entities
    - target: delivery_rate_issue
      relation: supported_by
      weight: expected
      description: "Excessive speech rate (>180 WPM) is a primary source of extraneous cognitive load in oral communication, overwhelming the listener's processing capacity per Unified Performance Framework"
      target_file: performance_entities
    - target: vocal_quality_issue
      relation: supported_by
      weight: expected
      description: "Extraneous cognitive load is generated by vocal quality issues; vocal fry, uptalk, and filler words create processing interference that diverts attention from content per Anatomy of Presence research"
      target_file: performance_entities
    - target: filler_word
      relation: supported_by
      weight: expected
      description: "Extraneous load is generated by filler words; verbal fillers force listeners to process irrelevant auditory information, diverting working memory resources from the intended message per Anatomy of Presence research"
      target_file: performance_entities
    - target: scenario_activity
      relation: limits
      weight: required
      description: "Extraneous load in SBT reflects instructional design quality; poor scenario design overwhelms working memory and must be managed through scaffolding per SBT guide"
      target_file: activity_types_entities
    - target: working_memory_marker
      relation: limits
      weight: expected
      description: "Extraneous load from academic bundles and high Propositional Idea Density limits working memory capacity; elite speakers minimise extraneous load to free cognitive resources per Architecture of Influence"
    - target: low_contrast_text
      relation: triggers
      weight: expected
      description: "Poor contrast is a significant source of extraneous load for all users per Slide Deck Design Playbook"
      target_file: accessibility_entities
    - target: visual_quality_dimension
      relation: limits
      weight: expected
      description: "Extraneous load markers (chartjunk, decorative elements, split-attention layouts) directly limit visual quality scoring — high extraneous load inversely correlates with visual quality per Visualisation Techniques research"
      target_file: scoring_entities
    - target: video_edit_transition
      relation: supported_by
      weight: expected
      description: "Extraneous load from topic transitions is resolved by establishing wide shots and consistent transition styles that signal content shifts and provide mental rest points per Visual Best Practices for Corporate Learning Videos"
      target_file: media_entities
    - target: microlearning_format
      relation: limits
      weight: required
      description: "Effective microlearning minimises extraneous load through clean, focused design — the format structurally constrains unnecessary mental effort per AI Microlearning Guide"
      target_file: content_format_entities
    - target: content_structure_marker
      relation: supported_by
      weight: expected
      description: "Extraneous load is mitigated by content structure markers — clear section boundaries, headings, and progress indicators reduce navigational confusion that generates unnecessary processing per course structure hierarchy research"
      target_file: content_architecture_entities
    - target: delivery_modality
      relation: supported_by
      weight: expected
      description: "Extraneous load sources differ by delivery modality — online delivery generates navigational extraneous load while face-to-face generates environmental distractions per innovative learning experiments"
      target_file: delivery_entities
    - target: layout_pattern
      relation: limits
      weight: expected
      description: "The 12-column grid system and C.R.A.P. principles reduce extraneous cognitive load by enforcing visual consistency; poor layout increases extraneous processing (Canonical Presentation Methodology)"
      target_file: visual_elements_entities
    - target: accessibility_feature
      relation: supported_by
      weight: expected
      description: "Extraneous load is reduced by accessibility features — neurodiversity accommodations (ADHD-friendly, dyslexia-friendly modes) directly strip extraneous processing demands per module-integration-strategy"
      target_file: visual_elements_entities
    - target: nominalisation_marker
      relation: supported_by
      weight: expected
      description: "Extraneous load is supported by nominalisations — they compress actions into abstract nouns increasing propositional idea density beyond processing limits (elite_speaker_taxonomy)"
      target_file: writing_entities
    - target: academic_bundle
      relation: supported_by
      weight: expected
      description: "Academic bundles increase cognitive distance and processing load; they are a lexical source of extraneous load in spoken discourse (Architecture of Influence, Part 3)"
      target_file: rhetorical_devices_entities
    - target: typography_element
      relation: supported_by
      weight: expected
      description: "Extraneous load is reduced by consistent typographic hierarchy; inconsistent heading styles waste working memory per cognitive interface UxD research"
      target_file: visual_elements_entities
  intrinsic_load_marker:
    description: References to intrinsic cognitive load — inherent difficulty of the material being learned
    canonical_id: intrinsic_load_marker
    entity_kind: cognitive_load_type
    family: clt_load_types
    gliner_label: INTRINSIC_LOAD
    gliner_description: Intrinsic cognitive load inherent difficulty element interactivity complex material challenging concept
      prerequisite knowledge
    examples:
    - the material is inherently complex
    - high element interactivity makes this topic difficult
    - this concept requires significant prerequisite knowledge
    - the intrinsic load of the subject matter
    - interrelated concepts increase cognitive demands
    anti_examples:
    - the design is confusing
    - too much text on the slide
    confidence_threshold: 0.7
    aliases:
    - inherent difficulty
    - content complexity
    - element interactivity
    indicators:
    - intrinsic load
    - intrinsic processing
    - element interactivity
    - inherent difficulty
    - inherently complex
    - prerequisite knowledge
    - interrelated concepts
    - content complexity
    patterns:
    - intrinsic (load|processing|difficulty|complexity)
    - element interactivity
    - inherent(ly)? (complex|difficult|challenging)
    - (prerequisite|prior) knowledge (required|needed|assumed)
    - interrelated (concepts|elements|components)
    color: '#f39c12'
    relates_to:
    - target: extraneous_load_marker
      relation: contrasts_with
      weight: required
      description: Intrinsic (inherent complexity) vs extraneous (unnecessary) load
    - target: mayer_essential_principle
      relation: triggers
      weight: expected
      description: High intrinsic load triggers Mayer's essential management principles
    - target: microlearning_format
      relation: resolves
      weight: expected
      description: Segmenting principle — breaking content into microlearning units manages intrinsic load by reducing element interactivity per segment
      target_file: content_format_entities
    - target: instructional_strategy
      relation: supported_by
      weight: expected
      description: High intrinsic load content requires careful instructional strategy selection including pre-training and scaffolding
      target_file: pedagogical_frameworks_entities
    - target: progressive_disclosure_marker
      relation: supported_by
      weight: expected
      description: Topics use progressive disclosure preventing cognitive overload — incremental revelation manages intrinsic complexity
        (Comprehensive Learning Design Framework)
    - target: subordination_marker
      relation: supported_by
      weight: expected
      description: "Complex embedded syntax (subordination, relative clauses) creates intrinsic processing load that simplification reduces per Researching Narrative and Discourse Analysis"
      target_file: discourse_entities
    - target: germane_load_marker
      relation: enables
      weight: expected
      description: "Managing intrinsic load through chunking into digestible components enables germane schema construction, improving learning outcomes by 25-35% per Case Study Excellence"
    - target: delivery_rate_issue
      relation: supported_by
      weight: optional
      description: "Intrinsic load perception is affected by delivery rate; slower-than-baseline speech allows processing of inherently complex material without overwhelming working memory per Anatomy of Presence research"
      target_file: performance_entities
    - target: scenario_activity
      relation: limits
      weight: required
      description: "Intrinsic load represents the inherent difficulty of material being simulated in SBT; CLT provides essential boundaries for scenario design per SBT guide"
      target_file: activity_types_entities
    - target: expertise_reversal_marker
      relation: limits
      weight: expected
      description: "Expertise reverses what constitutes a chunk; presenters must assume novice audience and design for the 4-chunk limit per Slide Deck Design Playbook"
    - target: content_structure_marker
      relation: supported_by
      weight: expected
      description: "Intrinsic load is managed by content structure markers that chunk and sequence complex information per slide design research monograph"
      target_file: content_architecture_entities
    - target: working_memory_marker
      relation: triggers
      weight: required
      description: "Inherent content complexity consumes limited channel capacity — Segmenting and Pre-training Principles manage intrinsic load by breaking and pre-teaching before complex material per mayers_15_principles"
    - target: novice_learner
      relation: triggers
      weight: expected
      description: "Intrinsic load varies by learner expertise — novice learners experience higher intrinsic load on the same material because low prior knowledge increases element interactivity per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: nominalisation
      relation: supported_by
      weight: expected
      description: "High propositional idea density from nominalisations increases intrinsic processing burden; de-densification targets these constructions (Architecture of Influence, Section 1.1)"
      target_file: discourse_entities
    - target: pedagogical_sequence_marker
      relation: supported_by
      weight: expected
      description: "SOAR narrative sequencing separates phases preventing simultaneous context-switching of complex material"
      target_file: content_architecture_entities
  germane_load_marker:
    description: References to germane cognitive load — productive effort spent on schema construction and deep processing
    canonical_id: germane_load_marker
    entity_kind: cognitive_load_type
    family: clt_load_types
    gliner_label: GERMANE_LOAD
    gliner_description: Germane cognitive load productive processing schema construction deep learning active engagement elaboration
      integration
    examples:
    - schema construction through worked examples
    - productive struggle with the material
    - deep processing through self-explanation
    - germane load supports meaningful learning
    - active cognitive engagement with the content
    anti_examples:
    - passive reading
    - surface memorisation
    confidence_threshold: 0.7
    aliases:
    - productive load
    - deep processing
    - meaningful effort
    indicators:
    - germane load
    - germane processing
    - schema construction
    - deep processing
    - active processing
    - self-explanation
    - productive struggle
    - elaboration
    - meaningful learning
    patterns:
    - germane (load|processing|effort)
    - schema (construction|building|formation)
    - deep (processing|learning|engagement)
    - active (processing|engagement|cognitive)
    - (self-explanation|self[- ]explain|elaborat)
    color: '#27ae60'
    relates_to:
    - target: extraneous_load_marker
      relation: contrasts_with
      weight: required
      description: Germane (schema-building) vs extraneous (wasteful) load
    - target: mayer_generative_principle
      relation: triggers
      weight: expected
      description: Germane load opportunities trigger Mayer's generative fostering principles
    - target: reflection_activity
      relation: supported_by
      weight: expected
      description: Reflection activities promote germane processing through self-explanation and metacognitive schema consolidation
      target_file: activity_types_entities
    - target: discussion_activity
      relation: supported_by
      weight: expected
      description: Discussion activities promote deep processing and active schema construction that characterise germane cognitive load
      target_file: activity_types_entities
    - target: metaphor
      relation: supported_by
      weight: expected
      description: Metaphors export inference structure of a known domain to an unknown domain facilitating deeper schema construction supporting germane load per Elite Speaker Linguistic Analysis
      target_file: rhetorical_devices_entities
    - target: elaboration_marker
      relation: supported_by
      weight: optional
      description: "Elaboration relations preserve context that supports germane meaning-building cognitive load per Researching Narrative and Discourse Analysis"
      target_file: discourse_entities
    - target: pause_marker
      relation: supported_by
      weight: expected
      description: "Strategic pauses provide processing time for germane schema construction — silence after key concepts allows consolidation into long-term memory per Ethos and Physicality research"
      target_file: performance_entities
    - target: emphasis_marker
      relation: supported_by
      weight: expected
      description: "Germane load is supported by emphasis markers; pitch and intensity variability direct the listener's attention to key points, facilitating meaningful processing per Vocal Profiling research"
      target_file: performance_entities
    - target: scenario_activity
      relation: supported_by
      weight: required
      description: "Germane load represents effort devoted to schema construction, which SBT promotes through constructivist active knowledge building via realistic problem-solving per SBT guide"
      target_file: activity_types_entities
    - target: semiotic_arrangement
      relation: supported_by
      weight: expected
      description: "Effective semiotic arrangements (Elaboration and Extension modes) directly support germane processing by helping viewers build mental models through visual structure per Visual Analysis of Slide Decks"
      target_file: visual_elements_entities
    - target: visual_element
      relation: supported_by
      weight: expected
      description: "Germane load is supported by well-designed visual elements — dual coding through text plus visuals creates two memory pathways, doubling encoding effectiveness per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: visual_narrative_element
      relation: supported_by
      weight: expected
      description: "Germane cognitive load is productively triggered by visual narrative elements that require active interpretation — brushing PCPs to discover segments, tracing pathfinding animations, interpreting t-SNE cluster labels per Narrative Visualization research"
      target_file: visual_elements_entities
    - target: working_memory_marker
      relation: supported_by
      weight: required
      description: "Productive schema-building processing requires available working memory capacity freed by reducing extraneous load — Mayer's active processing foundation states learning happens when learners select, organise, and integrate information per mayers_15_principles"
    - target: microlearning_format
      relation: supported_by
      weight: expected
      description: "Effective microlearning maximises germane load through relevant, engaging content that promotes productive mental effort for learning per AI Microlearning Guide"
      target_file: content_format_entities
    - target: engagement_dimension
      relation: supports
      weight: expected
      description: "Germane load represents productive mental effort for learning; engagement strategies like gamification boost this while maintaining learning focus per AI Microlearning Guide"
      target_file: scoring_entities
    - target: practice_activity
      relation: supported_by
      weight: expected
      description: "Germane load is promoted by practice activities — guided practice and application exercises require active schema construction that characterises productive cognitive processing per course structure hierarchy research"
      target_file: activity_types_entities
    - target: instructional_strategy
      relation: supported_by
      weight: expected
      description: "Germane load is supported by instructional strategies that inject emotional moments — curiosity gaps and achievement celebrations deepen schema construction per module-integration-strategy"
      target_file: pedagogical_frameworks_entities
    - target: formative_assessment
      relation: supported_by
      weight: expected
      description: "Germane load is strengthened when practice is paired with immediate feedback that reinforces correct responses per Slide Deck Design Playbook Gagne Event 7"
      target_file: assessment_entities
    - target: claim
      relation: enables
      weight: expected
      description: "Germane load processing is enabled when claims are structured via Action Titles as complete declarative sentences, facilitating schema building and meaningful encoding (Canonical Presentation Methodology)"
      target_file: narrative_entities
    - target: visionary_bundle
      relation: supported_by
      weight: expected
      description: "Visionary discourse bundles guide audience attention toward meaning-making rather than decoding abstract hedges (Architecture of Influence, Section 1.3)"
      target_file: rhetorical_devices_entities
  mayer_extraneous_principle:
    description: 'References to Mayer''s principles for reducing extraneous processing: coherence, signalling, redundancy,
      spatial contiguity, temporal contiguity'
    canonical_id: mayer_extraneous_principle
    entity_kind: mayer_principle
    family: extraneous_reduction
    gliner_label: MAYER_EXTRANEOUS
    gliner_description: Mayer principle coherence signalling cueing redundancy spatial contiguity temporal contiguity reduce
      extraneous
    examples:
    - violates the coherence principle
    - add signalling cues to highlight key content
    - the redundancy principle suggests removing duplicate text
    - spatial contiguity — labels should be on the diagram
    - temporal contiguity requires syncing narration with visuals
    - remove seductive details per coherence
    anti_examples:
    - coherent argument structure
    - consistent signalling
    confidence_threshold: 0.7
    aliases:
    - coherence principle
    - signalling principle
    - contiguity principle
    indicators:
    - coherence principle
    - signalling principle
    - cueing
    - redundancy principle
    - spatial contiguity
    - temporal contiguity
    - seductive details
    - extraneous material
    - integrated labels
    - sync narration
    patterns:
    - (coherence|signalling|cueing|redundancy) principle
    - (spatial|temporal) contiguity
    - (remove|eliminate) (seductive|extraneous|decorative) (details|material|elements)
    - (integrate|embed) labels (into|within|on)
    - (sync|synchronise) (narration|audio) (with|to)
    color: '#3498db'
    relates_to:
    - target: extraneous_load_marker
      relation: resolves
      weight: required
      description: Mayer's extraneous principles provide specific remedies for detected extraneous load
    - target: mayer_essential_principle
      relation: contrasts_with
      weight: expected
      description: Extraneous reduction vs essential management — different Mayer principle categories
    - target: germane_load_marker
      relation: enables
      weight: required
      description: Redundancy Principle eliminates redundant visual+verbal information, freeing cognitive resources for germane
        processing
    - target: learning_principle
      relation: specialises
      weight: required
      description: Mayer's 15 principles are tactical implementations of Cognitive Load Theory
      target_file: pedagogical_frameworks_entities
    - target: structural_slide
      relation: supports
      weight: required
      description: 'Mayer''s principles directly guide slide design: Coherence eliminates chartjunk, Signaling highlights
        key content'
      target_file: slide_types_entities
    - target: design_principle
      relation: enables
      weight: expected
      description: Mayer's extraneous principles (coherence, signaling, contiguity) enable evidence-based design principle application in visual content
      target_file: visual_elements_entities
    - target: visual_element
      relation: limits
      weight: expected
      description: "Mayer's extraneous principles (coherence, signalling) limit visual element usage — decorative images, gratuitous animations, and seductive details must be removed per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: negative_qualifier
      relation: enables
      weight: expected
      description: "Mayer's extraneous principles enable negative qualifier scoring — violations of coherence, redundancy, and contiguity principles trigger negative quality assessments per Visualisation Techniques research"
      target_file: scoring_entities
    - target: animation_type
      relation: limits
      weight: expected
      description: "Mayer's coherence principle limits animation type usage — gratuitous animations that don't serve learning objectives add extraneous cognitive load per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: storyboard_element
      relation: supports
      weight: expected
      description: "Mayer's extraneous load reduction applies to storyboard design — removing unnecessary detail, shading, and decorative elements keeps frames clear and focused on essential information per Sketch Style for Wireframes and Storyboards"
      target_file: media_entities
    - target: planning_artefact_marker
      relation: supports
      weight: expected
      description: "Mayer's coherence principle governs wireframe planning — include only visuals and text that directly support the learning objective, reducing extraneous cognitive load at the planning stage per Wireframe Best Practices"
      target_file: content_architecture_entities
    - target: audio_element
      relation: limits
      weight: expected
      description: "Redundancy Principle warns against presenting same information in multiple formats simultaneously such as showing text while reading it aloud, overloading both channels per mayers_15_principles"
      target_file: media_entities
    - target: mayer_essential_principle
      relation: precedes
      weight: required
      description: "Extraneous processing reduction (Category A) must precede essential processing management (Category B) in Mayer's cognitive processing hierarchy per mayers_15_principles"
    - target: intrinsic_load_marker
      relation: enables
      weight: expected
      description: "Reducing extraneous load frees cognitive capacity for processing intrinsic content complexity — removing unnecessary words, images, or sounds enables focus on essential material per mayers_15_principles"
    - target: typography_element
      relation: limits
      weight: expected
      description: "Redundancy principle limits on-screen typography — verbatim duplication of narration as on-screen text creates extraneous load per Visual Best Practices for Corporate Learning Videos"
      target_file: visual_elements_entities
    - target: assessment_item_type
