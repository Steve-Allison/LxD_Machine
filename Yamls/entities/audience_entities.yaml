      relation: triggers
      weight: optional
      description: "Technical buyers trigger need for data evidence — scalability, security, and integration issues require technical proof points per SOAR Storytelling research"
      target_file: evidence_types_entities
    - target: action_marker
      relation: supported_by
      weight: expected
      description: "Technical buyers require action-oriented solution details showing how the product addresses technical requirements per SOAR Narrative Mapping by Sales Stage"
      target_file: sales_entities
    - target: visual_demonstration
