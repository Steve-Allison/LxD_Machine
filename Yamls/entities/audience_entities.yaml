  relationships: null
entity_types:
  economic_buyer:
    description: Executive with budget authority and final purchase approval
    canonical_id: economic_buyer
    entity_kind: buyer_persona
    family: buying_audience
    gliner_label: ECONOMIC_BUYER
    gliner_description: Executive budget authority CFO CMO CRO final approval purchase decision ROI business case
    examples:
    - CFO
    - CMO
    - CRO
    - VP of Marketing
    - Chief Digital Officer
    - budget holder
    - economic decision maker
    - executive sponsor
    anti_examples:
    - economy class
    - economic conditions
    - economic forecast
    confidence_threshold: 0.75
    match_policy_ref: defaults
    aliases:
    - budget_holder
    - executive_buyer
    - decision_maker
    indicators:
    - CFO
    - CMO
    - CRO
    - CDO
    - CIO
    - VP
    - Chief
    - budget
    - approval
    - executive
    patterns:
    - C[A-Z]O
    - VP of \w+
    - Chief \w+ Officer
    - budget \w+
    color: '#2c3e50'
    relates_to:
    - target: decision_maker_marker
      relation: enables
      weight: expected
      description: Economic buyer role provides the referent for MEDDPICC decision maker markers
      target_file: sales_entities
    - target: logos_appeal
      relation: supported_by
      weight: expected
      description: "Economic buyers are persuaded by logical appeals emphasising cost savings, time savings, and ROI per Comprehensive Audience Analysis"
      target_file: rhetorical_devices_entities
    - target: data_statistic
      relation: supported_by
      weight: expected
      description: "Economic buyers require statistics, metrics, and financial analysis as evidence per Comprehensive Audience Analysis"
      target_file: evidence_types_entities
    - target: audience_kpi
      relation: contains
      weight: required
      description: "Economic buyers evaluate solutions against their KPIs including throughput, cost reduction, and client satisfaction per Comprehensive Audience Analysis"
    - target: result_marker
      relation: supported_by
      weight: expected
      description: "Economic buyers require result evidence showing measurable business outcomes and ROI per SOAR Narrative Mapping by Sales Stage"
      target_file: sales_entities
    - target: claim
      relation: supported_by
      weight: required
      description: "The Audience Transformation Roadmap requires mapping economic buyers' Point A beliefs and Point B desired actions; claims must be tailored to justify their specific decision (Canonical Presentation Methodology)"
      target_file: narrative_entities
    - target: budget_objection
      relation: triggers
      weight: expected
      description: "Economic buyers trigger budget objections as their primary purchasing concern — CFOs and budget holders scrutinise cost justification and ROI before approving spend per Comprehensive Audience Analysis"
      target_file: sales_entities
  technical_buyer:
