      relation: supported_by
      weight: expected
      description: "Technical buyers value peer credibility and expert acknowledgement of their existing knowledge per Comprehensive Audience Analysis"
      target_file: rhetorical_devices_entities
    - target: industry_benchmark
      relation: supported_by
      weight: expected
      description: "Technical buyers require performance benchmarks and industry security standard compliance as proof per Comprehensive Audience Analysis"
