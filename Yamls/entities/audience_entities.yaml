soar_stage_persona_alignment:
  description: Maps key buyer personas to SOAR narrative stage emphasis — different personas engage at different depth levels
    across the four stages
  economic_buyer:
    primary_engagement: RESULT
    secondary_engagement: SITUATION
    content_preference: ROI, validated outcomes, strategic business impact, cost of inaction
    presentation_style: BLUF — lead with recommendation and business case; support with evidence
    note: Economic buyers want the bottom line first; detail slides should be available but not led with
  technical_buyer:
    primary_engagement: ACTION
    secondary_engagement: RESULT
    content_preference: Architecture, integration, security, scalability, implementation path
    presentation_style: Structured evidence — validation criteria, technical proof points, reference architectures
    note: Technical buyers hold veto power; their objections must be pre-empted in the ACTION stage
  user_buyer:
    primary_engagement: OPPORTUNITY
    secondary_engagement: ACTION
    content_preference: Day-in-the-life improvement, friction removal, workflow transformation, time savings
    presentation_style: Story-first — show before/after contrast from the user perspective; demo works well here
    note: User buyers are emotionally engaged when the day-to-day pain is named accurately in the OPPORTUNITY stage
  champion_persona:
    primary_engagement: ALL STAGES
    secondary_engagement: RESULT
    content_preference: Internal business case ammunition, ROI calculator, stakeholder-specific messaging
    presentation_style: All four SOAR stages — champion must be able to re-tell the story to internal stakeholders
    note: The champion needs content they can share; leave-behind materials should cover all four SOAR stages at appropriate
      depth
quality_indicators:
  audience_specificity:
    generic: No audience entity detected — content not targeted; likely low resonance
    single_tier: One tier detected (e.g., only ECONOMIC_BUYER) — targeted but may miss other stakeholders
    multi_stakeholder: Two or more buyer types detected — content addresses multi-stakeholder reality
  executive_calibration:
    misaligned: ECONOMIC_BUYER detected but content opens with technical detail — BLUF format required
    aligned: ECONOMIC_BUYER + BLUF_HOOK detected in opening — correct format for executive audience
