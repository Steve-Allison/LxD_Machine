  - Corpus/Research/Research - Presentation Delivery_ Ethos and Physicality.md
  - Corpus/Research/Research - Personal Branding Framework for Early.md
  - Corpus/Research/Research - Advanced Computational Discourse Analysis_ Operationalizing Rhetorical Structure Theory with
    LLM.md
  - Corpus/Research/Research - Analyzing Story for Business Communication.md
  - Corpus/Research/Research - The Anatomy of Presence.md
