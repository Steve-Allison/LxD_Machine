quality_indicators:
  positive:
  - slide type matches content intent
  - appropriate structural complexity for the message
  - correct prompt group routing
  - clear slide type reference in brief
  - appropriate pacing rhythm with lean and dense slides alternating
  - slide type matches the narrative function (lean vs. dense)
  negative:
  - slide type mismatch with content
  - overly complex layout for simple message
  - ambiguous slide type reference
  - missing slide type specification in storyboard
  - label title slide with no assertion
  - uniformly dense deck with no breather slides
