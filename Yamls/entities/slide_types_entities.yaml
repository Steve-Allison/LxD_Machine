    - glossary slide
    - reference slide
    - two-column
    - two column
    - table slide
    - matrix slide
    - key takeaway slide
    - key message slide
    - summary slide
    - action title slide
    - recommendation slide
    - SCQA slide
    - BLUF slide
    - bottom line up front slide
