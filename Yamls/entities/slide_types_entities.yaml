_meta:
  id: slide_types_entities
  purpose: entity
  version: 1.21.0
  last_updated: '2026-03-09'
  description: GLiNER entity definitions for detecting slide type references in instructional briefs, storyboards, and content
    planning text — aligned to the 28-type slide taxonomy.
  domain: visual
  domain_type: cross_cutting
  corpus_sources:
  - Corpus/Research/Research - Visual Analysis of Slide Decks.md
  - Corpus/Research/Research - Canonical Presentation Methodology Research.md
  - Corpus/Research/Research - Visual Communication and Storytelling.md
  - Corpus/Research/Research - visualisation_techniques_corporate_learning.md
  - Corpus/Research/slide_design_research_monograph.md
  - Corpus/Research/slide_design_research_monograph_part_2.md
  - Corpus/Research/slide_design_research_monograph_part_4.md
  - Corpus/Research/Applying Mayer's Principles & Contemporary Theory - A Practical Checklist.md
  - Corpus/Research/Research - Narrative Visualization, Sketchnoting, Accessibility.md
  - Corpus/Research/Visual Best Practices for Corporate Learning Videos.md
  - Corpus/Research/Research - Storyboard Best Practices.md
  - Corpus/Research/research_-_slide_deck_design_playbook_research.md
  - Corpus/Research/Research - Slide Deck Design Playbook Research.md
  relationships:
  - target: taxonomy/slide_types_taxonomy.yaml
    type: depends_on
    description: Canonical 28-type slide taxonomy with SigLIP prompts and text signals
gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - slide
    - deck
    - presentation
    - layout
    - diagram
    - chart
    - cover
    - agenda
    secondary:
    - hub and spoke
    - process flow
    - timeline
    - comparison
    - testimonial
    - framework
    - pillars
    - dashboard
entity_types:
  structural_slide:
    description: References to structural diagram slides including architecture stacks, hub-spoke, cycles, process flows,
      hierarchies, and timelines
    canonical_id: structural_slide
    entity_kind: slide_type
    family: structural
    gliner_label: STRUCTURAL_SLIDE
    gliner_description: Structural slide architecture stack hub spoke cycle process flow hierarchy tree timeline roadmap diagram
      layers
    examples:
    - add an architecture stack slide
    - create a hub-and-spoke diagram
    - include a process flow showing the workflow
    - we need a timeline slide for the roadmap
    - insert a cycle diagram for the iterative process
    - add an org chart hierarchy
    - create a current state / future state flowchart
    - add a market map diagram showing the competitive landscape
    anti_examples:
    - the structure of the argument
    - process improvement project
    - timeline of events
    confidence_threshold: 0.7
    aliases:
    - diagram slide
    - flow slide
    - structural diagram
    indicators:
    - architecture stack
    - hub and spoke
    - hub-and-spoke
    - cycle diagram
    - process flow
    - workflow diagram
    - hierarchy
    - org chart
    - timeline slide
    - roadmap slide
    - tree diagram
    - layered architecture
    - flowchart
    - flow chart
    - market map
    - current state slide
    - future state slide
    - current state diagram
    - future state diagram
    patterns:
    - (architecture|technology|platform) (stack|layers?) (slide|diagram)
    - (hub[- ]and[- ]spoke|hub[- ]spoke|radial) (slide|diagram|layout)
    - (cycle|circular|loop|iterative) (slide|diagram|process)
    - (process|workflow|pipeline) (flow|slide|diagram)
    - (hierarchy|org chart|tree) (slide|diagram|structure)
    - (timeline|roadmap|milestone) (slide|diagram|view)
    - (flowchart|flow chart) (slide|diagram|page)
    - (current[- ]state|future[- ]state) (slide|diagram|view)
    - (market map|strategic map) (slide|diagram)
    color: '#2c3e50'
    maps_to_taxonomy_types:
    - architecture_stack
    - hub_spoke
    - cycle_process
    - process_flow
    - hierarchy_tree
    - timeline_roadmap
    relates_to:
    - target: session_structure_marker
      relation: supports
      weight: required
      description: Structural slides (agenda slides, section dividers, roadmap slides) serve as scaffolding that reduces listener
        anxiety. They provide the session structure markers that signal what to expect and when major transitions occur.
      target_file: delivery_entities
    - target: content_structure_marker
      relation: enables
      weight: expected
      description: "Section divider slides use Repetition principle to build navigation structure per Slide Deck Design Playbook"
      target_file: content_architecture_entities
    - target: layout_pattern
      relation: contains
      weight: required
      description: "Structural slides contain specific layout patterns that define their visual organisation per slide design research monograph"
      target_file: visual_elements_entities
    - target: video_edit_transition
      relation: bridges
      weight: expected
      description: "Structural slides bridge with video edit transitions — title cards and chapter headings appear at transition points between video segments as visual signposts per Visual Best Practices for Corporate Learning Videos"
      target_file: media_entities
    - target: progressive_disclosure_marker
      relation: supports
      weight: expected
      description: "Structural slides support progressive disclosure by segmenting content into labelled chapters that signal topic shifts and provide mental rest points per Visual Best Practices for Corporate Learning Videos"
      target_file: cognitive_load_entities
    - target: scqa_marker
      relation: supported_by
      weight: optional
      description: "Structural diagram slides benefit from SCQA framing to establish why the architecture matters — Situation/Complication provides context before the structural Answer per slide deck design playbook"
      target_file: rhetorical_devices_entities
    - target: SITUATION_MARKER
      relation: supports
      weight: expected
      description: "Structural slides with Bento Grid serve SOAR Situation phase for contextual grounding"
      target_file: sales_entities
    taxonomy_mapping:
    - taxonomy: slide_types_taxonomy
      dimension: slide_category
      values:
      - structural
      strength: primary
  data_proof_slide:
    description: References to data-driven and proof slides including statistics, ROI, comparisons, charts, testimonials,
      and competitive landscapes
    canonical_id: data_proof_slide
    entity_kind: slide_type
    family: data_proof
    gliner_label: DATA_PROOF_SLIDE
    gliner_description: Data proof slide statistics metrics ROI business impact comparison chart graph customer testimonial
      case study competitive landscape
    examples:
    - add a stats slide with the key metrics
    - include an ROI slide showing business impact
    - create a before-and-after comparison slide
    - we need a chart slide for the data
    - add a customer testimonial slide
    - insert a competitive landscape quadrant
    - add a problem slide showing the market gap
    - create a TAM/SAM/SOM market sizing slide
    - include a solution slide after the problem
    - include an evidence slide to support the recommendation
    anti_examples:
    - the data shows
    - compare the two approaches
    - customer feedback email
    - the problem with our strategy
    - the solution to the inefficiency
    confidence_threshold: 0.7
    aliases:
    - metrics slide
    - data slide
    - proof point slide
    indicators:
    - stats slide
    - metrics slide
    - ROI slide
    - business impact slide
    - comparison slide
    - before and after
    - chart slide
    - graph slide
    - data visualisation
    - testimonial slide
    - case study slide
    - customer proof
    - competitive landscape
    - quadrant
    - logo slide
    - problem slide
    - solution slide
    - market sizing slide
    - TAM SAM SOM
    - bubble chart slide
    - revenue slide
    - evidence slide
    - proof slide
    - supporting data slide
    patterns:
    - (stats|metrics|KPI|numbers?) (slide|page)
    - (ROI|business impact|value|benefit) (slide|page)
    - (comparison|before[- ]and[- ]after|vs) (slide|page)
    - (chart|graph|data|trend|forecast) (slide|page|visualisation)
    - (customer|client|testimonial|case study|proof) (slide|page)
    - (competitive|market|landscape|quadrant) (slide|page|map)
    - (problem|pain point|challenge) (slide|page)
    - (solution|resolution|answer) (slide|page)
    - (TAM|SAM|SOM|market size|market sizing) (slide|page|chart|diagram)
    - (revenue|growth|traction) (slide|page|chart)
    - (evidence|proof point|supporting data|validation) (slide|page)
    color: '#27ae60'
    maps_to_taxonomy_types:
    - stats_metrics
    - business_impact
    - comparison
    - chart_data
    - customer_proof
    - competitive_landscape
    relates_to:
    - target: evidence
      relation: supports
      weight: required
      description: Data/proof slides provide evidence via charts, statistics, or research to substantiate claims
      target_file: narrative_entities
    - target: chart_type
      relation: contains
      weight: required
      description: Data proof slides contain chart types as the primary mechanism for visual data representation and storytelling
        per Visual Communication and Storytelling
      target_file: visual_elements_entities
    - target: data_statistic
      relation: contains
      weight: required
      description: Data proof slides contain data statistics transformed into compelling visual narratives for decision-making
        per Visual Communication and Storytelling
      target_file: evidence_types_entities
    - target: executive_audience
      relation: supports
      weight: expected
      description: "Data proof slides directly support executive audience needs by providing evidence-based decision-making material with ROI metrics and business impact data per slide design research monograph part 2"
      target_file: audience_entities
    - target: cognitive_debt_marker
      relation: triggers
      weight: expected
      description: "Data proof slides with excessive data series, chartjunk, or missing action titles trigger cognitive debt by overwhelming the audience with unstructured quantitative information per slide design research monograph part 4"
      target_file: visual_elements_entities
    - target: video_shot_type
      relation: supported_by
      weight: expected
      description: "Data proof slides are supported by specific video shot types — green screen compositing shows charts and graphs behind the presenter who can gesture toward data points per Visual Best Practices for Corporate Learning Videos"
      target_file: media_entities
    - target: layout_pattern
      relation: supported_by
      weight: expected
      description: "Data proof slides require layout patterns that leave appropriate space for data visualisation while maintaining presenter visibility per Visual Best Practices for Corporate Learning Videos"
      target_file: visual_elements_entities
    - target: quality_indicator
      relation: supported_by
      weight: expected
      description: "Data proof slide quality is measured by Tufte's Data-Ink Ratio — removal of gridlines, 3D effects, and chart junk maximizes data communication (Cognitive Interface, §4.1)"
      target_file: visual_elements_entities
    - target: claim
      relation: supports
      weight: required
      description: "Data proof slides serve as the Dashes that prove the Dot (action title claim) — each chart or statistic must explicitly substantiate the slide's headline assertion per slide deck design playbook"
      target_file: narrative_entities
    - target: RESULT_MARKER
      relation: supports
      weight: expected
      description: "Data proof slides with Hero Card serve Results phase validating approach with focal statistics"
      target_file: sales_entities
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Multimedia principle requires data slides pair visual charts with verbal explanation for dual coding per Applying Mayer's Principles Practical Checklist"
      target_file: visual_elements_entities
    taxonomy_mapping:
    - taxonomy: slide_types_taxonomy
      dimension: slide_category
      values:
      - data_proof
      strength: primary
