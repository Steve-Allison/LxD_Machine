    relates_to:
    - target: clarity_dimension
      relation: supports
      weight: required
      description: Content slides must prioritize clarity through minimalist design, clear hierarchy, and focused messaging.
        The primary purpose of content slides is semantic clarity; excessive visual decoration reduces clarity scores.
      target_file: scoring_entities
    - target: typography_element
      relation: contains
      weight: expected
      description: "Content slides contain typography elements (headlines, body text, captions, bullet points) as their primary information carriers per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: content_structure_marker
      relation: supported_by
      weight: expected
      description: "Content slides depend on content structure markers for proper pedagogical sequencing per slide design research monograph"
      target_file: content_architecture_entities
    - target: mayer_extraneous_principle
      relation: supported_by
      weight: expected
      description: "Content slides with excessive text, decorative graphics, or redundant on-screen narration text violate Mayer's coherence and redundancy principles — content must be stripped to essential instructional elements per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    - target: video_shot_type
      relation: supported_by
      weight: expected
      description: "Content slides are supported by video shot types — side-by-side lecture framing places the presenter alongside keyed-in slide content per Visual Best Practices for Corporate Learning Videos"
      target_file: media_entities
    - target: storyboard_element
