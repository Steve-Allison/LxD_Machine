quality_indicators:
  positive:
  - measurable action verb
  - clear condition specified
  - defined success criterion
  - aligned to Bloom's level
  - ABCD formula complete
  negative:
  - unmeasurable verb (understand, know, appreciate)
  - missing condition
  - no success criterion
  - Bloom's level mismatch with assessment
  - vague or compound objective
