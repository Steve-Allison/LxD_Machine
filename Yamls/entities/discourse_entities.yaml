    field: coherence
    indicators:
    - importantly
    - crucially
    - notably
    - significantly
    - especially
    - particularly
    - above all
    - most importantly
    - it is worth noting
    - of particular note
    - remarkably
    - strikingly
    - critically
    patterns:
    - importantly
    - crucially
    - notably
    - significantly
    - above all
    - most importantly
    color: '#c0392b'
    relates_to:
    - target: anaphora
      relation: supported_by
      weight: expected
      description: "Emphasis markers are supported by anaphora which creates emphatic repetition at the beginning of successive clauses per Analyzing Story for Business Communication"
      target_file: rhetorical_devices_entities
    - target: pause_marker
      relation: triggers
      weight: expected
      description: "Emphasis markers trigger strategic pauses that provide prosodic weight and audience processing time; elite speakers place unfilled pauses after emphasis words for maximum impact per elite_speaker_taxonomy"
      target_file: performance_entities
    - target: mayer_extraneous_principle
      relation: supported_by
      weight: expected
      description: "Bold and highlighting implement signaling principle guiding learner attention per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
  concession_marker:
    label: CONCESSION_MARKER
    field_description: Concession acknowledgement marker admittedly granted of course certainly true that while it is
    description: Lexical marker signalling concession or acknowledgement before counter-point
    entity_kind: discourse_marker
    family: coherence_structure
    examples:
    - admittedly costs increased
    - granted there are challenges
    - of course risks exist
    - certainly the timeline is tight
    - true that competitors are strong
    - while it is difficult
    - no doubt there are concerns
    - it must be admitted that
    - to be fair the process
    confidence_threshold: 0.7
    field: coherence
    indicators:
    - admittedly
    - granted
    - of course
    - certainly
    - 'true'
    - no doubt
    - it must be admitted
    - to be fair
    - to be sure
    - indeed
    - naturally
    patterns:
    - admittedly
    - granted,? \w+
    - of course
    - certainly
    - it must be admitted
    - to be fair
    color: '#7f8c8d'
    relates_to:
    - target: qualifier
      relation: enables
      weight: optional
      description: Discourse concessions can introduce qualifiers for claims
      target_file: narrative_entities
    - target: ethos_appeal
      relation: supports
      weight: required
      description: Concession markers (admittedly, I grant that, it's true that) enable ethos appeals by demonstrating fairness
        and intellectual honesty. Strategic concessions increase credibility by acknowledging counterarguments before refuting
        them.
