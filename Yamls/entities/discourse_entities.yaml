    coherence markers, complexity indicators, and cross-modal references.
  domain: narrative
  domain_type: cross_cutting
  corpus_sources:
  - 'Corpus/Research/Structural Paradigms in Natural Language Processing: A Comprehensive Analysis of Narrative Orchestration,
    Discourse Integration, and Latent Evaluation.md'
  - 'Corpus/Research/PDL Architecture: Narrative & Discourse Analysis Series.md'
  - Corpus/Research/Crafting Powerful Opening Plays.md
  - Corpus/Research/Research - Elite Speaker Linguistic Analysis Taxonomy.md
  - Corpus/Research/Research - Visual Communication and Storytelling.md
  - Corpus/Research/Research - Researching Narrative and Discourse Analysis.md
  - Corpus/Research/Research - Canonical Presentation Methodology Research.md
  - Corpus/Research/Research - Advanced Computational Discourse Analysis_ Operationalizing Rhetorical Structure Theory with
    LLM.md
  - Corpus/Research/Research - Analyzing Story for Business Communication.md
  - Corpus/Research/a-guide-to-good-reasoning-cultivating-intellectual-virtues-16112.md
  - Corpus/Research/Research - The Architecture of Influence_ A Comprehensive Multimodal Taxonomy of Elite vs. Average Public
