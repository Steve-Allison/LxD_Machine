    - to sum up the key points
    - in conclusion the data supports
    - all in all a success
    - the bottom line is
    - ultimately we achieved
    - to recap the main points
    confidence_threshold: 0.8
    field: coherence
    indicators:
    - in summary
    - to summarise
    - to conclude
    - in conclusion
    - overall
    - in short
    - to sum up
    - all in all
    - the bottom line
    - ultimately
    - in brief
    - to recap
    patterns:
    - in summary
    - to conclude
    - in conclusion
    - overall
    - in short
    - to sum up
    - to recap
    color: '#27ae60'
    relates_to:
    - target: resolution_signal
      relation: supports
      weight: required
      description: Summary markers (in summary, to recap, in conclusion, the bottom line) signal narrative closure and consolidation.
        They enable audiences to integrate information into long-term memory.
      target_file: narrative_entities
    - target: tricolon_marker
      relation: supported_by
      weight: expected
      description: Steve Jobs frames talks as Just three stories with the Rule of Three meta-structure reducing cognitive load signaling completeness per Elite Speaker Linguistic Analysis
    - target: structural_slide
      relation: supports
      weight: expected
      description: "Summary discourse markers support structural recap slides — 'in summary', 'to conclude', and 'the bottom line' signal the transition to summary slides that consolidate key points per slide deck design playbook"
      target_file: slide_types_entities
    - target: claim
      relation: contains
      weight: expected
      description: "Summary markers encapsulate the claim in executive summary form; Horizontal Flow requires that Action Titles serve as standalone summary statements (Canonical Presentation Methodology)"
      target_file: narrative_entities
    - target: working_memory_marker
      relation: supports
      weight: expected
      description: "Summary markers consolidate information and reduce working memory demands by chunking content into retrievable packages aligned with the brain's limited processing capacity per elite_speaker_taxonomy"
      target_file: cognitive_load_entities
    - target: progressive_disclosure_marker
      relation: supports
      weight: expected
      description: "Summary markers support progressive disclosure Billboard and Skim layers for core message extraction"
      target_file: cognitive_load_entities
  emphasis_marker:
