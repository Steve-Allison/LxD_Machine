    - now let's consider
    - regarding the timeline
    - as for the budget
    - with respect to security
    - concerning the next steps
    - on the subject of
    - speaking of which
    confidence_threshold: 0.75
    field: coherence
    indicators:
    - turning to
    - moving on
    - now
    - regarding
    - as for
    - with respect to
    - concerning
    - on the subject of
    - speaking of
    - as regards
    - in terms of
    patterns:
    - turning to \w+
    - moving on to \w+
    - now let's \w+
    - regarding \w+
    - as for \w+
    color: '#8e44ad'
    relates_to:
    - target: transition_marker
      relation: contains
      weight: expected
      description: Topic shifts subsume narrative transition markers
      target_file: narrative_entities
    - target: session_structure_marker
      relation: supports
      weight: required
      description: Topic shift markers (now, moving on, let's turn to, shifting gears) signal major transitions in presentation
        structure. They reduce listener anxiety by making structure explicit.
      target_file: delivery_entities
    - target: transition_marker
      relation: supports
      weight: expected
      description: Frame markers and transition markers segment speech into digestible chapters providing structural signposting per Elite Speaker Linguistic Analysis
      target_file: narrative_entities
  summary_marker:
