  - Hyland (2005) - Stance and engagement
  relationships: null
entity_types:
  cause_marker:
    label: CAUSE_MARKER
    field_description: Causal discourse marker because since therefore thus hence consequently due to as a result
    description: Lexical marker signalling causal or consequential relationship
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - because we invested in R&D
    - since market conditions improved
    - due to customer demand
    - therefore we succeeded
    - thus revenue increased
    - consequently costs decreased
    - as a result of the changes
    - hence the improvement
    - owing to strong execution
    - thanks to our team
    confidence_threshold: 0.7
    field: rst
    indicators:
    - because
    - since
    - as
    - due to
    - owing to
    - given that
    - therefore
    - thus
    - hence
    - consequently
    - as a result
    - so
    - accordingly
    - thanks to
    patterns:
    - because \w+
    - due to \w+
    - as a result of
    - therefore
    - consequently
    color: '#e74c3c'
    relates_to:
    - target: logos_appeal
      relation: supports
      weight: required
      description: Cause markers (because, since, as, caused by) explicitly establish causal reasoning. They enable logos
        appeals by articulating logical relationships between propositions.
      target_file: rhetorical_devices_entities
    - target: claim
      relation: supports
      weight: expected
      description: "Discourse-Aware TS explicitly preserves causal links as Cause relations connecting propositions to claims per Researching Narrative and Discourse Analysis"
      target_file: narrative_entities
    - target: elaboration_marker
      relation: contrasts_with
      weight: optional
      description: "RSTformer RST-attention heads specialize with causal relations occupying different attention heads than elaboration relations showing functional contrast per Researching Narrative and Discourse Analysis"
    - target: warrant
      relation: supports
      weight: expected
      description: "Cause markers (because, since, therefore) express the warrant — the logical connection between evidence (Dashes) and claim (Dot) in hierarchical argument structure per Canonical Presentation Methodology"
      target_file: narrative_entities
    - target: evidence
      relation: enables
      weight: expected
      description: "Causal discourse markers enable evidence presentation forcing explicit causal connections in narrative prose"
      target_file: narrative_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - cause
      strength: primary
  contrast_marker:
    label: CONTRAST_MARKER
    field_description: Contrastive discourse marker however but although nevertheless despite yet on the other hand
    description: Lexical marker signalling contrast, opposition, or concession
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - however costs also rose
    - but quality declined
    - although expensive, it succeeded
    - yet results were modest
    - nevertheless we proceeded
    - on the other hand, Product B failed
    - despite the challenges
    - in contrast to expectations
    - whereas competitors struggled
    - unlike our competitors
    confidence_threshold: 0.75
    field: rst
    indicators:
    - but
    - however
    - although
    - though
    - even though
    - yet
    - nevertheless
    - nonetheless
    - despite
    - in spite of
    - on the other hand
    - conversely
    - in contrast
    - whereas
    - while
    - unlike
    patterns:
    - however
    - although \w+
    - despite \w+
    - on the other hand
    - in contrast
    - unlike \w+
    color: '#9b59b6'
    relates_to:
    - target: antithesis
      relation: enables
      weight: expected
      description: Discourse contrast markers provide the connective tissue for antithesis devices
      target_file: rhetorical_devices_entities
    - target: narrative_tension
      relation: supports
      weight: required
      description: Contrast markers (but, however, yet, on the other hand) establish oppositions that create narrative tension.
        They signal departures from expectations and prepare audiences for resolution.
      target_file: narrative_entities
    - target: contrast_hook
      relation: supports
      weight: expected
      description: Contrast markers support contrast hooks by providing the discourse connectives (however, but, yet) that
        signal the expectation-reality gap in opening contrasts per Crafting Powerful Opening Plays
      target_file: opening_hooks_entities
    - target: cause_marker
      relation: bridges
      weight: optional
      description: "Elite discourse replaces academic contrast markers ('On the other hand') with cause-oriented navigation ('What this means is'), bridging contrastive and causal framing per Architecture of Influence"
    - target: design_principle
      relation: supported_by
      weight: expected
      description: "Discourse contrast markers map to visual contrast principles using perceptual opposites to make elements stand out per Visual Communication and Storytelling"
      target_file: visual_elements_entities
    - target: antithesis
      relation: specialises
      weight: expected
      description: "RST framework treats contrast as a rhetorical relation type with antithesis being the rhetorical device form of the same structural opposition per Researching Narrative and Discourse Analysis"
      target_file: rhetorical_devices_entities
    - target: concession_marker
      relation: bridges
      weight: expected
      description: Contrast and concession are related RST relations sharing overlapping signal sets — contrast marks balanced
        opposition while concession marks acknowledged counterpoints with different nuclearity per Advanced Computational Discourse
        Analysis research
    - target: qualifier
      relation: triggers
      weight: expected
      description: "Discount indicators (but, however, nevertheless, although, yet) signal qualifications that acknowledge objections while maintaining the main claim per a-guide-to-good-reasoning"
      target_file: narrative_entities
    - target: rebuttal
      relation: supports
      weight: expected
      description: "Adversative markers (however, nevertheless, but) signal contrasting or rebutting content — RST Contrast relations use these markers to flag opposing arguments per UNIFIED_NARRATIVE_METHODOLOGY_v2"
      target_file: narrative_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - contrast
      strength: primary
  temporal_marker:
    label: TEMPORAL_MARKER
    field_description: Temporal sequence marker when after before then next finally subsequently during meanwhile
    description: Lexical marker signalling temporal sequence or time frame
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - when we launched the product
    - after completing the pilot
    - before the merger
    - then we expanded
    - next we validated
    - finally we deployed
    - subsequently revenue grew
    - during Q3
    - meanwhile competitors struggled
    - previously we had tried
    - following the acquisition
    confidence_threshold: 0.7
    field: rst
    indicators:
    - when
    - after
    - before
    - until
    - while
    - during
    - first
    - then
    - next
    - finally
    - subsequently
    - previously
    - meanwhile
    - eventually
    - at first
    - in the end
    - following
    - prior to
    patterns:
    - when \w+
    - after \w+
    - before \w+
    - first,? \w+
    - then,? \w+
    - finally,? \w+
    - following \w+
    color: '#3498db'
    relates_to:
    - target: narrative_hook
      relation: supports
      weight: required
      description: Temporal markers (first, then, finally, once, when) create narrative time sequence. They establish causal
        and temporal relationships that generate narrative coherence and hook audience attention.
      target_file: narrative_entities
    - target: ACTION_MARKER
      relation: supports
      weight: expected
      description: "Temporal markers map to sequential process flows in Approach phase with chronological steps"
      target_file: sales_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - temporal
      strength: primary
  elaboration_marker:
    label: ELABORATION_MARKER
    field_description: Elaboration marker specifically in particular for example such as namely that is in other words
    description: Lexical marker signalling elaboration, specification, or exemplification
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - specifically we reduced latency
    - in particular the enterprise segment
    - for example healthcare clients
    - such as API integration
    - namely the core features
    - that is return on investment
    - in other words simplified workflow
    - to illustrate the impact
    - more precisely the algorithm
    - for instance in finance
    confidence_threshold: 0.65
    field: rst
    indicators:
    - specifically
    - in particular
    - for example
    - for instance
    - such as
    - namely
    - that is
    - i.e.
    - e.g.
    - in other words
    - to illustrate
    - more precisely
    - to be specific
    patterns:
    - specifically
    - in particular
    - for example
    - for instance
    - such as \w+
    - namely
    - that is
    color: '#2ecc71'
    relates_to:
    - target: clarity_dimension
      relation: supports
      weight: required
      description: Elaboration markers (in other words, for example, that is to say) provide real-time definitions and clarification.
        They reduce propositional density by unpacking complex ideas. Elaboration improves clarity scores.
      target_file: scoring_entities
    - target: intrinsic_load_marker
      relation: contrasts_with
      weight: expected
      description: Elite speakers achieve lower propositional idea density through elaborative repetition unpacking density to reduce intrinsic load of complex content per Elite Speaker Linguistic Analysis
      target_file: cognitive_load_entities
    - target: claim
      relation: supports
      weight: expected
      description: "RSTformer shows elaboration satellites provide supporting detail to nucleus claims per Researching Narrative and Discourse Analysis"
      target_file: narrative_entities
    - target: cause_marker
      relation: contrasts_with
      weight: expected
      description: Elaboration provides supplementary detail on a nucleus while cause establishes causal dependency — these are
        distinct RST relation types requiring different signal patterns per Advanced Computational Discourse Analysis research
    - target: emphasis_marker
      relation: enables
      weight: optional
      description: "Elaborative repetition (unpacking complex ideas into multiple shorter sentences) enables emphasis by giving audience cognitive processing time through lower Propositional Idea Density per Architecture of Influence"
    - target: extraneous_load_marker
      relation: triggers
      weight: optional
      description: "Excessive elaboration in slide text triggers extraneous cognitive load — over-specification and unnecessary detail consume working memory without advancing understanding per slide deck design playbook"
      target_file: cognitive_load_entities
    - target: germane_load_marker
      relation: supports
      weight: expected
      description: "Elaboration through worked examples, analogies, and explanations directly supports germane load by aiding schema formation per Slide Deck Design Playbook Gagne Event 5"
      target_file: cognitive_load_entities
    - target: germane_load_marker
      relation: enables
      weight: optional
      description: "Elaboration markers enable germane processing providing connective tissue in Deep Dive layer"
      target_file: cognitive_load_entities
    - target: extraneous_load_marker
      relation: resolves
      weight: expected
      description: "Elaborative Repetition (unpacking dense propositions into multiple simpler clauses) reduces PID and cognitive processing burden — the core 'de-densification' tactic (Architecture of Influence, Section 1.1)"
      target_file: cognitive_load_entities
    - target: progressive_disclosure_marker
      relation: supports
      weight: optional
      description: "Elaboration markers signal deep-dive content for nested card reveals preserving simple initial views"
      target_file: cognitive_load_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - elaboration
      strength: primary
  joint_marker:
    label: JOINT_MARKER
    field_description: Additive joint marker and also additionally furthermore moreover in addition as well plus
    description: Lexical marker signalling addition or parallel information
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - and we reduced costs
    - also we improved quality
    - additionally we offer support
    - furthermore profitability improved
    - moreover we exceeded targets
    - in addition the platform scales
    - as well as training
    - plus new features
    - along with documentation
    - what's more it's scalable
    confidence_threshold: 0.6
    field: rst
    indicators:
    - and
    - also
    - additionally
    - furthermore
    - moreover
    - in addition
    - as well
    - plus
    - along with
    - besides
    - what's more
    - not only
    - but also
    patterns:
    - additionally
    - furthermore
    - moreover
    - in addition
    - as well as \w+
    - not only \w+ but also
    color: '#1abc9c'
    relates_to:
    - target: coordination_marker
      relation: specialises
      weight: optional
      description: Joint markers are a specific subtype of coordination markers that connect equal-status units. They maintain
        symmetry and parallelism that generates rhetorical power.
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - joint
      strength: primary
  attribution_marker:
    label: ATTRIBUTION_MARKER
    field_description: Attribution source marker according to says claims reports stated research shows data indicates
    description: Lexical marker signalling source attribution or citation
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - according to Gartner
    - the CEO says revenue will double
    - analysts claim growth will continue
    - IDC reports adoption is rising
    - the CFO stated margins improved
    - research shows 80% of projects
    - data indicates significant growth
    - studies suggest a correlation
    - experts believe the trend
    - McKinsey found that
    confidence_threshold: 0.75
    field: rst
    indicators:
    - according to
    - says
    - said
    - claims
    - claimed
    - reports
    - reported
    - states
    - stated
    - announced
    - believes
    - suggests
    - research shows
    - data indicates
    - studies show
    - experts say
    - found that
    patterns:
    - according to \w+
    - \w+ says
    - \w+ claims
    - \w+ reports
    - research shows
    - data indicates
    - \w+ found that
    color: '#f39c12'
    relates_to:
    - target: evidence
      relation: supports
      weight: required
      description: Attribution markers (according to, as [expert] notes, research shows) establish evidence provenance and
        credibility. They signal that claims are grounded in external authority rather than mere opinion.
      target_file: narrative_entities
    - target: subordination_marker
      relation: supports
      weight: expected
      description: Attribution relations are frequently marked by combined semantic-syntactic signals — specifically cognitive
        verbs followed by subordinate clause structures per Advanced Computational Discourse Analysis research
    - target: expert_testimony
      relation: triggers
      weight: expected
      description: "Report indicators ('according to', 'research shows', 'experts say') signal attributed claims from authorities whose reliability depends on expertise and potential bias per a-guide-to-good-reasoning"
      target_file: evidence_types_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - attribution
      strength: primary
  condition_marker:
    label: CONDITION_MARKER
    field_description: Conditional marker if unless provided that assuming in case on condition that supposing when
    description: Lexical marker signalling conditional or hypothetical relationship
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - if we invest in AI
    - unless we act now
    - provided that funding continues
    - assuming demand holds
    - in case of delays
    - on condition that goals are met
    - supposing the market recovers
    - should the need arise
    - whether or not we proceed
    confidence_threshold: 0.7
    field: rst
    indicators:
    - if
    - unless
    - provided that
    - providing
    - assuming
    - in case
    - on condition that
    - supposing
    - should
    - were to
    - in the event
    - whether
    patterns:
    - if \w+
    - unless \w+
    - provided that
    - assuming \w+
    - in case of
    color: '#e67e22'
    relates_to:
    - target: qualifier
      relation: supports
      weight: required
      description: Condition markers (if, unless, provided that, in case) establish scope limitations and conditional claims.
        They function as qualifiers that moderate claim strength.
      target_file: narrative_entities
    - target: warrant
      relation: triggers
      weight: expected
      description: "Conditional markers ('if...then', 'supposing that', 'so long as', 'only if') signal the logical form of if-then arguments that connect premises to conclusions per a-guide-to-good-reasoning"
      target_file: narrative_entities
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - condition
      strength: primary
  same_unit_marker:
    label: SAME_UNIT_MARKER
    field_description: Embedded clause marker parenthetical appositive which who that interrupted unit relative clause
    description: Marker of interrupted logical unit split by embedded clause or parenthetical
    entity_kind: rst_relation
    family: rhetorical_structure
    examples:
    - The product, which launched last quarter, exceeded expectations
    - Our strategy—developed over months—proved effective
    - Revenue (as shown in Figure 1) increased
    - The team, led by Sarah, delivered
    - Sales, particularly in EMEA, surpassed targets
    - The CEO, a former engineer, understood
    - Results, though preliminary, are promising
    confidence_threshold: 0.7
    field: rst
    indicators:
    - ', which'
    - ', who'
    - ', that'
    - —
    - ' ('
    - ') '
    - ', particularly'
    - ', especially'
    - ', including'
    - ', led by'
    - ', known as'
    - ', a '
    - ', the '
    patterns:
    - ', which \w+'
    - ', who \w+'
    - —\w+—
    - \([^)]+\)
    - ', particularly \w+'
    color: '#95a5a6'
    relates_to:
    - target: coordination_marker
      relation: bridges
      weight: optional
      description: "Discourse-Aware TS shows coordinate clause splitting decomposes same-units into separate propositions linked via coordination markers per Researching Narrative and Discourse Analysis"
    taxonomy_mapping:
    - taxonomy: Descriptive_RST_taxonomy
      dimension: relation_class
      values:
      - same_unit
      strength: primary
  topic_shift_marker:
