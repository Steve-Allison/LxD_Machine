    - target: germane_load_marker
      relation: enables
      weight: expected
      description: "Story hooks enable germane cognitive processing by activating schema construction through narrative transportation — audiences build mental models from story structures per slide deck design playbook"
      target_file: cognitive_load_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
