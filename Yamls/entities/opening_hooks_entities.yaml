entity_types:
  question_hook:
    label: QUESTION_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Opening question like what if why do how can have you imagine provocative question rhetorical question
      curiosity gap
    description: Opens with a question to engage curiosity (curiosity gap principle)
    examples:
    - What if everything you knew about X was wrong?
    - Why do 80% of digital transformations fail?
    - Have you ever wondered how...
    - How can we reduce costs by 40%?
    - When was the last time you...
    - Imagine if your team could...
    - What would you do with an extra hour every day?
    - What's really holding your team back?
    confidence_threshold: 0.7
    indicators:
    - question mark at end of sentence
    - starts with question words (what, why, how, when, where, who)
    - starts with 'have you', 'do you', 'did you', 'can you'
    - starts with 'imagine if'
    psychological_principle: Curiosity gap (Loewenstein 1994) - unresolved questions trigger dopamine
    hook_strength: high
    subtypes:
    - 'rhetorical: No answer expected; makes audience think'
    - 'direct: Invites immediate mental response'
    - 'provocative: Challenges assumptions'
    - 'hypothetical: ''imagine if'', ''what if'''
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Question Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: statistic_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: story_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: narrative_tension
      relation: triggers
      weight: required
      description: A question hook creates narrative tension by posing an unanswered question that the audience must resolve.
        This tension drives engagement and attention.
      target_file: narrative_entities
    - target: narrative_tension
      relation: enables
      weight: required
      description: Opening hooks of all types (question, story, contrast, statistic) enable narrative tension by creating
        cognitive gaps, curiosity, or surprise that must be resolved.
      target_file: narrative_entities
    - target: rhetorical_question
      relation: specialises
      weight: expected
      description: Question hooks are a specialised opening-position use of rhetorical questions, leveraging curiosity gaps to
        engage audience attention per Crafting Powerful Opening Plays
      target_file: rhetorical_devices_entities
    - target: rhetorical_question
      relation: specialises
      weight: expected
      description: "Model Criticism poses evaluative questions showing question hooks specialize rhetorical questions as openers per Researching Narrative and Discourse Analysis"
      target_file: discourse_entities
    - target: engagement_marker
      relation: triggers
      weight: expected
      description: "Question hooks trigger engagement markers — introspective questions like 'What three words would you use to describe me professionally?' drive personal brand feedback loops and audience participation per Personal Branding Framework"
      target_file: stance_markers_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: expected
      description: "Provocative or rhetorical questions are explicitly recommended as Attention-stage hooks in MMS to spark curiosity per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "A question hook activates audience attention and engagement per Gagne's Event 1 (Gain Attention) in Slide Deck Design Playbook"
      target_file: delivery_entities
    - target: situation_marker
      relation: supports
      weight: expected
      description: "Question hooks support situation markers by probing the audience's current state and challenges per SOAR Narrative Mapping by Sales Stage"
      target_file: sales_entities
    - target: germane_load_marker
      relation: triggers
      weight: expected
      description: "Question hooks trigger germane load — curiosity gap openings activate schema-building cognitive effort per module-integration-strategy"
      target_file: cognitive_load_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
  statistic_hook:
    label: STATISTIC_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Opening statistic like percentage metric number research shows according to surprising data compelling
      stat numerical fact
    description: Leads with surprising statistic or data point (von Restorff effect)
    examples:
    - 73% of employees would leave for better work-life balance
    - Every 39 seconds, a company falls victim to cyberattack
    - Research shows that 80% of projects fail
    - According to Gartner, $15M lost annually to bad data
    - In 2025, AI will transform 40% of jobs
    - $3.5 trillion wasted on digital transformation
    - Only 12% of change initiatives fully succeed
    confidence_threshold: 0.75
    indicators:
    - contains percentage (\d+%)
    - contains large number with units (\$\d+[MB], \d+ seconds)
    - starts with 'research shows', 'studies find', 'according to'
    - time-based frequency ('every X seconds/minutes')
    psychological_principle: von Restorff effect (1933) - distinctive elements are remembered better
    hook_strength: high
    quality_criteria:
      effective:
      - Counter-intuitive or unexpected
      - Personally relevant to audience
      - From credible source
      - Recent/current
      ineffective:
      - Vague or rounded ('millions of...')
      - Expected/obvious
      - Unverifiable
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Statistic Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: question_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: story_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: logos_appeal
      relation: supports
      weight: required
      description: A statistic hook supports logos appeals by providing numerical evidence and logical reasoning. Statistics
        establish the rational, data-driven foundation of an argument.
      target_file: rhetorical_devices_entities
    - target: data_statistic
      relation: contains
      weight: expected
      description: Statistic hooks contain data statistics as their core structural element, with the surprising number serving
        as the attention anchor per Crafting Powerful Opening Plays
      target_file: evidence_types_entities
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: Statistic hooks trigger narrative tension through the von Restorff effect — a surprising number creates cognitive
        disruption that demands resolution per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: pathos_appeal
      relation: enables
      weight: optional
      description: Statistic hooks can enable pathos appeals when the data reveals human impact, transforming abstract numbers
        into emotional engagement per Crafting Powerful Opening Plays
      target_file: rhetorical_devices_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: expected
      description: "Startling statistics serve as Attention-stage hooks in MMS, jolting learners into realising a topic's importance per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "Opening statistic hooks trigger immediate audience engagement by alerting and focusing attention per Gagne's Event 1 (Slide Deck Design Playbook)"
      target_file: delivery_entities
    - target: evidence
      relation: supported_by
      weight: expected
      description: "Statistic hooks supported by evidence data points making opening credible (Best Video Script Prompts)"
      target_file: narrative_entities
    - target: RESULT_MARKER
      relation: supports
      weight: optional
      description: "Statistic hooks align with Results phase Big Number archetype for immediate credibility"
      target_file: sales_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
  story_hook:
    label: STORY_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Opening narrative like imagine picture this let me tell last week there was specific story anecdote
      character situation
    description: Begins with brief, vivid anecdote (narrative transportation)
    examples:
    - Imagine you're sitting in a meeting, watching...
    - 'Picture this: 3 AM, hospital IT system goes dark...'
    - Let me tell you about Sarah, a marketing director...
    - Last March, a Fortune 500 company discovered...
    - There was a moment when everything changed...
    - I remember the day when...
    - Six months ago, a team in Singapore faced an impossible deadline.
    confidence_threshold: 0.7
    indicators:
    - starts with 'imagine', 'picture this', 'let me tell you'
    - contains 'last (week|month|year)', 'there was'
    - specific names and places (proper nouns)
    - present tense for immediacy
    - sensory language (saw, heard, felt)
    psychological_principle: Narrative transportation (Green & Brock 2000) - story absorption reduces resistance
    hook_strength: high
    elements:
      essential:
      - Specific character (named or identifiable)
      - Concrete situation (sensory details)
      - Tension or problem
      - Relatable context
      enhance:
      - Dialogue snippet
      - Emotion word
      - Unexpected detail
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Story Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: question_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: statistic_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: A story hook (particularly personal narratives or anecdotes) enables pathos appeals by creating emotional
        engagement through narrative. Stories activate emotional responses that pure logic cannot.
      target_file: rhetorical_devices_entities
    - target: personal_anecdote
      relation: contains
      weight: expected
      description: Story hooks contain personal anecdotes as source material, with first-person narratives providing specific
        character and situation elements per Crafting Powerful Opening Plays
      target_file: evidence_types_entities
    - target: customer_story
      relation: contains
      weight: expected
      description: Story hooks contain customer stories as source material, with third-party case narratives providing relatable
        character and challenge elements per Crafting Powerful Opening Plays
      target_file: evidence_types_entities
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: Story hooks trigger narrative tension through narrative transportation, as the audience absorbs the character's
        situation and anticipates resolution per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: expected
      description: "Short stories or relatable scenarios are primary Attention-stage hooks in MMS, immediately connecting with adult learners through shared experience per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: confidence_technique
      relation: supported_by
      weight: optional
      description: "Opening with a story you know well gives the speaker a confident start — story hooks are directly supported by confidence technique per Public Speaking research"
