  bluf_hook:
    label: BLUF_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: BLUF bottom line up front executive opener leads with recommendation conclusion action required the
      single most important message
    description: Bottom Line Up Front — leads immediately with the key conclusion or recommendation (executive default)
    examples:
    - 'Here is the recommendation: deploy by Q3.'
    - The bottom line is we need to act now.
    - 'My ask today: approve the budget.'
    - Before anything else — we have a window of 90 days.
    - The single most important thing you need to know is...
    - The decision we need from this room today is...
    - 'We need one thing from you: sign-off on the roadmap.'
    confidence_threshold: 0.72
    indicators:
    - '''here is the recommendation'', ''the bottom line'''
    - '''my ask'', ''our ask'', ''the decision we need'''
    - '''the single most important'', ''one thing'''
    - '''before anything else'', ''straight to it'''
    psychological_principle: Primacy effect (Murdock 1962) + executive communication norms — decision-makers want conclusions
      first
    hook_strength: high
    executive_context: BLUF is the required format for executive audiences; conclusion must appear in slides 1-5
    quality_criteria:
      effective:
      - Decision or recommendation is specific and actionable
      - Stakes are named (timeline, risk, opportunity)
      - Single clear ask — not a list
      ineffective:
      - BLUF is vague ('we need to do something')
      - Multiple competing asks
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Bluf Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: question_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: statistic_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: scqa_marker
      relation: supports
      weight: expected
      description: BLUF (Bottom Line Up Front) hook aligns with SCQA structure by placing the Answer (key message) at the
        beginning, reversing traditional Situation-Complication-Question-Answer sequence for executive communication.
      target_file: rhetorical_devices_entities
    - target: value_proposition
      relation: contains
      weight: expected
      description: BLUF hooks contain the core value proposition as their opening statement, presenting the key recommendation
        or conclusion before supporting detail per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: outcome_statement
      relation: contains
      weight: expected
      description: BLUF hooks contain outcome statements as their structural core, placing the desired result or recommendation
        at the front of the presentation per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: call_to_action
      relation: precedes
      weight: expected
      description: BLUF hooks precede the detailed call to action by establishing what decision is needed, setting up the specific
        action request that follows per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: claim
      relation: contains
      weight: required
      description: "BLUF hooks contain the core claim (thesis/recommendation) placed upfront via the Pyramid Principle — the Answer in SCQA is the explicit claim per Canonical Presentation Methodology"
      target_file: narrative_entities
    - target: claim
      relation: contains
      weight: required
      description: "The Pyramid Principle places the Answer (BLUF) immediately after the SCQA setup, so the BLUF hook contains the core claim/recommendation upfront to respect executive time (Canonical Presentation Methodology)"
      target_file: narrative_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
  quote_hook:
    label: QUOTE_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Opening quotation attribution named authority famous quote customer quote industry leader said as someone
      once said
    description: Opens with a compelling, attributed quotation that frames the central message
    examples:
    - As Warren Buffett said, 'Risk comes from not knowing what you're doing.'
    - 'One of our customers told us: ''This changed everything.'''
    - 'In the words of Peter Drucker: ''Culture eats strategy for breakfast.'''
    - 'The CEO of [Company X] put it perfectly last month:'
    - '''The only way to do great work is to love what you do.'' — Steve Jobs'
    - 'A VP of Marketing in our study said something that stopped us:'
    confidence_threshold: 0.72
    indicators:
    - opening quotation marks followed by attribution
    - '''as [name] said'', ''in the words of'''
    - '''one of our customers'', ''a client told us'''
    - dash or em-dash attribution ('— [Author]')
    psychological_principle: Social proof and authority transfer (Cialdini 2001)
    hook_strength: medium-high
    quality_criteria:
      effective:
      - Quote is unexpected or counter-intuitive
      - Attribution adds credibility (expert, customer, authority)
      - Quote connects directly to the session topic
      ineffective:
      - Overused generic quote ('Journey of a thousand miles...')
      - No clear link between quote and presentation content
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Quote Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: question_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: statistic_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: A quote hook (especially from recognized authorities) supports ethos appeals by borrowing credibility from
        an established source.
      target_file: rhetorical_devices_entities
    - target: expert_testimony
      relation: contains
      weight: expected
      description: Quote hooks contain expert testimony as their core element, leveraging attributed quotations from authorities
        to establish credibility and frame the message per Crafting Powerful Opening Plays
      target_file: evidence_types_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: optional
      description: "Quotes from respected figures are recommended as Attention-stage hooks in MMS and in the Visualization stage to amplify aspirational vision per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
hook_quality_indicators:
  high_quality_signals:
  - Specific numbers (not vague quantifiers)
  - Named entities (people, companies, places)
  - Sensory language (visual, auditory, tactile)
  - Active voice (not passive)
  - Question format (engages curiosity)
  - Present tense (creates immediacy)
  - Audience-specific relevance (names their situation)
  - Stakes are explicit (cost of inaction)
  low_quality_signals:
  - We/I-focused (not audience-focused)
  - Passive voice (reduces energy)
  - Vague quantifiers (many, some, various)
  - Filler words (just, actually, basically)
  - Generic statements (no specificity)
  - No tension or stakes
anti_patterns:
  weak_generic_opener:
    label: WEAK_OPENER
    field_description: Weak opening like thank you for good morning i am here to let me introduce agenda today low-impact
      generic
    examples:
    - Thank you for being here
    - Good morning everyone
    - I'm here to talk about
    - Today I will cover
    - Let me introduce myself
    - My name is
    - Before I begin
    - Let me start by saying
    - I'd like to present to you
    - In today's session we'll look at
    confidence_threshold: 0.75
    hook_strength: low
    remediation: Replace with question, statistic, story, contrast, problem statement, or BLUF hook
    relates_to:
    - target: performance_tier
      relation: limits
      weight: expected
      description: "Weak generic openers limit performance tier — Novice speakers use self-conscious openings while elite speakers open with calculated rhetorical hooks (elite_speaker_taxonomy)"
      target_file: performance_entities
  agenda_first:
    label: AGENDA_FIRST
    field_description: Agenda shown first before any hook our agenda today first we will then we will cover these topics outline
    examples:
    - Our agenda today is...
    - First, we will cover...
    - Here's what we'll discuss
    - Today's topics are...
    - 'In this session: overview, then details, then Q&A'
    confidence_threshold: 0.7
    hook_strength: low
    remediation: Move agenda slide to position 2-3 after an engaging hook has been established
    relates_to:
    - target: planning_artefact_marker
      relation: supported_by
      weight: expected
      description: "Agenda-first openers are supported by planning artefacts — wireframes provide one-page visual overviews of resource structure including main screens, navigation flow, and content organisation per course-creation-flow"
      target_file: content_architecture_entities
    - target: content_structure_marker
      relation: supports
      weight: expected
      description: "The Dot-Dash storylining method creates an agenda-like structure of Action Titles (Dots) that serve as the presentation's navigational scaffold (Canonical Presentation Methodology)"
      target_file: content_architecture_entities
integration:
  narrativelens_usage: "NarrativeLens extracts hook type entities from first slide content:\n\n1. Extract first 100 words\
    \ or first 3 sentences\n2. Detect QUESTION_HOOK, STATISTIC_HOOK, STORY_HOOK, CONTRAST_HOOK,\n   PROBLEM_HOOK, BLUF_HOOK,\
    \ QUOTE_HOOK, WEAK_OPENER, AGENDA_FIRST\n3. Store primary hook type with metadata\n4. Use in narrative lens scoring (hook\
    \ presence +15 points)\n5. Pass to Stage 4 critique for detailed hook quality analysis\n"
  stage_4_critique_usage: "Stage 4 (Critique Generator) performs comprehensive hook quality scoring:\n\n1. Load opening_hooks.yaml\
    \ (reference layer, 548 lines of scoring)\n2. Score across 5 dimensions:\n   - Attention capture (30% weight)\n   - Relevance\
    \ signal (25% weight)\n   - Memorability (20% weight)\n   - Flow to content (15% weight)\n   - Brevity (10% weight)\n\
    3. Detect anti-patterns (throat clearing, agenda first, apology)\n4. Generate hook remediation recommendations\n5. Map\
    \ to psychological principles (primacy effect, curiosity gap, narrative transportation)\n6. Check BLUF compliance for\
    \ executive audience profiles\n"
  example_extraction: "First slide text: \"What if I told you that 73% of projects fail due to\none simple mistake? Last year,\
    \ a Fortune 500 company learned this the hard way.\"\n\nEntities extracted:\n- QUESTION_HOOK: \"What if I told you\"\n\
    \  - Strength: high\n  - Psychological principle: curiosity gap\n\n- STATISTIC_HOOK: \"73% of projects fail\"\n  - Strength:\
    \ high\n  - Quality: counter-intuitive, specific percentage\n\n- STORY_HOOK: \"Last year, a Fortune 500 company\"\n  -\
    \ Strength: high\n  - Elements: specific time, specific character type\n\nOverall hook assessment: EXCELLENT (multiple\
    \ high-strength hooks)\n"
  scoring_impact: 'Hook presence in narrative lens scoring:

    - High-strength hook detected: +15 points

    - Multiple hooks (hybrid): +5 bonus points

    - BLUF_HOOK for executive profile: +8 bonus points

    - Weak/generic opener (WEAK_OPENER): -10 points

    - AGENDA_FIRST detected before hook: -8 points

    - No discernible hook: 0 adjustment

    '
reference_layer:
  opening_hooks_yaml: 'The full opening_hooks.yaml file (548 lines) is NOT used for NuExtract extraction.

    Most of it provides reference layer content for Stage 4 critique:


    - psychological_principles (100 lines): Primacy effect, curiosity gap, emotional arousal

    - frameworks (250 lines): BLUF, PASS, contrast opener, SCQA, etc.

    - scoring (80 lines): 5-dimension rubric with score bands

    - anti_patterns (70 lines): Throat clearing, agenda first, apology, etc.

    - remediation (48 lines): Weak-to-strong transformation strategies


    These are scoring frameworks and remediation strategies, not extractable entities.

    '
gliner_config:
  model: gliner-large-v2
  batch_size: 32
  default_confidence_threshold: 0.7
  context_window: 128
  use_hybrid_extraction: true
  entity_groups:
    hook_types:
    - QUESTION_HOOK
    - STATISTIC_HOOK
    - STORY_HOOK
    - BOLD_CLAIM_HOOK
    - PROBLEM_HOOK
    - CONTRAST_HOOK
domain_keywords:
  primary:
  - opening
  - hook
  - attention
  - engagement
  - curiosity
  - story
  - question
  - statistic
  - data
  - bold claim
  secondary:
  - rhetorical question
  - curiosity gap
  - von Restorff effect
  - primacy effect
  - pattern interrupt
  - cold open
  - anecdote
  - surprising fact
  - contrarian
  - provocative
  - what if
quality_indicators:
  hook_presence:
    absent: No opening hook entity detected in first slide — flat, uninspiring opening; -5 points narrative quality
    weak: Hook entity present but low-strength type — partial engagement; +2 points
    strong: High-strength hook detected (QUESTION_HOOK, STATISTIC_HOOK, STORY_HOOK) — strong opening; +5 points
  hook_alignment:
    misaligned: Hook type misaligned to audience — e.g., statistic hook for emotional audience; reduces resonance
    aligned: Hook type appropriate for detected audience persona — maximum engagement potential
  hook_diversity:
    single_type: Only one hook type used across all presentations — consider varying approach
    varied: Multiple hook types detected — rich and unpredictable opening repertoire
