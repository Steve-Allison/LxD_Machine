  contrast_hook:
    label: CONTRAST_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Contrast hook unexpected gap between expectation and reality we expected X but found Y the conventional
      wisdom says but actually
    description: Opens by revealing a gap between expected and actual — uses surprise to provoke attention
    examples:
    - We expected growth. Instead, we found a cliff edge.
    - The conventional wisdom says spend more. Our data says the opposite.
    - Most companies think this is complex. It's actually simple.
    - What we planned was X. What happened was Y.
    - Everyone assumed adoption would be low. It was through the roof.
    - We thought it would take months. It took three days.
    confidence_threshold: 0.7
    indicators:
    - '''we expected X but found Y'''
    - '''conventional wisdom says... but'''
    - '''instead'', ''but actually'', ''the opposite'''
    - contrast markers (however, yet, but, instead)
    psychological_principle: Contrast principle (Cialdini 2001) — anchoring to expectation amplifies surprise
    hook_strength: high
    quality_criteria:
      effective:
      - Clear expectation stated before the contrast
      - Contrast is genuinely surprising
      - Directly relevant to audience's experience
      ineffective:
      - Artificial contrast with no real tension
      - Expectation too vague to anchor
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Contrast Hook is a specific type of narrative hook
      target_file: narrative_entities
    - target: question_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: statistic_hook
      relation: contrasts_with
      weight: optional
      description: Alternative opening strategies — different hook approaches
    - target: antithesis
      relation: supports
      weight: expected
      description: A contrast hook employs the rhetorical device of antithesis, juxtaposing opposing ideas or states to highlight
        a strategic point or create cognitive impact.
      target_file: rhetorical_devices_entities
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: Contrast hooks trigger narrative tension by revealing a gap between expectation and reality, creating cognitive
        dissonance that demands explanation per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: antithesis
      relation: specialises
      weight: expected
      description: "LitVISTA paradox framing shows contrast hooks specialize antithesis as an opening rhetorical device per Researching Narrative and Discourse Analysis"
      target_file: rhetorical_devices_entities
    - target: before_after_comparison
      relation: enables
      weight: expected
      description: "Contrast hooks enable before-after comparisons by establishing the gap between pre-implementation challenges and post-implementation outcomes per Case Study Excellence"
      target_file: evidence_types_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: optional
      description: "MMS's Visualization stage uses positive vs. negative contrast — depicting the improved future versus the cost of not changing — which mirrors the contrast hook pattern per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
  problem_statement_hook:
    label: PROBLEM_HOOK
    entity_kind: rhetorical_device
    family: opening_hooks
    field_description: Problem statement hook opens with the core challenge the problem is organisations are struggling businesses
      face the critical issue
    description: Opens by naming the core problem the audience faces — immediate relevance without setup
    examples:
    - 'The problem is simple: too much data, not enough insight.'
    - Organisations are struggling to deliver content at scale.
    - The critical challenge facing your team right now is...
    - Every business in this room is dealing with the same friction.
    - The bottleneck isn't budget — it's speed of execution.
    - 'Here is the core issue: your customer data is fragmented.'
    confidence_threshold: 0.7
    indicators:
    - '''the problem is'', ''the challenge is'', ''the issue is'''
    - '''organisations are struggling'', ''businesses face'''
    - '''the bottleneck'', ''the friction'', ''the gap'''
    - '''your team is dealing with'', ''every company faces'''
    psychological_principle: Problem-first framing (Minto 1996) — audience engagement spikes when own problem is named
    hook_strength: high
    quality_criteria:
      effective:
      - Problem is specific, not generic
      - Names the audience's actual situation
      - Creates tension that demands resolution
      ineffective:
      - Generic business problem anyone faces
      - Problem stated then immediately solved (kills tension)
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: required
      description: Problem Statement Hook is a specific type of narrative hook
      target_file: narrative_entities
