quality_indicators:
  product_specificity:
    generic: No Adobe product entity detected — content may not be Adobe-specific
    single_product: One ADOBE_PRODUCT detected — targeted but missing portfolio context
    portfolio_coverage: Multiple ADOBE_PRODUCT entities across clouds — full portfolio awareness demonstrated
  solution_alignment:
    misaligned: Adobe product referenced without use-case context — spec without value connection
    aligned: ADOBE_PRODUCT paired with business outcome — solution-to-value connection present
  vocabulary_accuracy:
    deprecated_name: Deprecated product name detected — update to current FY26 naming convention
    current_name: Current product name used — FY26 nomenclature compliant
