  relationships: null
entity_types:
  adobe_product:
    description: Adobe product names including Experience Cloud, Creative Cloud, and Document Cloud offerings
    canonical_id: adobe_product
    entity_kind: product
    family: adobe_portfolio
    gliner_label: ADOBE_PRODUCT
    gliner_description: Adobe product AEM AEP AJO Analytics Target Campaign Workfront Marketo Commerce GenStudio
    examples:
    - Adobe Experience Manager
    - Adobe Analytics
    - Adobe Journey Optimizer
    - Adobe Real-Time CDP
    - Adobe GenStudio
    - Adobe Workfront
    anti_examples:
    - adobe.com
    - Adobe Inc
    - Adobe stock price
    confidence_threshold: 0.85
    validators:
    - type: allowlist
      ref: adobe_products_core
    match_policy_ref: product
    aliases:
    - adobe_solution
    - product
    - platform
    indicators:
    - Adobe
    - AEM
    - AEP
    - AJO
    - RTCDP
    - CJA
    patterns:
    - Adobe \w+
    - AEM \w+
    - \w+ Cloud
    color: '#fa0f00'
  adobe_technology:
    description: Adobe technologies, AI/ML capabilities, and platform components
    canonical_id: adobe_technology
    entity_kind: technology
    family: adobe_portfolio
    gliner_label: ADOBE_TECHNOLOGY
    gliner_description: Adobe technology Sensei Firefly AI GenAI XDM Edge Network SDK Web Mobile platform
    examples:
    - Adobe Sensei
    - Adobe Firefly
    - Sensei GenAI
    - Experience Data Model
    - Edge Network
    - Web SDK
    anti_examples:
    - edge browser
    - network cable
    - SDK documentation
    confidence_threshold: 0.8
    validators:
    - type: allowlist
      ref: adobe_technologies_core
    match_policy_ref: defaults
    aliases:
    - technology
    - capability
    - component
    indicators:
    - Sensei
    - Firefly
    - GenAI
    - XDM
    - SDK
    - Edge
    patterns:
    - \w+ SDK
    - \w+ Network
    - Adobe \w+ Services
    color: '#ff6f00'
  adobe_concept:
    description: Adobe solution concepts, frameworks, and strategic initiatives
    canonical_id: adobe_concept
    entity_kind: concept
    family: adobe_portfolio
    gliner_label: ADOBE_CONCEPT
    gliner_description: Content Supply Chain Digital Experience Platform CDP Customer Journey Personalization Omnichannel
      DXP
    examples:
    - Content Supply Chain
    - Digital Experience Platform
    - Real-Time Customer Profile
    - Journey Orchestration
    - Audience Segmentation
    anti_examples:
    - supply chain logistics
    - platform shoes
    - customer service
    confidence_threshold: 0.75
    validators:
    - type: requires_anchors
      ref: adobe_brand
    match_policy_ref: defaults
    aliases:
    - concept
    - framework
    - initiative
    indicators:
    - supply chain
    - platform
    - journey
    - orchestration
    - segmentation
    - personalization
    patterns:
    - \w+ Supply Chain
    - \w+ Platform
    - Customer \w+
    color: '#0d66d0'
  business_acronym:
    description: Business and technical acronyms used in enterprise contexts
    canonical_id: business_acronym
    entity_kind: abbreviation
    family: business_terminology
    gliner_label: BUSINESS_ACRONYM
    gliner_description: Acronym abbreviation ROI KPI SLA API B2B B2C SaaS CDP DXP PLG ABM MQL SQL
    examples:
    - ROI
    - KPI
    - B2B
    - SaaS
    - CDP
    - DXP
    anti_examples:
    - SQL database
    - API documentation
    - B2B vitamins
    confidence_threshold: 0.9
    abbreviation_rules:
      uppercase_only: true
      word_boundary: true
      requires_anchors:
      - b2b_marketing
      - tech_context
      anchors_min: 1
      anchors_window_tokens: 15
      denylist_ref: ambiguous_abbreviations
    validators:
    - type: regex
      ref: business_acronym_pattern
    match_policy_ref: defaults
    aliases:
    - acronym
    - abbreviation
    indicators: []
    patterns:
    - '[A-Z]{2,5}'
    - '[A-Z]\d[A-Z]'
    color: '#666666'
