gliner_config:
  model: gliner-large-v2
  batch_size: 32
  use_hybrid_extraction: true
  llm_fallback_for_types:
  - learning_objective
  - cognitive_level
  - instructional_event
  - motivation_element
  context_window: 50
  default_confidence_threshold: 0.7
domain_keywords:
  primary:
  - bloom
  - gagne
  - gagné
  - addie
  - kirkpatrick
  - mayer
  - merrill
  - knowles
  - andragogy
  - pedagogy
  - instructional design
  - learning objectives
  - cognitive load
  - scaffolding
  - formative
  - summative
  - assessment
  - rubric
  secondary:
  - metacognition
  - multimedia learning
  - constructivism
  - behaviorism
  - cognitivism
  - adult learning
  - self-directed
  - experiential
  - kolb
  - arcs
  - motivation
  - schema
  - worked example
  - chunking
  - spaced practice
  - retrieval practice
  - transfer
  - learning outcome
  - competency
quality_indicators:
  framework_alignment:
    no_framework: No pedagogical framework entity detected — design rationale not grounded in theory
    single_framework: One INSTRUCTIONAL_STRATEGY detected — some evidence-based intent present
    multi_framework: Multiple pedagogical entities across design — consistently evidence-based approach
  bloom_alignment:
    mismatch: COGNITIVE_LEVEL entity present but misaligned with activity or assessment type
    aligned: COGNITIVE_LEVEL matches activity verb and assessment type — Bloom's constructive alignment met
  research_grounding:
    absent: No cognitive science or instructional theory reference detected — intuitive rather than evidence-based design
    present: Cognitive science principle cited (CLT, Mayer, Bloom, Gagné) — evidence-based design rationale
