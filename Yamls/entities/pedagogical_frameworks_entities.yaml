entity_types:
  instructional_strategy:
    description: Teaching strategies, approaches, and methods
    canonical_id: instructional_strategy
    entity_kind: pedagogical_method
    family: instructional_design
    gliner_label: INSTRUCTIONAL_STRATEGY
    gliner_description: Teaching strategy method approach scaffolding microlearning spaced repetition worked examples chunking
    examples:
    - microlearning
    - problem-centred learning
    - scaffolding
    - spaced repetition
    - flipped classroom
    - collaborative learning
    - inquiry-based learning
    - worked examples
    - chunking
    - interleaving
    - retrieval practice
    - elaborative interrogation
    - dual coding
    - concrete examples
    - distributed practice
    anti_examples:
    - business strategy
    - marketing approach
    - sales method
    confidence_threshold: 0.6
    match_policy_ref: defaults
    aliases:
    - teaching_strategy
    - learning_strategy
    - pedagogical_approach
    indicators:
    - strategy
    - approach
    - method
    - technique
    - practice
    - -based learning
    - instructional
    patterns:
    - \w+-based learning
    - \w+ approach
    - \w+ strategy
    color: '#3498db'
    relates_to:
    - target: learning_objective
      relation: enables
      weight: required
      description: Instructional strategies (advance organisers, segmentation, retrieval practice, scaffolding) operationalise
        learning objectives
    - target: practice_activity
      relation: contains
      weight: expected
      description: Strategies include practice activities aligned to Bloom taxonomy levels per evidence-based sequencing
      target_file: activity_types_entities
    - target: formative_assessment
      relation: enables
      weight: expected
      description: Retrieval practice, quizzes, and formative checks embedded throughout content per evidence-based learning
        design
      target_file: assessment_entities
    - target: cognitive_load_dimension
      relation: supports
      weight: required
      description: Segmentation, pre-training, modality effect reduce extraneous load and manage intrinsic load via chunking
        (Sweller CLT)
      target_file: scoring_entities
    - target: cognitive_level
      relation: enables
      weight: expected
      description: Instructional strategies scaffold from simple recall (binary test cards) to complex application (simulations,
        role-plays, case studies) enabling progression through cognitive levels (Comprehensive Learning Design Framework)
    - target: audience_pain_point
      relation: resolves
      weight: expected
      description: "Instructional strategies resolve audience pain points about learning by breaking content into digestible modules with engaging formats per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: cognitive_level
      relation: supported_by
      weight: required
      description: "CDT's Performance-Content Matrix prescribes different strategies depending on the cognitive performance level required: Remember, Use, or Find per Merrill"
    - target: demonstration_activity
      relation: contains
      weight: expected
      description: "FPI Demonstration phase prescribes expert modeling and worked examples as core instructional strategy components per Merrill"
      target_file: activity_types_entities
    - target: scenario_activity
      relation: contains
      weight: expected
      description: "FPI Application phase prescribes branching scenarios and simulations as core practice strategy components per Merrill"
      target_file: activity_types_entities
    - target: roleplay_activity
      relation: contains
      weight: expected
      description: "Instructional strategies contain roleplay as an applied practice method for interpersonal skill development within active learning frameworks per roleplay research"
      target_file: activity_types_entities
    - target: monroe_sequence_marker
      relation: supported_by
      weight: expected
      description: "MMS functions as an instructional strategy by scaffolding learning through a problem-solution narrative arc that aligns content delivery with motivational design per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: delivery_mode
      relation: enables
      weight: required
      description: "Each instructional strategy requires a matched delivery mode: micro-learning for Sales Directors, sandbox for Tech Specialists, cohort-based for Millennials per Learner Persona Research"
    - target: assessment_type
      relation: triggers
      weight: expected
      description: "Instructional strategy choices (lecture vs interactivity balance) trigger assessment of their effectiveness through postcourse evaluation per recommended-training-effectiveness-questions"
    - target: planning_artefact_marker
      relation: supported_by
      weight: expected
      description: "Instructional strategies are supported by planning artefacts — action mapping and backward design both produce wireframes that specify which strategy applies to each module, preventing content-centric approaches per High-Level Planning Tools research"
      target_file: content_architecture_entities
    - target: learning_principle
      relation: supported_by
      weight: required
      description: "Instructional strategies are directly supported by learning principles — andragogy, CLT, experiential learning (Kolb), and constructivism serve as theoretical foundations for all ILT/VILT strategies per ILT&VILT Best Practice"
    - target: mayer_extraneous_principle
      relation: supported_by
      weight: expected
      description: "Instructional strategies for multimedia design are supported by Mayer's extraneous principles — Coherence removes irrelevant content, Signalling cues essential information, Redundancy prevents dual-channel overload per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: mayer_essential_principle
      relation: supported_by
      weight: expected
      description: "Instructional strategies are supported by Mayer's essential principles — Segmenting prescribes chunking, Pre-training prescribes vocabulary scaffolding, Modality prescribes narration over on-screen text with visuals per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: mayer_generative_principle
      relation: supported_by
      weight: expected
      description: "Instructional strategies for active learning are supported by Mayer's generative principles — Generative Activity Principle prescribes summarising, concept mapping, and peer teaching per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: content_structure_marker
      relation: supports
      weight: required
      description: "Instructional strategies support content structure — chunking, segmenting, and scaffolding strategies directly determine how content is organised into modules, sections, and learning paths (Gold Standard Structure)"
      target_file: content_architecture_entities
    - target: pedagogical_sequence_marker
      relation: supported_by
      weight: expected
      description: "Instructional strategies are supported by pedagogical sequence markers that implement the seven-stage gold-standard storyboard structure (hook, roadmap, pre-training, core content, practice, summary, assessment) per Best Practices for Structuring Corporate Learning Content"
      target_file: content_architecture_entities
    - target: microlearning_format
      relation: supports
      weight: expected
      description: "Spaced repetition and just-in-time delivery improve retention 25-80% compared to traditional methods — these are core instructional strategies for microlearning per AI Microlearning Guide"
      target_file: content_format_entities
    - target: learner_characteristic
      relation: supports
      weight: required
      description: "Instructional strategies are adapted to learner characteristics — the adaptive engine creates neurodiversity-specific accommodations (ADHD-friendly, autism-friendly, dyslexia-friendly) matched to learner profiles per module-integration-strategy"
    - target: motivation_element
      relation: enables
      weight: expected
      description: "Instructional strategies enable motivation through emotional design — curiosity gaps, achievement moments, and struggle support are built into the strategy layer per module-integration-strategy"
    - target: progressive_disclosure_marker
      relation: contains
      weight: expected
      description: "Instructional strategies contain progressive disclosure to manage novice vs expert needs — calibrating content complexity by gauging audience knowledge level and staging information accordingly per Comprehensive Audience Analysis"
      target_file: cognitive_load_entities
    - target: pedagogical_sequence_marker
      relation: enables
      weight: required
      description: "SOAR 4-step orchestration chain defines instructional strategy as sequenced workflow where each phase output becomes next input"
      target_file: content_architecture_entities
    - target: learning_objective
      relation: supports
      weight: required
      description: "Audience Simulator defines Point A to Point B transformation as the learning objective the strategy must serve"
    taxonomy_mapping:
    - taxonomy: pedagogical_frameworks_taxonomy
      dimension: instructional_approach
      values:
      - advance_organiser
      - segmentation
      - retrieval_practice
      - scaffolding
      strength: primary
  learning_principle:
