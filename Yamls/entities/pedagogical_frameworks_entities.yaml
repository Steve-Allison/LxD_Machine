    canonical_id: learning_principle
    entity_kind: cognitive_science
    family: learning_theory
    gliner_label: LEARNING_PRINCIPLE
    gliner_description: Cognitive principle learning theory Mayer multimedia contiguity coherence signalling modality redundancy
    examples:
    - prior knowledge activation
    - cognitive load
    - active learning
    - spaced practice
    - retrieval practice
    - elaboration
    - dual coding
    - multimedia principle
    - contiguity principle
    - coherence principle
    - segmenting principle
    - modality principle
    - redundancy principle
    - signalling principle
    - personalisation principle
    - testing effect
    - generation effect
    - desirable difficulties
    - productive failure
