  learning_objective:
    description: Stated learning goals, outcomes, or competencies
    canonical_id: learning_objective
    entity_kind: learning_outcome
    family: instructional_design
    gliner_label: LEARNING_OBJECTIVE
    gliner_description: Learning objective outcome goal competency learners will be able to by the end performance
    examples:
    - Learners will analyse data patterns
    - Apply Bloom's Taxonomy to objectives
    - Students will create a project plan
    - Evaluate the effectiveness of strategies
    - Demonstrate proficiency in...
    - By the end of this module...
    anti_examples:
    - business objective
    - sales goal
    - marketing objective
    confidence_threshold: 0.7
    match_policy_ref: defaults
    aliases:
    - learning_outcome
    - learning_goal
    - competency
    - performance_objective
    - terminal_objective
    - enabling_objective
    indicators:
    - objective
    - outcome
    - goal
    - competency
    - will be able to
    - by the end
    - learners will
    - participants will
    patterns:
    - learners? will \w+
    - students? will be able to
    - by the end.*will
    - participants? will
    - able to \w+
    requires_verb_detection: true
    color: '#1abc9c'
    relates_to:
    - target: cognitive_level
      relation: contains
      weight: required
      description: Objectives map to Bloom verbs (Remember to Create) and Kirkpatrick L2 learning outcomes from quizzes and
        products
    - target: remember_verb
      relation: specialises
      weight: expected
      description: Remember-level objectives (factual recall) require frequent retrieval practice supported by segmentation
        strategy
      target_file: learning_objectives_entities
    - target: assessment_type
      relation: enables
      weight: required
      description: Each objective maps to specific assessment checkpoint per Kirkpatrick evaluation framework (L2, L3, L4)
    - target: instructional_event
      relation: contains
      weight: expected
      description: Learning progression aligns outcomes to activities to evidence through module overview, practice, quiz,
        reflection
    - target: monroe_sequence_marker
      relation: supported_by
      weight: expected
      description: "MMS's Satisfaction stage must align directly with learning objectives — each objective corresponds to a part of the solution that addresses the Need per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: audience_kpi
      relation: supported_by
      weight: expected
      description: "Learning objectives must align with persona-specific KPIs: salary progression for Gen Z, time saved for Millennials, risk mitigation for executives per Learner Persona Research"
      target_file: audience_entities
    - target: learner_characteristic
      relation: supported_by
      weight: expected
      description: "Person analysis evaluates individual learner characteristics, prior knowledge, and learning preferences which significantly influence training design — learning objectives depend on learner characteristics per Essential Inputs for Learning Objectives"
    - target: kirkpatrick_level
      relation: triggers
      weight: expected
      description: "Training effectiveness shows effect sizes of 0.60-0.63 across all evaluation criteria when proper needs assessment is conducted — learning objectives trigger evaluation at specific Kirkpatrick levels per Essential Inputs for Learning Objectives"
      target_file: assessment_entities
    - target: alignment_marker
      relation: enables
      weight: required
      description: "Learning objectives enable alignment — each module objective maps back to course-level goals and business outcomes, creating the chain from training activity to learning outcome to business result per High-Level Planning Tools research"
      target_file: content_architecture_entities
    - target: formative_assessment
      relation: triggers
      weight: expected
      description: "Each learning objective triggers corresponding formative assessment; framework requires knowledge checks at topic and card levels to validate objective achievement per Comprehensive Learning Design Framework"
      target_file: assessment_entities
    - target: content_structure_marker
      relation: enables
      weight: expected
      description: "Learning objectives drive the content structure hierarchy — each strip targets exactly ONE measurable objective, and objectives ladder from card to strip to topic to module per course_structure_hierarchy_corpus_research"
      target_file: content_architecture_entities
    - target: assessment_item_type
      relation: triggers
      weight: required
      description: "Learning objectives trigger assessment item creation — the pipeline flows from content structure through learning goals to emotionally intelligent assessment items per module-integration-strategy"
      target_file: assessment_entities
    - target: pedagogical_model
      relation: supported_by
      weight: required
      description: "Learning objectives are supported by pedagogical models — the ADDIE model structures the entire creation flow from analysis through evaluation per course-creation-flow"
    - target: educational_standard
      relation: supports
      weight: expected
      description: "Learning objectives support educational standards — success criteria and KPIs are aligned with business goals as measurable standards per course-creation-flow"
    - target: alignment_marker
      relation: supported_by
      weight: required
      description: "Learning objectives paired with content and activities through Content Map instructional alignment (Content Map Instructions v3)"
      target_file: content_architecture_entities
    taxonomy_mapping:
    - taxonomy: learning_objectives_taxonomy
      dimension: objective_hierarchy
      values:
      - bloom_verb
      - cognitive_level
      - kirkpatrick_level
      strength: primary
  cognitive_level:
    description: Bloom's Taxonomy cognitive levels and thinking skills
    canonical_id: cognitive_level
    entity_kind: taxonomy_level
    family: blooms_taxonomy
    gliner_label: COGNITIVE_LEVEL
    gliner_description: Bloom taxonomy cognitive level remember understand apply analyse evaluate create thinking skill
    examples:
    - Remember
    - Understand
    - Apply
    - Analyse
    - Evaluate
    - Create
    confidence_threshold: 0.8
    taxonomy_reference: blooms_cognitive
    validate_against_taxonomy: true
    match_policy_ref: defaults
    aliases:
    - blooms_level
    - cognitive_domain
    - thinking_skill
    - cognitive_complexity
    indicators:
    - remember
    - understand
    - apply
    - analyse
    - analyze
    - evaluate
    - create
    - knowledge
    - comprehension
    - synthesis
    color: '#f39c12'
    relates_to:
    - target: learning_objective
      relation: specialises
      weight: required
      description: Bloom taxonomy levels (Remember through Create) determine content depth, practice type, and assessment
        rigour
    - target: analyze_verb
      relation: specialises
      weight: optional
      description: Higher-order objectives (Analyse, Evaluate, Create) require scenario-based or applied practice activities
      target_file: learning_objectives_entities
    - target: learning_objective
      relation: supports
      weight: required
      description: "CDT's three performance levels (Remember, Use, Find) classify the cognitive demand of each learning objective to prescribe appropriate instruction per Merrill"
      target_file: learning_objectives_entities
    - target: scenario_activity
      relation: supports
      weight: expected
      description: "Higher cognitive levels (Apply, Analyse, Evaluate) require scenario-based practice for authentic skill demonstration per roleplay research"
      target_file: activity_types_entities
    - target: kirkpatrick_level
      relation: supports
      weight: expected
      description: "Bloom cognitive levels map to Kirkpatrick evidence: Remember/Understand→L2 quizzes, Apply→L3 workplace observation, Create→L4 KPI/ROI (Applying_Learning_Theory_Practical_Checklist)"
      target_file: assessment_entities
    - target: learner_characteristic
      relation: supported_by
      weight: expected
      description: "Strip Planning Matrix scores content on Complexity (1-3) and Prior Knowledge (1-3) — cognitive level demands are modulated by learner characteristics like existing familiarity (Essentials_Course_Gold_Structure)"
    - target: assessment_type
      relation: enables
      weight: required
      description: "Cognitive levels (Bloom's) enable matching assessment types — ensure assessments match objective levels: Remember→quiz, Apply→demonstration, Create→project per ILT&VILT Best Practice"
    - target: remember_verb
      relation: contains
      weight: required
      description: "Bloom's Taxonomy defines cognitive progression from basic recall to creative synthesis — cognitive_level contains the specific verb levels including Remember per Activities Research v4"
      target_file: learning_objectives_entities
    - target: microlearning_format
      relation: supports
      weight: expected
      description: "AI decomposes learning objectives from lower-order (remembering, understanding) to higher-order skills; each microlearning module addresses one cognitive level per AI Microlearning Guide"
      target_file: content_format_entities
    - target: instructional_strategy
      relation: enables
      weight: expected
      description: "Cognitive levels determine module archetype selection: Remember/Understand maps to Core Concept, Apply/Analyse to Application Practice, Evaluate/Create to Integration Challenge per course_structure_hierarchy_corpus_research"
    taxonomy_mapping:
    - taxonomy: pedagogical_frameworks_taxonomy
      dimension: bloom_taxonomy
      values:
      - remember
      - understand
      - apply
      - analyze
      - evaluate
      - create
      strength: primary
