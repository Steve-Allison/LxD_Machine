    - cognitive_principle
    indicators:
    - principle
    - effect
    - theory
    - law
    - hypothesis
    patterns:
    - principle of \w+
    - \w+ principle
    - \w+ effect
    color: '#9b59b6'
    relates_to:
    - target: instructional_strategy
      relation: supported_by
      weight: required
      description: Mayer 15 principles (coherence, signaling, redundancy, contiguity, segmenting, pre-training, modality)
        ground all strategies
    - target: cognitive_load_dimension
      relation: supports
      weight: required
      description: Multimedia principles operationalise CLT via extraneous/intrinsic/germane load management per Sweller and
        Mayer
      target_file: scoring_entities
    - target: remember_verb
      relation: enables
      weight: expected
      description: Principles support progression from Remember (factual) to Create (higher-order) per Bloom taxonomy levels
      target_file: learning_objectives_entities
    - target: learning_objective
      relation: supports
      weight: required
      description: "FPI's five principles (problem-centered, activation, demonstration, application, integration) each directly promote achievement of learning objectives per Merrill"
      target_file: learning_objectives_entities
    - target: scenario_activity
      relation: supports
      weight: required
      description: "SBT is grounded in four established learning theories: Experiential Learning, Constructivism, Situated Cognition, and Cognitive Load Theory, each providing design constraints per SBT guide"
      target_file: activity_types_entities
    - target: roleplay_activity
      relation: supports
      weight: expected
      description: "Learning principles (experiential learning, situated cognition) support roleplay as authentic practice grounded in real-world interpersonal contexts per roleplay research"
      target_file: activity_types_entities
    - target: instructional_event
      relation: enables
      weight: expected
      description: "Cognitive learning principles (prior knowledge activation, chunking, feedback loops) directly enable effective execution of Gagné's instructional events per theory_gagne_s_nine_events_of_instruction"
    - target: learner_characteristic
      relation: supported_by
      weight: required
      description: "Learning principles are supported by learner characteristics — andragogy's 5 principles (relevance, self-direction, experience, readiness, problem-centeredness) derive directly from adult learner traits per ILT&VILT Best Practice"
    - target: adult_learner
      relation: supports
      weight: required
      description: "Learning principles directly support adult learner needs — Knowles' andragogy, Kolb's experiential cycle, and Mezirow's transformative learning all address how adults learn best per ILT&VILT Best Practice"
      target_file: audience_entities
    - target: mayer_extraneous_principle
      relation: contains
      weight: required
      description: "Learning principles contain Mayer's 5 extraneous principles (Coherence, Signalling, Redundancy, Spatial Contiguity, Temporal Contiguity) as specific empirically-grounded instructional rules per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: mayer_essential_principle
      relation: contains
      weight: required
      description: "Learning principles contain Mayer's 3 essential principles (Segmenting, Pre-training, Modality) as specific rules for managing intrinsic complexity in multimedia materials per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: mayer_generative_principle
      relation: contains
      weight: required
      description: "Learning principles contain Mayer's 7 generative/expanded principles (Multimedia, Personalization, Voice, Image, Embodiment, Immersion, Generative Activity) as rules for fostering deep understanding per mayers_15_principles"
      target_file: cognitive_load_entities
    - target: intrinsic_load_marker
      relation: limits
      weight: expected
      description: "Learning principles like segmenting and pre-training directly manage intrinsic load by breaking procedures into steps and building foundational schemas first per Slide Deck Design Playbook CDT Section 4.0"
      target_file: cognitive_load_entities
    - target: working_memory_marker
      relation: supported_by
      weight: required
      description: "Learning principles constrained by working memory limits; all design accommodates limited processing capacity"
      target_file: cognitive_load_entities
    - target: germane_load_marker
      relation: supports
      weight: expected
      description: "Schema construction principle maximized when extraneous load reduced allowing germane processing"
      target_file: cognitive_load_entities
    taxonomy_mapping:
    - taxonomy: pedagogical_frameworks_taxonomy
      dimension: learning_theory
      values:
      - mayer_multimedia_principles
      - cognitive_load_theory
      - dual_coding_theory
      strength: primary
