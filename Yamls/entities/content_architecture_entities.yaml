quality_indicators:
  positive:
  - planning artefacts referenced and used in design rationale
  - clear hierarchical content structure with defined units
  - gold-standard pedagogical sequence followed
  - delivery modalities matched to content type and objective
  - interaction elements embedded at appropriate intervals
  - explicit alignment between objectives, activities, and assessments
  negative:
  - no planning artefact referenced — content appears unplanned
  - flat content structure with no segmentation
  - pedagogical sequence missing key stages (e.g., no hook, no practice)
  - delivery modality mismatch (e.g., wall of text for procedural content)
  - no interaction elements — passive consumption only
  - alignment gaps between stated objectives and actual content
