  relationships:
  - target: taxonomy/activity_types_taxonomy.yaml
    type: depends_on
    description: Canonical activity type definitions and classification
  - target: methodology/activity_design_patterns.yaml
    type: depends_on
    description: Activity design pattern guidance
gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - activity
    - exercise
    - discussion
    - roleplay
    - quiz
    - simulation
    - workshop
    - practice
    secondary:
    - breakout
    - brainstorm
    - debrief
    - case study
    - demonstration
    - peer review
    - jigsaw
entity_types:
  discussion_activity:
    description: References to facilitated discussion activities in learning content
    canonical_id: discussion_activity
    entity_kind: learning_activity
    family: synchronous
    gliner_label: DISCUSSION_ACTIVITY
    gliner_description: Discussion activity facilitated discussion think-pair-share fishbowl panel Socratic seminar group
      discussion
    examples:
    - facilitated discussion on best practices
    - think-pair-share activity
    - fishbowl discussion
    - panel discussion with SMEs
    - Socratic seminar
    - table group discussion
    anti_examples:
    - discussion board post
    - the discussion continues
    confidence_threshold: 0.7
    aliases:
    - group discussion
    - class discussion
    - facilitated dialogue
    indicators:
    - facilitated discussion
    - think-pair-share
    - fishbowl
    - panel discussion
    - Socratic
    - group discussion
    - table discussion
    - whole-class discussion
    patterns:
    - (facilitated|group|table|whole-class|panel) discussion
    - think[- ]pair[- ]share
    - (fishbowl|Socratic) (discussion|seminar|dialogue)
    color: '#3498db'
    relates_to:
    - target: quiz_activity
      relation: contrasts_with
      weight: optional
      description: Synchronous (discussion) vs asynchronous (quiz) activity modes
    - target: reflection_activity
      relation: enables
      weight: expected
      description: Discussions generate insights that feed reflection activities for deeper metacognitive processing
    - target: collaborative_activity
      relation: bridges
      weight: expected
      description: Discussion serves as connective mechanism between individual and collaborative learning modes
    - target: analyze_verb
      relation: supports
      weight: expected
      description: Discussion activities support analysis-level learning objectives requiring critical evaluation of ideas
      target_file: learning_objectives_entities
    - target: instructional_strategy
      relation: supported_by
      weight: expected
      description: Discussion activities are grounded in pedagogical instructional strategies such as Socratic questioning
      target_file: pedagogical_frameworks_entities
    - target: facilitation_technique
      relation: supported_by
      weight: expected
      description: Effective discussions depend on facilitation techniques for managing participation and depth
      target_file: delivery_entities
    - target: germane_load_marker
      relation: enables
      weight: expected
      description: "Structured discussions activate multiple learning networks enhancing retention to 70% vs 5% for passive learning, directly engaging germane cognitive load processing per Discussion-based Learning research"
      target_file: cognitive_load_entities
    - target: formative_assessment
      relation: enables
      weight: expected
      description: "Formative assessment during discussions uses observable behavior indicators and participation rubrics to evaluate real-time learning per Discussion-based Learning research"
      target_file: assessment_entities
    - target: scenario_activity
      relation: supported_by
      weight: expected
      description: "Tabletop exercises use discussion-based sessions to validate plans, clarify roles, and identify coordination gaps within scenario frameworks per SBT guide"
    - target: instructional_event
      relation: supports
      weight: expected
      description: "Gagné's Event 3 (Stimulate Recall) explicitly uses discussions and questions to activate prior knowledge before introducing new content per theory_gagne_s_nine_events_of_instruction"
      target_file: pedagogical_frameworks_entities
    - target: adult_learner
      relation: supports
      weight: expected
      description: "Discussion forums and reflective dialogues leverage adult learners' experience and self-direction by connecting learning to personal workplace contexts (Best-Practice Learning Activities)"
      target_file: audience_entities
    - target: evaluate_verb
      relation: enables
      weight: optional
      description: "Discussion activities enable evaluate-level learning objectives — structured debates and peer critiques require learners to make judgments and defend positions using evaluation criteria (Best-Practice Learning Activities)"
      target_file: learning_objectives_entities
    - target: understand_verb
      relation: supports
      weight: expected
      description: "Discussion activities support understand-level learning objectives — collaborative discourse requires learners to explain, interpret, and summarise concepts through peer dialogue per course structure hierarchy research"
      target_file: learning_objectives_entities
    - target: interaction_element_marker
      relation: specialises
      weight: expected
      description: "Group discussions are a specific learning activity type within Content Map activity planning (Content Map Instructions v3)"
      target_file: content_architecture_entities
    - target: alignment_marker
      relation: supported_by
      weight: expected
      description: "Group discussions mapped as learning activities aligned to specific objectives within Content Map"
      target_file: content_architecture_entities
    taxonomy_mapping:
    - taxonomy: content_format_taxonomy
      dimension: delivery_mode
      values:
      - ilt
      - virtual_ilt
      strength: primary
  roleplay_activity:
    description: References to roleplay, simulation, and scenario-based practice activities
    canonical_id: roleplay_activity
    entity_kind: learning_activity
    family: synchronous
    gliner_label: ROLEPLAY_ACTIVITY
    gliner_description: Roleplay activity simulation scenario practice sales roleplay customer scenario objection handling
      mock call
    examples:
    - sales roleplay exercise
    - customer scenario simulation
    - objection handling drill
    - mock discovery call
    - role-based simulation
    - practice pitch session
    anti_examples:
    - role of the manager
    - play a role in
    confidence_threshold: 0.75
    aliases:
    - simulation
    - scenario practice
    - mock exercise
    indicators:
    - roleplay
    - role-play
    - simulation
    - scenario
    - mock call
    - mock pitch
    - objection handling
    - practice session
    - drill
    patterns:
    - (sales|customer|discovery|objection) (roleplay|role-play|simulation|drill)
    - mock (call|pitch|presentation|meeting)
    - (role-based|scenario-based) (simulation|practice|exercise)
    color: '#e74c3c'
    relates_to:
    - target: quiz_activity
      relation: contrasts_with
      weight: optional
      description: Synchronous (roleplay) vs asynchronous (quiz) activity modes
    - target: discussion_activity
      relation: bridges
      weight: expected
      description: Roleplay debriefs bridge into discussion activities for processing experiences and extracting insights
    - target: scenario_activity
      relation: specialises
      weight: expected
      description: Roleplay is a specialised form of scenario-based learning with interpersonal and performative focus
    - target: apply_verb
      relation: supports
      weight: expected
      description: Roleplay supports application-level Bloom's objectives through enacted real-world skill practice
      target_file: learning_objectives_entities
    - target: formative_assessment
      relation: enables
      weight: expected
      description: Roleplay enables formative assessment through observable performance and in-the-moment feedback
      target_file: assessment_entities
    - target: feedback_modality
      relation: triggers
      weight: required
      description: Roleplay performance triggers feedback modalities for immediate learner improvement and coaching
      target_file: assessment_entities
    - target: practice_activity
      relation: specialises
      weight: expected
      description: Practice Cards include simulations and role-plays as a specific type of practice activity (Comprehensive
        Learning Design Framework)
    - target: demonstration_activity
      relation: supported_by
      weight: expected
      description: "FPI sales training example shows expert role-play demonstrations preceding learner role-play practice per Merrill"
    - target: reflection_activity
      relation: triggers
      weight: required
      description: "Roleplay activities trigger structured debriefing and reflection for learners to process and internalise enacted experiences per roleplay research"
    - target: collaborative_activity
      relation: enables
      weight: expected
      description: "Roleplay enables collaborative activities through paired and group-based interpersonal practice formats per roleplay research"
    - target: facilitation_technique
      relation: supported_by
      weight: required
      description: "Roleplay requires skilled facilitation techniques for scenario setup, observation, and debrief management per roleplay research"
      target_file: delivery_entities
    - target: novice_learner
      relation: supports
      weight: expected
      description: "Role-play Third Spaces specifically address novice Gen Z soft skills deficits in conflict resolution and face-to-face communication per Learner Persona Research"
      target_file: audience_entities
    - target: instructional_event
      relation: supports
      weight: expected
      description: "Gagné's Event 6 (Elicit Performance) explicitly cites role-playing as a technique for learners to practice and apply knowledge per theory_gagne_s_nine_events_of_instruction"
      target_file: pedagogical_frameworks_entities
    - target: instructional_strategy
      relation: supported_by
      weight: expected
      description: "Role-play activities are supported by instructional strategy — action mapping recommends designing realistic practice scenarios including role-plays that mirror on-the-job tasks to develop target behaviours per High-Level Planning Tools research"
      target_file: pedagogical_frameworks_entities
    - target: audience_objection
      relation: enables
      weight: expected
      description: "Roleplay activities enable practice handling audience objections in simulated scenarios — learners rehearse responses to anticipated pushback in psychologically safe environments per Comprehensive Audience Analysis"
      target_file: audience_entities
    taxonomy_mapping:
    - taxonomy: content_format_taxonomy
      dimension: delivery_mode
      values:
      - ilt
      - virtual_ilt
      strength: primary
  collaborative_activity:
    description: References to group-based collaborative learning activities
    canonical_id: collaborative_activity
    entity_kind: learning_activity
    family: synchronous
    gliner_label: COLLABORATIVE_ACTIVITY
    gliner_description: Collaborative activity group work case study analysis problem solving design sprint hackathon workshop
      breakout
    examples:
    - case study analysis in groups
    - collaborative problem-solving exercise
    - design sprint
    - hackathon session
    - breakout room activity
    - jigsaw activity
    anti_examples:
    - collaboration tool
    - case study document
    confidence_threshold: 0.7
    aliases:
    - group activity
    - team exercise
    - collaborative exercise
    indicators:
    - case study analysis
    - problem-solving
    - design sprint
    - hackathon
    - breakout
    - jigsaw
    - group work
    - team activity
    - collaborative
    - brainstorm
    patterns:
    - (case study|problem[- ]solving|design sprint|hackathon) (activity|exercise|session)
    - (breakout|jigsaw|group|team|collaborative) (activity|exercise|work)
    - (brainstorm|brainstorming|mind[- ]mapping) (session|activity)
    color: '#2ecc71'
    relates_to:
    - target: quiz_activity
      relation: contrasts_with
      weight: optional
      description: Synchronous (collaborative) vs asynchronous (quiz) activity modes
    - target: discussion_activity
      relation: contains
      weight: expected
      description: Collaborative activities often contain discussion components for idea exchange and consensus building
    - target: analyze_verb
      relation: supports
      weight: expected
      description: Collaborative activities support analysis-level Bloom's objectives through group evaluation of problems
      target_file: learning_objectives_entities
    - target: create_verb
      relation: supports
      weight: required
      description: Collaborative activities support creation-level Bloom's objectives through joint artifact production
      target_file: learning_objectives_entities
    - target: delivery_modality
      relation: supported_by
      weight: expected
      description: Collaborative activities depend on delivery modality configuration for synchronous group interaction
      target_file: delivery_entities
    - target: instructional_strategy
      relation: supported_by
      weight: expected
      description: Collaborative activities are grounded in cooperative learning instructional strategies
      target_file: pedagogical_frameworks_entities
    - target: summative_assessment
      relation: enables
      weight: expected
      description: Collaborative project outputs can serve as summative assessment evidence of applied competence
      target_file: assessment_entities
    - target: motivation_element
      relation: supports
      weight: expected
      description: "FPI Activation phase uses group discussions where learners share prior experience insights activating engagement and motivation per Merrill"
      target_file: pedagogical_frameworks_entities
    - target: adult_learner
      relation: supports
      weight: expected
      description: "Millennials over-index on peer-validated cohort-based learning where they share best practices with others in similar roles per Learner Persona Research"
      target_file: audience_entities
    - target: reflection_activity
      relation: supports
      weight: optional
      description: "Reflect & Transfer Cards use collaborative elements — 'Share with peer', 'Share on collaborative board', 'Practice partner assignments' — collaborative activity supports reflection through social learning (Essentials_Course_Gold_Structure)"
    - target: germane_load_marker
      relation: enables
      weight: optional
      description: "Collaborative generative tasks (peer instruction, joint concept mapping, wiki creation) enable germane processing through Interactive-level ICAP engagement, the highest cognitive engagement level (Chi & Wylie, 2014; Applying_Learning_Theory_Practical_Checklist)"
      target_file: cognitive_load_entities
    - target: evaluate_verb
      relation: supports
      weight: expected
      description: "Collaborative activities like group case studies and team projects support Bloom's Evaluate level — teams must assess approaches, critique solutions, and present findings per ILT&VILT Best Practice"
      target_file: learning_objectives_entities
    - target: demonstration_activity
      relation: enables
      weight: optional
      description: "Collaborative activities enable group demonstrations such as team presentations and group teaching sessions where teams present findings to peers (Best-Practice Learning Activities)"
    - target: formative_assessment
      relation: supports
      weight: expected
      description: "Collaborative activities like hackathons, action learning projects, and group case studies support formative assessment through peer review and team deliverables (Best-Practice Learning Activities)"
      target_file: assessment_entities
    - target: facilitation_technique
      relation: supported_by
      weight: expected
      description: "Collaborative activities are supported by facilitation techniques — think-pair-share, breakout room management, circulating to coach, and structured debrief require skilled facilitation to produce effective collaborative outcomes (Gold Standard Structure)"
      target_file: delivery_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "Collaborative activities (breakout rooms, cohort forums, peer discussions) trigger engagement cues that reduce isolation and increase social presence in virtual settings per Best Practices for Structuring Corporate Learning Content"
      target_file: delivery_entities
    - target: mayer_generative_principle
      relation: supported_by
      weight: expected
      description: "Peer teaching in collaborative activities is a powerful generative strategy per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    taxonomy_mapping:
    - taxonomy: content_format_taxonomy
      dimension: delivery_mode
      values:
      - ilt
      - virtual_ilt
      strength: primary
