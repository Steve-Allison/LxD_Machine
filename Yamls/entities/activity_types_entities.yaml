quality_indicators:
  positive:
  - clear activity instructions
  - aligned to learning objective
  - appropriate Bloom's level
  - defined duration and format
  - debrief or feedback included
  negative:
  - activity-objective misalignment
  - missing instructions
  - no time allocation
  - no debrief mechanism
  - passive activity labelled as active
