  - Corpus/Research/theory_gagne_s_nine_events_of_instruction.md
  - Corpus/Research/recommended-training-effectiveness-questions-for-postcourse-eval.md
  - Corpus/Research/map-it-the-hands-on-guide-to-strategic-training-design-cathy-moo.md
