entity_types:
  claim:
    description: Assertions, propositions, or conclusions that require support
    canonical_id: claim
    entity_kind: argument_component
    family: toulmin_structure
    gliner_label: CLAIM
    gliner_description: Assertion proposition thesis conclusion statement requiring evidence support proof validation
    examples:
    - Our solution reduces costs by 40%
    - AI will transform customer experience
    - Market leaders are adopting this approach
    - This strategy delivers measurable ROI
    - Digital transformation is essential for growth
    - Speed of execution is now the primary competitive differentiator
    - The window for first-mover advantage is narrowing
    anti_examples:
    - insurance claim
    - claim form
    - baggage claim
    confidence_threshold: 0.65
    match_policy_ref: argument_component
    aliases:
    - assertion
    - proposition
    - thesis
    - conclusion
    indicators:
    - will
    - should
    - must
    - is essential
    - is critical
    - delivers
    - enables
    - transforms
    - accelerates
    patterns:
    - \w+ will \w+
    - \w+ delivers \w+
    - is essential for
    - is critical to
    color: '#3498db'
    relates_to:
    - target: evidence
      relation: supported_by
      weight: required
      description: Claims require evidential support — a claim without evidence is an unsubstantiated assertion
    - target: warrant
      relation: supported_by
      weight: expected
      description: Warrants provide the logical reasoning that connects evidence to this claim
    - target: qualifier
      relation: limits
      weight: expected
      description: Qualifiers constrain claim strength by defining scope, conditions, or boundaries
    - target: rebuttal
      relation: rebuts
      weight: optional
      description: Rebuttals challenge or contradict this claim in argumentative contexts
    - target: value_proposition
      relation: specialises
      weight: expected
      description: A value proposition is a commercially-framed specialisation of a claim
    - target: data_statistic
      relation: supported_by
      weight: expected
      description: Data statistics provide quantitative backing for claims
      target_file: evidence_types_entities
    - target: logos_appeal
      relation: supports
      weight: expected
      description: Claims are the core unit of logos-based persuasion; the assertion that
        requires evidential support per UNM v2 rhetorical balance analysis
      target_file: rhetorical_devices_entities
    - target: scqa_marker
      relation: supported_by
      weight: optional
      description: SCQA framework structures weak-logic narratives; the Answer component
        of SCQA delivers the central claim per UNM v2 prescriptive methodology
      target_file: rhetorical_devices_entities
    - target: situation_marker
      relation: supported_by
      weight: expected
      description: SOAR Situation stage provides context that grounds claims; a good situation
        statement orients listeners before claims are made per SOAR Storytelling research
      target_file: sales_entities
    - target: visual_demonstration
      relation: supported_by
      weight: expected
      description: "Claims are substantiated through visual demonstrations that bypass deliberative logic and appeal to the emotional brain first per Visual Communication and Storytelling"
      target_file: evidence_types_entities
    - target: chart_type
      relation: supported_by
      weight: expected
      description: "Claims are supported by chart types that provide visual evidence — bar charts, line graphs, and scatter plots make quantitative claims tangible and verifiable per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: call_to_action
      relation: enables
      weight: expected
      description: "SOAR workflow positions validated claims as the logical foundation that enables a specific audience call to action"
    - target: content_structure_marker
      relation: supported_by
      weight: expected
      description: "Claims structured by BLUF principle requiring governing assertion in first paragraph per Minto Pyramid"
      target_file: content_architecture_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - evidence
      - solution
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: aristotelian_appeal
      values:
      - logos
      strength: secondary
  evidence:
    description: Data, facts, examples, or citations supporting claims
    canonical_id: evidence
    entity_kind: argument_component
    family: toulmin_structure
    gliner_label: EVIDENCE
    gliner_description: Data statistics facts research citation proof support testimonial case study metric percentage
    examples:
    - According to Gartner, 75% of enterprises...
    - Customer X achieved 30% cost reduction
    - Q4 2023 results show 15% growth
    - Independent audit verified zero vulnerabilities
    - Over 500 Fortune 500 companies use...
    anti_examples:
    - evidence locker
    - crime scene evidence
    confidence_threshold: 0.7
    validators:
    - type: regex
      ref: percentage
    - type: regex
      ref: money_usd
    match_policy_ref: argument_component
    aliases:
    - support
    - proof
    - data_point
    - citation
    indicators:
    - according to
    - research shows
    - data indicates
    - studies show
    - results demonstrate
    - achieved
    - verified
    - reported
    - '%'
    - Fortune 500
    patterns:
    - according to \w+
    - \d+% \w+
    - \w+ achieved \d+
    - research shows
    - studies indicate
    color: '#2ecc71'
    relates_to:
    - target: claim
      relation: supports
      weight: required
      description: Evidence provides substantiation that makes claims credible
    - target: warrant
      relation: enables
      weight: expected
      description: Evidence provides the factual basis that warrants can reason from
    - target: data_statistic
      relation: contains
      weight: expected
      description: Evidence subsumes specific evidence types like data statistics
      target_file: evidence_types_entities
    - target: customer_story
      relation: contains
      weight: expected
      description: Evidence subsumes experiential evidence types like customer stories
      target_file: evidence_types_entities
    - target: evidence_quality_dimension
      relation: supports
      weight: required
      description: Evidence quality directly determines the evidence_quality_dimension score. The selection, presentation,
        and relevance of evidence (data, testimonials, case studies) are measurable factors in narrative strength.
      target_file: scoring_entities
    - target: logos_appeal
      relation: supports
      weight: expected
      description: Evidence is the factual foundation of logical persuasion; logos equals
        claim plus evidence in rhetorical balance analysis per UNM v2
      target_file: rhetorical_devices_entities
    - target: result_marker
      relation: supports
      weight: expected
      description: SOAR Results stage uses quantified metrics as evidence; specific data
        or examples are far more convincing than generalisations per SOAR research
      target_file: sales_entities
    - target: research_citation
      relation: contains
      weight: expected
      description: Evidence taxonomy includes research citations as a subcategory for
        reinforcing claims per UNM TACAM evidence type classification
      target_file: evidence_types_entities
    - target: before_after_comparison
      relation: contains
      weight: expected
      description: SOAR framework recommends before-and-after comparisons as evidence
        in Results stage to visually drive home the transformation per SOAR research
      target_file: evidence_types_entities
    - target: chart_type
      relation: supported_by
      weight: expected
      description: "Evidence presentation supported by appropriate chart type selection per Cognitive Fit Theory"
      target_file: visual_elements_entities
    - target: mayer_generative_principle
      relation: enables
      weight: optional
      description: "Generative activities require learners to produce evidence of understanding per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - evidence
      strength: primary
  warrant:
    description: Logical bridges connecting evidence to claims
    canonical_id: warrant
    entity_kind: argument_component
    family: toulmin_structure
    gliner_label: WARRANT
    gliner_description: Reasoning justification logical bridge because therefore thus hence it follows connection
    examples:
    - Because efficiency drives profitability...
    - Since market leaders set standards...
    - Given that customers demand speed...
    - As digital natives expect seamless experiences...
    anti_examples:
    - search warrant
    - arrest warrant
    - warranty
    confidence_threshold: 0.6
    match_policy_ref: argument_component
    aliases:
    - reasoning
    - justification
    - logical_bridge
    indicators:
    - because
    - since
    - given that
    - as
    - therefore
    - thus
    - hence
    - it follows that
    patterns:
    - because \w+
    - since \w+
    - given that \w+
    - therefore
    color: '#9b59b6'
    relates_to:
    - target: claim
      relation: bridges
      weight: required
      description: Warrants provide the logical bridge connecting evidence to claims — explains WHY the evidence justifies
        the assertion
    - target: evidence
      relation: bridges
      weight: required
      description: Warrants reason FROM evidence TO claims — without both endpoints the bridge is meaningless
    - target: cause_marker
      relation: supported_by
      weight: expected
      description: RST discourse analysis maps causal markers (therefore, thus, because)
        as linguistic surface markers for warrants per UNM v2 discourse analysis
      target_file: discourse_entities
    - target: value_proposition
      relation: bridges
      weight: expected
      description: SOAR Approach section requires warrants explaining WHY the solution
        addresses the challenge; framing approach as solution tied back to Opportunity per SOAR research
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - insight
      strength: primary
  qualifier:
    description: Hedging or limiting language indicating certainty level
    canonical_id: qualifier
    entity_kind: argument_component
    family: toulmin_structure
    gliner_label: QUALIFIER
    gliner_description: Hedge limitation condition uncertainty modifier typically generally usually probably might could
    examples:
    - In most cases...
    - Typically...
    - Under certain conditions...
    - For enterprise customers...
    - Generally speaking...
    confidence_threshold: 0.75
    match_policy_ref: argument_component
    aliases:
    - hedge
    - limitation
    - condition
    indicators:
    - typically
    - generally
    - usually
    - often
    - in most cases
    - under certain
    - may
    - might
    - could
    - probably
    patterns:
    - in most \w+
    - under certain \w+
    - for \w+ customers
    color: '#f39c12'
    relates_to:
    - target: claim
      relation: limits
      weight: expected
      description: Qualifiers define the scope, conditions, or boundaries under which claims hold true
    - target: hedging_marker
      relation: specialises
      weight: expected
      description: Qualifiers are degree-of-certainty markers in Toulmin argumentation;
        hedging markers are the discourse-level surface form per UNM v2 Toulmin Model
      target_file: discourse_entities
    - target: rebuttal
      relation: enables
      weight: expected
      description: Qualifiers and rebuttals are complementary constraint mechanisms on
        claim strength in Toulmin argumentation per UNM v2
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: secondary
  rebuttal:
    description: Acknowledgment of counterarguments or limitations
    canonical_id: rebuttal
    entity_kind: argument_component
    family: toulmin_structure
    gliner_label: REBUTTAL
    gliner_description: Counterargument objection concession limitation however although despite critics oppose challenge
    examples:
    - While competitors claim...
    - Although some argue...
    - Despite concerns about...
    - Critics may point to...
    - One might object that...
    confidence_threshold: 0.65
    match_policy_ref: argument_component
    aliases:
    - counterargument
    - objection
    - limitation
    - concession
    indicators:
    - while
    - although
    - despite
    - however
    - critics
    - opponents
    - some argue
    - one might
    - on the other hand
    patterns:
    - while \w+ claim
    - although some \w+
    - despite \w+
    - however
    color: '#e74c3c'
    relates_to:
    - target: claim
      relation: rebuts
      weight: required
      description: Rebuttals directly challenge or contradict claims with counter-evidence or opposing positions
    - target: evidence
      relation: supported_by
      weight: expected
      description: Strong rebuttals require their own evidential backing to be credible
    - target: qualifier
      relation: bridges
      weight: required
      description: Rebuttals and qualifiers work together in Toulmin argumentation. Qualifiers moderate claims by acknowledging
        exceptions; rebuttals address counterarguments. Together they create nuanced, credible argumentation.
    - target: contrast_marker
      relation: supported_by
      weight: expected
      description: RST adversative markers (however, nevertheless, but) signal rebuttal
        language at discourse level per UNM v2 RST analysis
      target_file: discourse_entities
    - target: ethos_appeal
      relation: enables
      weight: expected
      description: Addressing counter-arguments via rebuttals builds speaker credibility
        (ethos) in rhetorical balance per UNM v2 prescriptive analysis
      target_file: rhetorical_devices_entities
    - target: narrative_tension
      relation: enables
      weight: optional
      description: Acknowledging challenges and missteps adds credibility and creates
        narrative tension; audiences appreciate honest assessment per SOAR research
    - target: audience_objection
      relation: resolves
      weight: expected
      description: "Rebuttals directly resolve persona-specific objections by generating tailored counter-arguments and proof points per Storytelling for Different Business Personas"
      target_file: audience_entities
    - target: evidence
      relation: rebuts
      weight: expected
      description: "Rebuttals challenge evidence by questioning observation reliability, authority credibility, or showing premises are probably false per a-guide-to-good-reasoning"
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: emotional_tone
      values:
      - concerned
      strength: secondary
  narrative_hook:
    description: Attention-grabbing openings that engage the audience
    canonical_id: narrative_hook
    entity_kind: narrative_element
    family: storytelling_structure
    gliner_label: NARRATIVE_HOOK
    gliner_description: Attention grabber opener hook imagine what if picture consider compelling question provocative
    examples:
    - Imagine a world where...
    - What if you could...
    - Picture this scenario...
    - Have you ever wondered...
    - The biggest challenge facing enterprises today...
    confidence_threshold: 0.7
    match_policy_ref: defaults
    aliases:
    - hook
    - opener
    - attention_grabber
    indicators:
    - imagine
    - what if
    - picture
    - have you ever
    - the biggest
    - the most important
    - consider this
    patterns:
    - imagine \w+
    - what if you \w+
    - picture \w+
    - have you ever \w+
    color: '#1abc9c'
    relates_to:
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: Hooks create initial interest that sets up the expectation of tension or a problem
    - target: call_to_action
      relation: precedes
      weight: expected
      description: Hooks open narratives that culminate in calls to action
    - target: question_hook
      relation: contains
      weight: expected
      description: Narrative hooks subsume specific hook types like question hooks
      target_file: opening_hooks_entities
    - target: claim
      relation: triggers
      weight: required
      description: A narrative hook activates the audience's attention and curiosity, which then leads to the presentation
        of the core claim. The hook creates cognitive engagement necessary for the audience to receive the claim.
    - target: engagement_dimension
      relation: enables
      weight: required
      description: Narrative hooks establish the cognitive and emotional entry point for audiences. They determine whether
        audiences engage with the rest of the content. Strong hooks enable high engagement dimension scores by capturing attention
        before cognitive evaluation begins.
      target_file: scoring_entities
    - target: pain_point
      relation: triggers
      weight: expected
      description: SOAR Situation stage hooks audiences by connecting to their pain points;
        a concise recognisable situation triggers engagement per SOAR research
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: Hooks inject emotional engagement at narrative entry point; dry narratives
        result from low Pathos without effective hooks per UNM v2
      target_file: rhetorical_devices_entities
    - target: story_hook
      relation: contains
      weight: expected
      description: Story-based openings are a subcategory of narrative hooks using anecdote
        and personal narrative for authenticity per UNM v2 and SOAR research
      target_file: opening_hooks_entities
    - target: statistic_hook
      relation: contains
      weight: optional
      description: Data-driven hooks leverage statistical surprise or urgency as attention-grabbing
        openings within the broader narrative hook category per UNM v2
      target_file: opening_hooks_entities
    - target: visual_narrative_element
      relation: supported_by
      weight: expected
      description: "Narrative hooks are visually supported through hierarchy that directs viewer attention to the hook first per Visual Communication and Storytelling"
      target_file: visual_elements_entities
    - target: motivation_element
      relation: triggers
      weight: expected
      description: "FPI's Problem-Centered anchor and Show-Task corollary function as narrative hooks that create learner engagement from the start per Merrill"
      target_file: pedagogical_frameworks_entities
    - target: nonverbal_cue
      relation: supported_by
      weight: expected
      description: "Narrative hooks gain impact through delivery — raised eyebrows, leaning forward, dramatic pause before the hook all physically amplify the hook's attention-grabbing effect per Ethos and Physicality research"
      target_file: performance_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: required
      description: "Narrative hooks are the primary mechanism for MMS's Attention stage — provocative questions, surprising facts, anecdotes, or vivid scenarios that spark curiosity per Monroe's Motivated Sequence research"
      target_file: rhetorical_devices_entities
    - target: scenario_activity
      relation: supports
      weight: expected
      description: "SBT uses the 4 Cs narrative design (Characters, Context, Challenge, Consequences) where relatable characters and realistic settings hook learners into emotional investment per SBT guide"
      target_file: activity_types_entities
    - target: structural_slide
      relation: supported_by
      weight: expected
      description: "Narrative hooks are supported by structural slides which provide the visual scaffolding (agenda, section dividers) that contextualise the hook within the broader presentation arc per slide design research monograph part 3"
      target_file: slide_types_entities
    - target: engagement_cue
      relation: enables
      weight: expected
      description: "Opening with an anecdote or scenario directly grabs attention and creates engagement — narrative hooks enable engagement cues per Public Speaking research"
      target_file: delivery_entities
    - target: pedagogical_sequence_marker
      relation: precedes
      weight: expected
      description: "Narrative hooks precede the core pedagogical sequence — in the gold-standard structure, the opening hook captures attention before the roadmap, core content, practice, and assessment stages begin (Gold Standard Structure)"
      target_file: content_architecture_entities
    - target: authority_opener
      relation: supports
      weight: expected
      description: "Narrative hooks support authority openers — strong opening techniques provide the attention-grabbing framework within which a confident declarative statement achieves maximum impact (Mastering Presentation Nerves)"
      target_file: performance_entities
    - target: microlearning_format
      relation: supports
      weight: expected
      description: "Narrative hooks support microlearning formats — short-form content relies on immediate attention capture, making hooks critical for micro-module engagement per AI Microlearning Guide"
      target_file: content_format_entities
    - target: audience_pain_point
      relation: triggers
      weight: expected
      description: "Narrative hooks trigger recognition of audience pain points to establish relevance — connecting to what keeps the audience up at night creates immediate engagement per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: learner_characteristic
      relation: supported_by
      weight: expected
      description: "Audience Simulator step requires narrative hooks to be grounded in audience Point A analysis across KNOW/BELIEVE/FEEL/DO quadrants"
      target_file: pedagogical_frameworks_entities
    - target: transition_marker
      relation: enables
      weight: expected
      description: "Strong opening hooks set up the narrative thread that transition markers carry between sections (Best Video Script Prompts)"
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - setup
      strength: primary
    - taxonomy: narrative_taxonomy
      dimension: emotional_tone
      values:
      - urgent
      - inspirational
      strength: secondary
  call_to_action:
    description: Direct requests for audience action or next steps
    canonical_id: call_to_action
    entity_kind: narrative_element
    family: storytelling_structure
    gliner_label: CALL_TO_ACTION
    gliner_description: CTA action request next step contact schedule download register sign up get started demo
    examples:
    - Contact us today to learn more
    - Schedule a demo
    - Download the whitepaper
    - Let's discuss how...
    - Take the first step by...
    confidence_threshold: 0.8
    match_policy_ref: defaults
    aliases:
    - cta
    - next_step
    - action_request
    indicators:
    - contact
    - schedule
    - download
    - register
    - sign up
    - let's
    - take the
    - start your
    - get started
    patterns:
    - contact \w+ today
    - schedule a \w+
    - download the \w+
    - let's discuss
    color: '#e67e22'
    relates_to:
    - target: resolution_signal
      relation: precedes
      weight: expected
      description: Resolution signals lead into calls to action — the payoff sets up the ask
    - target: value_proposition
      relation: supported_by
      weight: expected
      description: CTAs need value propositions to justify the requested action
    - target: outcome_statement
      relation: supported_by
      weight: expected
      description: CTAs are strengthened by concrete outcome statements
    - target: result_marker
      relation: supported_by
      weight: expected
      description: SOAR Results stage naturally culminates in a CTA; recommends ending
        with a clear takeaway or call-to-action after presenting results per SOAR research
      target_file: sales_entities
    - target: monroe_sequence_marker
      relation: supported_by
      weight: optional
      description: CTAs map to the Action step in Monroe's Motivated Sequence providing
        persuasive closure after need, satisfaction, and visualisation per UNM v2
      target_file: rhetorical_devices_entities
    - target: action_marker
      relation: specialises
      weight: optional
      description: CTAs specialise the SOAR Action/Approach stage where the audience is
        directed to act on the presented solution per UNM v2 SOAR mapping
      target_file: sales_entities
    - target: audience_motivator
      relation: supported_by
      weight: expected
      description: "Calls to action are supported by audience motivators framing the ask in the audience's own terms per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: urgency_signal
      relation: supported_by
      weight: optional
      description: "Calls to action are supported by urgency signals as personalised CTAs convert 42% more visitors into leads per Comprehensive Audience Analysis"
      target_file: sales_entities
    - target: emphasis_marker
      relation: supported_by
      weight: expected
      description: "Calls to action require vocal emphasis (volume increase, deliberate pacing, pitch change) to signal their importance and drive audience response per Ethos and Physicality research"
      target_file: performance_entities
    - target: pathos_appeal
      relation: supported_by
      weight: expected
      description: "Calls to action are supported by pathos appeal; emotional connection (warmth, Duchenne smile) drives audience willingness to act on the directive per Anatomy of Presence research"
      target_file: rhetorical_devices_entities
    - target: engagement_cue
      relation: enables
      weight: expected
      description: "Calls to action enable engagement cues — clear directive language paired with benefit framing creates actionable audience engagement moments per Best Practices for Writing"
      target_file: delivery_entities
    - target: visual_element
      relation: supported_by
      weight: expected
      description: "Calls to action are supported by visual elements — prominent buttons, directional cues, and high-contrast visual treatments make CTAs visually distinct and actionable per Visualisation Techniques research"
      target_file: visual_elements_entities
    - target: functional_slide
      relation: supported_by
      weight: expected
      description: "Calls to action are supported by functional slides which provide the interactive mechanisms (QR codes, forms, links) that enable audience response per slide design research monograph part 2"
      target_file: slide_types_entities
    - target: positive_buying_signal
