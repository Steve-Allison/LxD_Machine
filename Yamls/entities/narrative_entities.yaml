        story feels uneasy and scores poorly on SOAR narrative quality per SOAR research
      target_file: sales_entities
    taxonomy_mapping:
    - taxonomy: narrative_taxonomy
      dimension: story_function
      values:
      - result
      - solution
      strength: primary
    - taxonomy: narrative_taxonomy
      dimension: emotional_tone
      values:
      - celebratory
      - optimistic
      strength: primary
gliner_config:
  model: gliner-large-v2
  batch_size: 32
  use_hybrid_extraction: true
  llm_fallback_for_types:
  - claim
  - warrant
  - value_proposition
  - narrative_tension
  context_window: 75
  default_confidence_threshold: 0.7
  entity_groups:
    toulmin_components:
    - CLAIM
    - EVIDENCE
    - WARRANT
    - QUALIFIER
    - REBUTTAL
    narrative_elements:
    - NARRATIVE_HOOK
    - CALL_TO_ACTION
    - TRANSITION_MARKER
    - NARRATIVE_TENSION
    - RESOLUTION_SIGNAL
    sales_elements:
    - VALUE_PROPOSITION
    - PAIN_POINT
    - OUTCOME_STATEMENT
domain_keywords:
  primary:
  - story
  - narrative
  - argument
  - claim
  - evidence
  - support
  - therefore
  - because
  - conclude
  - demonstrates
  - proves
  - shows
  - indicates
  - value proposition
  - call to action
  - hook
  - transition
  - tension
  - resolution
  secondary:
  - rhetoric
  - persuasion
  - discourse
  - proposition
  - thesis
  - warrant
  - backing
  - qualifier
  - rebuttal
  - toulmin
  - rst
  - coherence
  - cohesion
  - flow
  - structure
  - turning point
  - breakthrough
  - complication
  - urgency
  - SOAR
quality_indicators:
  argument_structure:
    claim_only: CLAIM without EVIDENCE — unsupported assertion; -5 points argument quality
    supported: CLAIM + EVIDENCE — minimum acceptable argument structure
    well_argued: CLAIM + EVIDENCE + WARRANT — full Toulmin structure; +5 points
    expert_backed: CLAIM + EVIDENCE + WARRANT + attributed REBUTTAL — highest argument quality; +8 points
  narrative_arc_completeness:
    description: Checks for tension-resolution pairing in narrative content
    incomplete: NARRATIVE_TENSION detected without RESOLUTION_SIGNAL — unresolved arc; tension without payoff
    complete: NARRATIVE_TENSION followed by RESOLUTION_SIGNAL — complete narrative arc; +5 points
    hook_absent: No NARRATIVE_HOOK detected in opening — flat start; -5 points
    cta_absent: No CALL_TO_ACTION detected in closing — no direction for audience; -3 points
  soar_narrative_indicators:
    description: Narrative entity signals that map to SOAR stage health
    situation_signal: PAIN_POINT detected — establishes Situation context
    opportunity_signal: NARRATIVE_TENSION detected — validates Opportunity urgency
    action_signal: VALUE_PROPOSITION detected — validates Action relevance
    result_signal: OUTCOME_STATEMENT + RESOLUTION_SIGNAL — validates Result credibility
