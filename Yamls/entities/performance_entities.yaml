_meta:
  id: performance_entities
  purpose: entity
  version: 2.18.1
  last_updated: '2026-03-09'
  description: Entity types and patterns for NLP-based speaker performance detection including disfluency markers, vocal quality
    indicators, rhetorical devices, and delivery cues.
  domain: performance
  domain_type: workflow
  corpus_sources:
  - Corpus/Research/Research - World-Class_Public_Speaking_Research.md
  - Corpus/Research/Research - Elite Speaker Linguistic Analysis Taxonomy.md
  - Corpus/Research/Research - The Architecture of Influence_ A Comprehensive Multimodal Taxonomy of Elite vs. Average Public
    Speaking.md
  - 'Corpus/Research/The World-Class Presentation Playbook: A Cognitive-Based System for Design, Structure, and Delivery.md'
  - 'Corpus/Research/The Canonical Presentation Lifecycle: A Strategic Methodology for High-Stakes Communication.md'
  - Corpus/Research/Research - Unified Performance Framework.md
  - Corpus/Research/Research - Presentation Delivery_ Ethos and Physicality.md
  - Corpus/Research/Research - Canonical Presentation Methodology Research.md
  - Corpus/Research/Crafting Powerful Opening Plays.md
  - Corpus/Research/Research - Personal Branding Framework for Early.md
  - Corpus/Research/Research - Analyzing Story for Business Communication.md
  - Corpus/Research/Research - The Anatomy of Presence.md
  - Corpus/Research/Research - Vocal Profiling for Executive Coaching.md
  - Corpus/Research/Research - Voice Coaching and Clinical Analysis.md
  - Corpus/Research/Research - World-Class_Public_Speaking_FULL_RESEARCH.md
  - Corpus/Research/Research - Voice Quality Metric Research Parameters.md
  - Corpus/Research/Best-Practice Elevator Pitches.md
  - Corpus/Research/Research_Corpus_Public_Speaking_Full.md
  - Corpus/Research/Research - Public_Speaking_research.md
  - Corpus/Research/Research - ILT & VILT Best Practice.md
  - Corpus/Research/research_-_mastering_presentation_nerves.md
  - Corpus/Research/research_-_elite_speaker_linguistic_analysis_taxonomy.md
  - Corpus/Research/research_-_the_architecture_of_influence__a_comprehensive_multim.md
  relationships:
  - target: reference/speaking_performance_thresholds.yaml
    type: depends_on
    description: Performance tier labels and threshold values for scoring
  - target: reference/voice_quality_thresholds.yaml
    type: depends_on
    description: Clinical thresholds for voice quality assessment
gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - speaker
    - delivery
    - voice
    - pitch
    - pace
    - pause
    - gesture
    - presence
    secondary:
    - filler
    - monotone
    - uptalk
    - vocal fry
    - projection
    - articulation
    - cadence
entity_types:
  filler_word:
    description: Verbal disfluencies that interrupt speech flow and undermine authority
    canonical_id: filler_word
    entity_kind: disfluency
    family: paralinguistic
    gliner_label: FILLER_WORD
    gliner_description: Verbal disfluency filler word hesitation um uh like you know kind of sort of
    examples:
    - um
    - uh
    - like
    - you know
    - kind of
    - sort of
    - I mean
    - basically
    - actually
    - right
    anti_examples:
    - I like this approach
    - What kind of solution
    - Sort the results
    confidence_threshold: 0.8
    aliases:
    - hesitation
    - verbal filler
    - disfluency
    indicators:
    - um
    - uh
    - er
    - like
    - you know
    - kind of
    - sort of
    - I mean
    - basically
    - actually
    - literally
    - right
    - so
    patterns:
    - \bum\b
    - \buh\b
    - \ber\b
    - you know
    - kind of
    - sort of
    - I mean
    color: '#e74c3c'
    performance_threshold:
      elite: < 1 per 100 words
      proficient: 1-3 per 100 words
      developing: 3-5 per 100 words
      needs_coaching: '> 5 per 100 words'
    relates_to:
    - target: extraneous_load_marker
      relation: triggers
      weight: expected
      description: Filler words add extraneous cognitive load to spoken delivery
      target_file: cognitive_load_entities
    - target: delivery_rate_issue
      relation: contrasts_with
      weight: required
      description: Filler words (um, uh, er) are the inverse of strategic pausing. While strategic pauses create gravitas
        and processing time, filler words signal uncertainty and planning load. Elite speakers replace filler words with silence.
    - target: pause_marker
      relation: contrasts_with
      weight: required
      description: Elite speakers replace filler words with emphatic pauses of 250-600ms; silence
        is the antithesis of disfluency per Unified Performance Framework and Ethos research
    - target: performance_tier
      relation: limits
      weight: expected
      description: Filler word density differentiates speaker tiers; elite speakers eliminate
        fillers while novice speakers default to disfluencies per Ethos and Physicality research
    - target: ethos_appeal
      relation: limits
      weight: expected
      description: "Filled pauses (um, uh, like) signal anxiety and lack of preparation, actively reducing speaker credibility and perceived competence per Ethos and Physicality research"
      target_file: rhetorical_devices_entities
    - target: presentation_anxiety_marker
      relation: supported_by
      weight: expected
      description: "Filler words co-occur with hesitation pauses exceeding 1000ms in non-boundary positions, both indicating lexical retrieval failure associated with anxiety per Unified Performance Framework"
      target_file: delivery_entities
    - target: vocal_quality_issue
      relation: triggers
      weight: expected
      description: "Excessive filler words trigger vocal quality degradation — rushed speech interspersed with um/uh undermines clarity and perceived confidence in personal brand delivery per Personal Branding Framework"
    - target: confidence_technique
      relation: rebuts
      weight: expected
      description: "Filler words directly undermine confidence techniques; the master protocol requires speaking on the exhale with downward inflection, which is incompatible with filler-laden speech per Anatomy of Presence research"
      target_file: delivery_entities
    - target: working_memory_marker
      relation: limits
      weight: required
      description: "Filler words directly consume working memory bandwidth — listeners must process meaningless sounds competing with content comprehension, with optimal filler rate of 0-2 per minute per Research_Corpus_Public_Speaking_Full"
      target_file: cognitive_load_entities
  vocal_quality_issue:
    description: Terms indicating voice quality problems requiring coaching or clinical attention
    canonical_id: vocal_quality_issue
    entity_kind: quality_indicator
    family: vocal_production
    gliner_label: VOCAL_QUALITY_ISSUE
    gliner_description: Voice quality problem hoarse breathy strained vocal fry nasal creaky thin weak
    examples:
    - hoarse voice
    - breathy quality
    - strained delivery
    - vocal fry
    - nasal tone
    - creaky voice
    - thin voice
    - weak projection
    anti_examples:
    - voice of the customer
    - brand voice
    - vocal supporter
    confidence_threshold: 0.75
    aliases:
    - voice problem
    - vocal pathology
    - voice concern
    indicators:
    - hoarse
    - breathy
    - strained
    - vocal fry
    - nasal
    - creaky
    - thin
    - weak
    - raspy
    - scratchy
    - tight
    - constricted
    patterns:
    - (hoarse|breathy|strained|nasal|creaky|thin|weak|raspy) (voice|quality|tone|delivery)
    - vocal (fry|strain|fatigue|tension)
    color: '#9b59b6'
    relates_to:
    - target: performance_tier
      relation: triggers
      weight: required
      description: Vocal quality issues (jitter >1.04%, shimmer >3.81%, HNR <20dB) directly
        determine performance tier placement per Unified Performance Framework diagnostic thresholds
    - target: nonverbal_cue
      relation: bridges
      weight: expected
      description: Vocal quality (breathiness, strain, vocal fry) co-occurs with physical tension
        patterns; physiological sigh breathing addresses both vocal and postural control per Ethos research
    - target: uptalk_indicator
      relation: bridges
      weight: expected
      description: Vocal fry and uptalk both signal reduced vocal authority; they co-occur as
        dual credibility killers per Presentation Delivery Ethos research
    - target: presentation_anxiety_marker
      relation: supported_by
      weight: optional
      description: Vocal quality degradation (pitch constriction, breathiness, volume drop)
        is a physiological indicator of presentation anxiety per Ethos and Physicality research
      target_file: delivery_entities
    - target: engagement_cue
      relation: contrasts_with
      weight: expected
      description: Monotone pitch and few pauses lead to low warmth while elite speakers oscillate between soft sell and hard sell voices for engagement per Elite Speaker Linguistic Analysis
      target_file: delivery_entities
    - target: ethos_appeal
      relation: limits
      weight: expected
      description: "Vocal quality issues (cracking, breathiness, monotone) undermine perceived competence and authority, directly limiting ethos appeal per Ethos and Physicality research"
      target_file: rhetorical_devices_entities
    - target: clarity_dimension
      relation: limits
      weight: required
      description: "Vocal quality issues directly degrade clarity scoring — low CPP/CPPS (<9dB in speech) and HNR <15dB indicate dysphonic voice that reduces intelligibility per Voice Quality Metric Research"
      target_file: scoring_entities
    - target: delivery_rate_issue
      relation: triggers
      weight: expected
      description: "Vocal quality issues like breathiness/roughness correlate with speech rate anomalies per voice metric research"
    - target: filler_word
      relation: triggers
      weight: expected
      description: "Vocal quality degradation co-occurs with increased filler word usage as speakers lose fine motor phonatory control per voice metric research"
    - target: engagement_dimension
      relation: limits
      weight: expected
      description: "Monotone or dysphonic vocal quality directly reduces audience engagement as shown by 'The Drone' archetype per voice metric research"
      target_file: scoring_entities
    - target: negative_qualifier
      relation: triggers
      weight: expected
      description: "Pathological voice quality indicators (high jitter >1.04%, low HNR <12dB) trigger negative scoring qualifiers per Voice Quality Metric Research"
      target_file: scoring_entities
    - target: extraneous_load_marker
      relation: triggers
      weight: expected
      description: "Robotic or monotonous narration requires extra effort to decode increasing extraneous load per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
  delivery_rate_issue:
    description: Speech rate and pacing problems identified in coaching feedback
    canonical_id: delivery_rate_issue
    entity_kind: quality_indicator
    family: delivery
    gliner_label: DELIVERY_RATE_ISSUE
    gliner_description: Speech rate pacing problem too fast rushed slow monotone flat trailing off mumbling
    examples:
    - speaking too fast
    - rushed delivery
    - monotone presentation
    - flat affect
    - trailing off at sentence ends
    - mumbling
    - hard to hear
    - swallowed syllables
    anti_examples:
    - fast track project
    - delivery service
    - flat design
    confidence_threshold: 0.7
    aliases:
    - pacing issue
    - rate problem
    - tempo concern
    indicators:
    - too fast
    - too slow
    - rushed
    - monotone
    - flat
    - trailing off
    - mumbling
    - hard to hear
    - volume drop
    - inaudible
    - unclear
    patterns:
    - (too|very) (fast|slow|quiet|loud)
    - (rushed|monotone|flat|mumbling)
    - trailing off
    - hard to hear
    - volume (drop|drops|dropped)
    color: '#f39c12'
    relates_to:
    - target: working_memory_marker
      relation: triggers
      weight: optional
      description: Speaking too fast overloads working memory
      target_file: cognitive_load_entities
    - target: pause_marker
      relation: supported_by
      weight: required
      description: Strategic pause insertion is the primary mechanism for controlling delivery
        rate; optimal 500-600ms pauses reduce WPM from conversational 150-160 to elite 100-120
        per Unified Performance Framework
    - target: performance_tier
      relation: triggers
      weight: required
      description: Speech rate directly determines performance tier placement; >170 WPM maps
        to The Manic archetype, <100 WPM maps to The Drone archetype per Unified Performance Framework
    - target: extraneous_load_marker
      relation: triggers
      weight: expected
      description: Excessive speech rate (>170 WPM) overloads audience processing capacity
        creating extraneous cognitive load per dual-channel processing theory
      target_file: cognitive_load_entities
    - target: nonverbal_cue
      relation: bridges
      weight: expected
      description: Rushed delivery rate correlates with restricted gesture range and frozen
        posture; optimal rate enables full use of the Power Box gesture space per Ethos research
    - target: performance_tier
      relation: limits
      weight: expected
      description: Novice speakers have fast rate above 160 wpm due to anxiety while elite speakers speak at 100-120 wpm per Elite Speaker Linguistic Analysis
    - target: presentation_anxiety_marker
      relation: supported_by
      weight: expected
      description: "Delivery rate issues are driven by presentation anxiety; the master protocol prescribes speaking slightly slower than baseline specifically to signal low anxiety per Anatomy of Presence research"
      target_file: delivery_entities
    - target: logos_appeal
      relation: limits
      weight: expected
      description: "Delivery rate issues limit logos appeal; speaking too fast (>170 WPM) exceeds the listener's processing capacity, reducing retention of logical arguments per Vocal Profiling research"
      target_file: rhetorical_devices_entities
    - target: vocal_quality_issue
      relation: triggers
      weight: expected
      description: "Excessive speech rate (>6 syllables/sec) triggers vocal quality issues — vowel centralization and spectral reduction degrade intelligibility and acoustic clarity per Voice Coaching and Clinical Analysis"
    - target: engagement_dimension
      relation: limits
      weight: expected
      description: "Delivery rate issues directly limit engagement scoring — both >180 WPM (cognitive backlog, 17-25% comprehension drop) and monotone pitch (<3 ST sigma) measurably reduce audience engagement per Voice Quality Metric Research"
      target_file: scoring_entities
    - target: working_memory_marker
      relation: limits
      weight: expected
      description: "Excessive speech rate overwhelms auditory processing loop and listener working memory capacity per voice metric research"
      target_file: cognitive_load_entities
    - target: novice_learner
      relation: limits
      weight: required
      description: "Excessive delivery rate >180 WPM limits novice learner comprehension most severely due to lack of chunking schema per Voice Quality Metric Research"
      target_file: audience_entities
  power_verb:
    description: High-impact action verbs that convey authority and leadership
    canonical_id: power_verb
    entity_kind: rhetorical_device
    family: lexical_choice
    gliner_label: POWER_VERB
    gliner_description: High-impact action verb authority leadership spearheaded ignited transformed mobilized propelled
    examples:
    - spearheaded the initiative
    - ignited a transformation
    - mobilized the team
    - propelled growth
    - championed the cause
    - orchestrated the rollout
    - catalyzed innovation
    anti_examples:
    - spearhead mint plant
    - ignited the fire
    confidence_threshold: 0.65
    aliases:
    - action verb
    - impact verb
    - leadership verb
    indicators:
    - spearheaded
    - ignited
    - transformed
    - mobilized
    - propelled
    - championed
    - orchestrated
    - catalyzed
    - revolutionized
    - pioneered
    - galvanized
    - architected
    - forged
    - unleashed
    patterns:
    - (spearheaded|ignited|transformed|mobilized|propelled|championed|orchestrated) \w+
    - (catalyzed|revolutionized|pioneered|galvanized|architected|forged|unleashed) \w+
    color: '#2ecc71'
    relates_to:
    - target: rhetorical_pattern
      relation: supports
      weight: required
      description: Power verbs (launched, transformed, spearheaded) form the foundation of dynamic rhetorical patterns. They
        create agency in discourse and signal action-orientation. Patterns of power verbs throughout a presentation establish
        a consistent voice of authority and agency.
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: Power verbs (launched, transformed, spearheaded) construct ethos through
        agency language; decisive action vocabulary signals executive presence per Canonical Methodology
      target_file: rhetorical_devices_entities
    - target: emphasis_marker
      relation: supported_by
      weight: expected
      description: Power verbs gain impact through vocal emphasis; stressed delivery of action
        verbs amplifies their authority signalling effect per Ethos and Physicality research
    - target: value_proposition
      relation: supports
      weight: expected
      description: "Power verbs directly strengthen value proposition impact — 'transform' vs 'help' signals decisive action and authority per Best-Practice Elevator Pitches"
      target_file: narrative_entities
    - target: action_marker
      relation: supports
      weight: expected
      description: Power verbs map directly to sales action markers; verbs like accelerated,
        captured, transformed serve dual rhetorical and sales narrative functions per SOAR framework
      target_file: sales_entities
    - target: bluf_hook
      relation: supports
      weight: expected
      description: Power verbs support BLUF hooks by providing the decisive, action-oriented language that makes bottom-line
        opening statements authoritative and impactful per Crafting Powerful Opening Plays
      target_file: opening_hooks_entities
    - target: performance_tier
      relation: enables
      weight: expected
      description: Level 4 Visionary speakers show high verb dynamism with discourse organizer bundles while Level 1 Novice speakers show low passive verb dynamism per Elite Speaker Linguistic Analysis
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: "Dynamic action verbs (ignite, shatter, unleash) activate emotional imagery and visceral response, directly enabling pathos appeal per Ethos and Physicality research"
    - target: hedge_marker
      relation: contrasts_with
      weight: expected
      description: "High-agency dynamic verbs (spearheaded, ignited, transformed) contrast with weak stative substitutes; replacing stative verbs increases perceived leadership competence per Architecture of Influence"
      target_file: rhetorical_devices_entities
    - target: boost_marker
      relation: supports
      weight: expected
      description: "Active verbs in brand statements (thrive, lead, drive, bridge) amplify confidence and assertiveness, directly supporting boost markers in personal brand messaging per Personal Branding Framework"
      target_file: stance_markers_entities
    - target: authority_opener
      relation: supports
      weight: expected
      description: "Power verbs support authority openers; vocal anchoring with downward inflection and command language signals certainty and authority in initial interactions per Anatomy of Presence research"
    - target: passive_voice_marker
      relation: contrasts_with
      weight: expected
      description: "Power verbs contrast with passive voice — elite speakers use high dynamic-to-stative verb ratios while passive auxiliary verbs correlate negatively with leadership perception (elite_speaker_taxonomy)"
      target_file: writing_entities
    - target: filler_word
      relation: contrasts_with
      weight: expected
      description: "Elite speakers replace low-agency stative verbs and filler-prone hedging with high-dynamism power verbs; power verbs signal competence while fillers undermine it (Architecture of Influence, Sections 1.2, 1.4)"
    - target: delivery_rate_issue
      relation: limits
      weight: optional
      description: "Optimal elite speech rate of 100-120 wpm constrains power verb density; slower pacing allows each power verb to land with emphasis (Architecture of Influence, Sections 1.2, 1.4)"
  rhetorical_pattern:
    description: Named rhetorical devices used for persuasive impact in speeches
    canonical_id: rhetorical_pattern
    entity_kind: rhetorical_device
    family: speech_craft
    gliner_label: RHETORICAL_PATTERN
    gliner_description: Rhetorical device anaphora tricolon repetition parallel structure antithesis chiasmus
    examples:
    - We will fight. We will win. We will prevail.
    - Not just good — great. Not just great — transformative.
    - Ask not what your country can do for you
    - I have a dream... I have a dream... I have a dream
    - Government of the people, by the people, for the people
    anti_examples:
    - Please repeat your answer
    - The pattern in the data
    confidence_threshold: 0.6
    subtypes:
      anaphora:
        description: Repetition of opening words across consecutive phrases
        examples:
        - We will... We will... We will...
      tricolon:
        description: Three parallel phrases or clauses for rhythmic impact
        examples:
        - of the people, by the people, for the people
      antithesis:
        description: Contrasting ideas in parallel structure
        examples:
        - Not just X — but Y
      chiasmus:
        description: Reversed parallel structure (AB → BA)
        examples:
        - Ask not what your country can do for you — ask what you can do for your country
    aliases:
    - figure of speech
    - persuasion technique
    - oratory device
    indicators:
    - not just
    - but also
    - we will
    - we must
    - I have
    - let us
    patterns:
    - (\w+ ){2,}\. \1
    - not just \w+ .+ but \w+
    color: '#1abc9c'
    relates_to:
    - target: anaphora
      relation: contains
      weight: required
      description: Rhetorical patterns subsume named figures of speech; anaphora (repetition
        of opening words) is a core component of rhetorical patterning per elite speaker analysis
      target_file: rhetorical_devices_entities
    - target: tricolon
      relation: contains
      weight: required
      description: Tricolon (rule of three parallel phrases) is a foundational rhetorical
        pattern that creates rhythm and memorability in persuasive speech
      target_file: rhetorical_devices_entities
    - target: chiasmus
      relation: contains
      weight: expected
      description: Chiasmus (reversed parallel structure AB-BA) is an advanced rhetorical
        pattern used by elite speakers to create memorable contrasts per Canonical Methodology
      target_file: rhetorical_devices_entities
    - target: epistrophe
      relation: contains
      weight: expected
      description: Epistrophe (repetition of closing words) is the complement to anaphora
        and frequently appears in high-impact rhetorical sequences
      target_file: rhetorical_devices_entities
    - target: pause_marker
      relation: supported_by
      weight: expected
      description: Rhetorical patterns depend on strategic pausing for delivery impact;
        pauses before and after tricolons and anaphora amplify their persuasive effect
    - target: nonverbal_cue
      relation: supported_by
      weight: expected
      description: Rhetorical patterns are amplified through coordinated gesture and movement;
        the Power Box gesture space supports parallel structure delivery per Ethos research
    - target: narrative_hook
      relation: enables
      weight: expected
      description: Rhetorical patterns create compelling narrative hooks; tricolon and anaphora
        are primary devices for crafting memorable opening statements per Canonical Methodology
      target_file: narrative_entities
    - target: lexical_bundle
      relation: contains
      weight: expected
      description: Elite discourse uses formulaic sequences as rhetorical tools with lexical bundles functioning as discourse organizers per Elite Speaker Linguistic Analysis
    - target: claim
      relation: supports
      weight: expected
      description: "Rhetorical patterns (anaphora, tricolon, antithesis) support claims by providing persuasive delivery structure — Action Titles are declarative claims that rhetorical patterns amplify per Canonical Presentation Methodology"
      target_file: narrative_entities
    - target: antithesis
      relation: contains
      weight: expected
      description: "Rhetorical patterns contain antithesis as a specific contrast device juxtaposing opposing ideas for persuasive effect per Analyzing Story for Business Communication"
      target_file: rhetorical_devices_entities
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: "Rhetorical patterns support ethos appeal; Quintilian argued Actio was the dominant factor in persuasion — a mediocre speech delivered with superb physical rhetoric outperforms a brilliant speech delivered poorly per Anatomy of Presence research"
      target_file: rhetorical_devices_entities
    - target: engagement_cue
      relation: supports
      weight: expected
      description: "Rhetorical patterns support engagement cues; the staircase intonation pattern (step-wise pitch changes) signals structured persuasive argumentation that holds attention per Vocal Profiling research"
      target_file: delivery_entities
    - target: rhetorical_question
      relation: contains
      weight: expected
      description: "Rhetorical patterns contain rhetorical questions as an engagement technique great speakers employ alongside storytelling per Public Speaking research"
      target_file: rhetorical_devices_entities
    - target: performance_tier
      relation: enables
      weight: expected
      description: "Rhetorical patterns (anaphora, tricolon, metaphor density) enable higher performance tiers — the Visionary tier is defined by masterful use of discourse architecture (elite_speaker_taxonomy)"
    - target: pause_marker
      relation: contains
      weight: expected
      description: "Rhetorical patterns structurally contain strategic pauses marking syntactic boundaries and emphasis points per voice metric research"
  lexical_bundle:
    description: Multi-word formulaic sequences characteristic of elite speakers
    canonical_id: lexical_bundle
    entity_kind: rhetorical_device
    family: speech_craft
    gliner_label: LEXICAL_BUNDLE
    gliner_description: Formulaic phrase speaker bundle I want to tell you here is the thing let me show
    examples:
    - I want to tell you
    - Here's the thing
    - Let me show you
    - What I've learned is
    - The truth is
    - Here's what I know
    - Let me be clear
    - Make no mistake
    anti_examples:
    - bundle of sticks
    - product bundle
    confidence_threshold: 0.65
    aliases:
    - formulaic sequence
    - set phrase
    - stock phrase
    indicators:
    - I want to
    - here's the thing
    - let me
    - what I
    - the truth is
    - make no mistake
    - here's what
    - the fact is
    - the reality is
    patterns:
    - I want to (tell|show|share)
    - here's (the thing|what)
    - let me (show|tell|be)
    - the (truth|fact|reality) is
    - make no mistake
    color: '#3498db'
    relates_to:
    - target: authority_opener
      relation: supports
      weight: expected
      description: Lexical bundles like 'Let me be clear' and 'Make no mistake' function as
        authority opener signals establishing speaker command per Canonical Methodology research
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: Formulaic bundles construct ethos through discourse organiser patterns;
        bundles like 'The truth is' and 'Here is what I know' signal directness and credibility
      target_file: rhetorical_devices_entities
    - target: bluf_hook
      relation: enables
      weight: expected
      description: Lexical bundles provide the syntactic scaffolding for BLUF (Bottom Line Up
        Front) openings; 'Here is what you need to know' is both a bundle and a BLUF delivery mechanism
      target_file: opening_hooks_entities
    - target: working_memory_marker
      relation: supports
      weight: expected
      description: Frame markers reduce listener anxiety by providing a roadmap aligning with chunking limitations of human working memory per Elite Speaker Linguistic Analysis
      target_file: cognitive_load_entities
    - target: visionary_bundle
      relation: contains
      weight: expected
      description: Elite speakers dominate use of discourse organizer bundles such as I want to show you and Let me tell you which are a type of lexical bundle per Elite Speaker Linguistic Analysis
      target_file: rhetorical_devices_entities
    - target: rhetorical_pattern
      relation: supports
      weight: expected
      description: "Lexical bundles support rhetorical patterns by providing recurring multi-word sequences that create the staircase intonation structure of persuasive speech per Vocal Profiling research"
    - target: engagement_marker
      relation: supports
      weight: expected
      description: "Lexical bundles such as 'what I want to tell you' and 'if you look at' function as engagement markers that simulate dialogue and force active audience participation per elite_speaker_taxonomy"
      target_file: stance_markers_entities
    - target: academic_bundle
      relation: contrasts_with
      weight: expected
      description: "Visionary lexical bundles (discourse organisers, participant-oriented) contrast with academic bundles (stance, referential) in register and rhetorical function per elite_speaker_taxonomy"
      target_file: discourse_entities
    - target: academic_bundle
      relation: contains
      weight: required
