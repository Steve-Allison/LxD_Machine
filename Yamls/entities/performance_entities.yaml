quality_indicators:
  filler_density:
    description: Rate of filler word occurrence in speaker transcript
    elite: < 1 filler per 100 words — authority maintained
    proficient: 1-3 per 100 words — acceptable for most contexts
    developing: 3-5 per 100 words — noticeable disruption to flow
    needs_coaching: '> 5 per 100 words — significant authority impact'
  opener_quality:
    description: Strength of opening delivery pattern
    strong: 'AUTHORITY_OPENER detected in first 30 words: +5 points'
    weak: 'APOLOGY_OPENER detected: -8 points; in executive context: -12 points'
    neutral: No AUTHORITY_OPENER or APOLOGY_OPENER — generic, unmemorable
  rhetorical_density:
    description: Frequency of rhetorical patterns in speech transcript
    elite: '> 3 rhetorical devices per 500 words'
    adequate: 1-3 per 500 words
    sparse: < 1 per 500 words — flat, low-impact delivery
  hedge_authority_ratio:
    description: Balance between hedging language and authority markers
    note: High hedge density relative to lexical_bundle and power_verb markers indicates low-authority delivery style
    threshold: Hedge markers > 5 per 100 words with < 2 power verbs or lexical bundles = low authority register
