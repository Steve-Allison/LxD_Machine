gliner_config:
  model: urchade/gliner_multi_pii-v1
  batch_size: 8
  context_window: 512
  domain_keywords:
    primary:
    - facilitation
    - ILT
    - VILT
    - instructor
    - trainer
    - classroom
    - engagement
    - delivery
    secondary:
    - breakout
    - icebreaker
    - debrief
    - pacing
    - energy
    - participation
    - moderation
entity_types:
  delivery_modality:
    description: Training delivery formats and modality types
    canonical_id: delivery_modality
    entity_kind: delivery_format
    family: modality
    gliner_label: DELIVERY_MODALITY
    gliner_description: Delivery modality ILT VILT eLearning blended hybrid self-paced instructor-led virtual classroom
    examples:
    - instructor-led training (ILT)
    - virtual instructor-led training (VILT)
    - self-paced eLearning
    - blended learning programme
    - hybrid classroom
    - on-demand module
    - cohort-based online course
    anti_examples:
    - delivery service
    - virtual reality
    confidence_threshold: 0.8
    aliases:
    - training format
    - learning modality
    - instructional format
    indicators:
    - ILT
    - VILT
    - eLearning
    - e-learning
    - blended
    - hybrid
    - self-paced
    - instructor-led
    - virtual classroom
    - on-demand
    - cohort-based
    - synchronous
    - asynchronous
    patterns:
    - (instructor[- ]led|virtual[- ]instructor[- ]led) training
    - (ILT|VILT|eLearning|e-learning)
    - (blended|hybrid|self[- ]paced|on[- ]demand) (learning|course|programme|training)
    - virtual classroom
    color: '#3498db'
    relates_to:
    - target: virtual_platform_feature
      relation: bridges
      weight: required
      description: Delivery modality (in-person vs. virtual) requires different platform features. Virtual presentations require
        camera placement optimization, eye-contact simulation, and attention to framing. Modality choice constrains platform
        feature selection.
    - target: facilitation_technique
      relation: enables
      weight: expected
      description: Delivery modality enables specific facilitation techniques; ILT supports gallery walks and
        physical activities while VILT enables chat storms and breakout room discussions
    - target: session_structure_marker
      relation: contains
      weight: required
      description: Each delivery modality imposes distinct session structure requirements; ILT uses full-day
        structures with physical breaks while VILT requires shorter segmented sessions
    - target: content_structure_marker
      relation: enables
      weight: expected
      description: Delivery modality constrains content architecture; keynotes require sparse high-contrast
        visuals while read-ahead formats require dense rigorous logic layouts
      target_file: content_architecture_entities
    - target: extraneous_load_marker
      relation: limits
      weight: expected
      description: Delivery modality design manages extraneous cognitive load; live presentation demands sparse
        visuals reducing load while VILT combats Zoom fatigue through segmented sessions
      target_file: cognitive_load_entities
    - target: course_format
      relation: contains
      weight: expected
      description: Delivery modality contains course format decisions determining whether content is delivered
        as ILT workshop, VILT modules over weeks, or blended self-paced combinations
      target_file: content_format_entities
    - target: roleplay_activity
      relation: supports
      weight: expected
      description: "Delivery modality determines roleplay format — ILT enables face-to-face roleplay while VILT requires breakout rooms and adapted observation protocols per roleplay research"
      target_file: activity_types_entities
    - target: adult_learner
      relation: supported_by
      weight: expected
      description: Delivery modality choices are grounded in andragogy; adults need relevant, self-directed,
        experiential learning and modality must accommodate autonomy and prior experience
      target_file: audience_entities
    - target: layout_pattern
      relation: enables
      weight: expected
      description: Delivery modality enables specific layout patterns; keynotes use large fonts and sparse
        visuals while read-aheads use dense layouts with smaller fonts for detail
      target_file: visual_elements_entities
    - target: executive_audience
      relation: supports
      weight: expected
      description: "Delivery modality supports executive audiences when matched to preference such as concise slide decks for executives per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: technical_audience
      relation: supports
      weight: expected
      description: "Delivery modality supports technical audiences with whitepapers and engineering-team meetings per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: instructional_strategy
      relation: enables
      weight: expected
      description: "FPI principles are validated across delivery modalities including eLearning MOOCs immersive VR VILT and blended learning per Merrill"
      target_file: pedagogical_frameworks_entities
    - target: nonverbal_cue
      relation: enables
      weight: expected
      description: "Live delivery modalities enable the full range of nonverbal cues (gesture, posture, eye contact) while virtual and asynchronous modalities constrain them per Ethos and Physicality research"
      target_file: performance_entities
    - target: mixed_audience
      relation: supports
      weight: required
      description: "Multi-modal delivery is essential for mixed five-generation audiences with each generation requiring fundamentally different modality access per Learner Persona Research"
      target_file: audience_entities
    - target: engagement_cue
      relation: enables
      weight: expected
      description: "Delivery modality selection triggers engagement cues: mobile notifications for Gen Z, in-CRM pop-ups for Sales Directors, peer community alerts for Millennials per Learner Persona Research"
    - target: slide_type
      relation: supported_by
      weight: expected
      description: "The Live vs Leave-Behind delivery modality decision determines all subsequent design rules including font size, density, and layout per Slide Deck Design Playbook"
      target_file: visual_elements_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "VILT delivery modality triggers specific engagement cues every 5-10 minutes — polls, chat, reactions — while ILT uses physical movement and proximity cues per ILT&VILT Best Practice"
    - target: virtual_platform_feature
      relation: enables
      weight: expected
      description: "VILT delivery modality enables virtual platform features like breakout rooms, polls, whiteboards, and annotation tools that replicate classroom interactivity per ILT&VILT Best Practice"
    - target: delivery_modality_marker
      relation: supports
      weight: expected
      description: "ILT/VILT delivery modalities directly support delivery modality markers that classify whether content is suited for in-person, virtual, or hybrid formats per ILT&VILT Best Practice"
      target_file: content_architecture_entities
    - target: delivery_mode
      relation: bridges
      weight: expected
      description: "Performance delivery modality bridges to pedagogical delivery mode, as all 35+ activities are explicitly organised by synchronous vs asynchronous delivery (Best-Practice Learning Activities)"
      target_file: pedagogical_frameworks_entities
    - target: summative_assessment
      relation: limits
      weight: expected
      description: "Delivery modality constrains summative assessment options — online delivery requires proctoring solutions while face-to-face enables direct observation of performance per innovative learning experiments"
      target_file: assessment_entities
    - target: delivery_modality_marker
      relation: specialises
      weight: expected
      description: "Live presentation vs. read-ahead Slidument are distinct delivery modalities; the Canonical Lifecycle requires the format decision before design begins (Canonical Presentation Methodology)"
      target_file: content_architecture_entities
    - target: pause_marker
      relation: contains
      weight: expected
      description: "The YAML evaluation config defines pause_duration thresholds (strategic_pause_min_ms: 2000) as a core delivery modality metric for elite speech (Architecture of Influence, Part 2 Section 3)"
      target_file: performance_entities
    - target: planning_artefact_marker
      relation: supported_by
      weight: expected
      description: "Delivery methods planned within Content Map's Resources and Delivery Methods column (Content Map Instructions v3)"
      target_file: content_architecture_entities
    - target: mayer_essential_principle
      relation: supported_by
      weight: expected
      description: "Segmenting and pre-training align delivery modality pacing with essential processing limits per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
    - target: progressive_disclosure_marker
      relation: enables
      weight: expected
      description: "Card-based digital delivery enables progressive disclosure through nested scrollable content"
      target_file: cognitive_load_entities
  facilitation_technique:
    description: Named facilitation methods and instructor techniques for live delivery
    canonical_id: facilitation_technique
    entity_kind: delivery_method
    family: facilitation
    gliner_label: FACILITATION_TECHNIQUE
    gliner_description: Facilitation technique Socratic questioning cold call think-pair-share gallery walk parking lot check-in
    examples:
    - Socratic questioning
    - cold calling
    - think-pair-share
    - gallery walk
    - parking lot technique
    - round-robin check-in
    - fishbowl discussion
    - jigsaw method
    anti_examples:
    - cold weather
    - parking lot space
    confidence_threshold: 0.75
    aliases:
    - facilitation method
    - instructor technique
    - engagement strategy
    indicators:
    - Socratic questioning
    - cold call
    - think-pair-share
    - gallery walk
    - parking lot
    - round-robin
    - fishbowl
    - jigsaw
    - snowball
    - carousel
    - world café
    - dot voting
    - affinity mapping
    patterns:
    - (Socratic|guided|open) questioning
    - think[- ]pair[- ]share
    - (gallery|learning) walk
    - (fishbowl|jigsaw|snowball|carousel) (discussion|method|activity)
    - (parking lot|round[- ]robin|world café)
    color: '#2ecc71'
    relates_to:
    - target: engagement_cue
      relation: enables
      weight: expected
      description: Facilitation techniques enable engagement cues by creating interactive contexts in which
        participation prompts like polls, quizzes, and breakout discussions are deployed
    - target: session_structure_marker
      relation: bridges
      weight: expected
      description: Facilitation techniques bridge session structure markers by providing interactive methods
        used within each structural segment from icebreakers to closing debriefs
    - target: discussion_activity
      relation: specialises
      weight: expected
      description: Techniques like fishbowl, Socratic questioning, and world café specialise general discussion
        into structured facilitated interactions with observer feedback and debrief
      target_file: activity_types_entities
    - target: roleplay_activity
      relation: enables
      weight: expected
      description: Facilitation techniques enable roleplay activities by structuring assigned roles, observer
        feedback, and debrief cycles that make simulation-based practice effective
      target_file: activity_types_entities
    - target: presentation_anxiety_marker
      relation: limits
      weight: optional
      description: Gradual exposure through low-stakes speaking opportunities and audience interaction desensitises
        anxiety by distributing attention across the group reducing sole scrutiny
    - target: call_to_action
      relation: enables
      weight: optional
      description: Facilitation techniques enable behavioural calls to action by converting narrative CTAs into
        audience behaviour through structured interaction and practice activities
      target_file: narrative_entities
    - target: mixed_audience
      relation: supports
      weight: expected
      description: "Facilitation techniques support mixed audiences with dialogue facilitation and breakout-and-reconvene strategies per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: reflection_activity
      relation: enables
      weight: expected
      description: "FPI Integration phase requires facilitation techniques like post-VR debriefs teach-back scheduling and action plan guidance per Merrill"
      target_file: activity_types_entities
    - target: engagement_marker
      relation: enables
      weight: expected
      description: "Facilitation techniques enable engagement markers through active listening, insightful questioning, and collaborative dialogue that draw audience participation per Personal Branding Framework"
      target_file: stance_markers_entities
    - target: pause_marker
      relation: supported_by
      weight: expected
      description: "Facilitation techniques are supported by pause markers; the talk-to-listen ratio of 43:57 requires strategic silence to allow space for audience processing and participation per Vocal Profiling research"
      target_file: performance_entities
    - target: scenario_activity
      relation: supports
      weight: required
      description: "SBT requires nuanced facilitation balancing realism with psychological safety; facilitators act as coach using verbal sign-posting and open-ended probing questions per SBT guide"
      target_file: activity_types_entities
    - target: germane_load_marker
      relation: triggers
      weight: expected
      description: "Active audience engagement techniques convert passive receivers to active processors, creating germane load per Slide Deck Design Playbook"
      target_file: cognitive_load_entities
    - target: instructional_event
      relation: supports
      weight: expected
      description: "Facilitation techniques directly execute Gagné's instructional events including scaffolding (Event 5), coaching questions (Event 6), and structured debriefing (Event 7) per theory_gagne_s_nine_events_of_instruction"
      target_file: pedagogical_frameworks_entities
    - target: script_direction
      relation: supported_by
      weight: expected
      description: "Script directions provide narrative cues for facilitation ('[dry smile]', '[pause]', '[reflective tone]') guiding delivery nuance per tone_of_voice_guide"
      target_file: writing_entities
    - target: extraneous_load_marker
      relation: resolves
      weight: optional
      description: "Facilitation techniques like verbal signalling (pause, slower speech, 'The key point is...'), guiding discovery cues, and steering discussions back on-topic resolve extraneous load in live delivery (Applying_Learning_Theory_Practical_Checklist)"
      target_file: cognitive_load_entities
    - target: engagement_cue
      relation: triggers
      weight: expected
      description: "Facilitation techniques such as questioning, storytelling, and name-use directly trigger engagement cues from learners — facilitator energy sets the tone for group engagement per ILT&VILT Best Practice"
    - target: vocal_quality_issue
      relation: resolves
      weight: optional
      description: "Facilitation techniques like voice modulation, varied tone/volume/pace resolve vocal quality issues — use your voice as a tool to maintain interest per ILT&VILT Best Practice"
      target_file: performance_entities
    - target: collaborative_activity
      relation: enables
      weight: expected
      description: "Facilitation techniques enable collaborative activities — think-pair-share, breakout room management, circulating to coach, and structured debrief require skilled facilitation (Gold Standard Structure)"
      target_file: activity_types_entities
    - target: confidence_technique
      relation: supports
      weight: expected
      description: "Facilitation techniques directly support confidence techniques — creating safe environments, validating contributions, and handling wrong answers tactfully builds presenter and learner confidence per ILT&VILT Best Practice"
    - target: nonverbal_cue
      relation: enables
      weight: expected
      description: "Facilitation techniques enable effective nonverbal cues — maintaining eye contact, open body language, looking into camera for virtual eye contact, and nodding to show engagement per ILT&VILT Best Practice"
      target_file: performance_entities
    - target: formative_assessment
      relation: enables
      weight: expected
      description: "Facilitation techniques enable formative assessment — Socratic questioning reveals misconceptions in real time, think-pair-share provides observable performance evidence, and gallery walks enable peer evaluation per Corporate Learning Assessment research"
      target_file: assessment_entities
    - target: rubric_component
      relation: supported_by
      weight: optional
      description: "Facilitation techniques are supported by rubric components that define observable criteria for evaluating facilitated interactions — discussion quality, participation depth, and response accuracy per Corporate Learning Assessment research"
      target_file: assessment_entities
    - target: roleplay_activity
      relation: supports
      weight: expected
      description: "Facilitation techniques support role-play activities through instructor-managed role assignments, scenario scripts, observation checklists, and structured debrief protocols (Best-Practice Learning Activities)"
      target_file: activity_types_entities
    - target: discussion_activity
      relation: supports
      weight: expected
      description: "Facilitation techniques support discussion activities through facilitator-led question posing, moderated dialogues, and seeded weekly topics (Best-Practice Learning Activities)"
      target_file: activity_types_entities
    - target: progressive_disclosure_marker
      relation: supports
      weight: expected
      description: "Facilitation build-and-reveal techniques support progressive disclosure of slide content by controlling information flow during live delivery per slide deck design playbook"
      target_file: cognitive_load_entities
    - target: mayer_generative_principle
      relation: supported_by
      weight: expected
      description: "Facilitation techniques like Socratic questioning and teach-back prompt generative processing activities per Applying Mayer's Principles Practical Checklist"
      target_file: cognitive_load_entities
  engagement_cue:
    description: Verbal and structural cues used to maintain learner engagement during live delivery
    canonical_id: engagement_cue
    entity_kind: delivery_signal
    family: facilitation
    gliner_label: ENGAGEMENT_CUE
    gliner_description: Engagement cue rhetorical question show of hands poll chat waterfall raise hand emoji reaction energy
      check
    examples:
    - raise your hand if
    - type in the chat
    - show of hands
    - quick poll
    - chat waterfall
    - emoji reaction
    - energy check
    - who can tell me
    anti_examples:
    - hand sanitiser
    - chat application
    confidence_threshold: 0.65
    aliases:
    - participation prompt
    - interaction cue
    indicators:
    - raise your hand
    - type in the chat
    - show of hands
    - quick poll
    - chat waterfall
    - emoji reaction
    - who can tell me
    - turn to your partner
    - everyone unmute
    - thumbs up
    patterns:
    - raise (your|a) hand
    - (type|put|drop) (in|into) the chat
    - show of hands
    - (quick|live) poll
    - who (can|wants to) (tell|share|explain)
    - turn to (your|a) (partner|neighbour)
    color: '#e74c3c'
    relates_to:
    - target: virtual_platform_feature
      relation: supported_by
      weight: expected
      description: Engagement cues are supported by virtual platform features including polls, chat waterfalls,
        emoji reactions, and hand-raise mechanisms that deliver cues in VILT contexts
    - target: presentation_anxiety_marker
      relation: limits
      weight: optional
      description: Audience connection through engagement cues shifts focus outward reducing self-focused anxiety;
        tuning into nods, smiles, and reactions replaces inward fear with dialogue
    - target: kirkpatrick_level
      relation: supported_by
      weight: expected
      description: Engagement cue effectiveness is evaluated through Kirkpatrick Level 1 (reaction/sentiment)
        and Level 2 (learning/retention) measuring whether cues produced knowledge transfer
      target_file: assessment_entities
    - target: pause_marker
      relation: precedes
      weight: optional
      description: Engagement cues precede intentional pauses; after posing a question or participation prompt
        facilitators must allow longer silence for participants to unmute or type responses
      target_file: performance_entities
    - target: extraneous_load_marker
      relation: limits
      weight: optional
      description: Frequent small engagement interactions every 5-10 minutes reset the attention clock and keep
        learners mentally present, limiting extraneous cognitive load from monotony
      target_file: cognitive_load_entities
    - target: novice_learner
      relation: supports
      weight: optional
      description: Chat-based and low-barrier engagement cues support novice and introverted learners who prefer
        typing to speaking, ensuring inclusive participation in live sessions
      target_file: audience_entities
    - target: facilitation_technique
      relation: supported_by
      weight: expected
      description: Engagement techniques for remote attention and interaction frequency every 3-5 minutes of content are supported
        by specific facilitation techniques (Comprehensive Learning Design Framework)
    - target: narrative_hook
      relation: supported_by
      weight: expected
      description: Engagement cues are supported by narrative hooks which provide the compelling content that makes participation
        prompts meaningful and contextually anchored per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: audience_objection
      relation: resolves
      weight: expected
      description: "Engagement cues resolve audience objections by surfacing them midway for respectful acknowledgement and real-time adjustment per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: nonverbal_cue
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by nonverbal cue reading including body language and facial expressions signalling engagement or disengagement per Comprehensive Audience Analysis"
      target_file: performance_entities
    - target: pause_marker
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by strategic pauses which give the audience processing time to formulate responses after participation prompts per Elite Speaker Linguistic Analysis"
      target_file: performance_entities
    - target: inclusive_we
      relation: supported_by
      weight: optional
      description: "Engagement cues are supported by inclusive we framing which creates shared ownership and makes participation prompts feel collaborative rather than directive per Elite Speaker Linguistic Analysis"
      target_file: rhetorical_devices_entities
    - target: engagement_dimension
      relation: supports
      weight: expected
      description: "Vocal engagement cues — pitch variability >3.0 semitones SD, prosodic variation — directly support engagement scoring by keeping the listener's auditory cortex active through change detection per Unified Performance Framework"
      target_file: scoring_entities
    - target: rhetorical_question
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by rhetorical questions which directly prompt audience mental participation per Analyzing Story for Business Communication"
      target_file: rhetorical_devices_entities
    - target: pathos_appeal
      relation: supports
      weight: expected
      description: "Engagement cues support pathos appeal; Duchenne smiles create lower social distance and greater willingness to interact, directly serving the emotional connection that pathos requires per Anatomy of Presence research"
      target_file: rhetorical_devices_entities
    - target: emphasis_marker
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by emphasis markers; pitch variability (>2-3 ST SD) and intensity variability are the acoustic hallmarks of charismatic, engaging speech per Vocal Profiling research"
      target_file: performance_entities
    - target: scenario_activity
      relation: supported_by
      weight: expected
      description: "The fiction contract in SBT explicitly asks learners to engage with the scenario as if it were real, establishing emotional investment and engagement commitment per SBT guide"
      target_file: activity_types_entities
    - target: roleplay_activity
      relation: supports
      weight: expected
      description: "Engagement cues support roleplay by establishing participation norms and emotional safety before interpersonal practice activities per roleplay research"
      target_file: activity_types_entities
    - target: audience_motivator
      relation: supported_by
      weight: expected
      description: "Engagement cues must be calibrated to persona motivators: user-generated content for Gen Z, data-driven coaching cues for Sales Directors, credential signals for Marketers per Learner Persona Research"
      target_file: audience_entities
    - target: germane_load_marker
      relation: triggers
      weight: expected
      description: "The 2-minute rule and verbal signposting re-engage audience attention and create active processing (germane load) per Slide Deck Design Playbook"
      target_file: cognitive_load_entities
    - target: animation_type
      relation: supported_by
      weight: optional
      description: "Engagement cues in live delivery can be supported by purposeful animation types that direct audience attention per slide design research monograph"
      target_file: visual_elements_entities
    - target: instructional_event
      relation: supports
      weight: expected
      description: "Engagement cues directly support Gagné's Event 1 (Gain Attention) and Event 6 (Elicit Performance) by prompting audience interaction through polls, questions, and participation activities per theory_gagne_s_nine_events_of_instruction"
      target_file: pedagogical_frameworks_entities
    - target: session_structure_marker
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by session structure markers — strategic placement of interaction points every 10-20 minutes within the session structure maintains attention per ILT&VILT Best Practice"
    - target: extraneous_load_marker
      relation: resolves
      weight: expected
      description: "Engagement cues like varied modalities and frequent interaction resolve extraneous cognitive load by breaking monotony and resetting attention before overload occurs per ILT&VILT Best Practice"
      target_file: cognitive_load_entities
    - target: formative_assessment
      relation: supports
      weight: expected
      description: "Engagement cues support formative assessment by providing real-time participation signals — poll responses, chat answers, and hand-raise patterns serve as informal knowledge checks per Corporate Learning Assessment research"
      target_file: assessment_entities
    - target: quiz_activity
      relation: supported_by
      weight: expected
      description: "Engagement cues are supported by quiz activities including real-time polls, live quizzes, and embedded knowledge checks that maintain learner attention and participation (Best-Practice Learning Activities)"
      target_file: activity_types_entities
    - target: motivation_element
      relation: supported_by
      weight: expected
      description: "Gamification elements (points, badges, leaderboards) serve as engagement cues that must balance entertainment with learning objectives per AI Microlearning Guide"
      target_file: pedagogical_frameworks_entities
    - target: interaction_element_marker
      relation: supported_by
      weight: expected
      description: "Engagement cues during delivery are supported by interaction elements planned in content architecture; the 3-5 minute interaction frequency drives engagement cue timing per Comprehensive Learning Design Framework"
      target_file: content_architecture_entities
    - target: visionary_bundle
      relation: supported_by
