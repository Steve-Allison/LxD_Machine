  relationships:
  - target: taxonomy/rhetorical_devices_taxonomy.yaml
    type: depends_on
    description: Rhetorical device classification for entity label validation
entity_types:
  anaphora:
    label: ANAPHORA
    field_description: Anaphora repetition beginning of successive clauses we will we can I believe this is
    description: Repetition of the same word or phrase at the start of successive clauses for emphasis
    entity_kind: repetition_device
    family: figures_of_speech
    examples:
    - We will build. We will scale. We will win.
    - I believe in our people. I believe in our mission.
    - This is about courage. This is about commitment.
    - We can do more. We can deliver more. We can achieve more.
    - Every customer deserves better. Every team deserves better. Every leader deserves better.
    - Not about the technology. Not about the budget. Not about the timeline.
    confidence_threshold: 0.72
    field: rhetoric
    indicators:
    - We will
    - We can
    - We must
    - I believe
    - This is
    - It is time
    patterns:
    - (We will \w+[.,]\s*){2,}
    - (We can \w+[.,]\s*){2,}
    - (I believe \w+[.,]\s*){2,}
    color: '#e74c3c'
    relates_to:
    - target: epistrophe
      relation: contrasts_with
      weight: expected
      description: Anaphora (start repetition) vs epistrophe (end repetition) — opposing repetition strategies
    - target: tricolon
      relation: enables
      weight: optional
      description: Anaphoric repetition can structure tricolons for rhythmic emphasis
    - target: call_to_action
      relation: supports
      weight: expected
      description: Anaphora (repetition of words at the beginning of successive clauses) amplifies and reinforces a call-to-action
        by creating rhythm, emphasis, and memorability around the desired action.
      target_file: narrative_entities
    - target: anaphora_marker
      relation: supports
      weight: required
      description: The rhetorical device of anaphora (repetition at clause beginnings) creates the anaphora_marker discourse
        phenomenon. Elite speakers deliberately construct anaphoric patterns to build rhythm and trigger audience response.
      target_file: discourse_entities
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: "Anaphora builds a prosodic crescendo signaling to the audience when the climax is reached and is a primary trigger for applause generation per Elite Speaker Linguistic Analysis"
      target_file: narrative_entities
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: "Anaphora creates liturgical rhythm and collective identity through repetition enabling emotional engagement via the Mere Exposure Effect per Elite Speaker Linguistic Analysis"
    - target: performance_tier
      relation: enables
      weight: expected
      description: "Anaphora usage frequency and structural mastery differentiates performance tiers; elite speakers build prosodic crescendos that train audience response and trigger applause per elite_speaker_taxonomy"
      target_file: performance_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - repetition
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: aristotelian_appeal
      values:
      - pathos
      strength: secondary
  epistrophe:
    label: EPISTROPHE
    field_description: Epistrophe repetition same word end of successive clauses matters counts works succeeds
    description: Repetition of the same word or phrase at the end of successive clauses
    entity_kind: repetition_device
    family: figures_of_speech
    examples:
    - Every customer matters. Every deal matters. Every person matters.
    - Speed counts. Accuracy counts. Trust counts.
    - For the customer. For the company. For the future.
    confidence_threshold: 0.7
    field: rhetoric
    indicators:
    - matters
    - counts
    - works
    - succeeds
    patterns:
    - (\w+ \w+\.\s*){2,}\1
    color: '#c0392b'
    relates_to:
    - target: anaphora
      relation: contrasts_with
      weight: expected
      description: Epistrophe (end repetition) vs anaphora (start repetition)
    - target: rhetorical_pattern
      relation: supports
      weight: optional
      description: Epistrophe (repetition at clause ends) creates rhythmic closure and emphasis. When paired with anaphora,
        it creates powerful symmetrical patterns that enhance memorability and persuasive impact.
      target_file: performance_entities
    - target: logos_appeal
      relation: supports
      weight: expected
      description: "Epistrophe's repetitive end-position emphasis creates logical cumulation — each clause builds on the prior, reinforcing the rational argument structure per Ethos and Physicality research"
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - repetition
      strength: primary
  tricolon:
    label: TRICOLON
    field_description: Tricolon rule of three three parallel words phrases clauses speed quality cost faster better cheaper
    description: Three parallel words, phrases, or clauses creating rhythm and memorability
    entity_kind: repetition_device
    family: figures_of_speech
    examples:
    - speed, quality, and cost
    - faster, better, cheaper
    - plan, execute, and deliver
    - people, process, and technology
    - simple, scalable, and secure
    - reduce costs, improve quality, and increase speed
    - discover, design, and deploy
    - connect, engage, and convert
    confidence_threshold: 0.72
    field: rhetoric
    indicators:
    - ', and'
    - ', or'
    patterns:
    - \w+,\s+\w+,\s+and\s+\w+
    - \w+,\s+\w+,\s+or\s+\w+
    - \w+er,\s+\w+er,\s+\w+er
    color: '#e67e22'
    relates_to:
    - target: anaphora
      relation: supported_by
      weight: optional
      description: Tricolons are often structured with anaphoric repetition
    - target: tricolon_marker
      relation: supports
      weight: required
      description: The tricolon device (three parallel elements) creates the tricolon_marker discourse phenomenon. It satisfies
        the brain's pattern recognition while respecting working memory limits. 'Government of the people, by the people,
        for the people' exemplifies this device.
      target_file: discourse_entities
    - target: working_memory_marker
      relation: supports
      weight: required
      description: "The Rule of Three satisfies the brain's desire for order without overwhelming working memory as three is the smallest number to create a pattern per Elite Speaker Linguistic Analysis"
      target_file: cognitive_load_entities
    - target: narrative_hook
      relation: enables
      weight: expected
      description: "Tricolon meta-structure like Just three stories reduces audience cognitive load by providing a structural promise per Elite Speaker Linguistic Analysis"
      target_file: narrative_entities
    - target: pause_marker
      relation: supported_by
      weight: expected
      description: "Tricolon delivery requires strategic pauses between each of the three elements to create rhythmic separation and audience processing time per Ethos and Physicality research"
      target_file: performance_entities
    - target: value_proposition
      relation: supports
      weight: expected
      description: "Tricolon structures value propositions into memorable three-part packages — 'save time, cut costs, boost results' — creating rhythm that aids retention per Best-Practice Elevator Pitches"
      target_file: narrative_entities
    - target: layout_pattern
      relation: supported_by
      weight: optional
      description: "Tricolon (rule of three) is visually supported by the 3-pillar layout pattern with equal-width columns for icons + labels + descriptions per Slide Deck Design Playbook"
      target_file: visual_elements_entities
    - target: performance_tier
      relation: enables
      weight: expected
      description: "Tricolon mastery enables higher performance tiers through rhythmic persuasion; the Rule of Three creates a pattern that signals completeness and satisfies the brain's desire for order per elite_speaker_taxonomy"
      target_file: performance_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - repetition
      - balance
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: power_level
      values:
      - very_high
      strength: primary
  chiasmus:
    label: CHIASMUS
    field_description: Chiasmus reversed parallel grammatical structure A B B A crossing inverted mirror
    description: Two phrases where the second reverses the grammatical structure of the first (A-B / B-A)
    entity_kind: balance_device
    family: figures_of_speech
    examples:
    - We don't sell products; products sell us.
    - Ask not what the company can do for you, but what you can do for the company.
    - When the going gets tough, the tough get going.
    - Work to live, not live to work.
    - Your customer doesn't buy technology; technology buys your customer's trust.
    confidence_threshold: 0.65
    field: rhetoric
    indicators:
    - not
    - but
    patterns:
    - \w+ \w+ \w+; \w+ \w+ \w+
    color: '#8e44ad'
    relates_to:
    - target: antithesis
      relation: contrasts_with
      weight: expected
      description: Chiasmus (ABBA reversal) vs antithesis (opposing ideas) — different balance techniques
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: "Chiasmus demonstrates intellectual sophistication and verbal mastery, directly reinforcing speaker credibility and ethos per Ethos and Physicality research"
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - balance
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: power_level
      values:
      - very_high
      strength: primary
  antithesis:
    label: ANTITHESIS
    field_description: Antithesis contrasting opposing ideas side by side parallel not failure but success not cost but investment
    description: Juxtaposition of contrasting ideas in parallel grammatical structure
    entity_kind: balance_device
    family: figures_of_speech
    examples:
    - Not a cost, but an investment.
    - Not failure, but a learning opportunity.
    - We don't manage change; we create it.
    - Short-term pain, long-term gain.
    - Risk is not the enemy; stagnation is.
    - This isn't a question of if. It's a question of when.
    - Not the status quo. A better path forward.
    confidence_threshold: 0.7
    field: rhetoric
    indicators:
    - Not a
    - Not failure
    - not the enemy
    - but a
    patterns:
    - Not \w+, but \w+
    - not \w+; \w+
    - short-term \w+, long-term \w+
    color: '#2980b9'
    relates_to:
    - target: chiasmus
      relation: contrasts_with
      weight: expected
      description: Antithesis (opposing ideas) vs chiasmus (ABBA structure)
    - target: contrast_marker
      relation: specialises
      weight: expected
      description: Antithesis is a rhetorically refined form of discourse contrast
      target_file: discourse_entities
    - target: contrast_hook
      relation: supports
      weight: expected
      description: "Antithesis directly supports contrast hooks by juxtaposing two opposing ideas to create tension per Analyzing Story for Business Communication"
      target_file: opening_hooks_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - balance
      strength: primary
  rhetorical_question:
    label: RHETORICAL_QUESTION
    field_description: Rhetorical question asked for effect not answer what if why how imagine have you ever
    description: Question posed for persuasive or stylistic effect, not expecting a direct answer
    entity_kind: engagement_device
    family: structural_persuasion
    examples:
    - What if we could cut costs in half?
    - Why do 70% of transformations fail?
    - How can we ignore this opportunity?
    - Have you ever wondered why customers leave?
    - Isn't it time we changed?
    - Who wouldn't want faster results?
    confidence_threshold: 0.75
    field: rhetoric
    indicators:
    - What if
    - Why do
    - How can
    - Have you ever
    - Isn't it time
    - Who wouldn't
    - '?'
    patterns:
    - What if \w+\?
    - Why do \w+\?
    - How can \w+\?
    - Have you ever \w+\?
    color: '#f39c12'
    relates_to:
    - target: narrative_hook
      relation: specialises
      weight: optional
      description: Rhetorical questions can function as narrative hooks
      target_file: narrative_entities
    - target: question_hook
      relation: enables
      weight: expected
      description: Rhetorical questions are the device underlying question-based hooks
      target_file: opening_hooks_entities
    - target: engagement_cue
      relation: supports
      weight: required
      description: Rhetorical questions engage audiences by forcing active cognitive participation. They create cognitive
        engagement and prompt internal dialogue, increasing receptiveness to subsequent content.
      target_file: delivery_entities
    - target: narrative_tension
      relation: triggers
      weight: expected
      description: Rhetorical questions trigger narrative tension by posing unresolved questions that create cognitive gaps the
        audience must close per Crafting Powerful Opening Plays
      target_file: narrative_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: optional
      description: "Rhetorical questions serve as attention hooks in MMS's opening stage and as engagement devices throughout per Monroe's Motivated Sequence research"
    - target: germane_load_marker
      relation: triggers
      weight: expected
      description: "Rhetorical questions directly trigger germane cognitive processing by forcing learners to mentally formulate answers, switching from passive reception to active schema construction per Video Scripts Best Practices"
      target_file: cognitive_load_entities
    - target: authority_opener
      relation: supports
      weight: optional
      description: "Rhetorical questions support authority openers — posing a compelling question within or before an authority opening creates cognitive engagement that amplifies the declarative impact (Mastering Presentation Nerves)"
      target_file: performance_entities
    - target: question_hook
      relation: bridges
      weight: optional
      description: "Rhetorical questions serve dual duty as engagement devices and opening hook variants (Best Video Script Prompts)"
      target_file: opening_hooks_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - engagement
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: aristotelian_appeal
      values:
      - pathos
      strength: secondary
  inclusive_we:
    label: INCLUSIVE_WE
    field_description: Inclusive we our us together collective audience speaker unity we can together we achieve
    description: Use of 'we', 'our', 'us' to create shared identity between speaker and audience
    entity_kind: engagement_device
    family: structural_persuasion
    examples:
    - We are at a turning point.
    - Our shared mission is growth.
    - Together we can transform this market.
    - This is our opportunity.
    - We all know the challenge.
    - Let us be clear about what's at stake.
    confidence_threshold: 0.65
    field: rhetoric
    indicators:
    - We are
    - 'Our '
    - Together we
    - Let us
    - All of us
    patterns:
    - We are \w+
    - Our \w+ is
    - Together we \w+
    - Let us \w+
    color: '#27ae60'
    relates_to:
    - target: customer_hero
      relation: supports
      weight: expected
      description: The 'inclusive we' rhetorical device positions the speaker and audience as allies, supporting the narrative
        of the customer as the hero with the vendor as a partner.
      target_file: character_archetypes_entities
    - target: facilitation_technique
      relation: supports
      weight: required
      description: Inclusive 'we' pronouns facilitate audience connection by dissolving the barrier between speaker and audience.
        They create shared identity and collective purpose, increasing buy-in and receptiveness.
      target_file: delivery_entities
    - target: pathos_appeal
      relation: enables
      weight: expected
      description: "Replacing abstract 'one' or passive 'it' with inclusive 'we' or direct 'you' increases warmth and Linguistic Style Matching, enabling emotional connection per Architecture of Influence"
    - target: mixed_audience
      relation: enables
      weight: expected
      description: "Inclusive we enables cohesion in mixed audiences by tying diverse needs back to a common goal per Comprehensive Audience Analysis"
      target_file: audience_entities
    - target: ethos_appeal
      relation: supports
      weight: expected
      description: "Inclusive We dissolves the barrier between stage and audience signaling high warmth and shared identity creating trust per Elite Speaker Linguistic Analysis"
    - target: engagement_cue
      relation: enables
      weight: expected
      description: "Inclusive We enables audience engagement by simulating dialogue and shared participation creating shared mental space per Elite Speaker Linguistic Analysis"
      target_file: delivery_entities
    - target: engagement_marker
      relation: triggers
      weight: expected
      description: "Inclusive 'we' triggers engagement markers — shared ownership framing (we explore, we'll discuss, your brand) creates collaborative participation per Personal Branding Framework"
      target_file: stance_markers_entities
    - target: monroe_sequence_marker
      relation: supports
      weight: optional
      description: "Inclusive 'we' personalises the MMS narrative, positioning instructor as partner rather than lecturer, enhancing emotional connection per Monroe's Motivated Sequence research"
    - target: audience_pain_point
      relation: bridges
      weight: optional
      description: "Inclusive we bridges speaker to audience pain points through identification — highlighting shared concerns creates connection that surfaces mutual pain per Audience Analysis and Persuasion"
      target_file: audience_entities
    - target: engagement_marker
      relation: supports
      weight: expected
      description: "Research prescribes changing abstract 'one' or passive 'it' to inclusive 'we' or direct 'you' to increase Linguistic Style Matching (LSM) and warmth signaling (Architecture of Influence, Part 2 Constraint #4)"
      target_file: stance_markers_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - engagement
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: aristotelian_appeal
      values:
      - ethos
      strength: secondary
  hyperbole:
    label: HYPERBOLE
    field_description: Hyperbole deliberate exaggeration billions of customers thousands of hours transforming entire industry
    description: Deliberate overstatement used for emphasis or dramatic effect
    entity_kind: amplification_device
    family: figures_of_speech
    examples:
    - This will transform the entire industry.
    - We've saved thousands of hours.
    - Customers love us more than ever.
    - This is the biggest opportunity in a decade.
    - Every single customer wants this.
    confidence_threshold: 0.65
    field: rhetoric
    indicators:
    - entire industry
    - every single
    - thousands of
    - the biggest
    - more than ever
    - transform everything
    patterns:
    - entire \w+
    - every single \w+
    - the biggest \w+ in
    - more than ever
    color: '#e74c3c'
    relates_to:
    - target: claim
      relation: limits
      weight: optional
      description: Hyperbolic framing can undermine claim credibility if overused
      target_file: narrative_entities
    - target: pathos_appeal
      relation: enables
      weight: optional
      description: Hyperbole enables pathos appeals by amplifying emotional stakes through deliberate overstatement, making the
        audience feel the magnitude of an issue per Crafting Powerful Opening Plays
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - amplification
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: aristotelian_appeal
      values:
      - pathos
      strength: primary
  metaphor:
    label: METAPHOR
    field_description: Metaphor implicit comparison is a bridge journey foundation engine catalyst fuel ecosystem
    description: Implicit comparison asserting one thing is another to illuminate meaning
    entity_kind: comparison_device
    family: figures_of_speech
    examples:
    - Data is the new oil.
    - Our platform is a catalyst for growth.
    - The roadmap is a bridge to the future.
    - We are the engine of this transformation.
    - Innovation is in our DNA.
    - This is the foundation of our strategy.
    confidence_threshold: 0.65
    field: rhetoric
    indicators:
    - is the new
    - is a catalyst
    - is a bridge
    - is in our DNA
    - is the engine
    - is the foundation
    patterns:
    - \w+ is the new \w+
    - \w+ is a \w+ for
    - is in our DNA
    color: '#16a085'
    relates_to:
    - target: simile
      relation: contrasts_with
      weight: expected
      description: Metaphor (implicit comparison) vs simile (explicit like/as comparison)
    - target: analogy
      relation: supported_by
      weight: optional
      description: Metaphors can be grounded by underlying analogical reasoning
      target_file: evidence_types_entities
    - target: visionary_bundle
      relation: supports
      weight: required
      description: Metaphors are foundational to visionary rhetoric. They allow speakers to map inference structures from
        known domains to abstract concepts, creating compelling frames. Metaphor density is significantly higher in elite
        visionary speech (e.g., Jobs' 'bicycle for the mind').
      target_file: discourse_entities
    - target: story_hook
      relation: supports
      weight: expected
      description: Metaphors support story hooks by providing vivid imagery that makes opening narratives more compelling and
        memorable per Crafting Powerful Opening Plays
      target_file: opening_hooks_entities
    - target: claim
      relation: supports
      weight: expected
      description: "Metaphors allow the speaker to export inference structure of a known domain to an unknown domain and by choosing the metaphor frame the debate per Elite Speaker Linguistic Analysis"
      target_file: narrative_entities
    - target: germane_load_marker
      relation: supports
      weight: expected
      description: "Elite speakers use high metaphor density when explaining abstract concepts exporting known domain inference structures to support germane schema construction per Elite Speaker Linguistic Analysis"
      target_file: cognitive_load_entities
    - target: semiotic_arrangement
      relation: supported_by
      weight: expected
      description: "Metaphors in visual storytelling rely on semiotic symbolic signs where meaning is culturally learned not logically connected per Visual Communication and Storytelling"
      target_file: visual_elements_entities
    - target: power_verb
      relation: enables
      weight: expected
      description: "Metaphorical framing activates dynamic verbs (ignite, shatter, bridge) that carry the figurative meaning — metaphors enable power verb selection per Ethos and Physicality research"
      target_file: performance_entities
    - target: value_proposition
      relation: supports
      weight: expected
      description: "Metaphors support value propositions — 'Brand You', 'personal brand is the steering wheel', 'product in perpetual beta' make abstract brand concepts tangible per Personal Branding Framework"
      target_file: narrative_entities
    - target: pathos_appeal
      relation: supports
      weight: expected
      description: "Metaphors support pathos appeal; vivid metaphors ('auditory face' for the voice, 'cognitive fingerprint' for gait) create emotional resonance and understanding per Anatomy of Presence research"
    - target: visual_narrative_element
      relation: enables
      weight: expected
      description: "Visual metaphors enable visual narrative elements — bubble charts for market containment, flow diagrams for transformation arcs — creating meaning through semiotic visual representation per Visual Analysis of Slide Decks"
      target_file: visual_elements_entities
    - target: working_memory_marker
      relation: supports
      weight: expected
      description: "Metaphors support working memory by mapping abstract concepts onto familiar concrete domains; exporting inference structure from a known source domain reduces cognitive processing demands per elite_speaker_taxonomy"
      target_file: cognitive_load_entities
    - target: performance_tier
      relation: enables
      weight: expected
      description: "Metaphor density and originality are key markers differentiating performance tiers; elite speakers use significantly higher metaphor density when explaining abstract concepts per elite_speaker_taxonomy"
      target_file: performance_entities
    taxonomy_mapping:
    - taxonomy: rhetorical_devices_taxonomy
      dimension: device_family
      values:
      - comparison
      strength: primary
    - taxonomy: rhetorical_devices_taxonomy
      dimension: power_level
      values:
      - high
      strength: primary
  simile:
    label: SIMILE
    field_description: Simile explicit comparison like as similar to think of it as works like acts like
    description: Explicit comparison using 'like' or 'as' to aid understanding
    entity_kind: comparison_device
    family: figures_of_speech
    examples:
    - Think of it like a flywheel.
    - It works like a GPS for your business.
    - Our platform acts like a nervous system.
    - As fast as flipping a switch.
    - Like adding fuel to a fire.
    confidence_threshold: 0.7
    field: rhetoric
    indicators:
    - Think of it like
    - works like
    - acts like
    - similar to
    - like a
    - as fast as
