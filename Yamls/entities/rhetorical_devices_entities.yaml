  monroe_sequence_marker:
    label: MONROE_SEQUENCE
    description: 'Signals of Monroe''s Motivated Sequence structure — the five-stage persuasive sequence: Attention → Need
      → Satisfaction → Visualisation → Action'
    field_description: Monroe motivated sequence attention need satisfaction visualisation action imagine if we did this here
      is what it looks like here is how we get there
    entity_kind: structural_framework
    family: argument_structure
    examples:
    - Here is the problem we all face. (Need stage)
    - Here is exactly how we solve it. (Satisfaction stage)
    - Picture what success looks like. (Visualisation stage)
    - Here is what we need from you today. (Action stage)
    - This is why this moment matters. (Attention stage)
    - The solution is already proven. Let me show you what it looks like in practice.
    - Imagine a world where this problem is solved. Here is how we get there.
    confidence_threshold: 0.67
    field: rhetoric
    indicators:
    - here is the problem
    - here is how we solve it
    - picture what success looks like
    - here is what we need from you
    - this is why this moment matters
    - the solution is already proven
    - here is how we get there
    patterns:
    - here is the (problem|challenge|issue)
    - here is (exactly )?how we (solve|address|fix)
    - picture what (success|this) looks like
    - here is what we need from you
    - imagine (a world|what it looks like|success)
    color: '#9b59b6'
    five_stages:
      attention: Hooks audience attention — curiosity gap, statistic, or story opening
      need: Establishes the problem that demands resolution
      satisfaction: Presents the solution in concrete terms
      visualisation: Projects what success looks like when the solution is adopted
      action: Issues a clear, specific call to action
