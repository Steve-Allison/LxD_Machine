  scqa_marker:
    label: SCQA_MARKER
    description: Signals of Minto's SCQA narrative structure — the Situation/Complication/Question/Answer rhetorical sequence
      used in executive communication
    field_description: SCQA structure situation complication question answer the challenge is so the question becomes here
      is the answer here is our recommendation
    entity_kind: structural_framework
    family: argument_structure
    examples:
    - 'The situation is this: our market is growing at 15% annually. The complication is that our costs are growing faster.
      So the question becomes: how do we maintain margin?'
    - 'Currently, teams spend 40% of their time on manual tasks. The problem is this process cannot scale. The question is:
      what changes now?'
    - Here is the situation. Here is the problem. Here is what we recommend.
    - The context is X. The challenge is Y. So what do we do? Here is the answer.
    - We face three realities. Two create tension. One resolves it.
    confidence_threshold: 0.7
    field: rhetoric
    indicators:
    - the situation is
    - the complication is
    - so the question becomes
    - here is the answer
    - here is our recommendation
    - the challenge is
    - the context is
    - so what do we do
    patterns:
    - the (situation|context) is (this:)? \w+
    - the (complication|challenge|problem) is \w+
    - so the question (becomes|is) \w+
    - here is (the answer|our recommendation|what we recommend)
