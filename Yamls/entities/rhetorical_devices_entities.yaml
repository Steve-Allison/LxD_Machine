    logos_heavy: '> 60% logos markers vs pathos/ethos'
    balanced: Mixed logos, ethos, and pathos across content
    pathos_heavy: '> 60% pathos markers vs logos/ethos'
  device_density:
    sparse: < 1 device per 500 words
    adequate: 1-3 per 500 words
    rich: '> 3 per 500 words'
  engagement_signals:
    low: < 2 engagement devices (rhetorical_question, inclusive_we) per section
    good: 2-4 engagement devices per section
    high: '> 4 engagement devices — check for over-engineering'
  structural_framework_presence:
    description: Checks for presence of structural argument frameworks in executive and sales decks
    scqa_executive: 'SCQA_MARKER in executive deck: +5 points narrative quality'
    kairos_close: 'KAIROS in close section: +3 points persuasion quality'
    monroe_full: 'Full MONROE_SEQUENCE (5 stages): +8 points structure quality'
    no_framework: 'No structural framework detected in full-length deck: -5 points (flat, undifferentiated structure)'
