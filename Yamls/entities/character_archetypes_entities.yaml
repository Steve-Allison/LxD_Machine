quality_indicators:
  archetype_coverage:
    minimal: Only hero detected — flat, underdeveloped story
    developing: Hero + 1-2 supporting archetypes
    rich: Hero + mentor + villain + herald detected — full narrative tension
  business_narrative_fit:
    vendor_centric: 'Vendor as hero detected — reframe so customer is hero (penalty: -8 points)'
    balanced: Customer hero + vendor as mentor — ideal business narrative
    customer_centric: Customer hero prominent, vendor in background — strong
    champion_present: CHAMPION detected alongside CUSTOMER_HERO — narrative has internal credibility signal (+3 points)
  soar_narrative_alignment:
    description: Checks whether detected archetypes appear in expected SOAR stages
    misalignment_signals:
    - VENDOR_AS_MENTOR language appearing in RESULT stage — vendor overclaiming ownership of outcome
    - HERO language assigned to vendor — customer hero displaced
    - No VILLAIN or HERALD detected — narrative lacks tension, story falls flat
    - CHAMPION absent in multi-stakeholder deal narrative — reduces credibility
    alignment_bonus: +5 points when CUSTOMER_HERO + VENDOR_AS_MENTOR + VILLAIN all detected in correct SOAR sequence
