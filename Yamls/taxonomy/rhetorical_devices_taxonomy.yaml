_meta:
  id: rhetorical_devices_taxonomy
  title: "Rhetorical Devices Taxonomy"
  description: "Classification of rhetorical and persuasive language devices by communicative function — repetition, balance, amplification, comparison, engagement, structural organisation, and Aristotelian appeals"
  domain: narrative
  domain_type: classification
  purpose: taxonomy
  version: "1.4.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Research - Canonical Presentation Methodology Research.md"
    - "Corpus/Research/PDL Architecture: Narrative & Discourse Analysis Series.md"
  academic_sources:
    - "Aristotle - Rhetoric"
    - "Corbett & Connors (1998) - Classical Rhetoric for the Modern Student"
    - "Fahnestock (1999) - Rhetorical Figures in Science"
    - "Leith (2011) - You Talkin' to Me?"

  relationships:
    - target: entities/rhetorical_devices_entities.yaml
      type: depends_on
