  id: accessibility_taxonomy
  title: "Accessibility Taxonomy"
  description: "Classification of accessibility requirements by WCAG conformance level, disability category, content modality, accommodation type, and audit severity"
  domain: visual
  domain_type: cross_cutting
  purpose: taxonomy
  version: "1.2.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/Research - Narrative Visualization, Sketchnoting, Accessibility.md"
    - "Corpus/Research/Research - The Cognitive Interface - Operationalizing UxD for Documents and Reports.md"
    - "Corpus/Research/universal_learning_design_framework.md"
  academic_sources:
    - "W3C (2018) - Web Content Accessibility Guidelines (WCAG) 2.1"
    - "Section 508 Standards"
    - "EN 301 549 (European Accessibility Standard)"
  relationships:
    - target: entities/accessibility_entities.yaml
      type: depends_on
      description: "Accessibility entity types for NER extraction"
    - target: reference/accessibility_standards.yaml
