  description: "Classification of discourse structures by relation type, coherence level, connective function, complexity tier, and analysis granularity"
  domain: narrative
  domain_type: cross_cutting
  purpose: taxonomy
  version: "1.1.0"
  last_updated: "2026-03-01"
  corpus_sources:
    - "Corpus/Research/PDL_ARCHITECTURE_NARRATIVE_DISCOURSE_SERIES.md"
