  description: "Classification of 16 research-validated instructional design frameworks by learning paradigm — behaviourist, cognitivist, constructivist, humanist, and experiential — with selection guidance and use case routing"
  domain: pedagogical
  domain_type: classification
  purpose: taxonomy
  version: "1.4.0"
  last_updated: "2026-03-01"
  corpus_sources:
