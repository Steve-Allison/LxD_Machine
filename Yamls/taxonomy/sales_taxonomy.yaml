  id: sales_taxonomy
  purpose: taxonomy
  version: "1.2.0"
  last_updated: "2026-03-01"
  description: "Classification of sales conversation signals and deal dynamics by signal type, deal stage, qualification framework, objection category, and engagement type."
  domain: sales
  domain_type: workflow
  corpus_sources:
    - "Corpus/Research/soar_mapping_by_sales_stage.md"
    - "Corpus/Research/Storytelling_for_Different_Business_Personas.md"
    - "Corpus/Research/Research - Using SOAR Storytelling most effectively.md"
  academic_sources:
    - "MEDDIC/MEDDPICC qualification framework"
    - "SPIN Selling - Rackham (1988)"
    - "Challenger Sale - Dixon & Adamson (2011)"
    - "Adobe SOAR framework"
  relationships:
    - target: entities/sales_entities.yaml
      type: depends_on
