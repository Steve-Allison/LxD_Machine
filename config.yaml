paths:
  corpus_path: Knowledge_Base
  ontology_path: Yamls
  data_path: data/openai

ollama:
  url: http://localhost:11434

models:
  embed: text-embedding-3-small
  embed_dims: 1536
  embed_backend: openai
  llm: qwen3:14b
  rerank: qwen3-reranker:0.6b
  llm_no_think: true

openai:
  api_key_env: OPENAI_API_KEY
  model: text-embedding-3-small
  dims: 1536
  batch_size: 512
  max_workers: 8

chunking:
  strategy: hybrid_docling
  chunk_size: 256
  chunk_overlap: 50
  min_tokens: 20
  tokenizer_backend: tiktoken
  tokenizer_name: cl100k_base

embedding:
  timeout_secs: 60
  retry_attempts: 3
  retry_backoff:
    - 1
    - 2
    - 4
  query_instruction: null

corpus:
  text_extensions:
    - ".md"
    - ".docling.json"
    - ".docling.md"
  asset_extensions:
    - ".png"
  ignore_names:
    - ".DS_Store"
  min_text_file_bytes: 1

assets:
  register_png: true
  infer_docling_parent: true

ontology:
  include_globs:
    - "**/*.yaml"
  ignore_names: []

retrieval:
  dense_top_k: 20
  rerank_top_k: 20
  lexical_fusion_weight: 2.0
  relation_fusion_weight: 1.0

reranker:
  enabled: true
  backend: llama_cpp
  url: http://127.0.0.1:8012
  endpoint: /v1/rerank
  timeout_secs: 30
  launch:
    auto_start: true
    executable: llama-server
    model_source: ollama_blob
    host: 127.0.0.1
    port: 8012
    startup_timeout_secs: 120
    extra_args: []

expansion:
  enabled: true
  hops: 1
  max_terms: 12

relation_extraction:
  enabled: true
  backend: openai
  fallback_backend: ollama
  openai_model: gpt-4o-mini
  ollama_model: qwen3:14b
  min_entity_mentions: 2
  max_relations_per_chunk: 15
  temperature: 0.0
  timeout_secs: 90

synthesis:
  max_chunks: 8
  timeout_secs: 60
  temperature: 0.1
  max_tokens: 1500

mcp:
  server_name: lxd-machine
  version: 0.1.0

logging:
  level: INFO
  format: json
